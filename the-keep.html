/* ----- 2b. CROSS-MODULE REFS ------------------------------------------- */
/* One module looks at another's data via Refs, never via direct key knowledge.
   This keeps every cross-reference (NPC wikilinks, pin-to-today, backlinks,
   add-from-roster) in one place that can evolve as integrations deepen. */
const Refs = {
  async calendar() { return (await Vault.get('almanac-calendar')) || DEFAULT_CALENDAR; },

  async today() {
    let t = await Vault.get('almanac-today');
    if (!t) {
      const cal = await this.calendar();
      t = { year: cal.year, month: 0, day: 1 };
      await Vault.set('almanac-today', t);
    }
    return t;
  },
  async setToday(date) { return Vault.set('almanac-today', date); },
  async advanceToday(days = 1) {
    const t = await this.today();
    const cal = await this.calendar();
    const dpm = cal.daysPerMonth;
    const monthsPerYear = cal.months.length;
    let d = t.day + days, m = t.month, y = t.year;
    while (d > dpm) { d -= dpm; m++; if (m >= monthsPerYear) { m = 0; y++; } }
    while (d < 1)   { m--; if (m < 0) { m = monthsPerYear - 1; y--; } d += dpm; }
    const next = { year: y, month: m, day: d };
    await this.setToday(next);
    return next;
  },
  dayKey(date) { return `${date.year}-${date.month}-${date.day}`; },
  async formatDate(date) {
    const cal = await this.calendar();
    return this.formatDateWith(date, cal);
  },
  // Sync variants for rooms that have already fetched the calendar
  // (Watch, Cabinet, Almanac, Coffer). The async formatDate above is
  // a thin wrapper around these; one canonical chronicle date format
  // ("12 Frostmoon, 712") lives here so the chronicle reads the same
  // in toasts, item meta, and panel headers.
  formatDateWith(date, calendar) {
    if (!date || typeof date !== 'object') return '';
    return date.day + ' ' + (calendar.months[date.month] || '?') + ', ' + date.year;
  },
  formatDateLongWith(date, calendar) {
    if (!date || typeof date !== 'object') return '';
    const dn = calendar.daynames[(date.day - 1) % calendar.daynames.length] || '';
    return (dn ? dn + ', ' : '') + this.formatDateWith(date, calendar);
  },

  async pinToToday(text, origin) {
    const today = await this.today();
    const notes = (await Vault.get('almanac-notes')) || {};
    const key = this.dayKey(today);
    const note = notes[key] || { weather: '', body: '' };
    note.body = (note.body ? note.body + '\n\n' : '') + text;
    // If the caller supplied origin metadata, also record a structured
    // pin entry so the Almanac can render a Jump-to-source chip. The
    // body text is still appended for legacy excerpt/search behaviour.
    if (origin && origin.module) {
      note.pins = note.pins || [];
      note.pins.push({ text, origin, ts: Date.now() });
    }
    note.updated = Date.now();
    notes[key] = note;
    await Vault.set('almanac-notes', notes);
    return today;
  },

  // Centralised origin navigator. Pinning callers tag an entry with
  // origin = { module, id?, mapId?, poiId?, label }. This dispatches
  // each one to the right room and (where possible) the right item.
  async jumpToOrigin(origin) {
    if (!origin || !origin.module) return;
    const mod = origin.module;
    if (mod === 'atlas') {
      if (origin.mapId) await Vault.set('atlas-active', origin.mapId);
      if (origin.poiId) await Vault.set('atlas-poi-show', origin.poiId);
      return Keep.mount('atlas');
    }
    if (mod === 'cabinet' && origin.id) {
      await Vault.set('cabinet-highlight', origin.id);
      return Keep.mount('cabinet');
    }
    if (mod === 'threats' && origin.id) {
      await Vault.set('threats-highlight', origin.id);
      return Keep.mount('threats');
    }
    if (mod === 'fellowship' && origin.id) {
      await Vault.set('fellowship-highlight', origin.id);
      return Keep.mount('fellowship');
    }
    if (mod === 'faces' && origin.id) {
      await Vault.set('faces-show', origin.id);
      return Keep.mount('faces');
    }
    if (mod === 'factions' && origin.id) {
      await Vault.set('factions-expand', origin.id);
      return Keep.mount('factions');
    }
    if (mod === 'wayfarer' && origin.id) {
      await Vault.set('wayfarer-highlight', origin.id);
      return Keep.mount('wayfarer');
    }
    // For modules with no per-item navigation (oracle, augury, spark,
    // bones, hearth, lists, quest, skirmish, tavern, loot, coffer),
    // just mount the room.
    return Keep.mount(mod);
  },

  async npcRoster() { return (await Vault.get('faces-roster')) || []; },
  async npcByName() {
    const r = await this.npcRoster();
    const m = new Map();
    for (const n of r) m.set(n.name, n);
    return m;
  },
  npcAsMarkdown(npc) {
    return `# ${npc.name}\n\n*${npc.role}, ${npc.culture}*\n\n` +
           `**Voice:** ${npc.voice}\n\n` +
           `**Wants:** ${npc.want}\n\n` +
           `**Mannerism:** ${npc.mannerism}\n\n` +
           `**Appearance:** ${npc.physical}\n\n` +
           `**Secret:** ${npc.secret}\n\n`;
  },

  // Atlas lookup. Returns a Map keyed by POI name AND region name,
  // each value: { kind: 'poi'|'region', mapId, mapName, biomeName,
  // poiId?, type?, preview }. POI keys win over region keys if a
  // map happens to share a name with a POI (extremely unlikely).
  async atlasByName() {
    const maps = (await Vault.get('atlas-maps')) || [];
    const m = new Map();
    // Region names first; POIs overwrite if any collision (shouldn't happen).
    for (const map of maps) {
      if (!m.has(map.name)) {
        m.set(map.name, {
          kind: 'region',
          mapId: map.id,
          mapName: map.name,
          biomeName: map.biome,
          preview: 'A ' + map.biome + ' region with ' + (map.pois || []).length + ' marks.'
        });
      }
    }
    for (const map of maps) {
      for (const poi of (map.pois || [])) {
        m.set(poi.name, {
          kind: 'poi',
          mapId: map.id,
          mapName: map.name,
          biomeName: map.biome,
          poiId: poi.id,
          type: poi.type,
          preview: (poi.backstory || '').slice(0, 220)
        });
      }
    }
    return m;
  },
  async openAtlasPoi(ref) {
    if (!ref || !ref.mapId) return;
    await Vault.set('atlas-active', ref.mapId);
    if (ref.kind === 'poi' && ref.poiId) await Vault.set('atlas-poi-show', ref.poiId);
    return Keep.mount('atlas');
  },

  async archiveEntries() { return (await Vault.get('archive-entries')) || {}; },
  async backlinks(targetName) {
    const entries = await this.archiveEntries();
    const out = [];
    const safe = targetName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`\\[\\[${safe}\\]\\]`);
    for (const [k, e] of Object.entries(entries)) {
      if (re.test(e.body || '')) out.push(k);
    }
    return out;
  },
  async openArchiveEntry(name) {
    const entries = await this.archiveEntries();
    if (!entries[name]) {
      const npcs = await this.npcByName();
      const isNpc = npcs.has(name);
      const body = isNpc ? this.npcAsMarkdown(npcs.get(name)) : `# ${name}\n\n`;
      entries[name] = { title: name, body, type: isNpc ? 'person' : null, updated: Date.now() };
      await Vault.set('archive-entries', entries);
    } else if (!entries[name].type) {
      // back-fill type for older entries
      const npcs = await this.npcByName();
      if (npcs.has(name)) {
        entries[name].type = 'person';
        await Vault.set('archive-entries', entries);
      }
    }
    await Vault.set('archive-current', name);
    return Keep.mount('archive');
  },
  async openAlmanacAt(date) {
    if (date && typeof date === 'object') {
      await Vault.set('almanac-selected', date);
    }
    return Keep.mount('almanac');
  }
};

/* ----- 3. APP SHELL & ROUTER ------------------------------------------- */
const Keep = (() => {
  const modules = new Map();
  const categories = [
    { id: 'workshop',  name: 'Workshop' },
    { id: 'mysteries', name: 'Mysteries' },
    { id: 'table',     name: 'The Table' }
  ];
  // ids that anchor the top nav section (always rendered first, in this order)
  const topIds = ['home', 'campaigns'];
  let current = null;
  let folio, nav, chipWrap;

  function register(mod) { modules.set(mod.id, mod); }

  async function mount(id) {
    if (current && current.unmount) current.unmount();
    const mod = modules.get(id);
    if (!mod) return;
    current = mod;
    folio.innerHTML = '';
    folio.append(
      U.el('div', { class: 'folio__head' }, [
        U.el('div', {}, [
          U.el('h1', { class: 'folio__title' }, mod.name),
          U.el('div', { class: 'folio__sub' }, mod.sub || '')
        ]),
        U.el('div', { class: 'folio__actions', id: 'folio-actions' })
      ])
    );
    const body = U.el('div', { id: 'folio-body' });
    folio.append(body);
    document.querySelectorAll('.nav__btn').forEach(b => {
      b.classList.toggle('nav__btn--active', b.dataset.mid === id);
    });
    if (mod.mount) await mod.mount(body, document.getElementById('folio-actions'));
    Vault.set('last-module', id);
  }

  function renderNav() {
    nav.innerHTML = '';
    // top section: home + roll (and any other category-null modules)
    const topSec = U.el('div', { class: 'nav__section' });
    topIds.forEach(id => { if (modules.has(id)) topSec.append(makeNavBtn(modules.get(id))); });
    nav.append(topSec);

    for (const cat of categories) {
      const mods = [...modules.values()].filter(m => m.category === cat.id);
      if (!mods.length) continue;
      const sec = U.el('div', { class: 'nav__section' });
      sec.append(U.el('div', { class: 'nav__heading' }, cat.name));
      mods.forEach(m => sec.append(makeNavBtn(m)));
      nav.append(sec);
    }
  }
  function makeNavBtn(m) {
    const btn = U.el('button', { class: 'nav__btn', 'data-mid': m.id });
    const g = U.el('span', { class: 'nav__glyph' });
    g.appendChild(U.glyph(m.glyph));
    btn.append(g, U.el('span', {}, m.name));
    btn.addEventListener('click', () => mount(m.id));
    return btn;
  }

  async function renderChip() {
    if (!chipWrap) return;
    chipWrap.innerHTML = '';
    const all = await Campaigns.list();
    const activeId = Vault.getActiveCampaign();
    const cur = all.find(c => c.id === activeId);
    if (!cur) return;

    const chip = U.el('button', { class: 'campaign-chip', title: 'Switch chronicle' }, [
      U.el('span', { class: 'campaign-chip__sigil' }, '\u2766'),
      U.el('span', { class: 'campaign-chip__name' }, cur.name),
      U.el('span', { class: 'campaign-chip__chevron' }, '\u25BE')
    ]);
    const menu = U.el('div', { class: 'campaign-menu', hidden: '' });

    all.forEach(c => {
      const isActive = c.id === activeId;
      menu.append(U.el('button', {
        class: 'campaign-menu__item' + (isActive ? ' campaign-menu__item--active' : ''),
        onclick: async () => { menu.setAttribute('hidden', ''); if (!isActive) await switchTo(c.id); }
      }, [
        U.el('span', { class: 'campaign-menu__check' }, isActive ? '\u2713' : '\u00A0'),
        U.el('span', {}, c.name)
      ]));
    });
    menu.append(U.el('div', { class: 'campaign-menu__divider' }));
    menu.append(U.el('button', {
      class: 'campaign-menu__item',
      onclick: async () => {
        menu.setAttribute('hidden', '');
        const name = prompt('Name this new chronicle');
        if (!name) return;
        const id = await Campaigns.create(name);
        await switchTo(id);
      }
    }, [U.el('span', { class: 'campaign-menu__check' }, '+'), U.el('span', {}, 'New Chronicle')]));
    menu.append(U.el('button', {
      class: 'campaign-menu__item',
      onclick: () => { menu.setAttribute('hidden', ''); mount('campaigns'); }
    }, [U.el('span', { class: 'campaign-menu__check' }, '\u2767'), U.el('span', {}, 'The Roll')]));

    chip.addEventListener('click', (e) => {
      e.stopPropagation();
      if (menu.hasAttribute('hidden')) menu.removeAttribute('hidden');
      else menu.setAttribute('hidden', '');
    });
    document.addEventListener('click', () => menu.setAttribute('hidden', ''));

    chipWrap.append(chip, menu);
  }

  async function switchTo(id) {
    await Vault.global.set('active-campaign', id);
    Vault.setActiveCampaign(id);
    const all = await Campaigns.list();
    const c = all.find(x => x.id === id);
    if (c) { c.updated = Date.now(); await Vault.global.set('campaigns', all); }
    await renderChip();
    const last = await Vault.get('last-module');
    await mount(last && modules.has(last) ? last : 'home');
    U.toast('Chronicle: ' + (c ? c.name : 'switched'));
  }

  async function initTheme() {
    const saved = (await Vault.global.get('theme')) || 'light';
    applyTheme(saved);
    const toggle = document.getElementById('theme-toggle');
    if (toggle) {
      renderToggleIcon(toggle, saved);
      toggle.addEventListener('click', async () => {
        const cur = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
        const next = cur === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        await Vault.global.set('theme', next);
        renderToggleIcon(toggle, next);
        if (current && current.id) await mount(current.id);
      });
    }
  }
  function applyTheme(theme) {
    if (theme === 'dark') document.documentElement.dataset.theme = 'dark';
    else delete document.documentElement.dataset.theme;
  }
  function renderToggleIcon(btn, theme) {
    btn.innerHTML = theme === 'dark'
      ? '<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M12 3 C 14 7 17 8 17 13 C 17 17 14 21 12 21 C 10 21 7 17 7 13 C 7 10 9 9 10 7 C 11 9 12 9 12 6 Z"/></svg>'
      : '<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M20 14 A 8 8 0 1 1 10 4 A 6 6 0 0 0 20 14 Z"/></svg>';
    btn.title = theme === 'dark' ? 'Return to the light' : 'Enter the shadow';
  }

  /* ---------- Universal Search ---------- */

  let searchOpen = false;

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]);
  }
  function hl(text, q) {
    if (!q) return escHtml(text);
    const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escHtml(text).replace(new RegExp(safe, 'gi'), m => `<mark class="search-modal__hit">${m}</mark>`);
  }
  function snip(text, q, maxLen) {
    text = String(text || '').replace(/\s+/g, ' ').trim();
    if (!text) return '';
    if (!q) return text.slice(0, maxLen || 160) + (text.length > (maxLen || 160) ? '\u2026' : '');
    const low = text.toLowerCase();
    const idx = low.indexOf(q.toLowerCase());
    if (idx < 0) return text.slice(0, maxLen || 160);
    const span = maxLen || 140;
    const start = Math.max(0, idx - Math.floor(span / 3));
    const end = Math.min(text.length, start + span);
    const pre = start > 0 ? '\u2026' : '';
    const post = end < text.length ? '\u2026' : '';
    return pre + hl(text.slice(start, end), q) + post;
  }

  async function buildIndex() {
    const idx = [];

    // Archive
    try {
      const entries = (await Vault.get('archive-entries')) || {};
      for (const [name, e] of Object.entries(entries)) {
        idx.push({
          group: 'The Archive',
          moduleId: 'archive',
          title: e.title || name,
          subtitle: '',
          body: e.body || '',
          onSelect: () => Refs.openArchiveEntry(name)
        });
      }
    } catch {}

    // Hall of Faces (NPCs)
    try {
      const roster = (await Vault.get('faces-roster')) || [];
      for (const n of roster) {
        idx.push({
          group: 'Hall of Faces',
          moduleId: 'faces',
          title: n.name,
          subtitle: (n.role || '') + (n.culture ? ' \u00b7 ' + n.culture : ''),
          body: [n.voice, n.want, n.mannerism, n.physical, n.secret].filter(Boolean).join(' '),
          onSelect: async () => { await Vault.set('faces-show', n.id); await mount('faces'); }
        });
      }
    } catch {}

    // The Fellowship (companions)
    try {
      const companions = (await Vault.get('fellowship')) || [];
      for (const c of companions) {
        idx.push({
          group: 'The Fellowship',
          moduleId: 'fellowship',
          title: c.name,
          subtitle: (c.archetype || '') + (c.status ? ' \u00b7 ' + c.status : ''),
          body: [c.voice, ...(c.customLines || []), ...(c.speakHistory || []).slice(0, 5)].filter(Boolean).join(' '),
          onSelect: async () => { await Vault.set('fellowship-highlight', c.id); await mount('fellowship'); }
        });
      }
    } catch {}

    // The Wayfarer (PC sheets)
    try {
      const pcs = (await Vault.get('wayfarer')) || [];
      for (const pc of pcs) {
        idx.push({
          group: 'The Wayfarer',
          moduleId: 'wayfarer',
          title: pc.name,
          subtitle: [pc.lineage, pc.calling].filter(Boolean).join(' \u00b7 '),
          body: [pc.description, pc.oath, pc.bonds, pc.carried, pc.notes].filter(Boolean).join(' '),
          onSelect: async () => { await Vault.set('wayfarer-highlight', pc.id); await mount('wayfarer'); }
        });
      }
    } catch {}

    // Faction Ledger
    try {
      const factions = (await Vault.get('factions')) || [];
      for (const f of factions) {
        idx.push({
          group: 'Faction Ledger',
          moduleId: 'factions',
          title: (f.sigil ? f.sigil + ' ' : '') + f.name,
          subtitle: f.motto || '',
          body: (f.goal || '') + ' ' + (f.notes || ''),
          onSelect: async () => { await Vault.set('factions-expand', f.id); await mount('factions'); }
        });
      }
    } catch {}

    // The Cabinet
    try {
      const items = (await Vault.get('cabinet')) || [];
      for (const it of items) {
        idx.push({
          group: 'The Cabinet',
          moduleId: 'cabinet',
          title: it.name,
          subtitle: (it.kind || '') + (it.status ? ' \u00b7 ' + it.status : ''),
          body: [it.description, it.heldBy, it.foundAt, it.worth].filter(Boolean).join(' '),
          onSelect: async () => { await Vault.set('cabinet-highlight', it.id); await mount('cabinet'); }
        });
      }
    } catch {}

    // Threats
    try {
      const threats = (await Vault.get('threats')) || [];
      for (const t of threats) {
        const isDone = t.filled >= t.total;
        idx.push({
          group: 'Threats',
          moduleId: 'threats',
          title: t.name,
          subtitle: isDone ? 'fulfilled' : (t.filled + '/' + t.total),
          body: t.description || '',
          onSelect: async () => { await Vault.set('threats-highlight', t.id); await mount('threats'); }
        });
      }
    } catch {}

    // Almanac day notes
    try {
      const notes = (await Vault.get('almanac-notes')) || {};
      const cal = await Refs.calendar();
      for (const [key, n] of Object.entries(notes)) {
        if (!n || (!n.body && !n.weather)) continue;
        const parts = key.split('-').map(Number);
        const [y, m, d] = parts;
        if (Number.isNaN(y) || Number.isNaN(m) || Number.isNaN(d)) continue;
        const title = Refs.formatDateWith({ year: y, month: m, day: d }, cal);
        idx.push({
          group: 'The Almanac',
          moduleId: 'almanac',
          title,
          subtitle: n.weather || '',
          body: n.body || '',
          onSelect: () => Refs.openAlmanacAt({ year: y, month: m, day: d })
        });
      }
    } catch {}

    // Oracle history
    try {
      const hist = (await Vault.get('oracle-history')) || [];
      hist.slice(0, 80).forEach(h => {
        if (!h || !h.q) return;
        idx.push({
          group: 'The Oracle',
          moduleId: 'oracle',
          title: h.q,
          subtitle: (h.verdict || '') + (h.qualifier ? ' \u00b7 ' + h.qualifier : ''),
          body: h.comp || '',
          onSelect: () => mount('oracle')
        });
      });
    } catch {}

    // The Atlas: each region and each POI within it
    try {
      const maps = (await Vault.get('atlas-maps')) || [];
      for (const m of maps) {
        idx.push({
          group: 'The Atlas',
          moduleId: 'atlas',
          title: m.name,
          subtitle: (m.biome ? m.biome[0].toUpperCase() + m.biome.slice(1) : '')
                 + (m.pois ? ' \u00b7 ' + m.pois.length + ' marks' : ''),
          body: (m.pois || []).map(p => p.name).join(' '),
          onSelect: async () => {
            await Vault.set('atlas-active', m.id);
            await mount('atlas');
          }
        });
        for (const p of (m.pois || [])) {
          idx.push({
            group: 'The Atlas',
            moduleId: 'atlas',
            title: p.name,
            subtitle: (p.type ? p.type.replace(/_/g, ' ') : '') + ' \u00b7 ' + m.name,
            body: p.backstory || '',
            onSelect: async () => {
              await Vault.set('atlas-active', m.id);
              await Vault.set('atlas-poi-show', p.id);
              await mount('atlas');
            }
          });
        }
      }
    } catch {}

    return idx;
  }

  function runSearch(query, idx) {
    const q = query.trim().toLowerCase();
    if (!q) return [];
    const out = [];
    for (const it of idx) {
      const titleLow = (it.title || '').toLowerCase();
      const subLow = (it.subtitle || '').toLowerCase();
      const bodyLow = (it.body || '').toLowerCase();
      const where = titleLow.includes(q) ? 0
        : subLow.includes(q) ? 1
        : bodyLow.includes(q) ? 2 : -1;
      if (where >= 0) out.push({ ...it, _rank: where });
    }
    out.sort((a, b) => a._rank - b._rank);
    return out.slice(0, 30);
  }

  async function openSearch() {
    if (searchOpen) return;
    searchOpen = true;

    const idx = await buildIndex();

    const ov = U.el('div', { class: 'modal-overlay search-overlay' });
    const dialog = U.el('div', { class: 'search-modal' });
    const input = U.el('input', {
      class: 'search-modal__input',
      placeholder: 'Search NPCs, factions, places, finds, threats, days, lore...',
      autocomplete: 'off', spellcheck: 'false'
    });
    const resultsEl = U.el('div', { class: 'search-modal__results' });
    const hint = U.el('div', { class: 'search-modal__hint' }, [
      U.el('span', {}, [U.el('kbd', {}, '\u2191\u2193'), document.createTextNode('navigate')]),
      U.el('span', {}, [U.el('kbd', {}, 'Enter'), document.createTextNode('open')]),
      U.el('span', {}, [U.el('kbd', {}, 'Esc'), document.createTextNode('close')])
    ]);
    dialog.append(input, resultsEl, hint);
    ov.append(dialog);
    document.body.append(ov);

    let current = [];
    let activeIdx = 0;
    let lastQuery = '';

    function renderResults() {
      resultsEl.innerHTML = '';
      if (!input.value.trim()) {
        resultsEl.append(U.el('div', { class: 'search-modal__empty' },
          'Type to search NPCs, factions, places, the cabinet, threats, day notes, and lore.'));
        return;
      }
      if (!current.length) {
        resultsEl.append(U.el('div', { class: 'search-modal__empty' }, 'Nothing found.'));
        return;
      }
      // group by source
      const groups = new Map();
      current.forEach(r => {
        if (!groups.has(r.group)) groups.set(r.group, []);
        groups.get(r.group).push(r);
      });
      let flatIdx = 0;
      for (const [gname, items] of groups) {
        resultsEl.append(U.el('div', { class: 'search-modal__group-head' }, gname));
        for (const r of items) {
          const isActive = flatIdx === activeIdx;
          const myIdx = flatIdx;
          const btn = U.el('button', {
            class: 'search-modal__result' + (isActive ? ' is-active' : ''),
            onclick: () => select(myIdx),
            onmouseenter: () => { activeIdx = myIdx; updateActive(); }
          });
          const titleEl = U.el('div', { class: 'search-modal__result-title' });
          titleEl.innerHTML = hl(r.title || '', lastQuery);
          btn.append(titleEl);
          if (r.subtitle) {
            const subEl = U.el('div', { class: 'search-modal__result-subtitle' });
            subEl.innerHTML = hl(r.subtitle, lastQuery);
            btn.append(subEl);
          }
          if (r._rank === 2 && r.body) {
            const snippet = snip(r.body, lastQuery, 140);
            if (snippet) {
              const sEl = U.el('div', { class: 'search-modal__result-snippet' });
              sEl.innerHTML = snippet;
              btn.append(sEl);
            }
          }
          resultsEl.append(btn);
          flatIdx++;
        }
      }
    }
    function updateActive() {
      const all = resultsEl.querySelectorAll('.search-modal__result');
      all.forEach((b, i) => b.classList.toggle('is-active', i === activeIdx));
      const active = all[activeIdx];
      if (active) active.scrollIntoView({ block: 'nearest' });
    }
    function select(i) {
      const r = current[i];
      if (!r) return;
      closeSearch();
      Promise.resolve(r.onSelect()).catch(() => {});
    }
    function closeSearch() {
      searchOpen = false;
      ov.remove();
      document.removeEventListener('keydown', keyHandler, true);
    }
    function keyHandler(e) {
      if (e.key === 'Escape') { e.preventDefault(); e.stopPropagation(); closeSearch(); return; }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(current.length - 1, activeIdx + 1);
        updateActive();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(0, activeIdx - 1);
        updateActive();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        select(activeIdx);
      }
    }

    input.addEventListener('input', () => {
      lastQuery = input.value.trim();
      current = runSearch(input.value, idx);
      activeIdx = 0;
      renderResults();
    });
    ov.addEventListener('click', (e) => { if (e.target === ov) closeSearch(); });
    document.addEventListener('keydown', keyHandler, true);
    renderResults();
    setTimeout(() => input.focus(), 30);
  }

  function initSearchBindings() {
    const btn = document.getElementById('search-button');
    if (btn) btn.addEventListener('click', () => openSearch());
    document.addEventListener('keydown', (e) => {
      if (e.key !== '/' || searchOpen) return;
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
      e.preventDefault();
      openSearch();
    });
  }

  async function init() {
    folio = document.getElementById('folio');
    nav = document.getElementById('nav');
    chipWrap = document.getElementById('banner-campaign');

    // Hearth popout mode: opened via window.open from the Pop Out button.
    // The body gets a CSS class that hides the banner, nav, and folio
    // header, so the Hearth controls are the only thing visible. The
    // popup runs its own AudioContext entirely independent of the main
    // window, so navigating in the main window has no effect on
    // playback here, and closing this window stops the audio cleanly.
    const isHearthPopout = window.location.hash === '#hearth-popout';
    if (isHearthPopout) {
      document.body.classList.add('popout-mode');
      document.title = 'The Hearth, The Keep';
    }

    const activeId = await Campaigns.migrate();
    Vault.setActiveCampaign(activeId);

    await initTheme();
    initSearchBindings();
    renderNav();
    await renderChip();

    if (isHearthPopout) {
      mount('hearth');
      return;
    }

    const last = await Vault.get('last-module');
    mount(last && modules.has(last) ? last : 'watch');
  }

  return { register, mount, init, modules, switchTo, renderChip, openSearch, current: () => current && current.id };
})();

/* =========================================================================
   MODULE: THE WATCH (Session Prep)
   A contextual landing page that aggregates the current state of the
   chronicle: today's day note and weather, the last few days of notes, any
   threats over halfway full, and the most-recently-touched NPCs and finds.
   Sibling to The Gate; intended as the practical re-entry point for an
   ongoing campaign while The Gate remains the tile-grid welcome.
   ========================================================================= */
Keep.register({
  id: 'watch',
  name: 'The Watch',
  category: null,
  glyph: 'g-watch',
  tagline: 'Yesterday, today, and what is mounting.',
  sub: 'A long look across the chronicle. Useful at the start of a session.',

  async mount(body, actions) {
    const cal = await Refs.calendar();
    const today = await Refs.today();
    const notes = (await Vault.get('almanac-notes')) || {};
    const threats = (await Vault.get('threats')) || [];
    const npcs = (await Vault.get('faces-roster')) || [];
    const items = (await Vault.get('cabinet')) || [];
    const companions = (await Vault.get('fellowship')) || [];
    const wayfarers = (await Vault.get('wayfarer')) || [];
    const factions = (await Vault.get('factions')) || [];
    const oracleHistory = (await Vault.get('oracle-history')) || [];
    const auguryHistory = (await Vault.get('augury-history')) || [];
    const sparkHistory = (await Vault.get('spark-history')) || [];
    const archiveEntries = (await Vault.get('archive-entries')) || {};

    function fmtDate(d) { return Refs.formatDateWith(d, cal); }
    function dayKey(d) { return d.year + '-' + d.month + '-' + d.day; }
    function previousDay(d) {
      let day = d.day - 1, month = d.month, year = d.year;
      if (day < 1) {
        month--;
        if (month < 0) { month = cal.months.length - 1; year--; }
        day = cal.daysPerMonth;
      }
      return { day, month, year };
    }
    function excerpt(text, max) {
      const t = String(text || '').replace(/\s+/g, ' ').trim();
      if (t.length <= max) return t;
      return t.slice(0, max).trimEnd() + '\u2026';
    }

    const wrap = U.el('div', { class: 'watch' });

    // --- TODAY ---
    const todayKey = dayKey(today);
    const todayNote = notes[todayKey];
    const todaySec = U.el('div', { class: 'watch__section watch__today' });
    todaySec.append(
      U.el('div', { class: 'watch__section-head' }, [
        document.createTextNode('Today'),
        U.el('button', { class: 'watch__section-action',
          onclick: () => Refs.openAlmanacAt(today) }, 'Open in Almanac')
      ]),
      U.el('div', { class: 'watch__today-date' }, fmtDate(today))
    );
    if (todayNote && (todayNote.weather || todayNote.body)) {
      if (todayNote.weather) {
        todaySec.append(U.el('div', { class: 'watch__today-weather' }, todayNote.weather));
      }
      if (todayNote.body) {
        todaySec.append(U.el('div', { class: 'watch__today-body' }, todayNote.body));
      }
    } else {
      todaySec.append(U.el('div', { class: 'watch__today-empty' },
        'No note for today. Open the Almanac to set the weather and write what happened.'));
    }
    todaySec.append(U.el('div', { class: 'watch__today-actions' }, [
      U.el('button', { class: 'btn btn--small btn--ghost',
        onclick: () => Refs.openAlmanacAt(today) }, todayNote ? 'Edit Today' : 'Set Today'),
      U.el('button', { class: 'btn btn--small btn--ghost',
        onclick: async () => {
          await Refs.advanceToday();
          await Keep.mount('watch');
        }
      }, 'Advance One Day')
    ]));
    wrap.append(todaySec);

    // --- GRID: mounting + recent days + faces + finds + companions in trouble ---
    const grid = U.el('div', { class: 'watch__grid' });

    // MOUNTING PRESSURES (threats > 50% full, not yet fulfilled)
    {
      const sec = U.el('div', { class: 'watch__section' });
      const mounting = threats
        .filter(t => t.filled > 0 && t.filled < t.total && (t.filled / t.total) >= 0.5)
        .sort((a, b) => (b.filled / b.total) - (a.filled / a.total))
        .slice(0, 8);
      sec.append(U.el('div', { class: 'watch__section-head' }, [
        document.createTextNode('Mounting Pressures'),
        U.el('button', { class: 'watch__section-action',
          onclick: () => Keep.mount('threats') }, 'All clocks')
      ]));
      if (!mounting.length) {
        sec.append(U.el('div', { class: 'watch__empty' }, 'Nothing mounting. The clocks tick quietly.'));
      } else {
        const list = U.el('ul', { class: 'watch__list' });
        mounting.forEach(t => {
          const ratio = t.filled / t.total;
          const urgent = ratio >= 0.85;
          const li = U.el('button', {
            class: 'watch__item',
            onclick: async () => {
              await Vault.set('threats-highlight', t.id);
              await Keep.mount('threats');
            }
          }, [
            U.el('span', { class: 'watch__item-primary' }, [
              U.el('span', {}, t.name),
              t.description ? U.el('span', { class: 'watch__item-day-excerpt' }, excerpt(t.description, 80)) : null
            ].filter(Boolean)),
            U.el('span', { class: 'watch__threat-fill' + (urgent ? ' watch__threat-fill--urgent' : '') },
              t.filled + '/' + t.total)
          ]);
          list.append(li);
        });
        sec.append(list);
      }
      grid.append(sec);
    }

    // RECENT DAYS (previous 4 days from today)
    {
      const sec = U.el('div', { class: 'watch__section' });
      sec.append(U.el('div', { class: 'watch__section-head' }, [
        document.createTextNode('Recent Days'),
        U.el('button', { class: 'watch__section-action',
          onclick: () => Keep.mount('almanac') }, 'Almanac')
      ]));
      const recent = [];
      let cursor = previousDay(today);
      for (let i = 0; i < 60 && recent.length < 5; i++) {
        const key = dayKey(cursor);
        const note = notes[key];
        if (note && (note.body || note.weather)) {
          recent.push({ date: { ...cursor }, note });
        }
        cursor = previousDay(cursor);
      }
      if (!recent.length) {
        sec.append(U.el('div', { class: 'watch__empty' }, 'No days noted yet.'));
      } else {
        const list = U.el('ul', { class: 'watch__list' });
        recent.forEach(({ date, note }) => {
          const li = U.el('button', {
            class: 'watch__item',
            onclick: () => Refs.openAlmanacAt(date)
          }, [
            U.el('span', { class: 'watch__item-primary' }, [
              U.el('span', {}, fmtDate(date)),
              note.body ? U.el('span', { class: 'watch__item-day-excerpt' }, excerpt(note.body, 90)) : null
            ].filter(Boolean)),
            note.weather ? U.el('span', { class: 'watch__item-tag' }, excerpt(note.weather, 18)) : null
          ].filter(Boolean));
          list.append(li);
        });
        sec.append(list);
      }
      grid.append(sec);
    }

    // RECENT FACES (most-recently touched NPCs)
    {
      const sec = U.el('div', { class: 'watch__section' });
      sec.append(U.el('div', { class: 'watch__section-head' }, [
        document.createTextNode('Recent Faces'),
        U.el('button', { class: 'watch__section-action',
          onclick: () => Keep.mount('faces') }, 'Hall of Faces')
      ]));
      const recent = [...npcs]
        .sort((a, b) => (b.created || 0) - (a.created || 0))
        .slice(0, 6);
      if (!recent.length) {
        sec.append(U.el('div', { class: 'watch__empty' }, 'No faces in the roster yet.'));
      } else {
        const list = U.el('ul', { class: 'watch__list' });
        recent.forEach(n => {
          const li = U.el('button', {
            class: 'watch__item',
            onclick: async () => {
              await Vault.set('faces-show', n.id);
              await Keep.mount('faces');
            }
          }, [
            U.el('span', { class: 'watch__item-primary' }, n.name),
            U.el('span', { class: 'watch__item-secondary' }, n.role || '')
          ]);
          list.append(li);
        });
        sec.append(list);
      }
      grid.append(sec);
    }

    // RECENT FINDS (Cabinet items, most-recently updated)
    {
      const sec = U.el('div', { class: 'watch__section' });
      sec.append(U.el('div', { class: 'watch__section-head' }, [
        document.createTextNode('Recent Finds'),
        U.el('button', { class: 'watch__section-action',
          onclick: () => Keep.mount('cabinet') }, 'The Cabinet')
      ]));
      const recent = [...items]
        .sort((a, b) => (b.updated || b.created || 0) - (a.updated || a.created || 0))
        .slice(0, 6);
      if (!recent.length) {
        sec.append(U.el('div', { class: 'watch__empty' }, 'No finds catalogued yet.'));
      } else {
        const list = U.el('ul', { class: 'watch__list' });
        recent.forEach(it => {
          const li = U.el('button', {
            class: 'watch__item',
            onclick: async () => {
              await Vault.set('cabinet-highlight', it.id);
              await Keep.mount('cabinet');
            }
          }, [
            U.el('span', { class: 'watch__item-primary' }, it.name),
            U.el('span', { class: 'watch__item-tag' }, it.status || 'held')
          ]);
          list.append(li);
        });
        sec.append(list);
      }
      grid.append(sec);
    }

    // COMPANIONS NOT HALE (only if fellowship is in use)
    if (companions.length) {
      const hurting = companions.filter(c => c.status && c.status !== 'hale' && c.status !== 'departed');
      if (hurting.length) {
        const sec = U.el('div', { class: 'watch__section' });
        sec.append(U.el('div', { class: 'watch__section-head' }, [
          document.createTextNode('Companions in Trouble'),
          U.el('button', { class: 'watch__section-action',
            onclick: () => Keep.mount('fellowship') }, 'Fellowship')
        ]));
        const list = U.el('ul', { class: 'watch__list' });
        hurting.forEach(c => {
          const li = U.el('button', {
            class: 'watch__item',
            onclick: async () => {
              await Vault.set('fellowship-highlight', c.id);
              await Keep.mount('fellowship');
            }
          }, [
            U.el('span', { class: 'watch__item-primary' }, c.name),
            U.el('span', { class: 'watch__item-tag' }, c.status)
          ]);
          list.append(li);
        });
        sec.append(list);
        grid.append(sec);
      }
    }

    // WAYFARERS (show roster if any PCs exist; flag non-Hale statuses)
    if (wayfarers.length) {
      const sec = U.el('div', { class: 'watch__section' });
      sec.append(U.el('div', { class: 'watch__section-head' }, [
        document.createTextNode(wayfarers.length === 1 ? 'The Wayfarer' : 'The Wayfarers'),
        U.el('button', { class: 'watch__section-action',
          onclick: () => Keep.mount('wayfarer') }, 'Open')
      ]));
      const list = U.el('ul', { class: 'watch__list' });
      wayfarers.forEach(pc => {
        const hurt = pc.status && pc.status !== 'hale';
        const li = U.el('button', {
          class: 'watch__item',
          onclick: async () => {
            await Vault.set('wayfarer-highlight', pc.id);
            await Keep.mount('wayfarer');
          }
        }, [
          U.el('span', { class: 'watch__item-primary' }, [
            U.el('span', {}, pc.name || '(unnamed)'),
            (pc.calling || pc.lineage) ?
              U.el('span', { class: 'watch__item-day-excerpt' },
                [pc.lineage, pc.calling].filter(Boolean).join(', ')) : null
          ].filter(Boolean)),
          U.el('span', {
            class: 'watch__item-tag' + (hurt ? ' watch__item-tag--alert' : '')
          }, pc.status || 'hale')
        ]);
        list.append(li);
      });
      sec.append(list);
      grid.append(sec);
    }

    // STANDING WITH (factions in play: recently touched, with party standing, or tied to active threats)
    if (factions.length) {
      // determine which factions have active threats
      const factionsWithThreats = new Set(
        threats
          .filter(t => t.factionId && t.filled > 0 && t.filled < t.total)
          .map(t => t.factionId)
      );
      const ranked = [...factions]
        .map(f => ({
          f,
          activeThreat: factionsWithThreats.has(f.id),
          standing: Math.abs(f.party || 0),
          touched: f.updated || 0
        }))
        .filter(x => x.activeThreat || x.standing > 0 || x.touched > 0)
        .sort((a, b) => {
          if (a.activeThreat !== b.activeThreat) return b.activeThreat - a.activeThreat;
          if (a.touched !== b.touched) return b.touched - a.touched;
          return b.standing - a.standing;
        })
        .slice(0, 5);

      const sec = U.el('div', { class: 'watch__section' });
      sec.append(U.el('div', { class: 'watch__section-head' }, [
        document.createTextNode('Standing With'),
        U.el('button', { class: 'watch__section-action',
          onclick: () => Keep.mount('factions') }, 'Faction Ledger')
      ]));
      if (!ranked.length) {
        sec.append(U.el('div', { class: 'watch__empty' }, 'No standings noted yet.'));
      } else {
        const list = U.el('ul', { class: 'watch__list' });
        ranked.forEach(({ f, activeThreat }) => {
          const party = f.party || 0;
          const partyLabel = party === 0 ? 'neutral'
            : (party > 0 ? '+' : '') + party;
          const li = U.el('button', {
            class: 'watch__item',
            onclick: async () => {
              await Vault.set('factions-expand', f.id);
              await Keep.mount('factions');
            }
          }, [
            U.el('span', { class: 'watch__item-primary' }, [
              U.el('span', {}, (f.sigil || '\u2756') + ' ' + f.name),
              activeThreat ? U.el('span', { class: 'watch__item-day-excerpt' },
                '\u2620 clock ticking') : null
            ].filter(Boolean)),
            U.el('span', { class: 'watch__item-tag' }, partyLabel)
          ]);
          list.append(li);
        });
        sec.append(list);
      }
      grid.append(sec);
    }

    // RECENT CASTINGS (Oracle + Augury merged, sorted by ts desc)
    {
      const castings = [];
      oracleHistory.forEach(o => {
        const q = (o.q && o.q.trim()) ? '"' + o.q.trim() + '"' : '(no question)';
        const verdict = (o.verdict || '') + ', ' + (o.qualifier || '');
        castings.push({
          ts: o.ts || 0,
          kind: 'oracle',
          headline: q,
          summary: verdict
        });
      });
      auguryHistory.forEach(a => {
        const labels = { tarot: 'Tarot', runes: 'Runes', scry: 'Scrying' };
        castings.push({
          ts: a.ts || 0,
          kind: 'augury',
          headline: labels[a.method] || 'Augury',
          summary: a.text || ''
        });
      });
      castings.sort((a, b) => (b.ts || 0) - (a.ts || 0));
      const recent = castings.slice(0, 5);

      if (recent.length) {
        const sec = U.el('div', { class: 'watch__section' });
        sec.append(U.el('div', { class: 'watch__section-head' }, [
          document.createTextNode('Recent Castings'),
          U.el('button', { class: 'watch__section-action',
            onclick: () => Keep.mount(recent[0].kind) }, recent[0].kind === 'oracle' ? 'Oracle' : 'Augury')
        ]));
        const list = U.el('ul', { class: 'watch__list' });
        recent.forEach(c => {
          const li = U.el('button', {
            class: 'watch__item',
            onclick: () => Keep.mount(c.kind)
          }, [
            U.el('span', { class: 'watch__item-primary' }, [
              U.el('span', {}, c.headline),
              c.summary ? U.el('span', { class: 'watch__item-day-excerpt' }, excerpt(c.summary, 70)) : null
            ].filter(Boolean)),
            U.el('span', { class: 'watch__item-tag' }, c.kind === 'oracle' ? 'oracle' : 'augury')
          ]);
          list.append(li);
        });
        sec.append(list);
        grid.append(sec);
      }
    }

    // RECENT SPARKS (last 5 phrases struck)
    if (sparkHistory.length) {
      const sec = U.el('div', { class: 'watch__section' });
      sec.append(U.el('div', { class: 'watch__section-head' }, [
        document.createTextNode('Recent Sparks'),
        U.el('button', { class: 'watch__section-action',
          onclick: () => Keep.mount('spark') }, 'The Spark')
      ]));
      const list = U.el('ul', { class: 'watch__list' });
      sparkHistory.slice(0, 5).forEach(s => {
        const li = U.el('button', {
          class: 'watch__item',
          onclick: () => Keep.mount('spark')
        }, [
          U.el('span', { class: 'watch__item-primary' }, excerpt(s.text || '', 90)),
          U.el('span', { class: 'watch__item-tag' }, s.category || 'all')
        ]);
        list.append(li);
      });
      sec.append(list);
      grid.append(sec);
    }

    // RECENT LORE (archive entries most recently updated)
    {
      const entries = Object.entries(archiveEntries)
        .map(([name, e]) => ({ name, ...e }))
        .filter(e => e.body || e.title)
        .sort((a, b) => (b.updated || 0) - (a.updated || 0))
        .slice(0, 5);

      if (entries.length) {
        const sec = U.el('div', { class: 'watch__section' });
        sec.append(U.el('div', { class: 'watch__section-head' }, [
          document.createTextNode('Recent Lore'),
          U.el('button', { class: 'watch__section-action',
            onclick: () => Keep.mount('archive') }, 'Archive')
        ]));
        const list = U.el('ul', { class: 'watch__list' });
        entries.forEach(e => {
          const firstLine = (e.body || '').replace(/^#+\s+/gm, '').split('\n').find(l => l.trim());
          const li = U.el('button', {
            class: 'watch__item',
            onclick: async () => {
              await Vault.set('archive-current', e.name);
              await Keep.mount('archive');
            }
          }, [
            U.el('span', { class: 'watch__item-primary' }, [
              U.el('span', {}, e.title || e.name),
              firstLine ? U.el('span', { class: 'watch__item-day-excerpt' }, excerpt(firstLine, 80)) : null
            ].filter(Boolean)),
            e.type ? U.el('span', { class: 'watch__item-tag' }, e.type) : null
          ].filter(Boolean));
          list.append(li);
        });
        sec.append(list);
        grid.append(sec);
      }
    }

    // THIS WEEK'S RECORDS (pins from the last 7 days, rolled up by recency)
    {
      // walk back through last 7 days collecting pinned paragraphs
      const PIN_TAG_RE = /^([A-Z][A-Z\u00C0-\u017F\s'\u2019\-]*?(?:\([^)]+\))?):/;
      const SAID_RE = /^([A-Z][A-Z\u00C0-\u017F\s'\u2019\-]+) SAID:/;
      const week = [];
      let cursor = { ...today };
      for (let i = 0; i < 7; i++) {
        const key = dayKey(cursor);
        const note = notes[key];
        if (note && note.body) {
          const paragraphs = note.body.split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);
          paragraphs.forEach(p => {
            const firstLine = p.split('\n')[0];
            let tag = null;
            let rest = p;
            const saidMatch = firstLine.match(SAID_RE);
            const tagMatch = firstLine.match(PIN_TAG_RE);
            if (saidMatch) {
              tag = saidMatch[1].toLowerCase();
              rest = firstLine;
            } else if (tagMatch) {
              tag = tagMatch[1].toLowerCase().split('(')[0].trim();
              rest = p.slice(tagMatch[0].length).trim();
            }
            if (tag) {
              week.push({
                date: { ...cursor },
                tag,
                text: rest.split('\n').slice(0, 2).join(' ').trim()
              });
            }
          });
        }
        cursor = previousDay(cursor);
      }

      if (week.length) {
        const sec = U.el('div', { class: 'watch__section' });
        sec.append(U.el('div', { class: 'watch__section-head' }, [
          document.createTextNode("This Week's Records"),
          U.el('button', { class: 'watch__section-action',
            onclick: () => Keep.mount('almanac') }, 'Almanac')
        ]));
        const list = U.el('ul', { class: 'watch__list' });
        week.slice(0, 8).forEach(rec => {
          const li = U.el('button', {
            class: 'watch__item',
            onclick: () => Refs.openAlmanacAt(rec.date)
          }, [
            U.el('span', { class: 'watch__item-primary' }, [
              U.el('span', {}, excerpt(rec.text, 85) || '(empty)'),
              U.el('span', { class: 'watch__item-day-excerpt' },
                fmtDate(rec.date))
            ]),
            U.el('span', { class: 'watch__item-tag' }, rec.tag)
          ]);
          list.append(li);
        });
        sec.append(list);
        grid.append(sec);
      }
    }

    wrap.append(grid);
    body.append(wrap);

    actions.append(
      U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => Keep.mount('home') }, 'Browse Rooms')
    );
  }
});

/* =========================================================================
   MODULE: SCRIPTORIUM (Handout Forge)
   ========================================================================= */
Keep.register({
  id: 'scriptorium',
  name: 'Scriptorium',
  category: 'workshop',
  glyph: 'g-quill',
  tagline: 'Forge handouts on aged parchment and posters of old.',
  sub: 'Set ink to vellum. Stain it with time.',

  state: { style: 'parchment', seed: 1729, text: '', title: 'Wanted', subtitle: 'Reward: 500 gold crowns' },

  async mount(body, actions) {
    const s = this.state;
    s.text = s.text || 'By order of the Margrave of Ashlow,\n\nLet all who pass these woods know: the road through Greyfern is closed at dusk. The witch returns. Do not light fires within sight of the standing stones.\n\nSigned this fourth day of Lateharvest, in the year of the Long Comet.';

    const styles = [
      { id: 'parchment', name: 'Parchment Letter' },
      { id: 'wanted',    name: 'Wanted Poster'   },
      { id: 'journal',   name: 'Journal Page'    },
      { id: 'ledger',    name: 'Ledger Sheet'    },
      { id: 'edict',     name: 'Royal Edict'     }
    ];
    const wrap = U.el('div', { class: 'forge' });
    const panel = U.el('div', { class: 'forge__panel' });
    const preview = U.el('div', { class: 'forge__preview' });

    const styleSelect = U.el('select', { class: 'select' },
      styles.map(st => U.el('option', { value: st.id, selected: st.id === s.style ? 'selected' : false }, st.name))
    );
    styleSelect.addEventListener('change', () => { s.style = styleSelect.value; render(); });

    const titleInput = U.el('input', { class: 'input', value: s.title, placeholder: 'Title (optional)' });
    titleInput.addEventListener('input', () => { s.title = titleInput.value; render(); });

    const subInput = U.el('input', { class: 'input', value: s.subtitle, placeholder: 'Subtitle (optional)' });
    subInput.addEventListener('input', () => { s.subtitle = subInput.value; render(); });

    const ta = U.el('textarea', { class: 'textarea', placeholder: 'The body of your handout.' });
    ta.value = s.text;
    ta.addEventListener('input', () => { s.text = ta.value; render(); });

    const seedRow = U.el('div', { style: { display: 'flex', gap: '0.5rem', alignItems: 'center' } });
    const seedLabel = U.el('span', { class: 'tag' }, 'Seed ' + s.seed);
    const reseed = U.el('button', { class: 'btn btn--ghost btn--small', onclick: () => {
      s.seed = Math.floor(Math.random() * 100000);
      seedLabel.textContent = 'Seed ' + s.seed;
      render();
    } }, 'Re-stain');
    seedRow.append(seedLabel, reseed);

    panel.append(
      U.el('div', { class: 'forge__field' }, [U.el('label', { class: 'label' }, 'Style'), styleSelect]),
      U.el('div', { class: 'forge__field' }, [U.el('label', { class: 'label' }, 'Title'), titleInput]),
      U.el('div', { class: 'forge__field' }, [U.el('label', { class: 'label' }, 'Subtitle'), subInput]),
      U.el('div', { class: 'forge__field' }, [U.el('label', { class: 'label' }, 'Body'), ta]),
      U.el('div', { class: 'forge__field' }, [U.el('label', { class: 'label' }, 'Aging Seed'), seedRow])
    );

    wrap.append(panel, preview);
    body.append(wrap);

    actions.append(
      U.el('button', { class: 'btn', onclick: () => exportPng() }, 'Export PNG'),
      U.el('button', { class: 'btn btn--ghost', onclick: () => exportSvg() }, 'Export SVG')
    );

    const render = () => {
      preview.innerHTML = '';
      preview.append(renderHandout(s));
      Vault.set('forge-state', s);
    };
    const saved = await Vault.get('forge-state');
    if (saved) { Object.assign(s, saved); ta.value = s.text; titleInput.value = s.title; subInput.value = s.subtitle; styleSelect.value = s.style; seedLabel.textContent = 'Seed ' + s.seed; }
    render();

    function renderHandout(state) {
      const ns = 'http://www.w3.org/2000/svg';
      const W = 600, H = 800;
      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svg.setAttribute('xmlns', ns);
      svg.setAttribute('class', 'forge__svg');
      const rng = U.seededRng(state.seed);

      // defs: filters and patterns
      const defs = document.createElementNS(ns, 'defs');
      defs.innerHTML = `
        <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="${state.seed % 50}"/>
          <feColorMatrix values="0 0 0 0 0.55  0 0 0 0 0.45  0 0 0 0 0.32  0 0 0 0.22 0"/>
          <feComposite in2="SourceGraphic" operator="in"/>
        </filter>
        <filter id="bigGrain" x="0" y="0" width="100%" height="100%">
          <feTurbulence baseFrequency="0.03" numOctaves="2" seed="${(state.seed * 7) % 99}"/>
          <feColorMatrix values="0 0 0 0 0.40  0 0 0 0 0.30  0 0 0 0 0.18  0 0 0 0.16 0"/>
        </filter>
      `;
      svg.appendChild(defs);

      // base parchment
      const base = document.createElementNS(ns, 'rect');
      base.setAttribute('width', W); base.setAttribute('height', H);
      base.setAttribute('fill', '#efe2c2');
      svg.appendChild(base);

      const tint = document.createElementNS(ns, 'rect');
      tint.setAttribute('width', W); tint.setAttribute('height', H);
      tint.setAttribute('fill', 'url(#nope)');
      tint.setAttribute('filter', 'url(#bigGrain)');
      tint.setAttribute('opacity', '0.85');
      svg.appendChild(tint);

      // procedural stains
      for (let i = 0; i < 4 + Math.floor(rng() * 4); i++) {
        const e = document.createElementNS(ns, 'ellipse');
        e.setAttribute('cx', rng() * W);
        e.setAttribute('cy', rng() * H);
        e.setAttribute('rx', 30 + rng() * 80);
        e.setAttribute('ry', 20 + rng() * 60);
        e.setAttribute('fill', '#8a6c25');
        e.setAttribute('opacity', String(0.05 + rng() * 0.10));
        svg.appendChild(e);
      }
      // edge darkening via radial-ish strips
      const edge = document.createElementNS(ns, 'rect');
      edge.setAttribute('width', W); edge.setAttribute('height', H);
      edge.setAttribute('fill', 'transparent');
      edge.setAttribute('stroke', '#5a4622');
      edge.setAttribute('stroke-width', '14');
      edge.setAttribute('opacity', '0.25');
      svg.appendChild(edge);

      // fine grain noise overlay
      const grain = document.createElementNS(ns, 'rect');
      grain.setAttribute('width', W); grain.setAttribute('height', H);
      grain.setAttribute('fill', '#000');
      grain.setAttribute('filter', 'url(#paperNoise)');
      grain.setAttribute('opacity', '0.5');
      svg.appendChild(grain);

      // torn corners by clip-path (simulate with overlay shapes)
      const torn = document.createElementNS(ns, 'path');
      const tearY = 14 + rng() * 6;
      torn.setAttribute('d', `M0 0 L${W} 0 L${W} ${tearY} Q${W*0.7} ${tearY-6} ${W*0.5} ${tearY+4} Q${W*0.3} ${tearY+10} 0 ${tearY-3} Z`);
      torn.setAttribute('fill', '#e8d9b8');
      torn.setAttribute('opacity', '0');
      svg.appendChild(torn);

      // STYLE-SPECIFIC CONTENT
      drawContent(svg, state, rng, W, H);

      return svg;
    }

    function drawContent(svg, state, rng, W, H) {
      const ns = 'http://www.w3.org/2000/svg';
      const ink = '#2a1a10';
      const accent = '#5c1f24';

      function text(x, y, str, opts = {}) {
        const t = document.createElementNS(ns, 'text');
        t.setAttribute('x', x); t.setAttribute('y', y);
        t.setAttribute('fill', opts.fill || ink);
        t.setAttribute('font-family', opts.family || "'EB Garamond', Georgia, serif");
        t.setAttribute('font-size', opts.size || 16);
        t.setAttribute('font-weight', opts.weight || 400);
        if (opts.anchor) t.setAttribute('text-anchor', opts.anchor);
        if (opts.style) t.setAttribute('font-style', opts.style);
        if (opts.spacing) t.setAttribute('letter-spacing', opts.spacing);
        t.textContent = str;
        svg.appendChild(t);
        return t;
      }
      function wrap(x, y, str, w, opts = {}) {
        const size = opts.size || 16;
        const lh = opts.lh || size * 1.45;
        const charW = size * 0.5;
        const max = Math.floor(w / charW);
        const paragraphs = str.split('\n');
        let cy = y;
        paragraphs.forEach((para, pi) => {
          if (!para.trim()) {
            cy += lh * 0.5; // smaller gap for blank line
            return;
          }
          let cur = '';
          for (const word of para.split(/\s+/)) {
            if (!word) continue;
            if ((cur + ' ' + word).trim().length > max && cur) {
              text(x, cy, cur, opts);
              cy += lh;
              cur = word;
            } else {
              cur = (cur + ' ' + word).trim();
            }
          }
          if (cur) { text(x, cy, cur, opts); cy += lh; }
          if (pi < paragraphs.length - 1) cy += lh * 0.35; // inter-paragraph gap
        });
        return cy;
      }

      const t = state.title || '';
      const sub = state.subtitle || '';

      if (state.style === 'wanted') {
        text(W/2, 80, 'WANTED', { family: "'Cinzel', serif", size: 56, weight: 700, anchor: 'middle', spacing: '6' });
        text(W/2, 110, '~ by order of the crown ~', { family: "'IM Fell English', serif", size: 18, style: 'italic', anchor: 'middle', fill: accent });
        // portrait box
        const box = document.createElementNS(ns, 'rect');
        box.setAttribute('x', 180); box.setAttribute('y', 140);
        box.setAttribute('width', 240); box.setAttribute('height', 240);
        box.setAttribute('fill', 'none'); box.setAttribute('stroke', ink); box.setAttribute('stroke-width', '2');
        svg.appendChild(box);
        // dotted X to suggest portrait absent
        const xpath = document.createElementNS(ns, 'path');
        xpath.setAttribute('d', `M180 140 L420 380 M420 140 L180 380`);
        xpath.setAttribute('stroke', '#8a6c25'); xpath.setAttribute('stroke-dasharray', '4 6');
        xpath.setAttribute('stroke-width', '1.5'); xpath.setAttribute('opacity', '0.5');
        svg.appendChild(xpath);
        text(W/2, 410, t || 'Name Unknown', { family: "'Cinzel', serif", size: 28, weight: 600, anchor: 'middle', spacing: '4' });
        if (sub) text(W/2, 444, sub, { family: "'IM Fell English', serif", size: 20, style: 'italic', anchor: 'middle', fill: accent });
        wrap(60, 490, state.text, W - 120, { size: 16, lh: 23 });
      }
      else if (state.style === 'edict') {
        text(W/2, 90, t || 'ROYAL EDICT', { family: "'Cinzel', serif", size: 38, weight: 700, anchor: 'middle', spacing: '5' });
        // decorative double rule
        for (const yy of [110, 116]) {
          const r = document.createElementNS(ns, 'line');
          r.setAttribute('x1', 80); r.setAttribute('x2', W - 80);
          r.setAttribute('y1', yy); r.setAttribute('y2', yy);
          r.setAttribute('stroke', ink); r.setAttribute('stroke-width', yy === 110 ? 2 : 0.8);
          svg.appendChild(r);
        }
        if (sub) text(W/2, 148, sub, { family: "'IM Fell English', serif", size: 18, style: 'italic', anchor: 'middle' });
        // drop cap
        const first = (state.text.trim()[0] || 'L').toUpperCase();
        text(70, 220, first, { family: "'Cinzel', serif", size: 70, weight: 700, fill: accent });
        wrap(130, 195, state.text.trim().slice(1), W - 200, { size: 17, lh: 24 });
        // seal
        const sealC = document.createElementNS(ns, 'circle');
        sealC.setAttribute('cx', W - 100); sealC.setAttribute('cy', H - 100);
        sealC.setAttribute('r', 50); sealC.setAttribute('fill', accent); sealC.setAttribute('opacity', '0.78');
        svg.appendChild(sealC);
        text(W - 100, H - 95, 'PER', { family: "'Cinzel', serif", size: 12, weight: 700, anchor: 'middle', fill: '#f4e8d0', spacing: '2' });
        text(W - 100, H - 80, 'REGEM', { family: "'Cinzel', serif", size: 14, weight: 700, anchor: 'middle', fill: '#f4e8d0', spacing: '2' });
      }
      else if (state.style === 'journal') {
        // ruled lines
        for (let y = 130; y < H - 60; y += 28) {
          const l = document.createElementNS(ns, 'line');
          l.setAttribute('x1', 70); l.setAttribute('x2', W - 50);
          l.setAttribute('y1', y); l.setAttribute('y2', y);
          l.setAttribute('stroke', '#7a5a32'); l.setAttribute('stroke-width', 0.6);
          l.setAttribute('opacity', '0.35');
          svg.appendChild(l);
        }
        text(W/2, 90, t || 'Field Notes', { family: "'IM Fell English', serif", size: 26, style: 'italic', anchor: 'middle' });
        if (sub) text(W/2, 112, sub, { family: "'IM Fell English', serif", size: 15, style: 'italic', anchor: 'middle', fill: '#6b5d4a' });
        wrap(80, 154, state.text, W - 150, { family: "'IM Fell English', serif", size: 16, lh: 28, style: 'italic' });
      }
      else if (state.style === 'ledger') {
        text(70, 70, t || 'House Ledger', { family: "'Cinzel', serif", size: 22, weight: 600, spacing: '4' });
        if (sub) text(70, 92, sub, { family: "'IM Fell English', serif", size: 14, style: 'italic', fill: '#6b5d4a' });
        // table lines
        for (let y = 120; y < H - 60; y += 32) {
          const l = document.createElementNS(ns, 'line');
          l.setAttribute('x1', 50); l.setAttribute('x2', W - 50);
          l.setAttribute('y1', y); l.setAttribute('y2', y);
          l.setAttribute('stroke', ink); l.setAttribute('stroke-width', 0.4); l.setAttribute('opacity', '0.45');
          svg.appendChild(l);
        }
        // column rules
        for (const x of [50, W - 180, W - 50]) {
          const l = document.createElementNS(ns, 'line');
          l.setAttribute('x1', x); l.setAttribute('x2', x);
          l.setAttribute('y1', 110); l.setAttribute('y2', H - 60);
          l.setAttribute('stroke', ink); l.setAttribute('stroke-width', 0.6); l.setAttribute('opacity', '0.45');
          svg.appendChild(l);
        }
        let row = 0;
        for (const line of state.text.split('\n')) {
          if (!line.trim()) continue;
          const parts = line.split(/\s+/);
          const num = parts[parts.length - 1];
          const isNum = /^-?\d/.test(num);
          const label = isNum ? parts.slice(0, -1).join(' ') : line;
          text(60, 142 + row * 32, label, { family: "'EB Garamond', serif", size: 15 });
          if (isNum) text(W - 60, 142 + row * 32, num, { family: "'EB Garamond', serif", size: 15, anchor: 'end' });
          row++;
          if (row > 17) break;
        }
      }
      else { // parchment / letter
        text(W/2, 86, t || '', { family: "'Cinzel', serif", size: 30, weight: 600, anchor: 'middle', spacing: '4' });
        if (sub) text(W/2, 116, sub, { family: "'IM Fell English', serif", size: 17, style: 'italic', anchor: 'middle', fill: '#6b5d4a' });
        // ornament
        text(W/2, 144, '\u2767  \u2767  \u2767', { family: "serif", size: 14, anchor: 'middle', fill: accent });
        wrap(70, 185, state.text, W - 140, { size: 17, lh: 25 });
      }
    }

    function exportSvg() {
      const svg = preview.querySelector('svg');
      if (!svg) return;
      const blob = new Blob([new XMLSerializer().serializeToString(svg)], { type: 'image/svg+xml' });
      downloadBlob(blob, 'handout-' + s.style + '-' + Date.now() + '.svg');
    }
    function exportPng() {
      const svg = preview.querySelector('svg');
      if (!svg) return;
      const str = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([str], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        const SCALE = 2;
        c.width = 600 * SCALE; c.height = 800 * SCALE;
        const ctx = c.getContext('2d');
        ctx.scale(SCALE, SCALE);
        ctx.drawImage(img, 0, 0, 600, 800);
        c.toBlob(b => downloadBlob(b, 'handout-' + s.style + '-' + Date.now() + '.png'), 'image/png');
        URL.revokeObjectURL(url);
      };
      img.src = url;
    }
    function downloadBlob(b, name) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b); a.download = name;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    }
  }
});

/* =========================================================================
   MODULE: ORACLE (yes/no with tone)
   ========================================================================= */
Keep.register({
  id: 'oracle',
  name: 'The Oracle',
  category: 'mysteries',
  glyph: 'g-eye',
  tagline: 'A yes, a no, a turn of fate. Ask, and listen.',
  sub: 'Ask a question. The answer takes the colour of your asking.',

  async mount(body) {
    const askInput = U.el('input', { class: 'input', placeholder: 'What do you wish to know?' });
    const askBtn = U.el('button', { class: 'btn btn--primary', onclick: () => roll() }, 'Cast');
    const askRow = U.el('div', { class: 'oracle__ask' }, [askInput, askBtn]);

    const result = U.el('div', { class: 'oracle__result' }, [
      U.el('div', { class: 'empty__ornament' }, '\u2734'),
      U.el('div', { class: 'oracle__verdict' }, 'Awaiting'),
      U.el('div', { class: 'oracle__qualifier' }, 'a question, an asker, an answer.')
    ]);

    const toneLabel = U.el('div', { style: { display: 'flex', gap: '0.5rem', marginBottom: '0.75rem', flexWrap: 'wrap', alignItems: 'center' } });
    const tones = [
      { id: 'doomed',   label: 'Doomed',   weight: { y: 1, n: 5 } },
      { id: 'unlikely', label: 'Unlikely', weight: { y: 2, n: 4 } },
      { id: 'even',     label: 'Even',     weight: { y: 3, n: 3 } },
      { id: 'likely',   label: 'Likely',   weight: { y: 4, n: 2 } },
      { id: 'fated',    label: 'Fated',    weight: { y: 5, n: 1 } }
    ];
    let tone = 'even';
    toneLabel.append(U.el('span', { class: 'label', style: { margin: 0 } }, 'Likelihood'));
    tones.forEach(t => {
      const b = U.el('button', { class: 'btn btn--ghost btn--small', onclick: () => { tone = t.id; updateTones(); } }, t.label);
      b.dataset.tone = t.id;
      toneLabel.append(b);
    });
    function updateTones() {
      toneLabel.querySelectorAll('button').forEach(b => {
        b.classList.toggle('btn--primary', b.dataset.tone === tone);
        b.classList.toggle('btn--ghost', b.dataset.tone !== tone);
      });
    }
    updateTones();

    const historyWrap = U.el('div', { class: 'oracle__history' }, [
      U.el('h4', {}, 'Recent castings')
    ]);

    body.append(U.el('div', { class: 'oracle' }, [askRow, toneLabel, result, historyWrap]));

    const complications = [
      'a hidden price reveals itself',
      'an old debt is named aloud',
      'someone you trusted is watching',
      'time presses harder than expected',
      'the weather turns against you',
      'a rumour outruns you',
      'a smaller fear takes root',
      'a witness will not stay silent',
      'the path costs more than counted',
      'an oath bends, but does not break'
    ];
    const qualifiers = {
      strong: ['and more', 'beyond doubt', 'utterly so'],
      yes: ['as asked'],
      partial: ['but a cost', 'with caveat', 'not as hoped'],
      no: ['as feared'],
      strongNo: ['and worse still', 'in every way', 'a refusal sealed']
    };

    async function loadHistory() {
      const items = await Vault.get('oracle-history') || [];
      historyWrap.querySelectorAll('.oracle__history-item').forEach(n => n.remove());
      items.slice(0, 8).forEach(it => {
        historyWrap.append(U.el('div', { class: 'oracle__history-item' }, [
          U.el('div', { class: 'oracle__history-q' }, it.q || '(no question)'),
          U.el('div', { class: 'oracle__history-a' + (it.yes ? '' : ''), style: { color: it.yes ? 'var(--forest)' : 'var(--wine)' } }, it.verdict)
        ]));
      });
      if (!items.length) historyWrap.append(U.el('div', { class: 'empty' }, 'The slate is clean.'));
    }
    loadHistory();

    async function roll() {
      const t = tones.find(x => x.id === tone);
      const total = t.weight.y + t.weight.n;
      const r = Math.random();
      const yesP = t.weight.y / total;
      const yes = r < yesP;
      // exception: roll for strong outcome (doubles in d6 terms)
      const strong = Math.random() < 0.18;
      const partial = !strong && Math.random() < 0.35;
      let verdict, qualifier;
      if (yes && strong) { verdict = 'Yes'; qualifier = U.pick(qualifiers.strong); }
      else if (yes && partial) { verdict = 'Yes, but'; qualifier = U.pick(qualifiers.partial); }
      else if (yes) { verdict = 'Yes'; qualifier = U.pick(qualifiers.yes); }
      else if (!yes && strong) { verdict = 'No'; qualifier = U.pick(qualifiers.strongNo); }
      else if (!yes && partial) { verdict = 'No, but'; qualifier = U.pick(qualifiers.partial); }
      else { verdict = 'No'; qualifier = U.pick(qualifiers.no); }
      // complication on 1-in-3
      const comp = Math.random() < 0.34 ? U.pick(complications) : null;

      result.innerHTML = '';
      result.append(
        U.el('div', { class: 'empty__ornament', style: { color: yes ? 'var(--forest)' : 'var(--wine)' } }, yes ? '\u2734' : '\u2767'),
        U.el('div', { class: 'oracle__verdict ' + (yes ? 'oracle__verdict--yes' : 'oracle__verdict--no') }, verdict),
        U.el('div', { class: 'oracle__qualifier' }, qualifier),
        comp ? U.el('div', { class: 'oracle__complication' }, 'Complication: ' + comp) : null,
        U.el('button', { class: 'btn btn--small btn--ghost pin-btn', onclick: async () => {
          const q = askInput.value.trim();
          let text = 'ORACLE: "' + (q || '(no question asked)') + '"\n';
          text += verdict + ', ' + qualifier + '.';
          if (comp) text += '\nComplication: ' + comp + '.';
          const today = await Refs.pinToToday(text, {
            module: 'oracle',
            label: (q || 'a question').slice(0, 60)
          });
          U.toast('Pinned to ' + (await Refs.formatDate(today)));
        }}, 'Pin to Almanac')
      );

      const items = await Vault.get('oracle-history') || [];
      items.unshift({ q: askInput.value, verdict, qualifier, yes, comp, ts: Date.now() });
      await Vault.set('oracle-history', items.slice(0, 50));
      loadHistory();
    }

    askInput.addEventListener('keydown', e => { if (e.key === 'Enter') roll(); });
  }
});

      needs: [

        'must deliver a sealed letter to the wrong city',
        'wants someone followed without their knowledge',

        'seeks the truth about her father\u2019s death',
        'wishes a marriage prevented',
        'needs a tomb opened, then closed again',

        'seeks a buyer for something stolen long ago',
        'needs an escort through dangerous country',
        'wants to find the maker of a particular sigil',
        'needs a ghost laid to rest',
        'seeks a place to disappear into',
        'would have a vow released',
        'needs to retrieve a body before the family hears',
        'wants a forgery exposed without scandal',
        'seeks the same map you carry',
        'needs a dying confession heard',

        'but the missing person does not want to be found',

        'but the dead refuse to be summoned',
