    function closePopover() {
      if (popoverEl && popoverEl.parentNode) popoverEl.parentNode.removeChild(popoverEl);
      popoverEl = null;
      document.querySelectorAll('.atlas__poi--selected').forEach(el => el.classList.remove('atlas__poi--selected'));
    }

    async function openPopover(poi, map, anchorEl) {
      closePopover();
      const type = POI_TYPES[poi.type];
      const canvas = document.querySelector('.atlas__canvas');
      if (!canvas) return;
      const pop = U.el('div', { class: 'atlas__popover' });
      const head = U.el('div', { class: 'atlas__popover-head' });
      const idx = map.pois.findIndex(p => p.id === poi.id) + 1;
      head.append(
        U.el('span', { class: 'atlas__popover-num' }, idx.toString()),
        U.el('span', { class: 'atlas__popover-name' }, poi.name),
        U.el('button', { class: 'atlas__popover-close', title: 'Close', onclick: closePopover }, '\u00D7')
      );
      pop.append(head);
      pop.append(U.el('div', { class: 'atlas__popover-type' }, type.typeLabel));
      pop.append(U.el('div', { class: 'atlas__popover-story' }, poi.backstory));

      // Archive backlinks: any chronicle entry that wikilinks this POI.
      try {
        const links = await Refs.backlinks(poi.name);
        if (links.length) {
          const linksWrap = U.el('div', { class: 'atlas__popover-backlinks' });
          linksWrap.append(U.el('div', { class: 'atlas__popover-backlinks-label' }, 'Mentioned in'));
          const row = U.el('div', { class: 'atlas__popover-backlinks-row' });
          links.forEach(name => {
            row.append(U.el('button', {
              class: 'tag',
              onclick: () => { closePopover(); Refs.openArchiveEntry(name); }
            }, name));
          });
          linksWrap.append(row);
          pop.append(linksWrap);
        }
      } catch (e) { /* backlinks are nice-to-have */ }

      const acts = U.el('div', { class: 'atlas__popover-actions' });
      if (type.questSetting) {
        acts.append(U.el('button', {
          class: 'atlas__popover-btn atlas__popover-btn--primary',
          onclick: () => launchQuestFromPoi(poi, map)
        }, 'Launch Quest Here'));
      }
      if (type.canRollTavern) {
        acts.append(U.el('button', {
          class: 'atlas__popover-btn',
          onclick: () => rollTavernFromPoi(poi)
        }, 'Roll a Tavern Here'));
      }
      if (type.canRollFace) {
        acts.append(U.el('button', {
          class: 'atlas__popover-btn',
          onclick: () => rollFaceFromPoi(poi, map)
        }, 'Roll a Face Here'));
      }
      if (type.canBeFaction) {
        acts.append(U.el('button', {
          class: 'atlas__popover-btn',
          onclick: () => addFactionFromPoi(poi, map)
        }, 'Seed a Faction'));
      }
      if (type.canBeThreat) {
        acts.append(U.el('button', {
          class: 'atlas__popover-btn',
          onclick: () => noteThreatFromPoi(poi, map)
        }, 'Note as Threat'));
      }
      acts.append(
        U.el('button', {
          class: 'atlas__popover-btn',
          onclick: () => createArchiveFromPoi(poi, map)
        }, 'To the Archive'),
        U.el('button', {
          class: 'atlas__popover-btn',
          onclick: () => pinPoiToAlmanac(poi, map)
        }, 'Pin to Almanac')
      );
      pop.append(acts);
      const rect = canvas.getBoundingClientRect();
      const scale = rect.width / 800;
      const px = poi.x * scale + 16;
      const py = Math.max(8, poi.y * scale - 60);
      pop.style.left = px + 'px';
      pop.style.top = py + 'px';
      canvas.appendChild(pop);
      const popRect = pop.getBoundingClientRect();
      if (popRect.right > rect.right - 8) {
        pop.style.left = Math.max(8, poi.x * scale - popRect.width - 16) + 'px';
      }
      popoverEl = pop;
      anchorEl.classList.add('atlas__poi--selected');
    }

    // -- RENDERING --
    function render() {
      body.innerHTML = '';
      actions.innerHTML = '';
      closePopover();
      const wrap = U.el('div', { class: 'atlas' + (maps.length ? '' : ' atlas--empty') });
      body.append(wrap);
      if (maps.length) wrap.append(renderSidebar());
      const activeM = activeMap();
      if (activeM) wrap.append(renderView(activeM));
      else wrap.append(renderBuilder());
    }

    function renderSidebar() {
      const sidebar = U.el('div', { class: 'atlas__sidebar' });
      sidebar.append(U.el('div', { class: 'atlas__sidebar-head' }, 'Library'));
      const list = U.el('div', { class: 'atlas__map-list' });
      maps.forEach(m => {
        const item = U.el('button', {
          class: 'atlas__map-item' + (m.id === activeMapId ? ' atlas__map-item--active' : ''),
          onclick: () => selectMap(m.id)
        });
        item.append(
          U.el('span', { class: 'atlas__map-item-name' }, m.name),
          U.el('span', { class: 'atlas__map-item-meta' }, BIOMES[m.biome].name + ' \u00B7 ' + m.poiCount + ' marks')
        );
        list.append(item);
      });
      sidebar.append(list);
      sidebar.append(U.el('button', {
        class: 'atlas__new-btn',
        onclick: () => { activeMapId = null; saveActive(); render(); }
      }, '+ Forge New Map'));
      return sidebar;
    }

    function renderBuilder() {
      const builder = U.el('div', { class: 'atlas__builder' });
      builder.append(U.el('div', { class: 'atlas__builder-intro' },
        'Forge a region. Pick a biome, choose how many marks to scatter, and either name it or let it name itself.'));

      builder.append(U.el('div', { class: 'atlas__build-section-head' }, 'Biome'));
      const biomesGrid = U.el('div', { class: 'atlas__biomes' });
      BIOME_ORDER.forEach(id => {
        const b = BIOMES[id];
        const card = U.el('button', {
          class: 'atlas__biome' + (buildState.biome === id ? ' atlas__biome--selected' : ''),
          onclick: () => { buildState.biome = id; render(); }
        });
        card.append(
          U.el('span', { class: 'atlas__biome-name' }, b.name),
          U.el('span', { class: 'atlas__biome-sub' }, b.sub)
        );
        biomesGrid.append(card);
      });
      builder.append(biomesGrid);

      builder.append(U.el('div', { class: 'atlas__build-section-head' }, 'Marks'));
      const optRow = U.el('div', { class: 'atlas__option-row' });
      [8, 12, 16].forEach(n => {
        optRow.append(U.el('button', {
          class: 'atlas__option' + (buildState.poiCount === n ? ' atlas__option--selected' : ''),
          onclick: () => { buildState.poiCount = n; render(); }
        }, n + ' marks'));
      });
      builder.append(optRow);

      builder.append(U.el('div', { class: 'atlas__build-section-head' }, 'Region Name'));
      const nameInp = U.el('input', {
        type: 'text',
        class: 'atlas__name-input',
        placeholder: 'Leave blank to auto-generate (e.g. "The Hollow Coast")',
        value: buildState.name
      });
      nameInp.addEventListener('input', (e) => { buildState.name = e.target.value; });
      builder.append(nameInp);

      const forgeRow = U.el('div', { class: 'atlas__forge-row' });
      forgeRow.append(U.el('button', { class: 'atlas__forge', onclick: createMap }, 'Forge the Map'));
      builder.append(forgeRow);

      return builder;
    }

    function renderView(map) {
      const view = U.el('div', { class: 'atlas__view' });
      const head = U.el('div', { class: 'atlas__view-head' });
      const actsBox = U.el('div', { class: 'atlas__view-actions' });
      actsBox.append(
        U.el('button', {
          class: 'btn btn--ghost btn--small',
          onclick: () => {
            const newName = prompt('Rename region:', map.name);
            if (newName != null) renameMap(map.id, newName);
          }
        }, 'Rename'),
        U.el('button', { class: 'btn btn--ghost btn--small', onclick: printMap }, 'Print / PDF'),
        U.el('button', { class: 'btn btn--ghost btn--small', onclick: () => deleteMap(map.id) }, 'Delete')
      );
      head.append(
        U.el('span', { class: 'atlas__view-title' }, map.name),
        U.el('span', { class: 'atlas__view-meta' }, BIOMES[map.biome].name + ' \u00B7 ' + map.pois.length + ' marks'),
        actsBox
      );
      view.append(head);

      const canvas = U.el('div', { class: 'atlas__canvas' });
      canvas.append(renderMapSVG(map));
      view.append(canvas);
      view.append(renderLegend(map));

      // If search or wikilink asked for a specific POI, open its popover
      // after the SVG settles in the DOM. Only fires when the active map
      // owns the pending POI; cleared either way.
      if (pendingPoiId) {
        const target = map.pois.find(p => p.id === pendingPoiId);
        const wantedId = pendingPoiId;
        pendingPoiId = null;
        if (target) {
          setTimeout(() => {
            const anchor = document.querySelector('.atlas__poi[data-poi-id="' + wantedId + '"]');
            if (anchor) openPopover(target, map, anchor);
          }, 50);
        }
      }

      // Dismiss popover on outside click
      setTimeout(() => {
        const handler = (e) => {
          if (popoverEl && !popoverEl.contains(e.target) && !e.target.closest('.atlas__poi')) {
            closePopover();
          }
        };
        document.addEventListener('click', handler);
      }, 0);

      return view;
    }

    function renderTopology(svg, biomeId, W, H) {
      const g = svgEl('g', { opacity: '0.20', fill: 'none', stroke: '#3a2f24' });
      if (biomeId === 'coast') {
        let d = 'M 0 ' + (H - 32);
        for (let x = 0; x <= W; x += 40) d += ' Q ' + (x + 20) + ' ' + (H - 42) + ' ' + (x + 40) + ' ' + (H - 32);
        g.appendChild(svgEl('path', { d, 'stroke-width': 1.2 }));
        let d2 = 'M 0 ' + (H - 18);
        for (let x = 0; x <= W; x += 50) d2 += ' Q ' + (x + 25) + ' ' + (H - 26) + ' ' + (x + 50) + ' ' + (H - 18);
        g.appendChild(svgEl('path', { d: d2, 'stroke-width': 0.8 }));
      } else if (biomeId === 'island') {
        // Sea on all four edges. Two wave lines per edge for depth.
        let dT = 'M 0 32';
        for (let x = 0; x <= W; x += 40) dT += ' Q ' + (x + 20) + ' 22 ' + (x + 40) + ' 32';
        g.appendChild(svgEl('path', { d: dT, 'stroke-width': 1.0 }));
        let dT2 = 'M 0 18';
        for (let x = 0; x <= W; x += 50) dT2 += ' Q ' + (x + 25) + ' 10 ' + (x + 50) + ' 18';
        g.appendChild(svgEl('path', { d: dT2, 'stroke-width': 0.7 }));
        let dB = 'M 0 ' + (H - 32);
        for (let x = 0; x <= W; x += 40) dB += ' Q ' + (x + 20) + ' ' + (H - 42) + ' ' + (x + 40) + ' ' + (H - 32);
        g.appendChild(svgEl('path', { d: dB, 'stroke-width': 1.0 }));
        let dB2 = 'M 0 ' + (H - 18);
        for (let x = 0; x <= W; x += 50) dB2 += ' Q ' + (x + 25) + ' ' + (H - 26) + ' ' + (x + 50) + ' ' + (H - 18);
        g.appendChild(svgEl('path', { d: dB2, 'stroke-width': 0.7 }));
        let dL = 'M 32 0';
        for (let y = 0; y <= H; y += 40) dL += ' Q 22 ' + (y + 20) + ' 32 ' + (y + 40);
        g.appendChild(svgEl('path', { d: dL, 'stroke-width': 1.0 }));
        let dL2 = 'M 18 0';
        for (let y = 0; y <= H; y += 50) dL2 += ' Q 10 ' + (y + 25) + ' 18 ' + (y + 50);
        g.appendChild(svgEl('path', { d: dL2, 'stroke-width': 0.7 }));
        let dR = 'M ' + (W - 32) + ' 0';
        for (let y = 0; y <= H; y += 40) dR += ' Q ' + (W - 22) + ' ' + (y + 20) + ' ' + (W - 32) + ' ' + (y + 40);
        g.appendChild(svgEl('path', { d: dR, 'stroke-width': 1.0 }));
        let dR2 = 'M ' + (W - 18) + ' 0';
        for (let y = 0; y <= H; y += 50) dR2 += ' Q ' + (W - 10) + ' ' + (y + 25) + ' ' + (W - 18) + ' ' + (y + 50);
        g.appendChild(svgEl('path', { d: dR2, 'stroke-width': 0.7 }));
      } else if (biomeId === 'forest') {
        for (let i = 0; i < 22; i++) {
          const x = 40 + Math.random() * (W - 80);
          const y = 80 + Math.random() * (H - 140);
          g.appendChild(svgEl('path', {
            d: 'M ' + x + ' ' + y + ' l 0 -6 M ' + (x - 3) + ' ' + (y - 4) + ' q 3 -6 6 0',
            'stroke-width': 0.7,
            'stroke-linecap': 'round'
          }));
        }
      } else if (biomeId === 'jungle') {
        // dense canopy: larger, more numerous tree silhouettes
        for (let i = 0; i < 32; i++) {
          const x = 25 + Math.random() * (W - 50);
          const y = 80 + Math.random() * (H - 140);
          g.appendChild(svgEl('path', {
            d: 'M ' + x + ' ' + y + ' l 0 -8 M ' + (x - 4) + ' ' + (y - 5) + ' q 4 -8 8 0',
            'stroke-width': 0.9,
            'stroke-linecap': 'round'
          }));
        }
        // a winding river across the map
        let rd = 'M 0 ' + (H * 0.5);
        let curY = H * 0.5;
        for (let x = 30; x <= W; x += 35) {
          curY += (Math.random() - 0.5) * 25;
          curY = Math.max(H * 0.32, Math.min(H * 0.68, curY));
          rd += ' Q ' + (x - 5) + ' ' + curY + ' ' + x + ' ' + curY;
        }
        g.appendChild(svgEl('path', { d: rd, 'stroke-width': 1.3 }));
      } else if (biomeId === 'mountain') {
        // ridge line
        let d = 'M 0 ' + (H * 0.55);
        for (let x = 0; x <= W; x += 60) {
          const peak = (H * 0.55) - (20 + Math.random() * 30);
          d += ' L ' + (x + 30) + ' ' + peak + ' L ' + (x + 60) + ' ' + (H * 0.55);
        }
        g.appendChild(svgEl('path', { d, 'stroke-width': 0.9 }));
      } else if (biomeId === 'wetland') {
        // reed clusters
        for (let i = 0; i < 14; i++) {
          const cx = 50 + Math.random() * (W - 100);
          const cy = 100 + Math.random() * (H - 160);
          let rd = '';
          for (let r = 0; r < 5; r++) {
            const rx = cx + (r - 2) * 2;
            rd += 'M ' + rx + ' ' + cy + ' L ' + rx + ' ' + (cy - 5 - Math.random() * 4) + ' ';
          }
          g.appendChild(svgEl('path', { d: rd, 'stroke-width': 0.6 }));
        }
      } else if (biomeId === 'plain') {
        // horizontal road
        const y = H * 0.5 + Math.random() * 40 - 20;
        g.appendChild(svgEl('path', {
          d: 'M 30 ' + y + ' Q ' + (W / 2) + ' ' + (y + 10) + ' ' + (W - 30) + ' ' + y,
          'stroke-width': 1.1, 'stroke-dasharray': '4,4'
        }));
      } else if (biomeId === 'desert') {
        // dune curves
        for (let i = 0; i < 5; i++) {
          const y = 90 + i * (H - 180) / 5 + Math.random() * 20;
          let d = 'M 20 ' + y;
          for (let x = 20; x <= W; x += 60) {
            d += ' Q ' + (x + 30) + ' ' + (y - 10) + ' ' + (x + 60) + ' ' + y;
          }
          g.appendChild(svgEl('path', { d, 'stroke-width': 0.7 }));
        }
      } else if (biomeId === 'tundra') {
        // scattered ice crystals
        for (let i = 0; i < 30; i++) {
          const cx = 30 + Math.random() * (W - 60);
          const cy = 80 + Math.random() * (H - 140);
          g.appendChild(svgEl('path', {
            d: 'M ' + (cx - 3) + ' ' + cy + ' L ' + (cx + 3) + ' ' + cy + ' M ' + cx + ' ' + (cy - 3) + ' L ' + cx + ' ' + (cy + 3) + ' M ' + (cx - 2) + ' ' + (cy - 2) + ' L ' + (cx + 2) + ' ' + (cy + 2) + ' M ' + (cx - 2) + ' ' + (cy + 2) + ' L ' + (cx + 2) + ' ' + (cy - 2),
            'stroke-width': 0.5
          }));
        }
      } else if (biomeId === 'subterranean') {
        // cracks
        for (let i = 0; i < 8; i++) {
          const x = 40 + Math.random() * (W - 80);
          const y = 90 + Math.random() * (H - 160);
          let d = 'M ' + x + ' ' + y;
          let cx = x, cy = y;
          for (let k = 0; k < 4; k++) {
            cx += (Math.random() - 0.5) * 40;
            cy += (Math.random() - 0.5) * 40;
            d += ' L ' + cx + ' ' + cy;
          }
          g.appendChild(svgEl('path', { d, 'stroke-width': 0.6 }));
        }
      }
      svg.appendChild(g);
    }

    function renderCompass(svg, x, y) {
      const g = svgEl('g', {
        transform: 'translate(' + x + ',' + y + ')',
        fill: 'none', stroke: '#5c1f24', 'stroke-width': 0.8
      });
      g.appendChild(svgEl('circle', { cx: 0, cy: 0, r: 18 }));
      g.appendChild(svgEl('circle', { cx: 0, cy: 0, r: 12, 'stroke-width': 0.5 }));
      g.appendChild(svgEl('path', {
        d: 'M 0 -16 L 3 0 L 0 16 L -3 0 Z M -16 0 L 0 3 L 16 0 L 0 -3 Z',
        fill: '#5c1f24', 'fill-opacity': 0.7
      }));
      const n = svgEl('text', {
        x: 0, y: -22,
        'text-anchor': 'middle',
        'font-family': 'Cinzel, serif',
        'font-size': 8,
        fill: '#5c1f24'
      });
      n.textContent = 'N';
      g.appendChild(n);
      svg.appendChild(g);
    }

    function renderMapSVG(map) {
      const W = 800, H = 540;
      const biome = BIOMES[map.biome];
      const svg = svgEl('svg', {
        viewBox: '0 0 ' + W + ' ' + H,
        class: 'atlas__map',
        xmlns: SVG_NS
      });

      // Background
      svg.appendChild(svgEl('rect', { x: 0, y: 0, width: W, height: H, fill: biome.bg }));

      // Topology decoration
      renderTopology(svg, map.biome, W, H);

      // Decorative border
      svg.appendChild(svgEl('rect', {
        x: 8, y: 8, width: W - 16, height: H - 16,
        fill: 'none', stroke: '#5c1f24', 'stroke-width': 2
      }));
      svg.appendChild(svgEl('rect', {
        x: 16, y: 16, width: W - 32, height: H - 32,
        fill: 'none', stroke: '#5c1f24', 'stroke-width': 0.6,
        'stroke-dasharray': '6,4'
      }));

      // Title
      const title = svgEl('text', {
        x: W / 2, y: 52,
        'text-anchor': 'middle',
        'font-family': 'Cinzel, serif',
        'font-size': 28,
        'letter-spacing': '4',
        fill: '#3a2415'
      });
      title.textContent = map.name;
      svg.appendChild(title);

      // POIs
      map.pois.forEach((poi, i) => {
        const type = POI_TYPES[poi.type];
        const g = svgEl('g', {
          class: 'atlas__poi',
          'data-poi-id': poi.id
        });
        g.appendChild(svgEl('circle', {
          cx: poi.x, cy: poi.y, r: 22,
          fill: 'transparent',
          class: 'atlas__poi-hit'
        }));
        g.appendChild(svgEl('path', {
          d: POI_GLYPHS[type.glyph],
          transform: 'translate(' + poi.x + ',' + poi.y + ')',
          class: 'atlas__poi-glyph',
          fill: 'none', stroke: '#3a2415', 'stroke-width': 1.3,
          'stroke-linecap': 'round', 'stroke-linejoin': 'round'
        }));
        // Number badge
        g.appendChild(svgEl('circle', {
          cx: poi.x + 10, cy: poi.y - 10, r: 8,
          fill: '#faf2dd', stroke: '#5c1f24', 'stroke-width': 0.7,
          class: 'atlas__poi-num-bg'
        }));
        const numTxt = svgEl('text', {
          x: poi.x + 10, y: poi.y - 7,
          'text-anchor': 'middle',
          'font-family': 'Cinzel, serif',
          'font-size': 9,
          fill: '#5c1f24'
        });
        numTxt.textContent = (i + 1).toString();
        g.appendChild(numTxt);
        // Label
        const lbl = svgEl('text', {
          x: poi.x, y: poi.y + 22,
          'text-anchor': 'middle',
          'font-family': 'EB Garamond, serif',
          'font-style': 'italic',
          'font-size': 11,
          fill: '#3a2415'
        });
        lbl.textContent = poi.name;
        g.appendChild(lbl);
        // Click
        g.addEventListener('click', (e) => {
          e.stopPropagation();
          openPopover(poi, map, g);
        });
        svg.appendChild(g);
      });

      // Compass
      renderCompass(svg, W - 50, H - 50);

      return svg;
    }

    function renderLegend(map) {
      const wrap = U.el('div', { class: 'atlas__legend' });
      wrap.append(U.el('div', { class: 'atlas__legend-head' }, 'Legend'));
      const list = U.el('div', { class: 'atlas__legend-list' });
      map.pois.forEach((poi, i) => {
        const type = POI_TYPES[poi.type];
        const item = U.el('div', { class: 'atlas__legend-item' });
        item.append(U.el('span', { class: 'atlas__legend-num' }, (i + 1).toString()));
        const right = U.el('div');
        right.append(
          U.el('div', { class: 'atlas__legend-name' }, poi.name),
          U.el('div', { class: 'atlas__legend-type' }, type.typeLabel),
          U.el('div', { class: 'atlas__legend-story' }, poi.backstory)
        );
        item.append(right);
        list.append(item);
      });
      wrap.append(list);
      return wrap;
    }

    render();
  }
});

/* =========================================================================
   MODULE: LOOT (Treasure Generator)
   Tap a tier (paltry/modest/rich/royal) and roll. Generates coins by
   denomination, mundane oddments (1 to 5), and an occasional named
   wonder. Each item can be one-clicked into the Cabinet; coins can be
   one-clicked into the Coffer. Pin the whole haul to the Almanac.
   ========================================================================= */
Keep.register({
  id: 'loot',
  name: 'Loot',
  category: 'workshop',
  glyph: 'g-loot',
  tagline: 'Coins, oddments, and the occasional wonder.',
  sub: 'Roll the haul. Add what matters to the Cabinet. Drop the coin in the Coffer.',

  async mount(body, actions) {
    const TIERS = {
      paltry: {
        name: 'Paltry',
        sub: 'A beggar\u2019s pocket, or what a drunk left behind.',
        coins: () => ({
          cu: dN(2, 6),
          ag: chance(0.5) ? dN(1, 6) : 0,
          au: 0,
          pt: 0
        }),
        items: { min: 1, max: 2 },
        wonder: 0.05
      },
      modest: {
        name: 'Modest',
        sub: 'A tradesman\u2019s purse, a guard\u2019s footlocker.',
        coins: () => ({
          cu: dN(2, 8),
          ag: dN(3, 6),
          au: chance(0.6) ? dN(1, 6) : 0,
          pt: 0
        }),
        items: { min: 1, max: 3 },
        wonder: 0.15
      },
      rich: {
        name: 'Rich',
        sub: 'A noble\u2019s coffer, a bandit lord\u2019s share.',
        coins: () => ({
          cu: dN(1, 6),
          ag: dN(2, 8),
          au: dN(5, 6),
          pt: chance(0.5) ? dN(1, 6) : 0
        }),
        items: { min: 2, max: 4 },
        wonder: 0.35
      },
      royal: {
        name: 'Royal',
        sub: 'A king\u2019s tribute, a vault long sealed.',
        coins: () => ({
          cu: 0,
          ag: dN(2, 10),
          au: dN(10, 6),
          pt: dN(3, 6)
        }),
        items: { min: 3, max: 5 },
        wonder: 0.65
      }
    };

    const ODDMENTS = [
      'A bolt of moth-eaten cloth',
      'An iron skillet, dented',
      'A bundle of letters, none recent',
      'A coil of good rope',
      'A whetstone, well-used',
      'A traveller\u2019s cloak with mended hem',
      'A wooden bowl carved with a sigil',
      'A leather strap with a worn buckle',
      'A worn dagger, the maker\u2019s mark scratched out',
      'A silver candlestick, slightly tarnished',
      'A chipped goblet of pewter',
      'An empty vial that smells of nothing',
      'A rusted key on a ring of five',
      'A carved wooden idol of an unfamiliar god',
      'A handful of glass beads on a string',
      'A writing kit, ink long dried',
      'A broken lute with two strings missing',
      'A moth-eaten tapestry, folded small',
      'A moldering book in a foreign script',
      'A bag of iron nails',
      'A tinderbox with three strikers',
      'A small loaf of stale bread',
      'A roll of bandage, mostly clean',
      'A half-melted candle',
      'A clay pipe, well chewed',
      'A pair of soft boots in the wrong size',
      'A flask of vinegar, mislabelled',
      'A pouch of mixed buttons',
      'A water-damaged map of somewhere',
      'A chess piece (white queen) with no companions'
    ];

    const WONDERS = [
      { name: 'The Whispering Mirror',           desc: 'Shows a face other than your own when held to the moon.' },
      { name: 'Belt of the Stone Bear',          desc: 'The wearer cannot be moved against their will while their feet touch earth.' },
      { name: 'Ironwood Ring of Vance',          desc: 'Turns warm in the presence of lies.' },
      { name: 'Crown of Thirteen Sorrows',       desc: 'The wearer dreams strangers\u2019 griefs each night until removed.' },
      { name: 'The Quiet Lantern',               desc: 'Lights without flame, but only in rooms where someone has wept that day.' },
      { name: 'Inkstone of Marcus',              desc: 'Words written with its ink fade if spoken aloud before they dry.' },
      { name: 'The Hollow Coin',                 desc: 'When flipped, lands edge-on for an answer too true to bear.' },
      { name: 'Cloak of the Twelfth Watch',      desc: 'Renders the wearer unremarkable, but only between midnight and dawn.' },
      { name: 'The Pilgrim\u2019s Cup',          desc: 'Water drunk from it tastes of the last drink of the previous bearer.' },
      { name: 'Bone Flute of the Marsh-King',    desc: 'Calls toads from any wet ground within a mile. They do not leave.' },
      { name: 'The Memory Stone',                desc: 'Holds one memory at a time, drawn from the bearer on the night of the new moon.' },
      { name: 'Sealing Wax of the Last Court',   desc: 'Letters sealed with it cannot be opened by anyone but the addressed, alive or dead.' },
      { name: 'Vellum of the Unspoken Name',     desc: 'Bears a name visible only to those who have heard it whispered.' },
      { name: 'The Patient Knife',               desc: 'Refuses to draw blood from the same hand twice.' },
      { name: 'Amulet of the Brackish River',    desc: 'Wearer can drink any water without harm. Their breath smells of silt.' },
      { name: 'Lockpick of the Eighth Hour',     desc: 'Opens any lock once per day at exactly the hour of its forging.' },
      { name: 'The Salt-Eaten Compass',          desc: 'Points toward the last lie the bearer told.' },
      { name: 'Glove of the Honest Hand',        desc: 'The wearer cannot strike first, but never strikes badly.' },
      { name: 'The Drowning Bell',               desc: 'When rung, every sleeper within hearing distance dreams of dark water.' },
      { name: 'Boots of the Vagrant Saint',      desc: 'Soles never wear, but the wearer cannot sleep two nights under the same roof.' },
      { name: 'The Bell-Mason\u2019s Chisel',    desc: 'Carves stone as easily as wax for one hour after a death is mourned upon it.' },
      { name: 'Ring of the Three Petitions',     desc: 'Grants three small wishes, then becomes plain iron. The bearer never knows which wish was the third.' },
      { name: 'Mirror of the Lesser Truth',      desc: 'Shows the viewer not as they are, but as the last person they wronged saw them.' },
      { name: 'The Forager\u2019s Knot',         desc: 'A rope that grows tight in the presence of poison.' },
      { name: 'Cup of the Long Vigil',           desc: 'Wine drunk from it does not intoxicate, but the bearer feels the sorrow of all who drank before.' },
      { name: 'The Wandering Coin',              desc: 'Returns to the previous owner\u2019s pocket if not given away within seven days.' },
      { name: 'Hood of the Field Confessor',     desc: 'The wearer hears truth in any voice that addresses them, but cannot speak truth in return.' },
      { name: 'Brass Key of the Eastern Gate',   desc: 'Opens any door facing east at sunrise, then crumbles. Reforms by the next eastern dawn.' },
      { name: 'The Inheritor\u2019s Spoon',      desc: 'Food eaten from it tastes of the eater\u2019s childhood, whether they remember it or not.' },
      { name: 'Veil of the Sister Who Stayed',   desc: 'A grey cloth that, when laid across a sleeper\u2019s face, brings them dreams of someone they refused to follow.' }
    ];

    const COIN_LABELS = { cu: 'copper', ag: 'silver', au: 'gold', pt: 'platinum' };

    function dN(count, sides) {
      let total = 0;
      for (let i = 0; i < count; i++) total += 1 + Math.floor(Math.random() * sides);
      return total;
    }
    function chance(p) { return Math.random() < p; }
    function pickN(arr, n) {
      const shuffled = [...arr].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, n);
    }

    let activeTier = (await Vault.get('loot-tier')) || 'modest';
    let lastHaul = null;
    const today = await Refs.today();

    // ---- UI scaffolding ---------------------------------------------
    const wrap = U.el('div', { class: 'loot' });

    const builder = U.el('div', { class: 'loot__builder' });
    builder.append(
      U.el('div', { class: 'loot__intro' },
        'Choose a tier, then roll. The world provides coins, oddments, and now and again a wonder.'),
      U.el('div', { class: 'loot__section-head' }, 'Tier')
    );
    const tierRow = U.el('div', { class: 'loot__tiers' });
    Object.entries(TIERS).forEach(([key, t]) => {
      const btn = U.el('button', {
        class: 'loot__tier' + (activeTier === key ? ' loot__tier--active' : ''),
        onclick: async () => {
          activeTier = key;
          await Vault.set('loot-tier', key);
          renderTiers();
        }
      }, [
        U.el('span', { class: 'loot__tier-name' }, t.name),
        U.el('span', { class: 'loot__tier-sub' }, t.sub)
      ]);
      btn.dataset.tier = key;
      tierRow.append(btn);
    });
    builder.append(tierRow);

    builder.append(U.el('button', {
      class: 'loot__roll',
      onclick: () => roll()
    }, 'Roll the Haul'));

    const result = U.el('div', { class: 'loot__result' });
    result.style.display = 'none';

    wrap.append(builder, result);
    body.append(wrap);

    function renderTiers() {
      tierRow.querySelectorAll('.loot__tier').forEach(b => {
        b.classList.toggle('loot__tier--active', b.dataset.tier === activeTier);
      });
    }

    // ---- ROLL --------------------------------------------------------
    function roll() {
      const tier = TIERS[activeTier];
      const coins = tier.coins();
      const numItems = tier.items.min +
        Math.floor(Math.random() * (tier.items.max - tier.items.min + 1));
      const items = pickN(ODDMENTS, numItems);
      const wonder = chance(tier.wonder) ? U.pick(WONDERS) : null;
      lastHaul = {
        tier: activeTier,
        coins,
        items: items.map(t => ({ text: t, added: false })),
        wonder: wonder ? { name: wonder.name, desc: wonder.desc, added: false } : null,
        coinsAdded: false
      };
      renderResult();
    }

    function renderResult() {
      result.innerHTML = '';
      if (!lastHaul) { result.style.display = 'none'; return; }
      result.style.display = '';
      const tier = TIERS[lastHaul.tier];

      result.append(
        U.el('div', { class: 'loot__result-head' }, '\u2767 The Haul \u2767'),
        U.el('div', { class: 'loot__result-tier' }, tier.name + ': ' + tier.sub)
      );

      // Coins
      const hasCoins = Object.values(lastHaul.coins).some(v => v > 0);
      const coinsGroup = U.el('div', { class: 'loot__group' });
      coinsGroup.append(U.el('div', { class: 'loot__group-label' }, 'Coin'));
      if (hasCoins) {
        const coinsRow = U.el('div', { class: 'loot__coins' });
        ['cu', 'ag', 'au', 'pt'].forEach(k => {
          if (!lastHaul.coins[k]) return;
          coinsRow.append(U.el('span', { class: 'loot__coin' }, [
            U.el('span', { class: 'loot__coin-value' }, lastHaul.coins[k].toString()),
            U.el('span', { class: 'loot__coin-label' }, COIN_LABELS[k])
          ]));
        });
        coinsGroup.append(coinsRow);
      } else {
        coinsGroup.append(U.el('div', { class: 'loot__empty' }, 'No coin in this haul.'));
      }
      result.append(coinsGroup);

      // Oddments
      const oddGroup = U.el('div', { class: 'loot__group' });
      oddGroup.append(U.el('div', { class: 'loot__group-label' }, 'Oddments'));
      const oddList = U.el('div', { class: 'loot__items' });
      lastHaul.items.forEach((item, idx) => {
        const row = U.el('div', { class: 'loot__item' });
        row.append(U.el('span', { class: 'loot__item-text' }, item.text));
        const addBtn = U.el('button', {
          class: 'loot__item-add' + (item.added ? ' loot__item-add--done' : ''),
          disabled: item.added,
          onclick: async () => {
            await addItemToCabinet(item.text, 'curiosity');
            lastHaul.items[idx].added = true;
            renderResult();
          }
        }, item.added ? 'Added' : '+ Cabinet');
        row.append(addBtn);
        oddList.append(row);
      });
      oddGroup.append(oddList);
      result.append(oddGroup);

      // Wonder
      if (lastHaul.wonder) {
        const wGroup = U.el('div', { class: 'loot__group' });
        wGroup.append(U.el('div', { class: 'loot__group-label' }, 'Wonder'));
        const w = U.el('div', { class: 'loot__wonder' });
        const head = U.el('div', { class: 'loot__wonder-head' });
        head.append(U.el('span', { class: 'loot__wonder-name' }, lastHaul.wonder.name));
        const wAdd = U.el('button', {
          class: 'loot__item-add' + (lastHaul.wonder.added ? ' loot__item-add--done' : ''),
          disabled: lastHaul.wonder.added,
          onclick: async () => {
            await addItemToCabinet(lastHaul.wonder.name, 'relic', lastHaul.wonder.desc);
            lastHaul.wonder.added = true;
            renderResult();
          }
        }, lastHaul.wonder.added ? 'Added' : '+ Cabinet');
        head.append(wAdd);
        w.append(head);
        w.append(U.el('div', { class: 'loot__wonder-desc' }, lastHaul.wonder.desc));
        wGroup.append(w);
        result.append(wGroup);
      }

      // Actions
      const actionsRow = U.el('div', { class: 'loot__result-actions' });
      if (hasCoins) {
        const coinBtn = U.el('button', {
          class: 'btn btn--ghost btn--small' + (lastHaul.coinsAdded ? '' : ''),
          disabled: lastHaul.coinsAdded,
          onclick: async () => {
            await depositToCoffer(lastHaul.coins);
            lastHaul.coinsAdded = true;
            renderResult();
          }
        }, lastHaul.coinsAdded ? 'Coin added to Coffer' : '+ Coffer');
        actionsRow.append(coinBtn);
      }
      actionsRow.append(
        U.el('button', { class: 'btn btn--ghost btn--small', onclick: pinHaul }, 'Pin to Almanac'),
        U.el('button', { class: 'btn btn--ghost btn--small', onclick: () => roll() }, 'Roll Again')
      );
      result.append(actionsRow);
    }

    // ---- Cabinet / Coffer integration -------------------------------
    async function addItemToCabinet(name, kind, description) {
      const items = (await Vault.get('cabinet')) || [];
      items.push({
        id: U.uid(),
        name,
        kind,
        status: 'held',
        description: description || '',
        heldBy: 'the party',
        foundAt: 'a recent haul',
        foundOn: { ...today },
        worth: kind === 'relic' ? 'priceless' : 'modest',
        created: Date.now(), updated: Date.now()
      });
      await Vault.set('cabinet', items);
      U.toast('Added to the Cabinet');
    }

    async function depositToCoffer(coins) {
      const c = (await Vault.get('coffer')) || { cu: 0, ag: 0, au: 0, pt: 0, ledger: [] };
      c.cu = (c.cu || 0) + (coins.cu || 0);
      c.ag = (c.ag || 0) + (coins.ag || 0);
      c.au = (c.au || 0) + (coins.au || 0);
      c.pt = (c.pt || 0) + (coins.pt || 0);
      c.ledger = c.ledger || [];
      c.ledger.unshift({
        ts: Date.now(),
        change: { ...coins },
        note: 'A haul, found.'
      });
      if (c.ledger.length > 200) c.ledger.length = 200;
      await Vault.set('coffer', c);
      U.toast('Coin added to the Coffer');
    }

    async function pinHaul() {
      const tier = TIERS[lastHaul.tier];
      const coinStr = ['cu', 'ag', 'au', 'pt']
        .filter(k => lastHaul.coins[k])
        .map(k => lastHaul.coins[k] + ' ' + COIN_LABELS[k])
        .join(', ');
      let text = 'LOOT [' + tier.name.toLowerCase() + ']: ' + (coinStr || 'no coin');
      if (lastHaul.items.length) {
        text += '; ' + lastHaul.items.map(i => i.text).join('; ');
      }
      if (lastHaul.wonder) {
        text += '; ' + lastHaul.wonder.name + ' (' + lastHaul.wonder.desc + ')';
      }
      const t = await Refs.pinToToday(text, { module: 'loot', label: 'a haul' });
      U.toast('Pinned to ' + (await Refs.formatDate(t)));
    }
  }
});

/* =========================================================================
   MODULE: THE CABINET (Things Found)
   A registry of relics, letters, weapons, and curiosities the party has
   acquired or seen. Different from the Archive: structured fields, status
   colour-coding, and date-stamped to the in-world calendar.
   ========================================================================= */
Keep.register({
  id: 'cabinet',
  name: 'The Cabinet',
  category: 'workshop',
  glyph: 'g-cabinet',
  tagline: 'Relics, letters, and curiosities. The catalogue of what the party has touched.',
  sub: 'Each drawer holds a finding. Note what it is, who carries it, where it surfaced, and when.',

  async mount(body, actions) {
    const KINDS = [
      { id: 'relic',     name: 'Relic',     glyph: '\u2720' },
      { id: 'weapon',    name: 'Weapon',    glyph: '\u2694' },
      { id: 'tome',      name: 'Tome',      glyph: '\u2766' },
      { id: 'letter',    name: 'Letter',    glyph: '\u2709' },
      { id: 'trinket',   name: 'Trinket',   glyph: '\u2726' },
      { id: 'tool',      name: 'Tool',      glyph: '\u2692' },
      { id: 'curiosity', name: 'Curiosity', glyph: '\u2742' },
      { id: 'other',     name: 'Other',     glyph: '\u2767' }
    ];
    const STATUSES = [
      { id: 'held',      name: 'Held' },
      { id: 'lost',      name: 'Lost' },
      { id: 'hidden',    name: 'Hidden' },
      { id: 'given',     name: 'Given' },
      { id: 'destroyed', name: 'Destroyed' }
    ];

    function kindOf(id)   { return KINDS.find(k => k.id === id) || KINDS[KINDS.length - 1]; }
    function statusOf(id) { return STATUSES.find(s => s.id === id) || STATUSES[0]; }

    const calendar = await Refs.calendar();
    const todayDate = await Refs.today();
    function fmtDate(d) {
      return d ? Refs.formatDateWith(d, calendar) : '(unknown)';
    }

    let items = await Vault.get('cabinet');
    if (!items || !items.length) {
      items = [
        {
          id: U.uid(),
          name: 'The Brass Compass',
          kind: 'curiosity',
          status: 'held',
          description: 'The needle does not point north. It points at the bearer\u2019s greatest fear.',
          heldBy: 'the party',
          foundAt: 'a drowned chapel beneath the salt road',
          foundOn: { ...todayDate },
          worth: 'priceless',
          created: Date.now(), updated: Date.now()
        },
        {
          id: U.uid(),
          name: 'Letter Sealed with Black Wax',
          kind: 'letter',
          status: 'held',
          description: 'Unopened. Addressed to a name no one in the lower city will speak aloud.',
          heldBy: 'the party',
          foundAt: 'a courier\u2019s body in the snow above Greyfern',
          foundOn: { ...todayDate },
          worth: 'unknown',
          created: Date.now(), updated: Date.now()
        }
      ];
      await Vault.set('cabinet', items);
    }

    let filter = 'all';

    const head = U.el('div', { class: 'cabinet__head' });
    const grid = U.el('div', { class: 'cabinet__grid' });
    body.append(head, grid);

    actions.append(
      U.el('button', { class: 'btn btn--primary', onclick: () => openItemForm() }, 'Catalogue a Find')
    );

    async function save() { await Vault.set('cabinet', items); }

    function statusOrder(s) {
      return ['held','lost','hidden','given','destroyed'].indexOf(s) + 1 || 99;
    }

    async function render() {
      await refreshBacklinks();
      head.innerHTML = '';
      const counts = { all: items.length };
      STATUSES.forEach(s => { counts[s.id] = items.filter(i => i.status === s.id).length; });

      const filters = U.el('div', { class: 'cabinet__filters' });
      const opts = [{ id: 'all', name: 'All' }, ...STATUSES];
      opts.forEach(o => {
        const b = U.el('button', {
          class: 'cabinet__filter' + (filter === o.id ? ' is-active' : ''),
          onclick: () => { filter = o.id; render(); }
        }, [
          document.createTextNode(o.name),
          U.el('span', { class: 'cabinet__filter-count' }, String(counts[o.id] || 0))
        ]);
        filters.append(b);
      });
      head.append(filters);
      head.append(U.el('div', {}, [
        U.el('button', { class: 'btn btn--small', onclick: () => openItemForm() }, '+ Catalogue a Find')
      ]));

      grid.innerHTML = '';
      const visible = items.filter(i => filter === 'all' || i.status === filter);
      if (!visible.length) {
        grid.append(U.el('div', { class: 'empty' },
          filter === 'all' ? 'No finds yet. Catalogue one above.' : 'Nothing here in this state.'));
        return;
      }
      // sort: by status group, then by updated desc
      const sorted = [...visible].sort((a, b) => {
        const ao = statusOrder(a.status), bo = statusOrder(b.status);
        if (ao !== bo) return ao - bo;
        return (b.updated || 0) - (a.updated || 0);
      });
      sorted.forEach(it => grid.append(renderCard(it)));
      applyPendingHighlight();
    }

    let pendingHighlight = await Vault.get('cabinet-highlight');
    if (pendingHighlight) await Vault.remove('cabinet-highlight');
    function applyPendingHighlight() {
      if (!pendingHighlight) return;
      // if filter is hiding the item, switch to all
      const target = items.find(i => i.id === pendingHighlight);
      if (target && filter !== 'all' && target.status !== filter) {
        filter = 'all';
        pendingHighlight = pendingHighlight; // keep for re-render
        render();
        return;
      }
      const card = grid.querySelector('[data-itemid="' + pendingHighlight + '"]');
      if (card) {
        setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 30);
        card.classList.add('cabinet-card--highlight');
        setTimeout(() => card.classList.remove('cabinet-card--highlight'), 2400);
      }
      pendingHighlight = null;
    }

    // Cache of archive-entries-by-wikilink for the current render pass.
    // Rebuilt on every render() so newly forged Archive references show
    // up after a tab-back.
    let backlinksByName = new Map();
    async function refreshBacklinks() {
      const entries = await Refs.archiveEntries();
      backlinksByName = new Map();
      for (const [title, e] of Object.entries(entries)) {
        const body = e.body || '';
        const re = /\[\[([^\]]+)\]\]/g;
        let m;
        while ((m = re.exec(body))) {
          const tgt = m[1];
          if (!backlinksByName.has(tgt)) backlinksByName.set(tgt, []);
          if (!backlinksByName.get(tgt).includes(title)) backlinksByName.get(tgt).push(title);
        }
      }
    }

    function renderCard(it) {
      const k = kindOf(it.kind);
      const s = statusOf(it.status);
      const card = U.el('div', { class: 'cabinet-card cabinet-card--' + s.id });
      card.dataset.itemid = it.id;
      card.append(
        U.el('div', { class: 'cabinet-card__kind', title: k.name }, k.glyph)
      );
      const bodyEl = U.el('div', { class: 'cabinet-card__body' });
      bodyEl.append(
        U.el('div', { class: 'cabinet-card__head' }, [
          U.el('div', { class: 'cabinet-card__name' }, it.name),
          U.el('div', { class: 'cabinet-card__status' }, s.name)
        ])
      );
      if (it.description) {
        bodyEl.append(U.el('div', { class: 'cabinet-card__desc' }, it.description));
      }

      const meta = U.el('dl', { class: 'cabinet-card__meta' });
      function row(label, valNode) {
        meta.append(U.el('dt', {}, label), U.el('dd', {}, [valNode]));
      }
      if (it.heldBy) {
        // if it matches a roster NPC, render as a link to their archive
        const match = npcLookup(it.heldBy);
        row('Held By', match ? linkToArchive(it.heldBy) : document.createTextNode(it.heldBy));
      }
      if (it.foundAt) {
        row('Found', document.createTextNode(it.foundAt));
      }
      if (it.foundOn) {
        row('On', linkToAlmanac(it.foundOn));
      }
      if (it.worth) {
        row('Worth', document.createTextNode(it.worth));
      }
      // If this item was forged by another room (Quest find, Atlas
      // POI loot, etc.), the meta dl gets a "From" row with a
      // clickable Jump-to-source chip.
      if (it.origin && it.origin.module) {
        const o = it.origin;
        const moduleLabel = o.module.charAt(0).toUpperCase() + o.module.slice(1);
        const chip = U.el('button', {
          class: 'tag cabinet-card__origin-chip',
          title: 'Jump to ' + moduleLabel + (o.label ? ' \u00b7 ' + o.label : ''),
          onclick: () => Refs.jumpToOrigin(o)
        }, '\u21AA  ' + moduleLabel + (o.label ? ' \u00b7 ' + o.label : ''));
        row('From', chip);
      }
      if (meta.children.length) bodyEl.append(meta);

      // Archive backlinks: any chronicle entry that wikilinks this item.
      const links = backlinksByName.get(it.name);
      if (links && links.length) {
        const linksWrap = U.el('div', { class: 'cabinet-card__backlinks' });
        linksWrap.append(U.el('div', { class: 'cabinet-card__backlinks-label' }, 'Mentioned in'));
        const row = U.el('div', { class: 'cabinet-card__backlinks-row' });
        links.forEach(name => {
          row.append(U.el('button', {
            class: 'tag',
            onclick: () => Refs.openArchiveEntry(name)
          }, name));
        });
        linksWrap.append(row);
        bodyEl.append(linksWrap);
      }

      const acts = U.el('div', { class: 'cabinet-card__actions' });
      acts.append(
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          const text = 'CABINET: ' + it.name + ' [' + s.name.toLowerCase() + '].' +
            (it.description ? '\n' + it.description : '');
          const today = await Refs.pinToToday(text, {
            module: 'cabinet',
            id: it.id,
            label: it.name
          });
          U.toast('Pinned to ' + (await Refs.formatDate(today)));
        }}, 'Pin'),
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => openItemForm(it) }, 'Edit'),
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          if (!confirm('Remove "' + it.name + '" from the catalogue?')) return;
          items = items.filter(x => x.id !== it.id);
          await save();
          render();
        }}, 'Remove')
      );
      bodyEl.append(acts);

      card.append(bodyEl);
      return card;
    }

    // sync lookups (npcs already loaded in mount scope)
    let npcRosterCache = null;
    function npcLookup(name) {
      if (!npcRosterCache) npcRosterCache = [];
      return npcRosterCache.find(n => n.name === name) || null;
    }
    function linkToArchive(name) {
      const btn = U.el('button', { class: 'cabinet-card__meta-link',
        title: 'Open in the Archive',
        onclick: () => Refs.openArchiveEntry(name)
      }, name);
      return btn;
    }
    function linkToAlmanac(date) {
      const btn = U.el('button', { class: 'cabinet-card__meta-link',
        title: 'Open this day in the Almanac',
        onclick: () => Refs.openAlmanacAt(date)
      }, fmtDate(date));
      return btn;
    }

    function openItemForm(existing) {
      const isEdit = !!existing;
      const draft = existing
        ? { ...existing, foundOn: existing.foundOn ? { ...existing.foundOn } : { ...todayDate } }
        : { id: U.uid(), name: '', kind: 'curiosity', status: 'held',
            description: '', heldBy: 'the party', foundAt: '',
            foundOn: { ...todayDate }, worth: '',
            created: Date.now(), updated: Date.now() };

      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card', style: { maxWidth: '560px' } });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, isEdit ? 'Edit Find' : 'Catalogue a Find')
      );
      const scroll = U.el('div', { class: 'modal-card__scroll' });

      const nameInput = U.el('input', { class: 'input', placeholder: 'The Brass Compass, Wolfshade\u2019s Knife...', value: draft.name });
      const descInput = U.el('textarea', { class: 'textarea', placeholder: 'What is it? What is strange about it? What does it want?', style: { minHeight: '90px' } });
      descInput.value = draft.description || '';
      const heldByInput = U.el('input', { class: 'input', placeholder: 'the party, an NPC name, a place', value: draft.heldBy });
      const foundAtInput = U.el('input', { class: 'input', placeholder: 'a drowned chapel beneath the salt road', value: draft.foundAt });
      const worthInput = U.el('input', { class: 'input', placeholder: 'priceless, 300 gp, a few coppers', value: draft.worth });

      // kind picker
      const kindWrap = U.el('div', { class: 'kind-picker' });
      KINDS.forEach(k => {
        const b = U.el('button', { onclick: () => {
          draft.kind = k.id;
          kindWrap.querySelectorAll('button').forEach(x => x.classList.toggle('is-selected', x.dataset.kid === k.id));
        }}, [
          U.el('span', { class: 'kind-picker__glyph' }, k.glyph),
          U.el('span', {}, k.name)
        ]);
        b.dataset.kid = k.id;
        if (k.id === draft.kind) b.classList.add('is-selected');
        kindWrap.append(b);
      });

      // status picker
      const statusWrap = U.el('div', { class: 'status-picker' });
      STATUSES.forEach(s => {
        const b = U.el('button', { onclick: () => {
          draft.status = s.id;
          statusWrap.querySelectorAll('button').forEach(x => x.classList.toggle('is-selected', x.dataset.sid === s.id));
        }}, s.name);
        b.dataset.sid = s.id;
        if (s.id === draft.status) b.classList.add('is-selected');
        statusWrap.append(b);
      });

      // date editor
      const dateWrap = U.el('div', { class: 'cabinet-date' });
      const dayInput = U.el('input', { class: 'input', type: 'number', min: 1, max: calendar.daysPerMonth, value: draft.foundOn.day });
      const monthSelect = U.el('select', { class: 'select' });
      calendar.months.forEach((mn, i) => {
        const opt = U.el('option', { value: i }, mn);
        if (i === draft.foundOn.month) opt.selected = 'selected';
        monthSelect.append(opt);
      });
      const yearInput = U.el('input', { class: 'input', type: 'number', value: draft.foundOn.year });
      const todayBtn = U.el('button', { class: 'btn btn--small btn--ghost', type: 'button', onclick: () => {
        dayInput.value = todayDate.day;
        monthSelect.value = todayDate.month;
        yearInput.value = todayDate.year;
      }}, 'Today');
      dateWrap.append(dayInput, monthSelect, yearInput, todayBtn);

      scroll.append(
        U.el('div', { class: 'label' }, 'Name'),
        nameInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Kind'),
        kindWrap,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Description'),
        descInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Status'),
        statusWrap,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Held By'),
        heldByInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Found At'),
        foundAtInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Found On'),
        dateWrap,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Worth'),
        worthInput
      );
      dialog.append(scroll);

      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--ghost', onclick: () => ov.remove() }, 'Cancel'),
        U.el('button', { class: 'btn btn--primary', onclick: async () => {
          if (!nameInput.value.trim()) { nameInput.focus(); return; }
          draft.name = nameInput.value.trim();
          draft.description = descInput.value.trim();
          draft.heldBy = heldByInput.value.trim();
          draft.foundAt = foundAtInput.value.trim();
          draft.worth = worthInput.value.trim();
          draft.foundOn = {
            day: Math.max(1, Math.min(calendar.daysPerMonth, +dayInput.value || 1)),
            month: +monthSelect.value,
            year: +yearInput.value || calendar.year
          };
          draft.updated = Date.now();
          if (isEdit) {
            const idx = items.findIndex(x => x.id === existing.id);
            if (idx >= 0) items[idx] = draft;
          } else {
            items.unshift(draft);
          }
          await save();
          ov.remove();
          render();
        }}, isEdit ? 'Save' : 'Catalogue')
      ]));
      ov.append(dialog);
      document.body.append(ov);
      setTimeout(() => nameInput.focus(), 50);
    }

    // load NPC roster for the heldBy link lookup
    npcRosterCache = await Refs.npcRoster();

    render();
  }
});

/* =========================================================================
   MODULE: THE COFFER (Party Wealth)
   Coin tracker by denomination (copper / silver / gold / platinum) with
   a transaction ledger. Deposits and withdrawals are noted; the running
   balance shows worth in gold for quick reckoning. A split utility
   divides current wealth among an arbitrary number of shares.
   ========================================================================= */
Keep.register({
  id: 'coffer',
  name: 'The Coffer',
  category: 'workshop',
  glyph: 'g-coffer',
  tagline: 'Coin kept against need.',
  sub: 'Deposits and withdrawals, in copper, silver, gold, and platinum.',

  async mount(body, actions) {
    const DENOMS = [
      { key: 'cu', name: 'Copper',   short: 'cu', toGold: 0.01 },
      { key: 'ag', name: 'Silver',   short: 'ag', toGold: 0.1  },
      { key: 'au', name: 'Gold',     short: 'au', toGold: 1    },
      { key: 'pt', name: 'Platinum', short: 'pt', toGold: 10   }
    ];

    let state = (await Vault.get('coffer')) || {
      cu: 0, ag: 0, au: 0, pt: 0, ledger: []
    };
    if (!state.ledger) state.ledger = [];

    async function save() {
      // cap the ledger so storage does not balloon over a long chronicle
      if (state.ledger.length > 200) state.ledger.length = 200;
      await Vault.set('coffer', state);
    }

    function worthInGold() {
      return DENOMS.reduce((s, d) => s + (state[d.key] || 0) * d.toGold, 0);
    }
    function fmtGold(g) {
      if (g === 0) return '0';
      if (g >= 100) return Math.round(g).toString();
      if (g >= 10) return g.toFixed(1);
      return g.toFixed(2);
    }
    function fmtCoins(c) {
      const parts = DENOMS.filter(d => c[d.key])
        .map(d => c[d.key] + ' ' + d.short);
      return parts.length ? parts.join(', ') : '0';
    }

    // ---- DOM scaffolding --------------------------------------------
    const wrap = U.el('div', { class: 'coffer' });

    wrap.append(U.el('div', { class: 'coffer__intro' },
      'The party\u2019s shared purse. Add coin when found, subtract when spent. The Loot room can deposit straight here.'));

    // Balance card
    const balance = U.el('div', { class: 'coffer__balance' });
    balance.append(U.el('div', { class: 'coffer__balance-head' }, 'The Purse'));
    const denomRow = U.el('div', { class: 'coffer__balance-row' });
    balance.append(denomRow);
    const worthRow = U.el('div', { class: 'coffer__worth' });
    balance.append(worthRow);
    wrap.append(balance);

    // Form card
    const form = U.el('div', { class: 'coffer__form' });
    form.append(U.el('div', { class: 'coffer__form-head' }, 'Move Coin'));
    const inputs = U.el('div', { class: 'coffer__inputs' });
    const inputRefs = {};
    DENOMS.forEach(d => {
      const wrapEl = U.el('div', { class: 'coffer__input-wrap' });
      const inp = U.el('input', {
        type: 'number',
        min: '0',
        step: '1',
        placeholder: '0',
        class: 'coffer__input'
      });
      inputRefs[d.key] = inp;
      wrapEl.append(U.el('label', {}, d.name), inp);
      inputs.append(wrapEl);
    });
    form.append(inputs);

    const noteInput = U.el('input', {
      type: 'text',
      class: 'coffer__note',
      placeholder: 'A note, brief (e.g. "the goblin king\u2019s hoard")'
    });
    form.append(noteInput);

    const formActions = U.el('div', { class: 'coffer__actions' });
    formActions.append(
      U.el('button', {
        class: 'coffer__deposit',
        onclick: () => move(+1)
      }, '+ Deposit'),
      U.el('button', {
        class: 'coffer__withdraw',
        onclick: () => move(-1)
      }, '\u2212 Withdraw')
    );
    form.append(formActions);

    // Split utility
    const split = U.el('div', { class: 'coffer__split' });
    split.append(U.el('span', { class: 'coffer__split-label' }, 'Split among'));
    const splitInput = U.el('input', {
      type: 'number',
      min: '1',
      step: '1',
      value: '4',
      class: 'coffer__split-input',
      oninput: renderSplit
    });
    split.append(splitInput, U.el('span', { class: 'coffer__split-label' }, 'shares:'));
    const splitOut = U.el('span', { class: 'coffer__split-result' });
    split.append(splitOut);
    form.append(split);
    wrap.append(form);

    // Ledger card
    const ledgerCard = U.el('div', { class: 'coffer__ledger' });
    ledgerCard.append(U.el('div', { class: 'coffer__ledger-head' }, 'Ledger'));
    const ledgerList = U.el('div', { class: 'coffer__ledger-list' });
    ledgerCard.append(ledgerList);
    wrap.append(ledgerCard);

    body.append(wrap);

    // ---- RENDER -----------------------------------------------------
    function renderBalance() {
      denomRow.innerHTML = '';
      DENOMS.forEach(d => {
        const v = state[d.key] || 0;
        const cell = U.el('div', {
          class: 'coffer__denom' + (v === 0 ? ' coffer__denom--zero' : '')
        });
        cell.append(
          U.el('div', { class: 'coffer__denom-value' }, v.toString()),
          U.el('div', { class: 'coffer__denom-label' }, d.name)
        );
        denomRow.append(cell);
      });
      worthRow.innerHTML = '';
      worthRow.append(
        U.el('span', { class: 'coffer__worth-label' }, 'Worth in gold'),
        U.el('span', { class: 'coffer__worth-value' }, fmtGold(worthInGold()))
      );
    }

    function renderSplit() {
      const n = parseInt(splitInput.value, 10);
      if (!n || n < 1) { splitOut.textContent = ''; return; }
      const g = worthInGold();
      if (!g) { splitOut.textContent = 'Nothing to divide.'; return; }
      const per = g / n;
      splitOut.textContent = fmtGold(per) + ' gold each';
    }

    function renderLedger() {
      ledgerList.innerHTML = '';
      if (!state.ledger.length) {
        ledgerList.append(U.el('div', { class: 'coffer__empty' },
          'No entries yet. The purse is fresh.'));
        return;
      }
      state.ledger.slice(0, 25).forEach(entry => {
        const d = new Date(entry.ts);
        const tStr = d.getMonth() + 1 + '/' + d.getDate() + ' ' +
          d.getHours().toString().padStart(2, '0') + ':' +
          d.getMinutes().toString().padStart(2, '0');
        const row = U.el('div', { class: 'coffer__ledger-row' });
        const sign = entry.sign === undefined ? 1 : entry.sign;
        const amtClass = 'coffer__ledger-amt ' +
          (sign > 0 ? 'coffer__ledger-amt--gain' : 'coffer__ledger-amt--loss');
        const amtText = (sign > 0 ? '+' : '\u2212') + fmtCoins(entry.change);
        row.append(
          U.el('span', { class: 'coffer__ledger-time' }, tStr),
          U.el('span', { class: 'coffer__ledger-note' },
            entry.note || (sign > 0 ? 'deposit' : 'withdrawal')),
          U.el('span', { class: amtClass }, amtText)
        );
        ledgerList.append(row);
      });
    }

    // ---- ACTIONS ----------------------------------------------------
    function readInputs() {
      const c = { cu: 0, ag: 0, au: 0, pt: 0 };
      DENOMS.forEach(d => {
        const v = parseInt(inputRefs[d.key].value, 10);
        if (!isNaN(v) && v > 0) c[d.key] = v;
      });
      return c;
    }
    function clearInputs() {
      DENOMS.forEach(d => { inputRefs[d.key].value = ''; });
      noteInput.value = '';
    }

    async function move(sign) {
      const c = readInputs();
      const total = c.cu + c.ag + c.au + c.pt;
      if (!total) {
        U.toast('Enter at least one coin amount.');
        return;
      }
      if (sign < 0) {
        // ensure we have enough in each denomination being withdrawn
        const short = DENOMS.find(d => c[d.key] > (state[d.key] || 0));
        if (short) {
          U.toast('Not enough ' + short.name.toLowerCase() + ' in the purse.');
          return;
        }
      }
      DENOMS.forEach(d => {
        state[d.key] = (state[d.key] || 0) + sign * c[d.key];
      });
      state.ledger.unshift({
        ts: Date.now(),
        sign,
        change: { ...c },
        note: noteInput.value.trim()
      });
      await save();
      clearInputs();
      renderBalance();
      renderLedger();
      renderSplit();
    }

    // Actions area: pin the purse, reset entirely
    actions.append(
      U.el('button', {
        class: 'btn btn--ghost btn--small',
        title: 'Record current balance in today\u2019s note',
        onclick: async () => {
          const parts = DENOMS
            .filter(d => state[d.key])
            .map(d => state[d.key] + ' ' + d.short);
          const g = worthInGold();
          const text = 'COFFER: ' + (parts.length ? parts.join(', ') : 'empty') +
            ' (worth ' + fmtGold(g) + ' gold)';
          const t = await Refs.pinToToday(text, {
            module: 'coffer',
            label: fmtGold(g) + ' gold'
          });
          U.toast('Pinned to ' + (await Refs.formatDate(t)));
        }
      }, 'Pin Balance'),
      U.el('button', {
        class: 'btn btn--ghost btn--small',
        onclick: async () => {
          if (!confirm('Empty the coffer and clear the ledger?')) return;
          state = { cu: 0, ag: 0, au: 0, pt: 0, ledger: [] };
          await save();
          renderBalance();
          renderLedger();
          renderSplit();
        }
      }, 'Empty Purse')
    );

    renderBalance();
    renderLedger();
    renderSplit();
  }
});
