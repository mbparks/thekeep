      const src = audio.createBufferSource();
      src.buffer = buf; src.loop = true; src.start();
      return src;
    }

    // One-shot noise: a buffer source of finite length, plays once.
    function noiseOneShot(audio, type, dur) {
      const len = Math.floor(audio.sampleRate * dur);
      const buf = audio.createBuffer(1, len, audio.sampleRate);
      const data = buf.getChannelData(0);
      if (type === 'brown') {
        let last = 0;
        for (let i = 0; i < len; i++) {
          const w = Math.random() * 2 - 1;
          last = (last + 0.02 * w) / 1.02;
          data[i] = last * 3.5;
        }
      } else if (type === 'pink') {
        let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
        for (let i = 0; i < len; i++) {
          const w = Math.random() * 2 - 1;
          b0 = 0.99886 * b0 + w * 0.0555179;
          b1 = 0.99332 * b1 + w * 0.0750759;
          b2 = 0.96900 * b2 + w * 0.1538520;
          b3 = 0.86650 * b3 + w * 0.3104856;
          b4 = 0.55000 * b4 + w * 0.5329522;
          b5 = -0.7616 * b5 - w * 0.0168980;
          data[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;
          b6 = w * 0.115926;
        }
      } else {
        for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
      }
      const src = audio.createBufferSource();
      src.buffer = buf;
      return src;
    }

    // Event scheduler. Calls fn at random intervals between minMs and maxMs.
    // Returns a cancel function. Used to attach occasional one-shot events
    // (a thunderclap inside rain, a laugh inside tavern) to a long-running
    // layer. Each layer's stop() invokes its cancel function so events do
    // not leak after a layer is silenced.
    function schedule(minMs, maxMs, fn) {
      const stopped = { v: false };
      function tick() {
        if (stopped.v) return;
        const delay = minMs + Math.random() * (maxMs - minMs);
        setTimeout(() => {
          if (stopped.v) return;
          try { fn(); } catch {}
          tick();
        }, delay);
      }
      tick();
      return () => { stopped.v = true; };
    }

    // ---- ONE-SHOT EVENTS -----------------------------------------------
    // Brief atmospheric sounds. Each composes oscillators, filters, and
    // envelopes into a single ~0.1 to 4 second sound, then cleans up after
    // itself. Called by layer schedules or directly (wolf howls).

    function eventThunder(audio, dest) {
      const t = audio.currentTime + 0.05;
      const duration = 3 + Math.random() * 2.5;
      // Low rumble: brown noise heavily lowpassed, with frequency sweep
      const rumble = noiseOneShot(audio, 'brown', duration + 0.5);
      const lp = audio.createBiquadFilter();
      lp.type = 'lowpass'; lp.Q.value = 0.7;
      lp.frequency.setValueAtTime(80, t);
      lp.frequency.linearRampToValueAtTime(160, t + 0.4);
      lp.frequency.linearRampToValueAtTime(50, t + duration);
      const g = audio.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.4, t + 0.2);
      g.gain.linearRampToValueAtTime(0.22, t + duration * 0.5);
      g.gain.exponentialRampToValueAtTime(0.001, t + duration);
      rumble.connect(lp).connect(g).connect(dest);
      rumble.start(t); rumble.stop(t + duration + 0.4);
      // Sharp crack at the front (about half the time, for closer thunder)
      if (Math.random() < 0.55) {
        const crack = noiseOneShot(audio, 'white', 0.15);
        const hp = audio.createBiquadFilter();
        hp.type = 'highpass'; hp.frequency.value = 900;
        const cg = audio.createGain();
        cg.gain.setValueAtTime(0, t);
        cg.gain.linearRampToValueAtTime(0.22, t + 0.005);
        cg.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        crack.connect(hp).connect(cg).connect(dest);
        crack.start(t); crack.stop(t + 0.2);
      }
    }

    function eventDistantBell(audio, dest) {
      const f = [196, 220, 261.63][Math.floor(Math.random() * 3)];
      const t = audio.currentTime + 0.05;
      const carrier = audio.createOscillator();
      carrier.type = 'sine'; carrier.frequency.value = f;
      const mod = audio.createOscillator();
      mod.type = 'sine'; mod.frequency.value = f * 2.4;
      const modG = audio.createGain(); modG.gain.value = 200;
      mod.connect(modG).connect(carrier.frequency);
      const g = audio.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.12, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + 5);
      const lp = audio.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 850; // muffled distance
      carrier.connect(g).connect(lp).connect(dest);
      carrier.start(t); mod.start(t);
      carrier.stop(t + 5.2); mod.stop(t + 5.2);
    }

    function eventLogCollapse(audio, dest) {
      const t0 = audio.currentTime + 0.05;
      // Big thunk
      const thunk = noiseOneShot(audio, 'brown', 0.3);
      const tLp = audio.createBiquadFilter();
      tLp.type = 'lowpass'; tLp.frequency.value = 250;
      const tG = audio.createGain();
      tG.gain.setValueAtTime(0, t0);
      tG.gain.linearRampToValueAtTime(0.5, t0 + 0.008);
      tG.gain.exponentialRampToValueAtTime(0.001, t0 + 0.3);
      thunk.connect(tLp).connect(tG).connect(dest);
      thunk.start(t0); thunk.stop(t0 + 0.4);
      // Shower of crackles trailing
      for (let i = 0; i < 8; i++) {
        const t = t0 + 0.05 + i * 0.045 + Math.random() * 0.08;
        const buf = audio.createBuffer(1, Math.floor(audio.sampleRate * 0.05), audio.sampleRate);
        const d = buf.getChannelData(0);
        for (let j = 0; j < d.length; j++) {
          const env = Math.exp(-j / (audio.sampleRate * 0.012));
          d[j] = (Math.random() * 2 - 1) * env;
        }
        const c = audio.createBufferSource(); c.buffer = buf;
        const hp = audio.createBiquadFilter();
        hp.type = 'highpass'; hp.frequency.value = 2400;
        const g = audio.createGain(); g.gain.value = 0.08 + Math.random() * 0.08;
        c.connect(hp).connect(g).connect(dest);
        c.start(t);
      }
    }

    function eventLaugh(audio, dest) {
      const t0 = audio.currentTime + 0.05;
      const num = 3 + Math.floor(Math.random() * 3);
      const basePitch = 170 + Math.random() * 100;
      for (let i = 0; i < num; i++) {
        const t = t0 + i * (0.12 + Math.random() * 0.05);
        const pitch = basePitch - i * 12 + (Math.random() * 20 - 10);
        const saw = audio.createOscillator();
        saw.type = 'sawtooth'; saw.frequency.value = pitch;
        // vowel "ha" formants
        const f1 = audio.createBiquadFilter();
        f1.type = 'bandpass'; f1.Q.value = 6; f1.frequency.value = 720;
        const f2 = audio.createBiquadFilter();
        f2.type = 'bandpass'; f2.Q.value = 4; f2.frequency.value = 1480;
        const lp = audio.createBiquadFilter();
        lp.type = 'lowpass'; lp.frequency.value = 2400;
        const g = audio.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.06 + Math.random() * 0.04, t + 0.015);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        saw.connect(f1).connect(lp).connect(g).connect(dest);
        saw.connect(f2).connect(lp);
        saw.start(t); saw.stop(t + 0.14);
      }
    }

    function eventGull(audio, dest) {
      const t = audio.currentTime + 0.05;
      const o = audio.createOscillator();
      o.type = 'sawtooth';
      const base = 800 + Math.random() * 250;
      o.frequency.setValueAtTime(base, t);
      o.frequency.linearRampToValueAtTime(base * 1.3, t + 0.12);
      o.frequency.linearRampToValueAtTime(base * 0.7, t + 0.55);
      const bp = audio.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 1500; bp.Q.value = 3;
      const g = audio.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.07, t + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.65);
      o.connect(bp).connect(g).connect(dest);
      o.start(t); o.stop(t + 0.75);
    }

    function eventDrip(audio, dest) {
      const t = audio.currentTime + 0.05;
      const o = audio.createOscillator();
      o.type = 'sine';
      o.frequency.setValueAtTime(1400, t);
      o.frequency.exponentialRampToValueAtTime(500, t + 0.07);
      const g = audio.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.13, t + 0.004);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      // Crude reverb via a single feedback delay
      const delay = audio.createDelay(); delay.delayTime.value = 0.22;
      const wet = audio.createGain(); wet.gain.value = 0.4;
      const fb = audio.createGain(); fb.gain.value = 0.35;
      o.connect(g);
      g.connect(dest);
      g.connect(delay);
      delay.connect(fb).connect(delay);
      delay.connect(wet).connect(dest);
      o.start(t); o.stop(t + 0.5);
      setTimeout(() => {
        try { delay.disconnect(); fb.disconnect(); wet.disconnect(); } catch {}
      }, 2500);
    }

    function eventChairScrape(audio, dest) {
      const t = audio.currentTime + 0.05;
      const dur = 0.18 + Math.random() * 0.25;
      const src = noiseOneShot(audio, 'pink', dur + 0.1);
      const bp = audio.createBiquadFilter();
      bp.type = 'bandpass';
      const baseFreq = 550 + Math.random() * 400;
      bp.frequency.setValueAtTime(baseFreq, t);
      bp.frequency.linearRampToValueAtTime(baseFreq * 0.6, t + dur);
      bp.Q.value = 3.5;
      const g = audio.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.05, t + 0.04);
      g.gain.linearRampToValueAtTime(0.03, t + dur - 0.04);
      g.gain.linearRampToValueAtTime(0, t + dur);
      src.connect(bp).connect(g).connect(dest);
      src.start(t); src.stop(t + dur + 0.1);
    }

    function eventVendorCall(audio, dest) {
      const t = audio.currentTime + 0.05;
      const dur = 0.45 + Math.random() * 0.4;
      const pitch = 180 + Math.random() * 180;
      const saw = audio.createOscillator();
      saw.type = 'sawtooth';
      saw.frequency.setValueAtTime(pitch * 0.85, t);
      saw.frequency.linearRampToValueAtTime(pitch * 1.25, t + dur * 0.35);
      saw.frequency.linearRampToValueAtTime(pitch * 0.5, t + dur);
      const f1 = audio.createBiquadFilter();
      f1.type = 'bandpass'; f1.Q.value = 5; f1.frequency.value = 700;
      const f2 = audio.createBiquadFilter();
      f2.type = 'bandpass'; f2.Q.value = 4; f2.frequency.value = 1500;
      const lp = audio.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 2400;
      const g = audio.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.08, t + 0.06);
      g.gain.linearRampToValueAtTime(0.06, t + dur * 0.6);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      saw.connect(f1).connect(lp).connect(g).connect(dest);
      saw.connect(f2).connect(lp);
      saw.start(t); saw.stop(t + dur + 0.1);
    }

    function eventCoinClink(audio, dest) {
      const t = audio.currentTime + 0.05;
      const num = 1 + Math.floor(Math.random() * 3);
      for (let i = 0; i < num; i++) {
        const ti = t + i * 0.05;
        const o = audio.createOscillator();
        o.type = 'triangle';
        o.frequency.value = 1800 + Math.random() * 1600;
        const g = audio.createGain();
        g.gain.setValueAtTime(0, ti);
        g.gain.linearRampToValueAtTime(0.04, ti + 0.003);
        g.gain.exponentialRampToValueAtTime(0.001, ti + 0.13);
        o.connect(g).connect(dest);
        o.start(ti); o.stop(ti + 0.18);
      }
    }

    function eventHammerStrike(audio, dest) {
      const t = audio.currentTime + 0.05;
      // Low thump
      const thump = noiseOneShot(audio, 'brown', 0.12);
      const tLp = audio.createBiquadFilter();
      tLp.type = 'lowpass'; tLp.frequency.value = 280;
      const tG = audio.createGain();
      tG.gain.setValueAtTime(0, t);
      tG.gain.linearRampToValueAtTime(0.35, t + 0.005);
      tG.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      thump.connect(tLp).connect(tG).connect(dest);
      thump.start(t); thump.stop(t + 0.15);
      // Metallic ring
      const o = audio.createOscillator();
      o.type = 'triangle';
      o.frequency.value = 1100 + Math.random() * 500;
      const rg = audio.createGain();
      rg.gain.setValueAtTime(0, t);
      rg.gain.linearRampToValueAtTime(0.08, t + 0.005);
      rg.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      o.connect(rg).connect(dest);
      o.start(t); o.stop(t + 0.5);
    }

    function eventDustFall(audio, dest) {
      const t0 = audio.currentTime + 0.05;
      const num = 4 + Math.floor(Math.random() * 5);
      for (let i = 0; i < num; i++) {
        const t = t0 + i * 0.06 + Math.random() * 0.05;
        const buf = audio.createBuffer(1, Math.floor(audio.sampleRate * 0.04), audio.sampleRate);
        const d = buf.getChannelData(0);
        for (let j = 0; j < d.length; j++) {
          const env = Math.exp(-j / (audio.sampleRate * 0.012));
          d[j] = (Math.random() * 2 - 1) * env;
        }
        const src = audio.createBufferSource(); src.buffer = buf;
        const hp = audio.createBiquadFilter();
        hp.type = 'highpass'; hp.frequency.value = 2000;
        const g = audio.createGain(); g.gain.value = 0.03 + Math.random() * 0.04;
        src.connect(hp).connect(g).connect(dest);
        src.start(t);
      }
    }

    // Wolf howl. Sawtooth + vowel formants ("ow" gliding to "oo") with a
    // long pitch envelope. 35% chance of recursive distant answer for up
    // to two echoes, producing a primary howl and a smaller pack response.
    function eventWolfHowl(audio, dest, distance) {
      distance = distance || 0;
      const t = audio.currentTime + 0.05;
      const dur = 1.8 + Math.random() * 1.4;
      const fundFreq = (260 + Math.random() * 130) - distance * 30;
      const peakFreq = fundFreq * 1.4;
      const saw = audio.createOscillator();
      saw.type = 'sawtooth';
      saw.frequency.setValueAtTime(fundFreq * 0.7, t);
      saw.frequency.linearRampToValueAtTime(peakFreq, t + dur * 0.3);
      saw.frequency.linearRampToValueAtTime(peakFreq * 0.97, t + dur * 0.7);
      saw.frequency.linearRampToValueAtTime(fundFreq * 0.5, t + dur);
      const f1 = audio.createBiquadFilter();
      f1.type = 'bandpass'; f1.Q.value = 5;
      f1.frequency.setValueAtTime(680, t);
      f1.frequency.linearRampToValueAtTime(420, t + dur);
      const f2 = audio.createBiquadFilter();
      f2.type = 'bandpass'; f2.Q.value = 3;
      f2.frequency.setValueAtTime(1050, t);
      f2.frequency.linearRampToValueAtTime(780, t + dur);
      const lp = audio.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = 2600 - distance * 700;
      const g = audio.createGain();
      const vol = 0.16 * Math.pow(0.65, distance);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol, t + 0.4);
      g.gain.linearRampToValueAtTime(vol * 0.9, t + dur - 0.5);
      g.gain.linearRampToValueAtTime(0, t + dur);
      saw.connect(f1).connect(lp).connect(g).connect(dest);
      saw.connect(f2).connect(lp);
      saw.start(t); saw.stop(t + dur + 0.2);
      if (distance < 2 && Math.random() < 0.35) {
        setTimeout(() => eventWolfHowl(audio, dest, distance + 1),
          dur * 1000 + 700 + Math.random() * 1400);
      }
    }

    // ---- LAYERS --------------------------------------------------------

    function buildRain(audio, dest) {
      const noise = noiseSource(audio, 'pink');
      const hp = audio.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 1100; hp.Q.value = 0.5;
      const lp = audio.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 6500; lp.Q.value = 0.5;
      const gain = audio.createGain();
      noise.connect(hp).connect(lp).connect(gain).connect(dest);
      // distant thunder every 90s-240s
      const cancelThunder = schedule(90000, 240000, () => eventThunder(audio, dest));
      return { gain, stop() { noise.stop(); cancelThunder(); } };
    }
    function buildWind(audio, dest) {
      const noise = noiseSource(audio, 'brown');
      const lp = audio.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 460; lp.Q.value = 0.6;
      const gain = audio.createGain();
      // LFO on filter cutoff
      const lfo = audio.createOscillator(); lfo.frequency.value = 0.08;
      const lfoG = audio.createGain(); lfoG.gain.value = 220;
      lfo.connect(lfoG).connect(lp.frequency); lfo.start();
      noise.connect(lp).connect(gain).connect(dest);
      // distant bell every 100s-240s
      const cancelBell = schedule(100000, 240000, () => eventDistantBell(audio, dest));
      return { gain, stop() { noise.stop(); lfo.stop(); cancelBell(); } };
    }
    function buildFire(audio, dest) {
      const noise = noiseSource(audio, 'brown');
      const lp = audio.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 360;
      const gain = audio.createGain();
      noise.connect(lp).connect(gain).connect(dest);
      // crackles (the existing continuous spit-and-pop)
      const stopped = { v: false };
      function scheduleCrackle() {
        if (stopped.v) return;
        const t = audio.currentTime + Math.random() * 1.2 + 0.05;
        const buf = audio.createBuffer(1, audio.sampleRate * 0.12, audio.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) {
          const env = Math.exp(-i / (audio.sampleRate * 0.04));
          d[i] = (Math.random() * 2 - 1) * env * 0.7;
        }
        const src = audio.createBufferSource(); src.buffer = buf;
        const cg = audio.createGain(); cg.gain.value = 0.18;
        const cf = audio.createBiquadFilter(); cf.type = 'highpass'; cf.frequency.value = 2200;
        src.connect(cf).connect(cg).connect(dest);
        src.start(t);
        setTimeout(scheduleCrackle, 400 + Math.random() * 1400);
      }
      scheduleCrackle();
      // log collapse every 90s-240s
      const cancelCollapse = schedule(90000, 240000, () => eventLogCollapse(audio, dest));
      return { gain, stop() { stopped.v = true; noise.stop(); cancelCollapse(); } };
    }
    function buildDrone(audio, dest) {
      const o1 = audio.createOscillator(); o1.frequency.value = 55; o1.type = 'sine';
      const o2 = audio.createOscillator(); o2.frequency.value = 82.5; o2.type = 'sine';
      const o3 = audio.createOscillator(); o3.frequency.value = 110.05; o3.type = 'triangle';
      const lfo = audio.createOscillator(); lfo.frequency.value = 0.07;
      const lfoG = audio.createGain(); lfoG.gain.value = 0.7;
      lfo.connect(lfoG).connect(o3.detune); lfo.start();
      const gain = audio.createGain();
      const mix = audio.createGain(); mix.gain.value = 0.5;
      o1.connect(mix); o2.connect(mix); o3.connect(mix);
      mix.connect(gain).connect(dest);
      o1.start(); o2.start(); o3.start();
      // distant water drip every 60s-180s
      const cancelDrip = schedule(60000, 180000, () => eventDrip(audio, dest));
      return { gain, stop() { o1.stop(); o2.stop(); o3.stop(); lfo.stop(); cancelDrip(); } };
    }
    function buildBells(audio, dest) {
      const gain = audio.createGain();
      gain.connect(dest);
      const stopped = { v: false };
      function strike() {
        if (stopped.v) return;
        const f = [220, 261.63, 329.63, 392, 466.16][Math.floor(Math.random() * 5)];
        const t = audio.currentTime;
        const carrier = audio.createOscillator(); carrier.type = 'sine'; carrier.frequency.value = f;
        const mod = audio.createOscillator(); mod.type = 'sine'; mod.frequency.value = f * 2.4;
        const modG = audio.createGain(); modG.gain.value = 280;
        mod.connect(modG).connect(carrier.frequency);
        const g = audio.createGain(); g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.35, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, t + 4.2);
        carrier.connect(g).connect(gain);
        carrier.start(t); mod.start(t);
        carrier.stop(t + 4.5); mod.stop(t + 4.5);
        setTimeout(strike, 5000 + Math.random() * 9000);
      }
      strike();
      return { gain, stop() { stopped.v = true; } };
    }

    // Tavern: room tone bed. A warm pink-noise bed (the rustle of a busy
    // room, fire ambience, distant motion) with cup clinks and occasional
    // laughter or chair scrapes. The Hearth does not try to synthesise
    // voices, which never sound right. Pair with From Afar for real
    // crowd audio.
    function buildTavern(audio, dest) {
      const gain = audio.createGain();
      gain.connect(dest);

      // Warm room-tone bed
      const noise = noiseSource(audio, 'pink');
      const noiseBp = audio.createBiquadFilter();
      noiseBp.type = 'bandpass'; noiseBp.frequency.value = 800; noiseBp.Q.value = 0.45;
      const noiseLp = audio.createBiquadFilter();
      noiseLp.type = 'lowpass'; noiseLp.frequency.value = 1800;
      const noiseG = audio.createGain(); noiseG.gain.value = 0.45;
      noise.connect(noiseBp).connect(noiseLp).connect(noiseG).connect(gain);

      // Slow swell so the bed breathes
      const swellLfo = audio.createOscillator();
      swellLfo.type = 'sine'; swellLfo.frequency.value = 0.05;
      const swellLfoG = audio.createGain(); swellLfoG.gain.value = 0.12;
      swellLfo.connect(swellLfoG).connect(gain.gain); swellLfo.start();

      // Cup clinks (sporadic, recognisably ceramic)
      const stopped = { v: false };
      function clink() {
        if (stopped.v) return;
        const t = audio.currentTime + 0.02;
        const o = audio.createOscillator(); o.type = 'triangle';
        o.frequency.value = 1200 + Math.random() * 800;
        const g = audio.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.12, t + 0.005);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        o.connect(g).connect(dest);
        o.start(t); o.stop(t + 0.3);
        setTimeout(clink, 4000 + Math.random() * 9000);
      }
      clink();

      // Brief stylised laughs and chair scrapes (events are short enough
      // that they don't trigger the "fake voice" response the way
      // continuous babble does)
      const cancelLaugh = schedule(40000, 110000, () => eventLaugh(audio, dest));
      const cancelScrape = schedule(60000, 150000, () => eventChairScrape(audio, dest));

      return { gain, stop() {
        stopped.v = true;
        noise.stop();
        swellLfo.stop();
        cancelLaugh(); cancelScrape();
      }};
    }

    function buildWaves(audio, dest) {
      const noise = noiseSource(audio, 'pink');
      const lp = audio.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 800;
      const gain = audio.createGain();
      const swell = audio.createGain(); swell.gain.value = 0.4;
      const lfo = audio.createOscillator(); lfo.frequency.value = 0.11; lfo.type = 'sine';
      const lfoG = audio.createGain(); lfoG.gain.value = 0.35;
      lfo.connect(lfoG).connect(swell.gain); lfo.start();
      noise.connect(lp).connect(swell).connect(gain).connect(dest);
      // distant gull every 60s-180s
      const cancelGull = schedule(60000, 180000, () => eventGull(audio, dest));
      return { gain, stop() { noise.stop(); lfo.stop(); cancelGull(); } };
    }
    function buildCrows(audio, dest) {
      const gain = audio.createGain(); gain.connect(dest);
      const stopped = { v: false };
      function caw() {
        if (stopped.v) return;
        const t = audio.currentTime;
        const o = audio.createOscillator(); o.type = 'sawtooth';
        const base = 280 + Math.random() * 60;
        o.frequency.setValueAtTime(base, t);
        o.frequency.linearRampToValueAtTime(base * 0.55, t + 0.35);
        const bp = audio.createBiquadFilter(); bp.type = 'bandpass';
        bp.frequency.value = 900; bp.Q.value = 4;
        const g = audio.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.18, t + 0.04);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        o.connect(bp).connect(g).connect(gain);
        o.start(t); o.stop(t + 0.55);
        setTimeout(caw, 5000 + Math.random() * 14000);
      }
      caw();
      return { gain, stop() { stopped.v = true; } };
    }

    // Wolf Howl: a sub-bass drone for presence, plus scheduled howls
    // every 30s-90s. First howl fires shortly after the layer wakes so
    // the user knows it is on. Each howl has a chance to spawn a more
    // distant answering howl (pack behavior).
    function buildWolf(audio, dest) {
      const gain = audio.createGain();
      gain.connect(dest);
      // very low sub presence so the layer is not silent between howls
      const sub = noiseSource(audio, 'brown');
      const subLp = audio.createBiquadFilter();
      subLp.type = 'lowpass'; subLp.frequency.value = 60;
      const subG = audio.createGain(); subG.gain.value = 0.05;
      sub.connect(subLp).connect(subG).connect(gain);
      const cancelHowl = schedule(30000, 90000, () => eventWolfHowl(audio, dest));
      // fire a howl shortly after the layer wakes so the user knows it is on
      setTimeout(() => { try { eventWolfHowl(audio, dest); } catch {} },
        1500 + Math.random() * 4000);
      return { gain, stop() { sub.stop(); cancelHowl(); }};
    }

    // Market Day: open-air room tone with footfall rumble. Frequent
    // vendor calls (brief one-shot events, stylised enough to read as
    // "shouted" rather than as continuous speech), occasional hammer
    // strikes and coin clinks. Pair with From Afar for actual crowd
    // chatter.
    function buildMarket(audio, dest) {
      const gain = audio.createGain();
      gain.connect(dest);

      // Open-air room tone
      const noise = noiseSource(audio, 'pink');
      const noiseLp = audio.createBiquadFilter();
      noiseLp.type = 'lowpass'; noiseLp.frequency.value = 2200;
      const noiseG = audio.createGain(); noiseG.gain.value = 0.35;
      noise.connect(noiseLp).connect(noiseG).connect(gain);

      // Footfall rumble
      const footNoise = noiseSource(audio, 'brown');
      const footLp = audio.createBiquadFilter();
      footLp.type = 'lowpass'; footLp.frequency.value = 200;
      const footG = audio.createGain(); footG.gain.value = 0.3;
      footNoise.connect(footLp).connect(footG).connect(gain);

      // Crowd swell so the bed breathes
      const swellLfo = audio.createOscillator();
      swellLfo.type = 'sine'; swellLfo.frequency.value = 0.04;
      const swellLfoG = audio.createGain(); swellLfoG.gain.value = 0.12;
      swellLfo.connect(swellLfoG).connect(gain.gain); swellLfo.start();

      // Events: vendor calls, hammer strikes, coin clinks
      const cancelVendor = schedule(8000, 22000, () => eventVendorCall(audio, dest));
      const cancelHammer = schedule(18000, 50000, () => eventHammerStrike(audio, dest));
      const cancelCoin = schedule(10000, 28000, () => eventCoinClink(audio, dest));

      return { gain, stop() {
        noise.stop(); footNoise.stop();
        swellLfo.stop();
        cancelVendor(); cancelHammer(); cancelCoin();
      }};
    }

    // Stone Grinding: low rumble of brown noise + mid-band rasp. Slow
    // amplitude wobble suggests uneven friction. Slow frequency sweep on
    // the rasp keeps it from feeling static. Occasional dust falls.
    function buildStone(audio, dest) {
      const gain = audio.createGain();
      gain.connect(dest);
      // Low rumble
      const noise1 = noiseSource(audio, 'brown');
      const lp1 = audio.createBiquadFilter();
      lp1.type = 'lowpass'; lp1.frequency.value = 120; lp1.Q.value = 1;
      const g1 = audio.createGain(); g1.gain.value = 1.2;
      noise1.connect(lp1).connect(g1).connect(gain);
      // High-mid rasp
      const noise2 = noiseSource(audio, 'brown');
      const bp = audio.createBiquadFilter();
      bp.type = 'bandpass'; bp.frequency.value = 800; bp.Q.value = 1.5;
      const g2 = audio.createGain(); g2.gain.value = 0.32;
      noise2.connect(bp).connect(g2).connect(gain);
      // Amplitude wobble for uneven friction
      const lfo = audio.createOscillator();
      lfo.type = 'triangle'; lfo.frequency.value = 0.3;
      const lfoG = audio.createGain(); lfoG.gain.value = 0.18;
      lfo.connect(lfoG).connect(gain.gain); lfo.start();
      // Slow rasp sweep
      const lfo2 = audio.createOscillator();
      lfo2.type = 'sine'; lfo2.frequency.value = 0.06;
      const lfo2G = audio.createGain(); lfo2G.gain.value = 80;
      lfo2.connect(lfo2G).connect(bp.frequency); lfo2.start();
      // Dust falls
      const cancelDust = schedule(25000, 90000, () => eventDustFall(audio, dest));
      return { gain, stop() {
        noise1.stop(); noise2.stop(); lfo.stop(); lfo2.stop();
        cancelDust();
      }};
    }
  },

  unmount() {
    if (this.audio) {
      try { Object.values(this.layers).forEach(l => l.stop && l.stop()); } catch {}
      try { this.audio.close(); } catch {}
      this.audio = null; this.layers = {}; this.master = null; this.active = false;
    }
    // Stop any external "From Afar" stream
    if (this.streamPlayer && this.streamPlayer.destroy) {
      try { this.streamPlayer.destroy(); } catch {}
    }
    if (this.streamEl) {
      try {
        if (this.streamEl.tagName === 'AUDIO') {
          this.streamEl.pause();
          this.streamEl.src = '';
        }
        this.streamEl.remove();
      } catch {}
    }
    this.streamEl = null;
    this.streamPlayer = null;
    this.currentStreamId = null;
  }
});

/* =========================================================================
   MODULE: THE ROLL (Campaigns)
   ========================================================================= */
Keep.register({
  id: 'campaigns',
  name: 'The Roll',
  category: null,
  glyph: 'g-scroll',
  tagline: 'Every keep holds many stories. Set one aside, take up another.',
  sub: 'Manage your chronicles. Export, import, fork, retire.',

  async mount(body, actions) {
    const create = U.el('div', { class: 'roll__create' });
    const nameInput = U.el('input', { class: 'input', placeholder: 'Name a new chronicle' });
    const createBtn = U.el('button', { class: 'btn btn--primary', onclick: async () => {
      if (!nameInput.value.trim()) return;
      const id = await Campaigns.create(nameInput.value.trim());
      nameInput.value = '';
      await Keep.switchTo(id);
      await render();
    }}, 'Forge');
    const importBtn = U.el('button', { class: 'btn btn--ghost', onclick: () => openRestoreFlow() }, 'Restore...');
    create.append(nameInput, createBtn, importBtn);
    body.append(create);

    const list = U.el('div', { class: 'roll__list' });
    body.append(list);

    actions.append(
      U.el('button', { class: 'btn btn--primary', onclick: () => backupKeep() }, 'Backup the Keep')
    );

    async function render() {
      list.innerHTML = '';
      const all = await Campaigns.list();
      const activeId = Vault.getActiveCampaign();
      if (!all.length) {
        list.append(U.el('div', { class: 'empty' }, 'No chronicles yet. Forge one above.'));
        return;
      }
      for (const c of all) {
        const isActive = c.id === activeId;
        const entries = await Campaigns.size(c.id);
        const card = U.el('div', { class: 'roll__card' + (isActive ? ' roll__card--active' : '') });
        card.append(
          U.el('div', { class: 'card__corner card__corner--tl' }),
          U.el('div', { class: 'card__corner card__corner--tr' }),
          U.el('div', { class: 'card__corner card__corner--bl' }),
          U.el('div', { class: 'card__corner card__corner--br' }),
          U.el('div', { class: 'roll__name' }, c.name + (isActive ? '  \u2730' : '')),
          U.el('div', { class: 'roll__meta' },
            'forged ' + new Date(c.created).toLocaleDateString() + ' \u00B7 ' + entries + ' inscription' + (entries === 1 ? '' : 's')
          )
        );
        const acts = U.el('div', { class: 'roll__actions' });
        if (!isActive) {
          acts.append(U.el('button', { class: 'btn btn--small btn--primary', onclick: async () => {
            await Keep.switchTo(c.id);
            await render();
          }}, 'Open'));
        }
        acts.append(U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          const name = prompt('Rename chronicle', c.name);
          if (!name || !name.trim()) return;
          await Campaigns.rename(c.id, name.trim());
          await Keep.renderChip();
          await render();
        }}, 'Rename'));
        acts.append(U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          const json = await Campaigns.exportOne(c.id);
          if (!json) return;
          downloadJson(json, c.name);
        }}, 'Export'));
        acts.append(U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          if (!confirm(`Retire "${c.name}"? Its inscriptions cannot be recovered.`)) return;
          try {
            await Campaigns.remove(c.id);
            await Keep.renderChip();
            await render();
            if (Vault.getActiveCampaign() !== activeId) {
              // we deleted the active one; reload current module
              const last = await Vault.get('last-module');
              Keep.mount(last && Keep.modules.has(last) ? last : 'home');
            }
          } catch (e) { alert(e.message); }
        }}, 'Retire'));
        card.append(acts);
        list.append(card);
      }
    }

    async function backupKeep() {
      const out = await Campaigns.backupAll();
      downloadJson(out, 'keep-backup');
      U.toast('Backed up ' + out.campaigns.length + ' chronicle' + (out.campaigns.length === 1 ? '' : 's'));
    }

    function downloadJson(obj, label) {
      const blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      const slug = (label || 'chronicle').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
      a.download = 'keep-' + slug + '-' + Date.now() + '.json';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    }

    function openRestoreFlow() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'application/json,.json';
      input.addEventListener('change', async () => {
        const f = input.files && input.files[0];
        if (!f) return;
        let json;
        try { json = JSON.parse(await f.text()); }
        catch { alert('Could not parse JSON.'); return; }

        const fmt = Campaigns.detectFormat(json);
        if (!fmt) { alert('Not a Keep file. Expected keep-backup, keep-export, or campaign-export.'); return; }

        if (fmt === 'backup') {
          // full backup: offer merge or replace
          showRestoreDialog(json);
        } else {
          // legacy / single: just merge
          try {
            const result = await Campaigns.restoreMerge(json);
            const n = result.count;
            U.toast('Merged ' + n + ' chronicle' + (n === 1 ? '' : 's'));
            await Keep.renderChip();
            await render();
          } catch (e) { alert('Restore failed: ' + e.message); }
        }
      });
      input.click();
    }

    function showRestoreDialog(backup) {
      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card' });
      const date = backup.exported ? new Date(backup.exported).toLocaleString() : 'unknown date';
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, 'Restore the Keep')
      );
      const scroll = U.el('div', { class: 'modal-card__scroll' });
      scroll.append(
        U.el('p', {}, 'This backup holds ' + backup.campaigns.length + ' chronicle' +
                       (backup.campaigns.length === 1 ? '' : 's') + ', taken on ' + date + '.'),
        U.el('ul', {}, backup.campaigns.map(c =>
          U.el('li', {}, c.name + (c.id === backup.active ? '  \u2730' : ''))
        )),
        U.el('div', { class: 'divider' }, [U.el('span', { class: 'divider__ornament' }, '\u2767')]),
        U.el('p', { style: { fontFamily: 'var(--rubric)', fontStyle: 'italic' } },
          'Merge adds these as new chronicles alongside what you have now (with "(imported)" suffix). Replace wipes everything currently in the Keep and restores from this file exactly, preserving names, IDs, and which chronicle was active.'
        )
      );
      dialog.append(scroll);
      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--ghost', onclick: () => ov.remove() }, 'Cancel'),
        U.el('button', { class: 'btn', onclick: async () => {
          ov.remove();
          try {
            const result = await Campaigns.restoreMerge(backup);
            U.toast('Merged ' + result.count + ' chronicle' + (result.count === 1 ? '' : 's'));
            await Keep.renderChip();
            await render();
          } catch (e) { alert('Restore failed: ' + e.message); }
        }}, 'Merge'),
        U.el('button', { class: 'btn btn--primary', style: { background: 'var(--wine)', borderColor: 'var(--wine-d)' }, onclick: async () => {
          ov.remove();
          confirmReplace(backup);
        }}, 'Replace...')
      ]));
      ov.append(dialog);
      document.body.append(ov);
    }

    function confirmReplace(backup) {
      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card' });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', { style: { color: 'var(--wine)' } }, 'Replace the Keep')
      );
      const scroll = U.el('div', { class: 'modal-card__scroll' });
      scroll.append(
        U.el('p', { style: { fontFamily: 'var(--rubric)', fontStyle: 'italic', fontSize: '1.1rem' } },
          'This will erase every chronicle currently in your Keep and restore the backup in its place. There is no undo. To proceed, type the word RESTORE below.'
        )
      );
      const confirmInput = U.el('input', { class: 'input', placeholder: 'type RESTORE to confirm' });
      scroll.append(confirmInput);
      dialog.append(scroll);
      const doIt = async () => {
        if (confirmInput.value.trim().toUpperCase() !== 'RESTORE') {
          confirmInput.focus();
          confirmInput.style.borderColor = 'var(--wine)';
          return;
        }
        ov.remove();
        try {
          await Campaigns.restoreReplace(backup);
          U.toast('Keep restored from backup');
          await Keep.renderChip();
          await render();
        } catch (e) { alert('Restore failed: ' + e.message); }
      };
      confirmInput.addEventListener('keydown', e => { if (e.key === 'Enter') doIt(); });
      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--ghost', onclick: () => ov.remove() }, 'Cancel'),
        U.el('button', { class: 'btn btn--primary', style: { background: 'var(--wine)', borderColor: 'var(--wine-d)' }, onclick: doIt }, 'Replace the Keep')
      ]));
      ov.append(dialog);
      document.body.append(ov);
      setTimeout(() => confirmInput.focus(), 50);
    }

    await render();
  }
});

/* =========================================================================
   INIT
   ========================================================================= */
Keep.init();
</script>
</body>
</html>
