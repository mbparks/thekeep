  min-width: 260px;
  z-index: 50;
  padding: 0.35rem;
}
.campaign-menu[hidden] { display: none; }
.campaign-menu__item {
  display: flex; gap: 0.55rem; align-items: center;
  width: 100%;
  padding: 0.5rem 0.65rem;
  background: transparent;
  border: none;
  text-align: left;
  font-family: var(--rubric);
  font-size: 1rem;
  color: var(--ink-soft);
  cursor: pointer;
}
.campaign-menu__item:hover { background: rgba(184,146,58,0.12); color: var(--ink); }
.campaign-menu__item--active { color: var(--wine); }
.campaign-menu__check { width: 1.1rem; color: var(--wine); }
.campaign-menu__divider {
  height: 1px;
  background: var(--p-3);
  margin: 0.35rem 0;
}

/* ----- MODULE: THE ROLL (Campaigns) ----------------------------------- */
.roll__create {
  display: grid; grid-template-columns: 1fr auto auto; gap: 0.5rem;
  margin-bottom: 1.5rem; padding-bottom: 1.2rem; border-bottom: var(--rule);
}
@media (max-width: 720px) { .roll__create { grid-template-columns: 1fr; } }
.roll__list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1rem;
}
.roll__card {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1.25rem;
  position: relative;
  display: flex; flex-direction: column; gap: 0.6rem;
}
.roll__card--active {
  border-color: var(--wine);
  border-left-width: 4px;
  background: linear-gradient(90deg, rgba(184,146,58,0.08), var(--p-0));
}
.roll__name {
  font-family: var(--display);
  font-size: 1.2rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.roll__meta {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  font-size: 0.88rem;
}
.roll__actions {
  display: flex; gap: 0.4rem; flex-wrap: wrap;
  margin-top: auto;
}

/* ----- POLISH: FOCUS, CRITICAL HP, RECIPROCAL LABELS, WRAP ------------ */
.btn:focus-visible, .nav__btn:focus-visible, .home__tile:focus-visible,
.faction-card__expand:focus-visible, .gauge-btn:focus-visible,
.tavern__rumour-reveal:focus-visible, .lists__icon-btn:focus-visible,
.campaign-chip:focus-visible, .campaign-menu__item:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

.lists__row--critical {
  border-left-color: var(--wine);
  background: linear-gradient(90deg, rgba(92,31,36,0.16), var(--p-0));
}
.lists__row--critical .lists__hp { color: var(--wine); font-weight: 600; }
.lists--big .lists__row--critical .lists__hp { font-weight: 700; }

.faction-relation__label-stack {
  display: flex; flex-direction: column;
  align-items: flex-end;
  min-width: 7rem;
  gap: 0.05rem;
}
.faction-relation__label-stack .primary {
  font-family: var(--display);
  font-size: 0.7rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.faction-relation__label-stack .reciprocal {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.78rem;
  color: var(--ink-faded);
  letter-spacing: 0;
  text-transform: none;
}

.almanac__head { flex-wrap: wrap; gap: 0.75rem; }

/* ----- MODULE: THE WAYFARER (PC sheet) -------------------------------- */
.wayfarer__head {
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: var(--rule);
  display: flex; flex-wrap: wrap; gap: 0.7rem;
  align-items: center; justify-content: space-between;
}
.wayfarer__count { font-family: var(--rubric); font-style: italic; color: var(--ink-faded); font-size: 0.95rem; }
.wayfarer__grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
  gap: 1.2rem;
}
.wayfarer__empty {
  text-align: center;
  padding: 3rem 1.5rem;
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
}
.wayfarer__empty-call {
  display: block;
  font-family: var(--display);
  font-size: 1.1rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 1rem;
  font-style: normal;
}

.wayfarer-card {
  --accent: var(--wine);
  --accent-d: var(--wine-d);
  --accent-soft: rgba(92,31,36,0.10);
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1.3rem 1.4rem 1rem;
  position: relative;
  display: flex; flex-direction: column;
}
.wayfarer-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--accent), var(--accent-d));
}
.wayfarer-card--fallen { opacity: 0.6; }

.wayfarer-card__head {
  display: flex; align-items: flex-start; gap: 0.9rem;
  margin: 0.2rem 0 0.6rem;
}
.wayfarer-card__glyph {
  width: 48px; height: 48px;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent-soft);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 1.5rem;
  line-height: 1;
  flex-shrink: 0;
}
.wayfarer-card__title { flex: 1; min-width: 0; }
.wayfarer-card__name {
  font-family: var(--display);
  font-size: 1.35rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--ink);
  line-height: 1.15;
  margin-bottom: 0.2rem;
}
.wayfarer-card__caption {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--ink-faded);
}
.wayfarer-card__status {
  font-family: var(--display);
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 0.15rem 0.5rem;
  background: var(--status-soft, rgba(58,47,36,0.10));
  border: 1px solid var(--status-color, var(--ink-soft));
  color: var(--status-color, var(--ink-soft));
  flex-shrink: 0;
  align-self: flex-start;
}
.wayfarer-card--status-hale      { --status-color: var(--forest); --status-soft: rgba(45,74,53,0.12); }
.wayfarer-card--status-weary     { --status-color: var(--gold-d); --status-soft: rgba(184,146,58,0.16); }
.wayfarer-card--status-wounded   { --status-color: #8a4a2c;       --status-soft: rgba(138,74,44,0.14); }
.wayfarer-card--status-grievous  { --status-color: var(--wine);   --status-soft: rgba(92,31,36,0.14); }
.wayfarer-card--status-fallen    { --status-color: var(--ink-faded); --status-soft: rgba(107,93,74,0.12); }
[data-theme="dark"] .wayfarer-card--status-wounded { --status-color: #b8694a; --status-soft: rgba(184,105,74,0.18); }

.wayfarer-card__sep {
  border: none;
  border-top: 1px dotted var(--p-3);
  margin: 0.5rem 0 0.9rem;
}

.wayfarer-card__field {
  margin-bottom: 0.85rem;
}
.wayfarer-card__field-label {
  font-family: var(--display);
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faded);
  margin-bottom: 0.25rem;
  padding-bottom: 0.15rem;
  border-bottom: 1px solid var(--p-3);
}
.wayfarer-card__field-value {
  font-family: var(--rubric);
  font-size: 1rem;
  line-height: 1.5;
  color: var(--ink);
  white-space: pre-wrap;
}
.wayfarer-card__field--oath .wayfarer-card__field-value {
  font-style: italic;
  color: var(--accent);
  font-size: 1.05rem;
}
[data-theme="dark"] .wayfarer-card__field--oath .wayfarer-card__field-value {
  color: var(--ink);
  font-style: italic;
}

.wayfarer-card__backlinks {
  display: flex; flex-wrap: wrap; gap: 0.35rem;
  margin: 0.3rem 0 0.6rem;
}

.wayfarer-card__actions {
  display: flex; gap: 0.4rem; flex-wrap: wrap;
  margin-top: auto;
  padding-top: 0.55rem;
  border-top: 1px dashed var(--p-3);
}

.wayfarer-card--highlight {
  animation: keepHighlight 2.2s ease-out;
}

/* ----- MODULE: THE FELLOWSHIP (Companions) ---------------------------- */
.fellowship__head {
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: var(--rule);
  display: flex; flex-wrap: wrap; gap: 0.7rem;
  align-items: center; justify-content: space-between;
}
.fellowship__count { font-family: var(--rubric); font-style: italic; color: var(--ink-faded); font-size: 0.95rem; }
.fellowship__grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 1.1rem;
}

.fellowship-card {
  --accent: var(--ink-soft);
  --accent-d: var(--ink);
  --accent-soft: rgba(58,47,36,0.08);
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1.1rem 1.2rem 0.85rem;
  position: relative;
  display: flex; flex-direction: column;
}
.fellowship-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--accent), var(--accent-d));
}
.fellowship-card--departed { opacity: 0.6; }
.fellowship-card--fallen { opacity: 0.6; }

.fellowship-card__head {
  display: flex; align-items: center; gap: 0.8rem;
  margin: 0.15rem 0 0.5rem;
}
.fellowship-card__glyph {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent-soft);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 1.4rem;
  line-height: 1;
}
.fellowship-card__title { flex: 1; min-width: 0; }
.fellowship-card__name {
  font-family: var(--display);
  font-size: 1.15rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink);
  line-height: 1.15;
}
.fellowship-card__meta {
  display: flex; gap: 0.5rem; align-items: center;
  margin-top: 0.2rem;
  flex-wrap: wrap;
}
.fellowship-card__archetype {
  font-family: var(--display);
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faded);
}
.fellowship-card__status {
  font-family: var(--display);
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 0.15rem 0.5rem;
  background: var(--status-soft, rgba(58,47,36,0.1));
  border: 1px solid var(--status-color, var(--ink-soft));
  color: var(--status-color, var(--ink-soft));
}
.fellowship-card--status-hale      { --status-color: var(--forest); --status-soft: rgba(45,74,53,0.12); }
.fellowship-card--status-wounded   { --status-color: #8a4a2c;       --status-soft: rgba(138,74,44,0.14); }
.fellowship-card--status-lost      { --status-color: #4a5764;       --status-soft: rgba(74,87,100,0.14); }
.fellowship-card--status-fallen    { --status-color: var(--wine);   --status-soft: rgba(92,31,36,0.12); }
.fellowship-card--status-departed  { --status-color: var(--gold-d); --status-soft: rgba(184,146,58,0.16); }
[data-theme="dark"] .fellowship-card--status-wounded { --status-color: #b8694a; --status-soft: rgba(184,105,74,0.18); }
[data-theme="dark"] .fellowship-card--status-lost    { --status-color: #758494; --status-soft: rgba(117,132,148,0.16); }

.fellowship-card__voice {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.95rem;
  line-height: 1.45;
  color: var(--ink-soft);
  margin-bottom: 0.55rem;
}

.fellowship-card__bond {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 0.4rem 0.8rem;
  align-items: center;
  margin-bottom: 0.65rem;
}
.fellowship-card__bond-label {
  font-family: var(--display);
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faded);
}
.fellowship-card__bond-value {
  font-family: var(--rubric);
  font-size: 0.95rem;
  color: var(--ink);
}
.fellowship-card__bond-bar {
  grid-column: 1 / -1;
  margin: 0;
}
.fellowship-card__bond-controls {
  grid-column: 1 / -1;
  display: flex; gap: 0.3rem; justify-content: center;
  margin-top: 0.15rem;
}

.fellowship-card__quote {
  background: var(--p-1);
  border-left: 3px solid var(--accent);
  padding: 0.75rem 0.95rem;
  margin: 0.35rem 0 0.55rem;
  display: flex; align-items: flex-start; gap: 0.6rem;
  min-height: 3.5em;
}
.fellowship-card__quote-text {
  flex: 1;
  font-family: var(--rubric);
  font-style: italic;
  font-size: 1rem;
  color: var(--ink);
  line-height: 1.5;
  animation: fellowshipSpeakIn 0.32s ease-out;
}
.fellowship-card__quote-text::before {
  content: '\201C';
  font-family: var(--serif);
  font-size: 1.4em;
  color: var(--ink-faded);
  vertical-align: -0.18em;
  margin-right: 0.05em;
}
.fellowship-card__quote-text::after {
  content: '\201D';
  font-family: var(--serif);
  font-size: 1.4em;
  color: var(--ink-faded);
  vertical-align: -0.18em;
  margin-left: 0.05em;
}
.fellowship-card__quote--empty .fellowship-card__quote-text {
  font-style: italic;
  color: var(--ink-faded);
}
.fellowship-card__quote--empty .fellowship-card__quote-text::before,
.fellowship-card__quote--empty .fellowship-card__quote-text::after { content: ''; }
.fellowship-card__quote-actions {
  display: flex; gap: 0.15rem; flex-shrink: 0;
}
.fellowship-card__quote-act {
  background: transparent;
  border: none;
  color: var(--ink-faded);
  cursor: pointer;
  font-size: 0.95rem;
  padding: 0 0.3rem;
  opacity: 0.55;
  transition: opacity 0.12s, color 0.12s;
}
.fellowship-card__quote-act:hover { opacity: 1; color: var(--gold-d); }

@keyframes fellowshipSpeakIn {
  from { opacity: 0; transform: translateY(3px); }
  to   { opacity: 1; transform: none; }
}

.fellowship-card__speak {
  display: block;
  margin: 0.3rem auto 0.55rem;
  padding: 0.65rem 2.6rem;
  background: var(--accent);
  color: var(--p-0);
  border: 1px solid var(--accent-d);
  font-family: var(--display);
  font-size: 0.78rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  cursor: pointer;
  transition: transform 0.08s, filter 0.15s;
}
.fellowship-card__speak:hover { filter: brightness(1.08); }
.fellowship-card__speak:active { transform: translateY(1px); }
.fellowship-card__speak:disabled { opacity: 0.4; cursor: not-allowed; }
/* Dark mode: the default --accent (--ink-soft) becomes a light parchment
   tan in dark mode, so the original filled-button design becomes light
   on light. Switch to an outlined-button style instead: transparent
   background, accent-coloured border and text. Hover adds a faint tint
   without trying to brighten an already-dark surface. */
[data-theme="dark"] .fellowship-card__speak {
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent);
}
[data-theme="dark"] .fellowship-card__speak:hover {
  background: rgba(196, 186, 163, 0.14);
  filter: none;
}

.fellowship-card__backlinks {
  display: flex; flex-wrap: wrap; gap: 0.35rem;
  margin: 0.3rem 0 0.5rem;
}

.fellowship-card__actions {
  display: flex; gap: 0.4rem; flex-wrap: wrap;
  margin-top: auto;
  padding-top: 0.55rem;
  border-top: 1px dashed var(--p-3);
}

/* archetype picker in the form */
.archetype-picker {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 0.3rem;
}
.archetype-picker button {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.45rem 0.6rem;
  background: var(--p-0);
  border: 1px solid var(--p-3);
  color: var(--ink-soft);
  cursor: pointer;
  font-family: var(--rubric);
  font-size: 0.95rem;
  text-align: left;
}
.archetype-picker button:hover { background: rgba(184,146,58,0.12); }
.archetype-picker button.is-selected {
  background: var(--ink);
  color: var(--p-0);
  border-color: var(--ink);
}
.archetype-picker__glyph { font-family: var(--display); font-size: 1.1rem; line-height: 1; }

/* ----- MODULE: THE CABINET (Things Found) ----------------------------- */
.cabinet__head {
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: var(--rule);
  display: flex; flex-wrap: wrap; gap: 0.7rem;
  align-items: center; justify-content: space-between;
}
.cabinet__filters {
  display: flex; gap: 0.3rem; flex-wrap: wrap;
}
.cabinet__filter {
  font-family: var(--display);
  font-size: 0.68rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 0.4rem 0.75rem;
  background: var(--p-0);
  border: 1px solid var(--p-3);
  color: var(--ink-soft);
  cursor: pointer;
}
.cabinet__filter:hover { background: rgba(184,146,58,0.12); }
.cabinet__filter.is-active {
  background: var(--ink);
  color: var(--p-0);
  border-color: var(--ink);
}
.cabinet__filter-count { margin-left: 0.35rem; opacity: 0.65; font-size: 0.85em; }

.cabinet__grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 1rem;
}

.cabinet-card {
  --status-color: var(--ink-soft);
  --status-soft: rgba(58,47,36,0.10);
  background: var(--p-0);
  border: 1px solid var(--p-3);
  border-left: 4px solid var(--status-color);
  padding: 1rem 1.15rem;
  display: grid;
  grid-template-columns: 56px 1fr;
  gap: 0.95rem;
  align-items: start;
}
.cabinet-card--held      { --status-color: var(--forest); --status-soft: rgba(45,74,53,0.12); }
.cabinet-card--lost      { --status-color: #8a4a2c;       --status-soft: rgba(138,74,44,0.14); }
.cabinet-card--hidden    { --status-color: #4a5764;       --status-soft: rgba(74,87,100,0.14); }
.cabinet-card--given     { --status-color: var(--gold-d); --status-soft: rgba(184,146,58,0.16); }
.cabinet-card--destroyed { --status-color: var(--wine);   --status-soft: rgba(92,31,36,0.12); }

[data-theme="dark"] .cabinet-card--lost    { --status-color: #b8694a; --status-soft: rgba(184,105,74,0.18); }
[data-theme="dark"] .cabinet-card--hidden  { --status-color: #758494; --status-soft: rgba(117,132,148,0.16); }

.cabinet-card__kind {
  width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  background: var(--p-2);
  border: 1px solid var(--p-3);
  font-size: 1.7rem;
  color: var(--status-color);
  line-height: 1;
}
.cabinet-card__body { display: flex; flex-direction: column; min-width: 0; }
.cabinet-card__head {
  display: flex; align-items: center; gap: 0.55rem;
  margin-bottom: 0.35rem;
  flex-wrap: wrap;
}
.cabinet-card__name {
  font-family: var(--display);
  font-size: 1.05rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink);
  line-height: 1.15;
  flex: 1;
  min-width: 0;
}
.cabinet-card__status {
  font-family: var(--display);
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 0.15rem 0.5rem;
  background: var(--status-soft);
  border: 1px solid var(--status-color);
  color: var(--status-color);
}
.cabinet-card__desc {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.98rem;
  line-height: 1.5;
  color: var(--ink-soft);
  margin: 0.3rem 0 0.7rem;
}
.cabinet-card__meta {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 0.25rem 0.85rem;
  margin: 0 0 0.6rem;
}
.cabinet-card__meta dt {
  font-family: var(--display);
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faded);
  align-self: baseline;
}
.cabinet-card__meta dd {
  margin: 0;
  font-family: var(--rubric);
  font-size: 0.95rem;
  color: var(--ink);
  line-height: 1.35;
}
.cabinet-card__meta-link {
  background: transparent;
  border: none;
  padding: 0;
  font: inherit;
  color: var(--wine);
  border-bottom: 1px solid rgba(92,31,36,0.5);
  cursor: pointer;
}
.cabinet-card__meta-link:hover { color: var(--wine-d); border-bottom-color: var(--wine); }
[data-theme="dark"] .cabinet-card__meta-link {
  color: #e36b78;
  border-bottom-color: rgba(227,107,120,0.5);
}

.cabinet-card__actions {
  display: flex; gap: 0.4rem; flex-wrap: wrap;
  margin-top: auto;
  padding-top: 0.55rem;
  border-top: 1px dashed var(--p-3);
}

/* date editor block in the form */
.cabinet-date {
  display: grid;
  grid-template-columns: 70px 1fr 90px auto;
  gap: 0.4rem;
  align-items: center;
}
@media (max-width: 720px) { .cabinet-date { grid-template-columns: 1fr 1fr; } }

/* kind picker in the form (button row with glyph + name) */
.kind-picker {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
  gap: 0.3rem;
}
.kind-picker button {
  display: flex; align-items: center; gap: 0.45rem;
  padding: 0.4rem 0.6rem;
  background: var(--p-0);
  border: 1px solid var(--p-3);
  color: var(--ink-soft);
  cursor: pointer;
  font-family: var(--rubric);
  font-size: 0.95rem;
  text-align: left;
}
.kind-picker button:hover { background: rgba(184,146,58,0.12); }
.kind-picker button.is-selected {
  background: var(--ink);
  color: var(--p-0);
  border-color: var(--ink);
}
.kind-picker__glyph { font-family: var(--display); font-size: 1.1rem; line-height: 1; }

/* status picker (similar to kind picker, but smaller) */
.status-picker {
  display: flex; gap: 0.3rem; flex-wrap: wrap;
}
.status-picker button {
  font-family: var(--display);
  font-size: 0.68rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 0.4rem 0.75rem;
  background: var(--p-0);
  border: 1px solid var(--p-3);
  color: var(--ink-soft);
  cursor: pointer;
}
.status-picker button.is-selected {
  background: var(--ink);
  color: var(--p-0);
  border-color: var(--ink);
}

/* ----- MODULE: ATLAS (Region Map Generator) --------------------------- */
.atlas {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 1rem;
  align-items: start;
}
.atlas--empty { grid-template-columns: 1fr; }

/* Library sidebar */
.atlas__sidebar {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1rem 0.9rem;
  display: flex; flex-direction: column;
  gap: 0.7rem;
  position: sticky;
  top: 0.5rem;
  max-height: calc(100vh - 7rem);
  overflow-y: auto;
}
.atlas__sidebar-head {
  font-family: var(--display);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 0.7rem;
  color: var(--ink-faded);
  padding-bottom: 0.4rem;
  border-bottom: 1px dotted var(--p-3);
}
.atlas__map-list {
  display: flex; flex-direction: column;
  gap: 0.3rem;
}
.atlas__map-item {
  padding: 0.55rem 0.65rem;
  background: var(--p-1);
  border: 1px solid var(--p-3);
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.92rem;
  color: var(--ink-soft);
  cursor: pointer;
  text-align: left;
  display: flex; flex-direction: column;
  gap: 0.15rem;
}
.atlas__map-item:hover { background: var(--p-2); border-color: var(--gold); }
.atlas__map-item--active {
  background: var(--p-2);
  border-color: var(--gold);
  box-shadow: inset 0 0 0 1px var(--gold);
}
.atlas__map-item-name {
  font-family: var(--display);
  font-style: normal;
  font-size: 0.82rem;
  letter-spacing: 0.08em;
  color: var(--ink);
}
.atlas__map-item-meta {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.74rem;
  color: var(--ink-faded);
}
.atlas__new-btn {
  padding: 0.6rem 0.8rem;
  background: var(--ink-soft);
  color: #f5ebd6;
  border: 1px solid var(--ink-soft);
  font-family: var(--display);
  font-size: 0.74rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  text-align: center;
}
.atlas__new-btn:hover { filter: brightness(1.10); }
[data-theme="dark"] .atlas__new-btn { color: #1f1c17; }

/* Builder */
.atlas__builder {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1.3rem 1.5rem;
  display: flex; flex-direction: column;
  gap: 1rem;
}
.atlas__builder-intro {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-soft);
  line-height: 1.5;
}
.atlas__build-section-head {
  font-family: var(--display);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 0.72rem;
  color: var(--ink-faded);
  margin-bottom: 0.55rem;
  padding-bottom: 0.35rem;
  border-bottom: 1px dotted var(--p-3);
}
.atlas__biomes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 0.5rem;
}
.atlas__biome {
  padding: 0.75rem 0.8rem;
  background: var(--p-1);
  border: 1px solid var(--p-3);
  cursor: pointer;
  text-align: left;
  display: flex; flex-direction: column;
  gap: 0.25rem;
}
.atlas__biome:hover { background: var(--p-2); border-color: var(--gold); }
.atlas__biome--selected {
  background: var(--p-2);
  border-color: var(--gold);
  box-shadow: inset 0 0 0 1px var(--gold);
}
.atlas__biome-name {
  font-family: var(--display);
  font-size: 0.85rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink);
}
.atlas__biome-sub {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.78rem;
  color: var(--ink-faded);
  line-height: 1.35;
}
.atlas__option-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}
.atlas__option {
  padding: 0.5rem 0.85rem;
  background: var(--p-1);
  border: 1px solid var(--p-3);
  font-family: var(--display);
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink);
  cursor: pointer;
}
.atlas__option:hover { background: var(--p-2); border-color: var(--gold); }
.atlas__option--selected {
  background: var(--p-2);
  border-color: var(--gold);
  box-shadow: inset 0 0 0 1px var(--gold);
}
.atlas__name-input {
  width: 100%;
  padding: 0.55rem 0.7rem;
  background: var(--p-1);
  border: 1px solid var(--p-3);
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.98rem;
  color: var(--ink);
  box-sizing: border-box;
}
.atlas__name-input:focus { outline: none; border-color: var(--gold); background: var(--p-0); }
.atlas__forge-row {
  display: flex; justify-content: center;
  margin-top: 0.5rem;
}
.atlas__forge {
  padding: 0.85rem 2.4rem;
  background: var(--gold-d);
  color: #f5ebd6;
  border: 1px solid var(--gold-d);
  font-family: var(--display);
  font-size: 0.92rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  cursor: pointer;
  transition: filter 0.15s, transform 0.08s;
}
.atlas__forge:hover { filter: brightness(1.10); }
.atlas__forge:active { transform: translateY(1px); }
[data-theme="dark"] .atlas__forge { color: #1f1c17; }

/* Map view */
.atlas__view {
  display: flex; flex-direction: column;
  gap: 1rem;
}
.atlas__view-head {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 0.6rem;
}
.atlas__view-title {
  font-family: var(--display);
  font-size: 1.4rem;
  letter-spacing: 0.08em;
  color: var(--ink);
  flex: 1;
}
.atlas__view-meta {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  font-size: 0.92rem;
}
.atlas__view-actions {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
}

.atlas__canvas {
  position: relative;
  background: #f0e2b8;
  border: 1px solid var(--ink-soft);
  width: 100%;
  box-sizing: border-box;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.10);
}
[data-theme="dark"] .atlas__canvas {
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
}
.atlas__map {
  display: block;
  width: 100%;
  height: auto;
}
.atlas__poi { cursor: pointer; }
.atlas__poi:hover .atlas__poi-glyph { filter: brightness(0.8); }
.atlas__poi:hover .atlas__poi-num-bg { fill: #f5ddb0; }
.atlas__poi--selected .atlas__poi-num-bg { fill: var(--gold); }
.atlas__poi--selected .atlas__poi-glyph { filter: brightness(0.7); }

/* Popover */
.atlas__popover {
  position: absolute;
  z-index: 30;
  background: var(--p-0);
  border: 1px solid var(--gold);
  padding: 0.85rem 1rem;
  max-width: 320px;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
  font-family: var(--serif);
}
.atlas__popover-head {
  display: flex;
  align-items: baseline;
  gap: 0.4rem;
  margin-bottom: 0.5rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px dotted var(--p-3);
}
.atlas__popover-num {
  font-family: var(--display);
  font-size: 0.7rem;
  color: var(--gold-d);
  padding: 0.15rem 0.35rem;
  border: 1px solid var(--gold);
  background: rgba(184, 146, 58, 0.10);
}
[data-theme="dark"] .atlas__popover-num { color: var(--gold-l); }
.atlas__popover-name {
  flex: 1;
  font-family: var(--display);
  font-size: 0.95rem;
  letter-spacing: 0.05em;
  color: var(--ink);
}
.atlas__popover-close {
  background: transparent;
  border: none;
  font-family: var(--display);
  color: var(--ink-faded);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 0 0.3rem;
}
.atlas__popover-close:hover { color: var(--wine); }
.atlas__popover-type {
  font-family: var(--display);
  font-size: 0.65rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-faded);
  margin-bottom: 0.5rem;
}
.atlas__popover-story {
  font-family: var(--serif);
  font-size: 0.93rem;
  color: var(--ink);
  line-height: 1.55;
  margin-bottom: 0.7rem;
}
.atlas__popover-backlinks {
  margin-bottom: 0.7rem;
  padding-top: 0.5rem;
  border-top: 1px dotted var(--p-3);
}
.atlas__popover-backlinks-label {
  font-family: var(--display);
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faded);
  margin-bottom: 0.3rem;
}
.atlas__popover-backlinks-row {
  display: flex; flex-wrap: wrap; gap: 0.3rem;
}
.atlas__popover-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  padding-top: 0.5rem;
  border-top: 1px dotted var(--p-3);
}
.atlas__popover-btn {
  padding: 0.35rem 0.7rem;
  background: transparent;
  border: 1px solid var(--p-3);
  font-family: var(--display);
  font-size: 0.66rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-soft);
  cursor: pointer;
}
.atlas__popover-btn:hover { background: var(--p-2); color: var(--ink); border-color: var(--ink-soft); }
.atlas__popover-btn--primary {
  background: var(--wine);
  color: #f5ebd6;
  border-color: var(--wine-d);
}
.atlas__popover-btn--primary:hover { filter: brightness(1.10); background: var(--wine); color: #f5ebd6; }

/* Legend */
.atlas__legend {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1.1rem 1.3rem;
}
.atlas__legend-head {
  font-family: var(--display);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 0.74rem;
  color: var(--ink-faded);
  margin-bottom: 0.7rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px dotted var(--p-3);
}
.atlas__legend-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 0.8rem 1.2rem;
}
.atlas__legend-item {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 0.5rem 0.7rem;
  align-items: start;
}
.atlas__legend-num {
  font-family: var(--display);
  font-size: 0.72rem;
  color: var(--gold-d);
  padding: 0.2rem 0.4rem;
  border: 1px solid var(--gold);
  background: rgba(184, 146, 58, 0.10);
  align-self: start;
  min-width: 1.6rem;
  text-align: center;
}
[data-theme="dark"] .atlas__legend-num { color: var(--gold-l); }
.atlas__legend-name {
  font-family: var(--display);
  font-size: 0.88rem;
  letter-spacing: 0.05em;
  color: var(--ink);
}
.atlas__legend-type {
  font-family: var(--display);
  font-size: 0.62rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-faded);
  margin-top: 0.1rem;
  margin-bottom: 0.35rem;
}
.atlas__legend-story {
  grid-column: 2;
  font-family: var(--serif);
  font-size: 0.88rem;
  color: var(--ink-soft);
  line-height: 1.5;
}

/* Empty state when no maps yet */
.atlas__empty-hint {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  font-size: 0.85rem;
  text-align: center;
  padding: 0.4rem 0;
}

/* Mobile / narrow */
@media (max-width: 740px) {
  .atlas { grid-template-columns: 1fr; }
  .atlas__sidebar {
    position: static;
    max-height: 200px;
  }
}

/* Print: hide chrome, expand map, layout legend */
@media print {
  .atlas { grid-template-columns: 1fr !important; }
  .atlas__sidebar,
  .atlas__view-actions,
  .atlas__popover,
  .atlas__forge-row { display: none !important; }
  .atlas__canvas {
    page-break-after: always;
    width: 100% !important;
    box-shadow: none !important;
    border: 1px solid #5c1f24 !important;
  }
  .atlas__legend { font-size: 11pt; line-height: 1.5; border-color: #5c1f24 !important; }
  .atlas__legend-list { grid-template-columns: 1fr; }
  .atlas__legend-item { page-break-inside: avoid; margin-bottom: 0.7em; }
  [data-theme="dark"] .atlas,
  [data-theme="dark"] .atlas__canvas,
  [data-theme="dark"] .atlas__legend {
    background: #faf2dd !important;
    color: #2a201a !important;
  }
}

/* ----- MODULE: LOOT (Treasure Generator) ------------------------------ */
.loot { display: flex; flex-direction: column; gap: 1.4rem; }

.loot__builder {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1.3rem 1.4rem;
}
.loot__intro {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-soft);
  margin-bottom: 1rem;
  line-height: 1.5;
}
.loot__section-head {
  font-family: var(--display);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 0.72rem;
  color: var(--ink-faded);
  margin-bottom: 0.7rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px dotted var(--p-3);
}
.loot__tiers {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0.5rem;
  margin-bottom: 1.1rem;
}
.loot__tier {
  padding: 0.75rem 0.7rem;
  background: var(--p-1);
  border: 1px solid var(--p-3);
  cursor: pointer;
  text-align: left;
  transition: background 0.15s, border-color 0.15s, transform 0.08s;
  display: flex; flex-direction: column;
  gap: 0.2rem;
}
.loot__tier:hover { background: var(--p-2); border-color: var(--gold); }
.loot__tier:active { transform: translateY(1px); }
.loot__tier--active {
  background: var(--p-2);
  border-color: var(--gold);
  box-shadow: inset 0 0 0 1px var(--gold);
}
.loot__tier-name {
  font-family: var(--display);
  font-size: 0.85rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink);
}
.loot__tier-sub {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.78rem;
  color: var(--ink-faded);
  line-height: 1.35;
}
.loot__roll {
  display: block;
  width: 100%;
  padding: 0.9rem 2rem;
  background: var(--gold-d);
  color: #f5ebd6;
  border: 1px solid var(--gold-d);
  font-family: var(--display);
  font-size: 0.95rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  cursor: pointer;
  transition: filter 0.15s, transform 0.08s;
}
.loot__roll:hover { filter: brightness(1.10); }
.loot__roll:active { transform: translateY(1px); }
[data-theme="dark"] .loot__roll {
  background: var(--gold-d);
  color: #1f1c17;
}

/* Result */
.loot__result {
  background: var(--p-0);
  border: 1px solid var(--gold);
  padding: 1.4rem 1.5rem;
}
.loot__result-head {
  font-family: var(--display);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-size: 0.78rem;
  color: var(--gold-d);
  text-align: center;
  margin-bottom: 0.4rem;
}
[data-theme="dark"] .loot__result-head { color: var(--gold-l); }
.loot__result-tier {
  font-family: var(--rubric);
  font-style: italic;
  text-align: center;
  color: var(--ink-soft);
  font-size: 0.92rem;
  margin-bottom: 1rem;
  padding-bottom: 0.7rem;
  border-bottom: 1px dotted var(--p-3);
}
.loot__group {
  margin-bottom: 1rem;
}
.loot__group:last-of-type { margin-bottom: 0.4rem; }
.loot__group-label {
  font-family: var(--display);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-size: 0.72rem;
  color: var(--ink-faded);
  margin-bottom: 0.45rem;
}
.loot__coins {
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem 1.2rem;
  align-items: baseline;
  padding: 0.6rem 0.8rem;
  background: var(--p-1);
  border: 1px solid var(--p-3);
}
.loot__coin {
  display: inline-flex;
  align-items: baseline;
  gap: 0.35rem;
  font-family: var(--display);
}
.loot__coin-value {
  font-size: 1.1rem;
  color: var(--ink);
  font-weight: 600;
}
.loot__coin-label {
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-faded);
}
.loot__items { display: flex; flex-direction: column; gap: 0.45rem; }
.loot__item {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  padding: 0.55rem 0.8rem;
  background: var(--p-1);
  border: 1px solid var(--p-3);
  animation: lootIn 0.32s ease-out;
}
@keyframes lootIn {
  from { transform: translateY(6px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.loot__item-text {
  font-family: var(--rubric);
  color: var(--ink);
  flex: 1;
  line-height: 1.4;
}
.loot__item-add {
  flex-shrink: 0;
  padding: 0.3rem 0.6rem;
  background: transparent;
  border: 1px solid var(--p-3);
  color: var(--ink-soft);
  font-family: var(--display);
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.loot__item-add:hover {
  background: var(--gold-l);
  border-color: var(--gold);
  color: var(--ink);
}
[data-theme="dark"] .loot__item-add:hover {
  background: rgba(184, 146, 58, 0.18);
  color: var(--ink);
}
.loot__item-add--done {
  background: rgba(45, 74, 53, 0.12);
  border-color: var(--forest);
  color: var(--forest);
  cursor: default;
}
[data-theme="dark"] .loot__item-add--done {
  background: rgba(95, 162, 116, 0.18);
  border-color: #5fa274;
  color: #5fa274;
}
.loot__wonder {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
  padding: 0.8rem 0.9rem;
  background: rgba(184, 146, 58, 0.08);
  border: 1px solid var(--gold);
  animation: lootIn 0.4s ease-out;
}
[data-theme="dark"] .loot__wonder {
  background: rgba(184, 146, 58, 0.14);
}
.loot__wonder-head {
  display: flex;
  align-items: baseline;
  gap: 0.7rem;
}
.loot__wonder-name {
  flex: 1;
  font-family: var(--display);
  font-size: 1rem;
  letter-spacing: 0.04em;
  color: var(--gold-d);
}
[data-theme="dark"] .loot__wonder-name { color: var(--gold-l); }
.loot__wonder-desc {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-soft);
  line-height: 1.5;
  font-size: 0.95rem;
}
.loot__empty {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  padding: 0.5rem 0;
}
.loot__result-actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 1.2rem;
  flex-wrap: wrap;
  justify-content: center;
  padding-top: 0.9rem;
  border-top: 1px dotted var(--p-3);
}

/* ----- MODULE: THE COFFER (Party Wealth) ------------------------------ */
.coffer { display: flex; flex-direction: column; gap: 1.4rem; }
.coffer__intro {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-soft);
  line-height: 1.5;
  margin-bottom: 0.4rem;
}
.coffer__balance {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1.3rem 1.5rem;
}
.coffer__balance-head {
  font-family: var(--display);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 0.72rem;
  color: var(--ink-faded);
  margin-bottom: 0.8rem;
  padding-bottom: 0.45rem;
  border-bottom: 1px dotted var(--p-3);
}
.coffer__balance-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.6rem;
  margin-bottom: 1rem;
}
.coffer__denom {
  text-align: center;
  padding: 0.7rem 0.4rem;
  background: var(--p-1);
  border: 1px solid var(--p-3);
}
.coffer__denom-value {
  font-family: var(--display);
  font-size: 1.6rem;
  color: var(--ink);
  font-weight: 600;
  line-height: 1.1;
}
.coffer__denom--zero .coffer__denom-value { color: var(--ink-faded); opacity: 0.5; }
.coffer__denom-label {
  font-family: var(--display);
  font-size: 0.68rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-faded);
  margin-top: 0.25rem;
}
.coffer__worth {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-top: 0.7rem;
  border-top: 1px dotted var(--p-3);
}
.coffer__worth-label {
  font-family: var(--display);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-size: 0.78rem;
  color: var(--ink-soft);
}
.coffer__worth-value {
  font-family: var(--display);
  font-size: 1.2rem;
  color: var(--gold-d);
  font-weight: 600;
}
[data-theme="dark"] .coffer__worth-value { color: var(--gold-l); }

.coffer__form {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1.3rem 1.4rem;
}
.coffer__form-head {
  font-family: var(--display);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 0.72rem;
  color: var(--ink-faded);
  margin-bottom: 0.8rem;
  padding-bottom: 0.45rem;
  border-bottom: 1px dotted var(--p-3);
}
.coffer__inputs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.5rem;
  margin-bottom: 0.7rem;
}
.coffer__input-wrap {
  display: flex; flex-direction: column;
  gap: 0.2rem;
}
.coffer__input-wrap label {
  font-family: var(--display);
  font-size: 0.66rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-faded);
}
.coffer__input {
  width: 100%;
  padding: 0.55rem 0.6rem;
  background: var(--p-1);
  border: 1px solid var(--p-3);
  font-family: var(--display);
  font-size: 1rem;
  color: var(--ink);
  text-align: center;
}
.coffer__input:focus { outline: none; border-color: var(--gold); background: var(--p-0); }
.coffer__note {
  width: 100%;
  padding: 0.55rem 0.7rem;
  background: var(--p-1);
  border: 1px solid var(--p-3);
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--ink);
  margin-bottom: 0.8rem;
}
.coffer__note:focus { outline: none; border-color: var(--gold); background: var(--p-0); }
.coffer__actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.coffer__deposit, .coffer__withdraw {
  flex: 1;
  min-width: 130px;
  padding: 0.7rem 1rem;
  font-family: var(--display);
  font-size: 0.78rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  cursor: pointer;
  transition: filter 0.15s, transform 0.08s;
}
.coffer__deposit {
  background: var(--forest);
  color: #f5ebd6;
  border: 1px solid var(--forest);
}
.coffer__withdraw {
  background: transparent;
  color: var(--wine);
  border: 1px solid var(--wine);
}
.coffer__deposit:hover { filter: brightness(1.10); }
.coffer__withdraw:hover { background: rgba(92, 31, 36, 0.08); }
[data-theme="dark"] .coffer__withdraw:hover { background: rgba(200, 49, 62, 0.14); }
.coffer__deposit:active, .coffer__withdraw:active { transform: translateY(1px); }
[data-theme="dark"] .coffer__deposit { background: var(--forest); color: #1f1c17; }
[data-theme="dark"] .coffer__withdraw { color: #e36b78; border-color: #c8313e; }

.coffer__split {
  margin-top: 0.7rem;
  padding-top: 0.8rem;
  border-top: 1px dotted var(--p-3);
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.coffer__split-label {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-soft);
  font-size: 0.95rem;
}
.coffer__split-input {
  width: 60px;
  padding: 0.4rem 0.5rem;
  background: var(--p-1);
  border: 1px solid var(--p-3);
  font-family: var(--display);
  text-align: center;
  color: var(--ink);
}
.coffer__split-input:focus { outline: none; border-color: var(--gold); }
.coffer__split-result {
  flex: 1;
  font-family: var(--rubric);
  font-style: italic;
  color: var(--gold-d);
  font-size: 0.92rem;
}
[data-theme="dark"] .coffer__split-result { color: var(--gold-l); }

.coffer__ledger {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1.1rem 1.2rem;
}
.coffer__ledger-head {
  font-family: var(--display);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 0.72rem;
  color: var(--ink-faded);
  margin-bottom: 0.7rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px dotted var(--p-3);
}
.coffer__ledger-row {
  display: grid;
  grid-template-columns: 5rem 1fr auto;
  gap: 0.7rem;
  padding: 0.5rem 0.2rem;
  border-bottom: 1px dotted var(--p-3);
  align-items: baseline;
}
.coffer__ledger-row:last-child { border-bottom: none; }
.coffer__ledger-time {
  font-family: var(--display);
  font-size: 0.66rem;
  letter-spacing: 0.12em;
  color: var(--ink-faded);
}
.coffer__ledger-note {
  font-family: var(--rubric);
  font-size: 0.92rem;
  color: var(--ink-soft);
  font-style: italic;
}
.coffer__ledger-amt {
  font-family: var(--display);
  font-size: 0.85rem;
  font-weight: 600;
  text-align: right;
  white-space: nowrap;
}
.coffer__ledger-amt--gain { color: var(--forest); }
.coffer__ledger-amt--loss { color: var(--wine); }
[data-theme="dark"] .coffer__ledger-amt--gain { color: #5fa274; }
[data-theme="dark"] .coffer__ledger-amt--loss { color: #e36b78; }
.coffer__empty {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  text-align: center;
  padding: 0.5rem 0;
}

/* ----- MODULE: THREATS (Clocks) --------------------------------------- */
.threats__head {
  margin-bottom: 1.25rem;
  padding-bottom: 0.75rem;
  border-bottom: var(--rule);
  display: flex; gap: 0.5rem; flex-wrap: wrap;
  align-items: center; justify-content: space-between;
}
.threats__count { font-family: var(--rubric); font-style: italic; color: var(--ink-faded); font-size: 0.95rem; }
.threats__grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 1rem;
}

.threat-card {
  --accent: var(--wine);
  --accent-d: var(--wine-d);
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1rem 1.1rem;
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 1rem;
  align-items: start;
  position: relative;
}
.threat-card--complete {
  border-color: var(--gold);
  box-shadow: 0 0 0 1px var(--gold-d), inset 0 0 24px rgba(184,146,58,0.10);
}
.threat-card__clock {
  width: 110px; height: 110px;
  user-select: none;
}
.threat-card__clock svg { width: 100%; height: 100%; display: block; }
.threat-card__body { display: flex; flex-direction: column; min-width: 0; }
.threat-card__name {
  font-family: var(--display);
  font-size: 1.05rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 0.25rem;
}
.threat-card--complete .threat-card__name::after {
  content: " \2740";
  color: var(--gold);
  margin-left: 0.3rem;
}
.threat-card__desc {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.95rem;
  line-height: 1.4;
  color: var(--ink-soft);
  margin-bottom: 0.4rem;
}
.threat-card__faction {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  font-family: var(--display);
  font-size: 0.68rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-faded);
  margin-bottom: 0.5rem;
  cursor: pointer;
  align-self: flex-start;
  background: transparent;
  border: none;
  padding: 0;
}
.threat-card__faction:hover { color: var(--ink); }
.threat-card__faction-sigil {
  display: inline-flex;
  align-items: center; justify-content: center;
  width: 22px; height: 22px;
  background: var(--p-2);
  border: 1px solid var(--accent2, var(--p-3));
  color: var(--accent2, var(--ink-soft));
  font-size: 0.85rem;
}
.threat-card__controls {
  display: flex; align-items: center; gap: 0.4rem;
  margin-top: auto;
  padding-top: 0.6rem;
}
.threat-card__fill {
  font-family: var(--display);
  font-size: 1.05rem;
  letter-spacing: 0.1em;
  color: var(--ink);
  flex: 1;
  text-align: center;
}
.threat-card--complete .threat-card__fill {
  color: var(--gold-d);
  font-style: italic;
  font-family: var(--rubric);
  text-transform: lowercase;
  letter-spacing: 0;
}
.threat-card__actions {
  display: flex; gap: 0.4rem;
  margin-top: 0.5rem;
  padding-top: 0.5rem;
  border-top: 1px dashed var(--p-3);
}

/* clock SVG slice styling */
.clock__rim {
  stroke: var(--ink-soft);
  stroke-width: 2;
  fill: var(--p-1);
}
.threat-card--complete .clock__rim { stroke: var(--gold); stroke-width: 2.5; }
.clock__slice {
  stroke: var(--ink-soft);
  stroke-width: 1;
  cursor: pointer;
  transition: filter 0.12s;
}
.clock__slice--empty { fill: var(--p-1); }
.clock__slice--filled { fill: var(--accent, var(--wine)); }
.clock__slice:hover { filter: brightness(1.15); stroke: var(--gold); stroke-width: 1.5; }
.threat-card--complete .clock__slice--filled { fill: var(--gold); }
.clock__center { fill: var(--ink); }
.threat-card--complete .clock__center { fill: var(--gold-d); }

/* segment count picker in the form modal */
.seg-picker { display: flex; gap: 0.3rem; flex-wrap: wrap; }
.seg-picker button {
  width: 46px; height: 38px;
  background: var(--p-0);
  border: 1px solid var(--p-3);
  font-family: var(--display);
  font-size: 0.95rem;
  color: var(--ink-soft);
  cursor: pointer;
}
.seg-picker button:hover { background: rgba(184,146,58,0.15); }
.seg-picker button.is-selected {
  background: var(--ink);
  color: var(--p-0);
  border-color: var(--ink);
}

/* ----- POLISH II: SEARCH HITS, TOOLTIPS, MATRIX, DRAG ----------------- */

/* archive sidebar search highlights and excerpts */
.archive__hit { background: rgba(184,146,58,0.40); color: var(--ink); padding: 0 1px; }
.archive__entry-name { display: block; }
.archive__entry-excerpt {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.8rem;
  color: var(--ink-faded);
  line-height: 1.35;
  margin-top: 0.15rem;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* wikilink hover preview */
.wikilink-tooltip {
  position: fixed;
  z-index: 200;
  background: var(--p-0);
  border: 1px solid var(--ink-soft);
  box-shadow: var(--shadow-folio);
  padding: 0.7rem 0.95rem;
  max-width: 320px;
  pointer-events: none;
  font-size: 0.92rem;
  animation: tipIn 0.12s ease-out;
}
@keyframes tipIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
.wikilink-tooltip__title {
  font-family: var(--display);
  font-size: 0.78rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 0.25rem;
  display: flex; align-items: center; flex-wrap: wrap; gap: 0.3rem;
}
.wikilink-tooltip__body {
  font-family: var(--rubric);
  color: var(--ink-soft);
  line-height: 1.4;
}
.wikilink-tooltip__type {
  font-family: var(--display);
  font-size: 0.6rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 0.05rem 0.45rem;
  background: rgba(184,146,58,0.18);
  border: 1px solid rgba(184,146,58,0.45);
  color: var(--ink-soft);
}
.wikilink-tooltip__type--npc {
  background: rgba(45,74,53,0.15);
  border-color: rgba(45,74,53,0.45);
  color: var(--forest);
}
.wikilink-tooltip__type--missing {
  background: rgba(92,31,36,0.1);
  border-color: rgba(92,31,36,0.35);
  color: var(--wine);
}
.wikilink-tooltip__type--atlas {
  background: rgba(184,146,58,0.20);
  border-color: rgba(184,146,58,0.55);
  color: var(--gold-d);
}
[data-theme="dark"] .wikilink-tooltip__type--atlas { color: var(--gold-l); }

/* faction matrix view */
.factions__toggle { display: inline-flex; }
.factions__toggle-btn {
  font-family: var(--display);
  font-size: 0.7rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 0.45rem 0.9rem;
  background: var(--p-0);
  border: 1px solid var(--ink-soft);
  color: var(--ink-soft);
  cursor: pointer;
}
.factions__toggle-btn:first-child { border-right: none; }
.factions__toggle-btn.is-active { background: var(--ink); color: var(--p-0); border-color: var(--ink); }

.matrix-wrap {
  overflow-x: auto;
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 0.5rem;
}
.matrix { border-collapse: collapse; margin: 0 auto; }
.matrix th, .matrix td { border: 1px solid var(--p-3); padding: 0; }
.matrix__corner { background: var(--p-2); padding: 0.5rem; min-width: 80px; }
.matrix__col-head {
  background: var(--p-1);
  padding: 0.55rem 0.3rem 0.4rem;
  text-align: center;
  font-family: var(--display);
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-soft);
  width: 60px;
  min-width: 60px;
}
.matrix__col-head-sigil {
  display: block;
  font-size: 1.35rem;
  margin-bottom: 0.2rem;
  color: var(--accent, var(--ink-soft));
}
.matrix__row-head {
  background: var(--p-1);
  padding: 0.5rem 0.85rem;
  text-align: left;
  white-space: nowrap;
  font-family: var(--display);
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
}
.matrix__row-head-sigil {
  display: inline-block;
  margin-right: 0.55rem;
  color: var(--accent, var(--ink-soft));
  font-size: 1.05rem;
  vertical-align: -2px;
}
.matrix__cell {
  width: 60px; height: 60px;
  text-align: center;
  cursor: pointer;
  font-family: var(--display);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--ink);
  vertical-align: middle;
  transition: box-shadow 0.1s;
}
.matrix__cell:hover { box-shadow: inset 0 0 0 2px var(--gold); }
.matrix__cell--self {
  background: var(--p-2);
  cursor: default;
  color: var(--ink-whisper);
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.85rem;
  font-weight: 400;
}
.matrix__cell--self:hover { box-shadow: none; }

.matrix__editor {
  position: fixed;
  z-index: 60;
  background: var(--p-0);
  border: 1px solid var(--ink-soft);
  box-shadow: var(--shadow-folio);
  padding: 0.7rem 0.9rem;
  font-family: var(--serif);
  min-width: 200px;
}
.matrix__editor-title {
  font-family: var(--display);
  font-size: 0.68rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 0.4rem;
}
.matrix__editor-label {
  font-family: var(--display);
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  color: var(--ink);
  margin-bottom: 0.55rem;
}
.matrix__editor-buttons { display: flex; gap: 0.3rem; }

/* lists drag-to-reorder */
.lists__row {
  grid-template-columns: 22px 56px 1fr 1fr 90px auto;
}
.lists--big .lists__row {
  grid-template-columns: 90px 1fr 1fr 110px;
}
.lists__grip {
  display: flex; align-items: center; justify-content: center;
  cursor: grab;
  color: var(--ink-faded);
  user-select: none;
}
.lists__grip svg { width: 8px; height: 14px; opacity: 0.55; transition: opacity 0.12s; }
.lists__grip:hover svg { opacity: 1; }
.lists__grip:active { cursor: grabbing; }
.lists__row--dragging { opacity: 0.42; }
.lists__row--drop-top { box-shadow: inset 0 3px 0 var(--wine); }
.lists__row--drop-bot { box-shadow: inset 0 -3px 0 var(--wine); }
.lists--big .lists__grip { display: none; }

/* ----- SCROLLBAR ------------------------------------------------------- */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--p-1); }
::-webkit-scrollbar-thumb { background: var(--p-3); border: 2px solid var(--p-1); }
::-webkit-scrollbar-thumb:hover { background: var(--p-4); }

/* ----- RESPONSIVE ------------------------------------------------------ */
@media (max-width: 720px) {
  .app { grid-template-columns: 1fr; }
  .nav {
    border-right: none;
    border-bottom: var(--rule-bold);
    max-height: 220px;
  }
  .main { padding: 1.25rem; }
  .folio__title { font-size: 1.5rem; }

  /* banner: tighten and let chip wrap below crest if needed */
  .banner { padding: 0.7rem 0.9rem; flex-wrap: wrap; gap: 0.5rem; }
  .banner__crest svg { width: 34px; height: 34px; }
  .banner__title { font-size: 1.05rem; letter-spacing: 0.14em; }
  .banner__subtitle { display: none; }
  .campaign-chip { font-size: 0.88rem; padding: 0.35rem 0.6rem; }
  .campaign-chip__name { max-width: 140px; }
  .campaign-menu { min-width: 220px; right: -0.5rem; }

  /* tavern: ease padding so the parchment isn't crushed */
  .tavern__parchment { padding: 1.5rem 1.25rem 1.75rem; }
  .tavern__name { font-size: 1.7rem; letter-spacing: 0.08em; }
  .tavern__atmosphere { font-size: 1.05rem; padding: 0; }

  /* faction relation row: stack the controls under the name on mobile */
  .faction-relation { grid-template-columns: 28px 1fr auto auto; }
  .faction-relation__label-stack { min-width: 0; }
}

/* ====================================================================
   PRINT STYLESHEET
   Strips the app chrome (banner, nav, theme toggle, search, modals,
   tooltips, action buttons) and lays out the current room for
   letter-paper printing. Each room is tuned to print the artifact it
   produces: the Scriptorium prints the handout, the Almanac prints the
   calendar, the Watch prints the session summary, the Cabinet prints
   the inventory, etc. Forces the light palette so dark mode does not
   waste ink. Cards avoid breaking across pages where possible.
   ==================================================================== */
@media print {
  @page {
    size: letter portrait;
    margin: 0.5in;
  }

  /* force light palette in print regardless of UI theme */
  :root {
    --p-0: #ffffff !important;
    --p-1: #ffffff !important;
    --p-2: #f5f1e8 !important;
    --p-3: #b8a583 !important;
    --p-4: #8a7a55 !important;
    --ink: #1a1612 !important;
    --ink-soft: #3a2f24 !important;
    --ink-faded: #6b5d4a !important;
    --ink-whisper: #b0a290 !important;
    --wine: #5c1f24 !important;
    --wine-d: #3d1418 !important;
    --forest: #2d4a35 !important;
    --forest-d: #1c2f22 !important;
    --gold: #b8923a !important;
    --gold-l: #d4a849 !important;
    --gold-d: #8a6c25 !important;
    --indigo: #2a2848 !important;
  }

  body {
    background: white !important;
    background-image: none !important;
    color: black;
    font-size: 11pt;
    line-height: 1.45;
  }

  /* SHELL: hide app-level chrome */
  .banner, .nav, #nav,
  .modal-overlay, .search-overlay,
  .wikilink-tooltip, .matrix__editor {
    display: none !important;
  }

  /* LAYOUT: expand the folio to fill the page */
  .layout {
    display: block !important;
    width: 100% !important;
    max-width: none !important;
    padding: 0 !important;
    margin: 0 !important;
  }
  #folio, .folio {
    display: block !important;
    width: 100% !important;
    padding: 0 !important;
    border: none !important;
    box-shadow: none !important;
    background: white !important;
  }
  .folio__head {
    border-bottom: 1px solid var(--ink-soft);
    padding-bottom: 0.5rem;
    margin-bottom: 0.85rem;
  }
  .folio__title { font-size: 18pt; margin: 0; }
  .folio__sub { font-style: italic; font-size: 10pt; }
  .folio__actions, #folio-actions { display: none !important; }

  /* CARDS: do not break across pages */
  .card, .faction-card, .threat-card, .cabinet-card, .fellowship-card,
  .wayfarer-card, .roll__card, .watch__section, .augury__card,
  .archive__entry, .tavern__parchment {
    break-inside: avoid;
    page-break-inside: avoid;
  }

  /* ACTION CONTAINERS: hide everything that is only useful interactively */
  .lists__add, .lists__actions,
  .cabinet-card__actions, .cabinet__filters,
  .threat-card__actions, .threat-card__controls,
  .faction-card__actions, .faction-card__expand,
  .faction-card__gauge-controls, .faction-card__threat-chip,
  .fellowship-card__actions, .fellowship-card__speak,
  .fellowship-card__bond-controls, .fellowship-card__quote-actions,
  .wayfarer-card__actions,

<script>
/* =========================================================================
   THE KEEP - APPLICATION
   ========================================================================= */

/* ----- 1. STORAGE ADAPTER ---------------------------------------------- */
/* Keys are namespaced under "keep:". Within that, per-campaign data lives
   under "keep:c:{campaignId}:{key}", while global data (campaign list,
   active campaign pointer) lives under "keep:{key}" without the "c:" hop.
   Modules use Vault.get / Vault.set (auto-prefixed by the active campaign).
   App-level code that crosses campaigns uses Vault.global.* and Vault.raw.* */
const Vault = (() => {
  const hasWindowStorage = typeof window !== 'undefined' && typeof window.storage !== 'undefined';
  const NS = 'keep:';
  let activeCampaign = null;

  function campaignKey(k) {
    if (activeCampaign) return NS + 'c:' + activeCampaign + ':' + k;
    return NS + k; // fallback (before campaign init)
  }
  function globalKey(k) { return NS + k; }

  async function rawGet(fullK) {
    if (hasWindowStorage) {
      try { const r = await window.storage.get(fullK); return r ? JSON.parse(r.value) : null; }
      catch { return null; }
    }
    try { const v = localStorage.getItem(fullK); return v ? JSON.parse(v) : null; }
    catch { return null; }
  }
  async function rawSet(fullK, value) {
    const s = JSON.stringify(value);
    if (hasWindowStorage) { try { await window.storage.set(fullK, s); return true; } catch { return false; } }
    try { localStorage.setItem(fullK, s); return true; } catch { return false; }
  }
  async function rawList(fullPrefix) {
    if (hasWindowStorage) {
      try { const r = await window.storage.list(fullPrefix); return (r ? r.keys : []); }
      catch { return []; }
    }
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(fullPrefix)) keys.push(k);
    }
    return keys;
  }
  async function rawDelete(fullK) {
    if (hasWindowStorage) { try { await window.storage.delete(fullK); return true; } catch { return false; } }
    try { localStorage.removeItem(fullK); return true; } catch { return false; }
  }

  return {
    // per-campaign API (transparent to modules)
    async get(key) { return rawGet(campaignKey(key)); },
    async set(key, value) { return rawSet(campaignKey(key), value); },
    async list(prefix = '') {
      const full = campaignKey(prefix);
      const stripPrefix = activeCampaign ? NS + 'c:' + activeCampaign + ':' : NS;
      const keys = await rawList(full);
      return keys.map(k => k.replace(stripPrefix, ''));
    },
    async remove(key) { return rawDelete(campaignKey(key)); },

    // cross-campaign global subspace
    global: {
      async get(key) { return rawGet(globalKey(key)); },
      async set(key, value) { return rawSet(globalKey(key), value); },
      async list(prefix = '') {
        const keys = await rawList(NS + prefix);
        return keys.filter(k => !k.startsWith(NS + 'c:')).map(k => k.replace(NS, ''));
      },
      async remove(key) { return rawDelete(globalKey(key)); }
    },

    // raw passthrough for migration & campaign management
    raw: { get: rawGet, set: rawSet, list: rawList, delete: rawDelete, NS },

    setActiveCampaign(id) { activeCampaign = id; },
    getActiveCampaign() { return activeCampaign; }
  };
})();

/* ----- 1b. CAMPAIGN MANAGEMENT ----------------------------------------- */
const Campaigns = (() => {
  const PREFIX = Vault.raw.NS + 'c:';
  const LEGACY_KEYS = [
    'forge-state','oracle-history',
    'almanac-calendar','almanac-view','almanac-notes',
    'archive-entries','archive-current',
    'faces-roster','lists-state','last-module'
  ];

  async function list() { return (await Vault.global.get('campaigns')) || []; }
  async function save(arr) { return Vault.global.set('campaigns', arr); }

  async function migrate() {
    const active = await Vault.global.get('active-campaign');
    if (active) {
      // ensure it still exists in the campaigns list
      const all = await list();
      if (all.find(c => c.id === active)) return active;
      if (all.length) { await Vault.global.set('active-campaign', all[0].id); return all[0].id; }
    }
    // detect legacy unprefixed data
    let hasLegacy = false;
    const legacy = {};
    for (const k of LEGACY_KEYS) {
      const v = await Vault.raw.get(Vault.raw.NS + k);
      if (v != null) { hasLegacy = true; legacy[k] = v; }
    }
    const id = U.uid();
    const name = hasLegacy ? 'The First Chronicle' : 'A New Chronicle';
    if (hasLegacy) {
      for (const [k, v] of Object.entries(legacy)) {
        await Vault.raw.set(PREFIX + id + ':' + k, v);
        await Vault.raw.delete(Vault.raw.NS + k);
      }
    }
    const all = (await list());
    all.push({ id, name, created: Date.now(), updated: Date.now() });
    await save(all);
    await Vault.global.set('active-campaign', id);
    return id;
  }

  async function create(name) {
    const id = U.uid();
    const all = await list();
    all.push({ id, name: name || 'A New Chronicle', created: Date.now(), updated: Date.now() });
    await save(all);
    return id;
  }
  async function rename(id, name) {
    const all = await list();
    const c = all.find(x => x.id === id); if (!c) return;
    c.name = name; c.updated = Date.now();
    await save(all);
  }
  async function remove(id) {
    const all = await list();
    if (all.length <= 1) throw new Error('At least one chronicle must remain.');
    const keys = await Vault.raw.list(PREFIX + id + ':');
    for (const k of keys) await Vault.raw.delete(k);
    const next = all.filter(c => c.id !== id);
    await save(next);
    if ((await Vault.global.get('active-campaign')) === id) {
      await Vault.global.set('active-campaign', next[0].id);
      Vault.setActiveCampaign(next[0].id);
    }
  }
  async function exportOne(id) {
    const all = await list();
    const meta = all.find(c => c.id === id);
    if (!meta) return null;
    const prefix = PREFIX + id + ':';
    const keys = await Vault.raw.list(prefix);
    const data = {};
    for (const k of keys) data[k.replace(prefix, '')] = await Vault.raw.get(k);
    return {
      keep: 'campaign-export', version: 1,
      meta: { name: meta.name, created: meta.created, exported: Date.now() },
      data
    };
  }
  async function importOne(json) {
    if (!json || json.keep !== 'campaign-export') throw new Error('Not a Keep export.');
    const id = U.uid();
    const meta = json.meta || { name: 'Imported' };
    const all = await list();
    all.push({ id, name: meta.name + ' (imported)', created: Date.now(), updated: Date.now() });
    await save(all);
    const prefix = PREFIX + id + ':';
    for (const [k, v] of Object.entries(json.data || {})) {
      await Vault.raw.set(prefix + k, v);
    }
    return id;
  }
  async function size(id) {
    const prefix = PREFIX + id + ':';
    const keys = await Vault.raw.list(prefix);
    return keys.length;
  }

  /* Full keep backup: every chronicle, the chronicles list ordering, and the
     active-campaign pointer, in a single JSON blob with stable IDs. */
  async function backupAll() {
    const all = await list();
    const out = {
      keep: 'keep-backup',
      version: 1,
      app: 'The Keep',
      exported: Date.now(),
      active: await Vault.global.get('active-campaign'),
      campaigns: []
    };
    for (const c of all) {
      const prefix = PREFIX + c.id + ':';
      const keys = await Vault.raw.list(prefix);
      const data = {};
      for (const k of keys) data[k.replace(prefix, '')] = await Vault.raw.get(k);
      out.campaigns.push({
        id: c.id, name: c.name, created: c.created, updated: c.updated || Date.now(),
        data
      });
    }
    return out;
  }

  /* Destructive restore: wipe every existing chronicle's data and the
     chronicles list, then write the backup's chronicles preserving their
     IDs and active pointer. Used only for keep-backup format. */
  async function restoreReplace(backup) {
    if (!backup || backup.keep !== 'keep-backup') throw new Error('Not a keep backup.');
    if (!Array.isArray(backup.campaigns) || !backup.campaigns.length) throw new Error('Backup contains no chronicles.');

    // wipe existing per-campaign data
    const existing = await list();
    for (const c of existing) {
      const keys = await Vault.raw.list(PREFIX + c.id + ':');
      for (const k of keys) await Vault.raw.delete(k);
    }

    // write restored chronicles with original IDs
    const restored = [];
    for (const c of backup.campaigns) {
      const id = c.id || U.uid();
      restored.push({
        id,
        name: c.name || 'Restored',
        created: c.created || Date.now(),
        updated: c.updated || Date.now()
      });
      const prefix = PREFIX + id + ':';
      for (const [k, v] of Object.entries(c.data || {})) {
        await Vault.raw.set(prefix + k, v);
      }
    }
    await save(restored);

    // restore active pointer (or fall back to first)
    const validActive = backup.active && restored.find(c => c.id === backup.active);
    const activeId = validActive ? backup.active : restored[0].id;
    await Vault.global.set('active-campaign', activeId);
    Vault.setActiveCampaign(activeId);
    return activeId;
  }

  /* Format-detecting non-destructive merge. Handles all three formats:
     keep-backup, keep-export (old all-export), and campaign-export (single). */
  async function restoreMerge(backup) {
    if (!backup || typeof backup !== 'object') throw new Error('Not a Keep file.');
    if (backup.keep === 'keep-backup' && Array.isArray(backup.campaigns)) {
      let n = 0;
      for (const c of backup.campaigns) {
        await importOne({
          keep: 'campaign-export', version: 1,
          meta: { name: c.name, created: c.created },
          data: c.data || {}
        });
        n++;
      }
      return { count: n };
    }
    if (backup.keep === 'keep-export' && Array.isArray(backup.chronicles)) {
      let n = 0;
      for (const c of backup.chronicles) { await importOne(c); n++; }
      return { count: n };
    }
    if (backup.keep === 'campaign-export') {
      await importOne(backup);
      return { count: 1 };
    }
    throw new Error('Unrecognised Keep file (expected keep-backup, keep-export, or campaign-export).');
  }

  function detectFormat(json) {
    if (!json || typeof json !== 'object') return null;
    if (json.keep === 'keep-backup') return 'backup';
    if (json.keep === 'keep-export') return 'export-all';
    if (json.keep === 'campaign-export') return 'single';
    return null;
  }

  return { list, migrate, create, rename, remove, exportOne, importOne, size,
           backupAll, restoreReplace, restoreMerge, detectFormat };
})();

const DEFAULT_CALENDAR = {
  months: ['Frostmoon','Hearthwane','Greentide','Bloomfall','Highsun','Sunwarding','Goldfall','Lateharvest','Mistmonth','Hollowing','Longnight','Yulewake'],
  daysPerMonth: 30,

};

/* ----- 2. UTILITIES ---------------------------------------------------- */
const U = {
  el(tag, attrs = {}, children = []) {
    const e = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'class') e.className = v;
      else if (k === 'style') Object.assign(e.style, v);
      else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
      else if (k === 'html') e.innerHTML = v;
      else if (v !== false && v != null) e.setAttribute(k, v);
    }
    for (const c of [].concat(children)) {
      if (c == null || c === false) continue;
      e.append(c.nodeType ? c : document.createTextNode(c));
    }
    return e;
  },
  pick(arr, rng = Math.random) { return arr[Math.floor(rng() * arr.length)]; },
  pickN(arr, n, rng = Math.random) {
    const copy = [...arr]; const out = [];
    for (let i = 0; i < n && copy.length; i++) {
      const j = Math.floor(rng() * copy.length);
      out.push(copy.splice(j, 1)[0]);
    }
    return out;
  },
  randInt(a, b, rng = Math.random) { return Math.floor(rng() * (b - a + 1)) + a; },
  // mulberry32 seeded RNG
  seededRng(seed) {
    let s = seed >>> 0;
    return () => {
      s = (s + 0x6D2B79F5) >>> 0;
      let t = s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  },
  hash(s) {
    let h = 2166136261;
    for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
    return h >>> 0;
  },
  uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); },
  ornament(c = '\u2767') { return U.el('span', { class: 'divider__ornament' }, c); },
  divider(c) { return U.el('div', { class: 'divider' }, [U.ornament(c)]); },
  glyph(id) {
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 24 24');
    const use = document.createElementNS(ns, 'use');
    use.setAttribute('href', '#' + id);
    svg.appendChild(use);
    return svg;
  },
  toast(msg) {
    const t = U.el('div', {
      class: 'tag',
      style: {
        position: 'fixed', bottom: '1.5rem', left: '50%', transform: 'translateX(-50%)',
        background: 'var(--ink)', color: 'var(--p-0)', padding: '0.6rem 1.2rem',
        zIndex: 999, fontSize: '0.8rem', opacity: '0', transition: 'opacity 0.2s'
      }
    }, msg);
    document.body.appendChild(t);
    requestAnimationFrame(() => t.style.opacity = '1');
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 250); }, 1800);
  }
};
