<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Keep &middot; A Gamesmaster's Workshop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

<style>
/* =========================================================================
   THE KEEP
   A single-file, modular companion for tabletop fantasy play.
   License: GPL-3.0
   ========================================================================= */

/* ----- DESIGN TOKENS --------------------------------------------------- */
:root {
  /* parchment palette */
  --p-0: #faf2dd;
  --p-1: #f4e8d0;
  --p-2: #e8d9b8;
  --p-3: #d4c4a0;
  --p-4: #b8a583;

  /* ink */
  --ink:        #1a1612;
  --ink-soft:   #3a2f24;
  --ink-faded:  #6b5d4a;
  --ink-whisper:#8c7d66;

  /* heraldic accents */
  --wine:   #5c1f24;
  --wine-d: #3d1418;
  --forest: #2d4a35;
  --forest-d:#1c2f22;
  --gold:   #b8923a;
  --gold-l: #d4a849;
  --gold-d: #8a6c25;
  --indigo: #2a2848;

  /* relation tints (used as rgba components by the faction matrix) */
  --rel-neg-rgb: 92, 31, 36;
  --rel-pos-rgb: 45, 74, 53;
  --rel-zero-rgb: 212, 196, 160;

  /* type */
  --display:    'Cinzel', 'Trajan Pro', serif;
  --serif:      'EB Garamond', Georgia, 'Times New Roman', serif;
  --rubric:     'IM Fell English', 'EB Garamond', serif;
  --fraktur:    'UnifrakturMaguntia', serif;
  --mono:       ui-monospace, 'SF Mono', Menlo, monospace;

  /* metrics */
  --gutter: 1.5rem;
  --rule: 1px solid var(--ink-whisper);
  --rule-bold: 2px solid var(--ink-soft);
  --shadow-folio: 0 2px 0 rgba(58,47,36,0.06), 0 8px 24px rgba(58,47,36,0.12);
  --shadow-card: 0 1px 0 rgba(58,47,36,0.05), 0 4px 16px rgba(58,47,36,0.08);
}

/* ----- DARK THEME: Cult of Shadow ------------------------------------- */
/* For those who play as forces of darkness. The semantic meaning of every
   variable stays identical; only the values change. Cards stay lighter than
   bg (elevation reads correctly), and accents brighten so they catch the
   candlelight. Toggle persists globally under keep:theme. */
[data-theme="dark"] {
  --p-0: #1f1c17;
  --p-1: #14110d;
  --p-2: #2a261e;
  --p-3: #3a3325;
  --p-4: #574d3a;

  --ink:         #ede4d0;
  --ink-soft:    #c4baa3;
  --ink-faded:   #8a8270;
  --ink-whisper: #5d5648;

  --wine:   #c8313e;
  --wine-d: #8a1820;
  --forest: #5fa274;
  --forest-d: #3a7050;
  --gold:   #d4a849;
  --gold-l: #e8c060;
  --gold-d: #a07820;
  --indigo: #7167d9;

  --rel-neg-rgb: 200, 49, 64;
  --rel-pos-rgb: 95, 162, 116;
  --rel-zero-rgb: 80, 70, 55;

  --rule: 1px solid var(--ink-whisper);
  --rule-bold: 2px solid var(--ink-soft);
  --shadow-folio: 0 2px 0 rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.5);
  --shadow-card: 0 1px 0 rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.35);
}

[data-theme="dark"] body {
  background-color: var(--p-1);
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(212,168,73,0.05), transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(200,49,64,0.05), transparent 55%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.85 0 0 0 0 0.78 0 0 0 0 0.62 0 0 0 0.07 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  background-blend-mode: normal;
}

[data-theme="dark"] .banner {
  background: linear-gradient(180deg, var(--p-0), var(--p-1));
}

/* Tavern parchment: in dark mode, the notice is dark stained vellum or
   black-leather binding instead of light parchment. Still document-like. */
[data-theme="dark"] .tavern__parchment {
  background:
    radial-gradient(ellipse at 30% 10%, rgba(212,168,73,0.09), transparent 55%),
    radial-gradient(ellipse at 70% 90%, rgba(200,49,64,0.07), transparent 60%),
    linear-gradient(180deg, #2a241c, #1e1812);
  box-shadow:
    inset 0 0 0 1px rgba(237,228,208,0.06),
    inset 0 0 60px rgba(0,0,0,0.5),
    0 2px 0 rgba(0,0,0,0.4),
    0 12px 32px rgba(0,0,0,0.5);
}
[data-theme="dark"] .tavern__parchment::before {
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence baseFrequency='0.72' numOctaves='2' seed='9'/><feColorMatrix values='0 0 0 0 0.85 0 0 0 0 0.78 0 0 0 0 0.62 0 0 0 0.10 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  mix-blend-mode: normal;
  opacity: 0.5;
}

/* Almanac moon swatch: keep "dark disc with light side" metaphor in both themes */
[data-theme="dark"] .almanac__moon { background: #3a3325; }
[data-theme="dark"] .almanac__moon-light { background: #e8e0c0; }

/* Things that use --p-0 as TEXT on a non-theme background need their text
   to stay light in dark mode. The wine and forest fill colours brighten,
   but text on top needs to stay parchment-cream. */
[data-theme="dark"] .btn--primary,
[data-theme="dark"] .btn--primary:hover,
[data-theme="dark"] .augury__card,
[data-theme="dark"] .lists__cond:hover {
  color: var(--ink);
}

[data-theme="dark"] .archive__hit {
  background: rgba(232,192,96,0.30);
  color: var(--ink);
}

/* Gauge: the parchment-to-forest gradient needs a touch more saturation
   on the dark surface to read. */
[data-theme="dark"] .gauge {
  background: linear-gradient(90deg,
    rgba(200,49,64,0.40) 0%, rgba(200,49,64,0.22) 35%,
    rgba(212,168,73,0.18) 50%,
    rgba(95,162,116,0.22) 65%, rgba(95,162,116,0.42) 100%);
}

/* Theme toggle button in banner */
.banner__right {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.theme-toggle, .banner-icon {
  width: 38px; height: 38px;
  background: var(--p-2);
  border: 1px solid var(--p-3);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--ink-soft);
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  padding: 0;
}
.theme-toggle:hover, .banner-icon:hover {
  background: rgba(184,146,58,0.18);
  border-color: var(--gold-d);
  color: var(--ink);
}
.theme-toggle svg, .banner-icon svg { width: 18px; height: 18px; }
@media (max-width: 720px) {
  .theme-toggle, .banner-icon { width: 32px; height: 32px; }
  .theme-toggle svg, .banner-icon svg { width: 16px; height: 16px; }
}

/* ----- UNIVERSAL SEARCH ----------------------------------------------- */
.search-overlay {
  align-items: flex-start;
  padding-top: 11vh;
}
.search-modal {
  background: var(--p-0);
  border: 1px solid var(--ink-soft);
  box-shadow: var(--shadow-folio);
  width: min(640px, 92%);
  max-height: 72vh;
  display: flex; flex-direction: column;
  position: relative;
  font-family: var(--serif);
}
.search-modal__input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: var(--rule-bold);
  padding: 1rem 1.25rem;
  font-family: var(--display);
  font-size: 1.05rem;
  letter-spacing: 0.06em;
  color: var(--ink);
  outline: none;
}
.search-modal__input::placeholder { color: var(--ink-faded); font-style: italic; }
.search-modal__results {
  flex: 1;
  overflow-y: auto;
  padding: 0.3rem 0;
}
.search-modal__group-head {
  font-family: var(--display);
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faded);
  padding: 0.85rem 1.25rem 0.3rem;
  border-bottom: 1px dotted var(--p-3);
  margin-top: 0.3rem;
  position: sticky; top: 0;
  background: var(--p-0);
  z-index: 1;
}
.search-modal__group-head:first-child { margin-top: 0; }
.search-modal__result {
  display: block;
  width: 100%;
  text-align: left;
  background: transparent;
  border: none;
  padding: 0.7rem 1.25rem;
  cursor: pointer;
  color: var(--ink);
  font-family: var(--serif);
  border-bottom: 1px solid transparent;
}
.search-modal__result:hover,
.search-modal__result.is-active {
  background: rgba(184,146,58,0.13);
  border-bottom-color: var(--p-3);
}
.search-modal__result-title {
  font-family: var(--rubric);
  font-size: 1.02rem;
  line-height: 1.3;
  color: var(--ink);
}
.search-modal__result-subtitle {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.82rem;
  color: var(--ink-faded);
  margin-top: 0.05rem;
}
.search-modal__result-snippet {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.85rem;
  color: var(--ink-soft);
  line-height: 1.4;
  margin-top: 0.25rem;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.search-modal__hit {
  background: rgba(184,146,58,0.40);
  color: var(--ink);
  padding: 0 1px;
}
[data-theme="dark"] .search-modal__hit { background: rgba(232,192,96,0.30); }
.search-modal__empty {
  padding: 2.2rem 1.25rem;
  text-align: center;
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
}
.search-modal__hint {
  border-top: 1px dotted var(--p-3);
  padding: 0.55rem 1.25rem;
  font-family: var(--display);
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faded);
  display: flex; gap: 1.2rem; flex-wrap: wrap;
}
.search-modal__hint kbd {
  background: var(--p-2);
  border: 1px solid var(--p-3);
  padding: 0.05rem 0.4rem;
  font-family: var(--mono);
  font-size: 0.92em;
  color: var(--ink-soft);
  margin-right: 0.25rem;
}

/* highlight flash for cross-module navigation (search results lighting up
   their target card in the destination module) */
.cabinet-card--highlight, .threat-card--highlight, .fellowship-card--highlight {
  animation: keepHighlight 2.2s ease-out;
}
@keyframes keepHighlight {
  0%   { box-shadow: 0 0 0 3px var(--gold), 0 0 24px 4px rgba(212,168,73,0.35); }
  60%  { box-shadow: 0 0 0 2px var(--gold-d), 0 0 12px 2px rgba(212,168,73,0.18); }
  100% { box-shadow: 0 0 0 0 transparent; }
}

/* ----- BASE ------------------------------------------------------------ */
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: var(--serif);
  font-size: 18px;
  line-height: 1.55;
  color: var(--ink);
  background: var(--p-1);
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(184,146,58,0.08), transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(92,31,36,0.07), transparent 55%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence baseFrequency='0.85' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.10 0 0 0 0 0.08 0 0 0 0 0.06 0 0 0 0.12 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  background-blend-mode: multiply, multiply, normal;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button { font-family: inherit; color: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; color: inherit; }
a { color: var(--wine); text-decoration: underline; text-decoration-thickness: 0.06em; text-underline-offset: 0.15em; }
a:hover { color: var(--wine-d); }

h1, h2, h3, h4 { font-family: var(--display); font-weight: 500; letter-spacing: 0.04em; line-height: 1.15; margin: 0 0 0.5em; }
h1 { font-size: 2rem; }
h2 { font-size: 1.4rem; }
h3 { font-size: 1.1rem; }
h4 { font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.16em; }

p { margin: 0 0 1em; }
small { font-size: 0.85em; color: var(--ink-faded); }

/* ----- APP SHELL ------------------------------------------------------- */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
}

.banner {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  border-bottom: var(--rule-bold);
  background: linear-gradient(180deg, var(--p-0), var(--p-1));
  position: sticky; top: 0; z-index: 10;
}
.banner__crest { display: flex; align-items: center; gap: 0.85rem; }
.banner__crest svg { width: 42px; height: 42px; }
.banner__title {
  font-family: var(--display);
  font-weight: 600;
  font-size: 1.45rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.banner__subtitle {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  font-size: 0.95rem;
  margin-top: -2px;
}
.banner__status {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  font-size: 0.9rem;
}

.nav {
  border-right: var(--rule-bold);
  padding: 1.25rem 1rem 2rem;
  background:
    linear-gradient(180deg, transparent, rgba(212,196,160,0.18)),
    var(--p-1);
  overflow-y: auto;
}
.nav__section { margin-bottom: 1.4rem; }
.nav__heading {
  font-family: var(--display);
  font-size: 0.72rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faded);
  padding: 0 0.5rem 0.45rem;
  border-bottom: var(--rule);
  margin-bottom: 0.4rem;
  display: flex; align-items: center; gap: 0.5rem;
}
.nav__heading::after {
  content: ""; flex: 1; border-top: 1px solid var(--ink-whisper); opacity: 0.5;
}
.nav__btn {
  display: flex; align-items: center; gap: 0.7rem;
  width: 100%;
  padding: 0.55rem 0.6rem;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 2px;
  text-align: left;
  font-family: var(--rubric);
  font-size: 1.05rem;
  color: var(--ink-soft);
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.nav__btn:hover {
  background: rgba(184,146,58,0.10);
  color: var(--ink);
}
.nav__btn--active {
  background: rgba(184,146,58,0.18);
  border-color: var(--gold-d);
  color: var(--ink);
}
.nav__btn--active .nav__glyph { color: var(--wine); }
.nav__glyph {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px;
  color: var(--ink-faded);
}
.nav__glyph svg { width: 22px; height: 22px; }

/* ----- MAIN ------------------------------------------------------------ */
.main {
  padding: 2rem 2.25rem 4rem;
  overflow-y: auto;
  max-width: 100%;
}
.folio {
  max-width: 1080px;
  margin: 0 auto;
}
.folio__head {
  border-bottom: var(--rule);
  padding-bottom: 1rem;
  margin-bottom: 1.5rem;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem;
  flex-wrap: wrap;
}
.folio__title {
  font-family: var(--display);
  font-weight: 600;
  font-size: 2.1rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin: 0;
}
.folio__sub {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  font-size: 1.05rem;
  margin-top: 0.25rem;
}
.folio__actions { display: flex; gap: 0.6rem; flex-wrap: wrap; }

/* ----- SHARED COMPONENTS ----------------------------------------------- */
.btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.55rem 1rem;
  background: var(--p-0);
  border: 1px solid var(--ink-soft);
  border-radius: 2px;
  font-family: var(--display);
  font-size: 0.8rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink);
  box-shadow: 0 1px 0 rgba(58,47,36,0.1);
  transition: transform 0.08s, background 0.15s, color 0.15s;
}
.btn:hover { background: var(--ink); color: var(--p-0); }
.btn:active { transform: translateY(1px); }
.btn--primary {
  background: var(--wine);
  border-color: var(--wine-d);
  color: var(--p-0);
}
.btn--primary:hover { background: var(--wine-d); color: var(--p-0); }
.btn--ghost {
  background: transparent;
  border-color: var(--ink-whisper);
  color: var(--ink-soft);
}
.btn--ghost:hover { background: var(--p-2); color: var(--ink); }
.btn--small { padding: 0.35rem 0.7rem; font-size: 0.7rem; }

.card {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  box-shadow: var(--shadow-card);
  padding: 1.25rem;
  position: relative;
}
.card__corner {
  position: absolute;
  width: 14px; height: 14px;
  border: 1.5px solid var(--ink-soft);
}
.card__corner--tl { top: 6px; left: 6px; border-right: none; border-bottom: none; }
.card__corner--tr { top: 6px; right: 6px; border-left: none; border-bottom: none; }
.card__corner--bl { bottom: 6px; left: 6px; border-right: none; border-top: none; }
.card__corner--br { bottom: 6px; right: 6px; border-left: none; border-top: none; }

.input, .textarea, .select {
  width: 100%;
  background: var(--p-0);
  border: 1px solid var(--p-3);
  border-radius: 0;
  padding: 0.55rem 0.7rem;
  font-family: var(--serif);
  font-size: 1rem;
  color: var(--ink);
}
.textarea { min-height: 140px; resize: vertical; line-height: 1.5; }
.input:focus, .textarea:focus, .select:focus {
  outline: none;
  border-color: var(--wine);
  box-shadow: 0 0 0 2px rgba(92,31,36,0.15);
}
.label {
  display: block;
  font-family: var(--display);
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faded);
  margin: 0 0 0.35rem;
}

.divider {
  display: flex; align-items: center; justify-content: center; gap: 0.8rem;
  margin: 1.5rem 0;
  color: var(--ink-faded);
}
.divider::before, .divider::after {
  content: ""; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--ink-whisper), transparent);
}
.divider__ornament { font-size: 1.2rem; }

.tag {
  display: inline-block;
  padding: 0.15rem 0.5rem;
  background: rgba(184,146,58,0.18);
  color: var(--ink-soft);
  font-family: var(--display);
  font-size: 0.65rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  border: 1px solid rgba(184,146,58,0.4);
}
.tag--wine { background: rgba(92,31,36,0.1); border-color: rgba(92,31,36,0.4); color: var(--wine); }
.tag--forest { background: rgba(45,74,53,0.12); border-color: rgba(45,74,53,0.45); color: var(--forest); }

.empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--ink-faded);
  font-family: var(--rubric);
  font-style: italic;
}
.empty__ornament { font-size: 2rem; margin-bottom: 0.5rem; color: var(--p-4); }

.kbd {
  display: inline-block;
  padding: 0.1rem 0.4rem;
  background: var(--p-2);
  border: 1px solid var(--p-3);
  border-bottom-width: 2px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 0.8em;
  color: var(--ink-soft);
}

/* drop cap */
.dropcap::first-letter {
  font-family: var(--display);
  font-weight: 600;
  font-size: 3.6em;
  float: left;
  line-height: 0.85;
  margin: 0.05em 0.08em 0 0;
  color: var(--wine);
}

/* ----- HOME ------------------------------------------------------------ */
.home__grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1rem;
  margin-top: 1.5rem;
}
.home__tile {
  display: flex; flex-direction: column; gap: 0.5rem;
  padding: 1.25rem 1.1rem;
  background: var(--p-0);
  border: 1px solid var(--p-3);
  cursor: pointer;
  transition: transform 0.1s, border-color 0.15s, background 0.15s;
  text-align: left;
  position: relative;
  overflow: hidden;
}
.home__tile:hover {
  background: var(--p-0);
  border-color: var(--gold-d);
  transform: translateY(-2px);
  box-shadow: var(--shadow-folio);
}
.home__tile-glyph {
  width: 48px; height: 48px;
  color: var(--wine);
  margin-bottom: 0.25rem;
}
.home__tile-name {
  font-family: var(--display);
  font-size: 1rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.home__tile-desc {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  font-size: 0.95rem;
  line-height: 1.4;
}

/* ----- MODULE: SCRIPTORIUM (Handout Forge) ----------------------------- */
.forge { display: grid; grid-template-columns: 320px 1fr; gap: 1.5rem; align-items: start; }
.forge__panel { display: flex; flex-direction: column; gap: 0.9rem; }
.forge__field { display: flex; flex-direction: column; gap: 0.3rem; }
.forge__preview {
  background: var(--p-2);
  padding: 1rem;
  display: flex; align-items: center; justify-content: center;
  min-height: 480px;
}
.forge__preview svg { max-width: 100%; height: auto; box-shadow: var(--shadow-folio); }
@media (max-width: 880px) { .forge { grid-template-columns: 1fr; } }

/* ----- MODULE: ORACLE -------------------------------------------------- */
.oracle { max-width: 720px; margin: 0 auto; }
.oracle__ask { display: flex; gap: 0.6rem; margin-bottom: 1.5rem; }
.oracle__ask input { flex: 1; }
.oracle__result {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 2rem 1.5rem;
  text-align: center;
  margin-bottom: 1.5rem;
  min-height: 200px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0.75rem;
  position: relative;
}
.oracle__verdict {
  font-family: var(--display);
  font-size: 2.4rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
.oracle__verdict--yes { color: var(--forest); }
.oracle__verdict--no  { color: var(--wine); }
.oracle__qualifier {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 1.2rem;
  color: var(--ink-soft);
}
.oracle__complication {
  margin-top: 0.5rem;
  padding-top: 1rem;
  border-top: 1px dashed var(--p-3);
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-soft);
}
.oracle__history {
  border-top: var(--rule);
  padding-top: 1rem;
}
.oracle__history-item {
  padding: 0.5rem 0;
  border-bottom: 1px dotted var(--p-3);
  display: flex; justify-content: space-between; gap: 1rem;
  font-size: 0.95rem;
}
.oracle__history-q { color: var(--ink-soft); flex: 1; }
.oracle__history-a { font-family: var(--display); font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase; }

/* ----- MODULE: AUGURY -------------------------------------------------- */
.augury__methods {
  display: flex; gap: 0.6rem; justify-content: center; margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.augury__output {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 2rem;
  position: relative;
  min-height: 320px;
}
.augury__title {
  text-align: center;
  font-family: var(--display);
  font-size: 1rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faded);
  margin-bottom: 1.25rem;
}
.augury__cards { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.augury__card {
  width: 160px;
  background: linear-gradient(180deg, var(--wine-d), var(--wine));
  color: var(--p-0);
  padding: 1rem 0.85rem;
  border: 2px solid var(--gold-d);
  position: relative;
  text-align: center;
}
.augury__card-name {
  font-family: var(--display);
  font-size: 0.85rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
  color: var(--gold-l);
}
.augury__card-glyph { font-size: 2.5rem; margin: 1rem 0; }
.augury__card-meaning {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.9rem;
  line-height: 1.35;
  margin-top: 0.5rem;
}
.augury__card-position {
  font-family: var(--display);
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-l);
  border-top: 1px solid var(--gold-d);
  padding-top: 0.5rem;
  margin-top: 0.5rem;
}
.augury__runes {
  display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;
  margin-bottom: 1rem;
}
.augury__rune {
  text-align: center;
  width: 110px;
}
.augury__rune-glyph {
  font-family: var(--fraktur);
  font-size: 4rem;
  color: var(--ink);
  background: var(--p-2);
  border: 1px solid var(--p-3);
  padding: 0.5rem;
  margin-bottom: 0.5rem;
  display: block;
}
.augury__rune-name { font-family: var(--display); font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase; }
.augury__rune-meaning { font-family: var(--rubric); font-style: italic; font-size: 0.85rem; color: var(--ink-faded); margin-top: 0.25rem; }
.augury__reading {
  margin-top: 1.5rem;
  padding-top: 1.5rem;
  border-top: 1px dashed var(--p-3);
  font-family: var(--rubric);
  font-style: italic;
  font-size: 1.15rem;
  line-height: 1.6;
  text-align: center;
  color: var(--ink-soft);
}

/* ----- MODULE: THE WATCH (Session Prep) ------------------------------- */
.watch {
  display: flex; flex-direction: column;
  gap: 1.1rem;
}
.watch__section {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1.1rem 1.2rem;
  position: relative;
}
.watch__today {
  background:
    radial-gradient(ellipse at 30% 0%, rgba(184,146,58,0.08), transparent 70%),
    var(--p-0);
  border: 1px solid var(--p-3);
  border-top: 3px solid var(--gold-d);
  padding: 1.3rem 1.4rem;
}
.watch__section-head {
  display: flex; align-items: baseline; gap: 0.7rem;
  font-family: var(--display);
  font-size: 0.66rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faded);
  margin-bottom: 0.7rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px dotted var(--p-3);
}
.watch__section-action {
  margin-left: auto;
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.85rem;
  letter-spacing: 0;
  text-transform: none;
  color: var(--wine);
  cursor: pointer;
  background: none; border: none; padding: 0;
}
.watch__section-action:hover { color: var(--wine-d); }
[data-theme="dark"] .watch__section-action { color: #e36b78; }

.watch__today-date {
  font-family: var(--display);
  font-size: 1.45rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 0.25rem;
}
.watch__today-weather {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-soft);
  font-size: 1rem;
  margin-bottom: 0.7rem;
  padding-bottom: 0.7rem;
  border-bottom: 1px dotted var(--p-3);
}
.watch__today-body {
  font-family: var(--rubric);
  font-size: 1rem;
  line-height: 1.55;
  color: var(--ink);
  white-space: pre-wrap;
}
.watch__today-empty {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  padding: 0.6rem 0;
}
.watch__today-actions {
  margin-top: 0.8rem;
  display: flex; gap: 0.4rem;
}

.watch__grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.1rem;
}

.watch__list {
  display: flex; flex-direction: column;
  margin: 0; padding: 0; list-style: none;
}
.watch__item {
  display: flex; align-items: baseline; gap: 0.6rem;
  padding: 0.55rem 0.45rem;
  border-bottom: 1px dotted var(--p-3);
  cursor: pointer;
  background: transparent;
  border-left: none; border-right: none; border-top: none;
  text-align: left;
  width: 100%;
  font: inherit;
  color: inherit;
}
.watch__item:last-child { border-bottom: none; }
.watch__item:hover { background: rgba(184,146,58,0.10); }
.watch__item-primary {
  flex: 1;
  font-family: var(--rubric);
  font-size: 0.98rem;
  color: var(--ink);
  min-width: 0;
  line-height: 1.3;
}
.watch__item-secondary {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.85rem;
  color: var(--ink-faded);
  line-height: 1.3;
}
.watch__item-day-excerpt {
  display: block;
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.85rem;
  color: var(--ink-faded);
  margin-top: 0.15rem;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.watch__item-tag {
  font-family: var(--display);
  font-size: 0.58rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 0.1rem 0.45rem;
  background: var(--p-2);
  border: 1px solid var(--p-3);
  color: var(--ink-soft);
  flex-shrink: 0;
}
.watch__item-tag--alert {
  background: rgba(92, 31, 36, 0.10);
  border-color: var(--wine);
  color: var(--wine);
  font-weight: 600;
}
[data-theme="dark"] .watch__item-tag--alert {
  background: rgba(200, 49, 62, 0.18);
  border-color: #c8313e;
  color: #e36b78;
}
.watch__threat-fill {
  font-family: var(--display);
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  color: var(--wine);
  flex-shrink: 0;
  margin-left: 0.3rem;
}
[data-theme="dark"] .watch__threat-fill { color: #e36b78; }
.watch__threat-fill--urgent { color: var(--wine); font-weight: 600; }

.watch__empty {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  padding: 0.6rem 0.4rem;
}

/* ----- MODULE: THE SPARK (Prompt Generator) --------------------------- */
.spark__categories {
  display: flex; gap: 0.3rem; flex-wrap: wrap;
  margin-bottom: 1.1rem;
  justify-content: center;
}
.spark__category {
  font-family: var(--display);
  font-size: 0.62rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 0.4rem 0.8rem;
  background: var(--p-0);
  border: 1px solid var(--p-3);
  color: var(--ink-soft);
  cursor: pointer;
}
.spark__category:hover { background: rgba(184,146,58,0.13); }
.spark__category.is-active {
  background: var(--ink);
  color: var(--p-0);
  border-color: var(--ink);
}

.spark__display {
  background:
    radial-gradient(ellipse at 50% 0%, rgba(184,146,58,0.10), transparent 65%),
    var(--p-0);
  border: 1px solid var(--gold-d);
  padding: 3rem 2rem;
  text-align: center;
  position: relative;
  min-height: 10rem;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  margin-bottom: 0.6rem;
}
.spark__display::before, .spark__display::after {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  border: 1.5px solid var(--gold-d);
}
.spark__display::before { top: 8px; left: 8px; border-right: none; border-bottom: none; }
.spark__display::after  { bottom: 8px; right: 8px; border-left: none; border-top: none; }
.spark__display-text {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 1.55rem;
  line-height: 1.4;
  color: var(--ink);
  max-width: 520px;
  animation: sparkIn 0.4s ease-out;
}
.spark__display-cat {
  margin-top: 1.1rem;
  font-family: var(--display);
  font-size: 0.65rem;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--gold-d);
  animation: sparkIn 0.4s ease-out 0.06s both;
}
.spark__display--empty .spark__display-text {
  color: var(--ink-faded);
  font-style: italic;
  font-size: 1.05rem;
}
@keyframes sparkIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: none; }
}

.spark__controls {
  display: flex; gap: 0.5rem; justify-content: center;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.spark__strike {
  padding: 0.85rem 3rem;
  background: var(--gold-d);
  color: var(--p-0);
  border: 1px solid #5a4715;
  font-family: var(--display);
  font-size: 0.95rem;
  letter-spacing: 0.36em;
  text-transform: uppercase;
  cursor: pointer;
  transition: transform 0.08s, filter 0.15s;
}
.spark__strike:hover { filter: brightness(1.08); }
.spark__strike:active { transform: translateY(1px); }
[data-theme="dark"] .spark__strike { color: var(--ink); }

.spark__pin {
  padding: 0.85rem 1.3rem;
  background: transparent;
  border: 1px solid var(--ink-soft);
  color: var(--ink-soft);
  font-family: var(--display);
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
}
.spark__pin:hover { background: var(--ink); color: var(--p-0); border-color: var(--ink); }
.spark__pin:disabled { opacity: 0.35; cursor: not-allowed; }
.spark__pin:disabled:hover { background: transparent; color: var(--ink-soft); }

.spark__history {
  margin-top: 1.5rem;
  border-top: var(--rule);
  padding-top: 1rem;
}
.spark__history-head {
  font-family: var(--display);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faded);
  margin-bottom: 0.6rem;
}
.spark__history-list {
  display: flex; flex-direction: column;
}
.spark__history-item {
  display: flex; gap: 0.85rem; align-items: baseline;
  padding: 0.45rem 0.55rem;
  border-bottom: 1px dotted var(--p-3);
  cursor: pointer;
  background: transparent;
  border-left: none;
  border-right: none;
  border-top: none;
  text-align: left;
  width: 100%;
  font: inherit;
  color: inherit;
}
.spark__history-item:hover { background: rgba(184,146,58,0.08); }
.spark__history-text {
  flex: 1;
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--ink);
}
.spark__history-cat {
  font-family: var(--display);
  font-size: 0.55rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faded);
  flex-shrink: 0;
}
.spark__history-empty {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  padding: 0.5rem;
  text-align: center;
}

/* ----- MODULE: ALMANAC ------------------------------------------------- */
.almanac { display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; align-items: start; }
@media (max-width: 880px) { .almanac { grid-template-columns: 1fr; } }
.almanac__head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: var(--rule);
}
.almanac__month {
  font-family: var(--display);
  font-size: 1.3rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.almanac__year { font-family: var(--rubric); font-style: italic; color: var(--ink-faded); }
.almanac__nav { display: flex; gap: 0.4rem; }
.almanac__grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
  background: var(--p-3);
  border: 1px solid var(--p-3);
}
.almanac__dayname {
  background: var(--p-2);
  padding: 0.4rem 0.3rem;
  text-align: center;
  font-family: var(--display);
  font-size: 0.7rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-faded);
}
.almanac__day {
  background: var(--p-0);
  min-height: 78px;
  padding: 0.35rem 0.4rem;
  cursor: pointer;
  position: relative;
  transition: background 0.12s;
  display: flex; flex-direction: column;
}
.almanac__day:hover { background: rgba(184,146,58,0.1); }
.almanac__day--outside { background: var(--p-1); color: var(--ink-whisper); }
.almanac__day--today { outline: 2px solid var(--wine); outline-offset: -2px; }
.almanac__day--has-note::after {
  content: ""; position: absolute; right: 0.4rem; bottom: 0.4rem;
  width: 6px; height: 6px; border-radius: 50%; background: var(--gold);
}
.almanac__daynum { font-family: var(--display); font-size: 0.9rem; }
.almanac__moon {
  margin-top: auto;
  align-self: flex-end;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--ink-faded);
  position: relative;
  overflow: hidden;
}
.almanac__moon-light {
  position: absolute;
  top: 0; bottom: 0;
  background: var(--p-0);
}
.almanac__panel {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1rem;
  position: sticky; top: 100px;
}
.almanac__panel-date {
  font-family: var(--display);
  font-size: 0.85rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
  color: var(--ink-faded);
}
.almanac__panel-moon { font-style: italic; color: var(--ink-soft); margin-bottom: 0.5rem; font-family: var(--rubric); }
.almanac__weather-row { display: flex; gap: 0.4rem; margin-bottom: 0.75rem; }
.almanac__weather-row input { flex: 1; }

/* ----- MODULE: ARCHIVE (Lore Vault) ------------------------------------ */
.archive { display: grid; grid-template-columns: 240px 1fr; gap: 1.5rem; align-items: start; min-height: 580px; }
@media (max-width: 880px) { .archive { grid-template-columns: 1fr; } }
.archive__sidebar {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 0.75rem;
  max-height: 70vh;
  overflow-y: auto;
}
.archive__search { width: 100%; margin-bottom: 0.6rem; }
.archive__new { width: 100%; margin-bottom: 0.6rem; }
.archive__list { list-style: none; padding: 0; margin: 0; }
.archive__entry {
  padding: 0.5rem 0.5rem;
  cursor: pointer;
  border-radius: 2px;
  font-family: var(--rubric);
  font-size: 1rem;
  color: var(--ink-soft);
  border-bottom: 1px dotted var(--p-3);
}
.archive__entry {
  border-left: 3px solid transparent;
}
.archive__entry:hover { background: rgba(184,146,58,0.1); color: var(--ink); }
.archive__entry--active {
  background: rgba(184,146,58,0.18); color: var(--ink);
  padding-left: 0.4rem;
}
.archive__entry--type-person  { border-left-color: var(--forest); }
.archive__entry--type-place   { border-left-color: var(--indigo); }
.archive__entry--type-thing   { border-left-color: var(--gold-d); }
.archive__entry--type-event   { border-left-color: var(--wine); }
.archive__entry--type-faction { border-left-color: #8a4a2c; }
.archive__entry--type-lore    { border-left-color: rgba(107,93,74,0.55); }
[data-theme="dark"] .archive__entry--type-faction { border-left-color: #b8694a; }
.archive__entry--active.archive__entry--type-person  { border-left-color: var(--forest); }
.archive__entry--active.archive__entry--type-place   { border-left-color: var(--indigo); }
.archive__entry--active.archive__entry--type-thing   { border-left-color: var(--gold-d); }
.archive__entry--active.archive__entry--type-event   { border-left-color: var(--wine); }
.archive__entry--active.archive__entry--type-faction { border-left-color: #8a4a2c; }
.archive__entry--active.archive__entry--type-lore    { border-left-color: var(--wine); }

.archive__group-head {
  font-family: var(--display);
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faded);
  padding: 0.85rem 0.5rem 0.3rem;
  border-bottom: 1px dotted var(--p-3);
  margin-top: 0.35rem;
  list-style: none;
  cursor: default;
}
.archive__group-head:first-child { margin-top: 0; }
.archive__group-head:hover { background: transparent; color: var(--ink-faded); }

.archive__type-picker {
  display: flex; gap: 0.3rem; flex-wrap: wrap;
  margin: 0.4rem 0 0.6rem;
}
.archive__type-pill {
  font-family: var(--display);
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 0.25rem 0.55rem;
  background: transparent;
  border: 1px solid var(--p-3);
  color: var(--ink-faded);
  cursor: pointer;
  border-left: 3px solid var(--type-color, transparent);
}
.archive__type-pill:hover { color: var(--ink); border-color: var(--type-color, var(--ink-soft)); }
.archive__type-pill.is-active {
  background: var(--type-soft);
  color: var(--ink);
  border-color: var(--type-color);
}
.archive__main {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1.5rem;
}
.archive__title {
  width: 100%;
  border: none;
  background: transparent;
  font-family: var(--display);
  font-size: 1.6rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0;
  margin-bottom: 0.5rem;
  color: var(--ink);
}
.archive__title:focus { outline: none; border-bottom: 1px solid var(--gold); }
.archive__meta { display: flex; gap: 0.5rem; margin-bottom: 1rem; align-items: center; }
.archive__editor {
  width: 100%;
  border: 1px dashed var(--p-3);
  background: transparent;
  padding: 0.75rem;
  min-height: 360px;
  font-family: var(--mono);
  font-size: 0.95rem;
  line-height: 1.6;
  resize: vertical;
}
.archive__editor:focus { outline: none; border-style: solid; border-color: var(--gold-d); }
.archive__rendered { padding: 0.5rem 0; }
.archive__rendered h1, .archive__rendered h2, .archive__rendered h3 { color: var(--wine); }
.archive__rendered h1 { font-size: 1.5rem; }
.archive__rendered h2 { font-size: 1.2rem; }
.archive__rendered ul { padding-left: 1.4rem; }
.archive__rendered blockquote {
  border-left: 3px solid var(--gold);
  padding-left: 1rem;
  margin-left: 0;
  font-style: italic;
  color: var(--ink-soft);
}
.archive__wikilink {
  background: rgba(184,146,58,0.12);
  padding: 0.05rem 0.3rem;
  border-bottom: 1px solid var(--gold-d);
  cursor: pointer;
  color: var(--wine);
}
.archive__wikilink--missing { background: rgba(92,31,36,0.08); color: var(--ink-faded); text-decoration: line-through; }
.archive__toggle { display: flex; gap: 0.4rem; margin-bottom: 0.6rem; }

/* ----- MODULE: HALL OF FACES (NPC) ------------------------------------- */
.faces__roll {
  text-align: center;
  margin-bottom: 1.5rem;
}
.faces__npc {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1.5rem;
  margin-bottom: 1rem;
  position: relative;
}
.faces__npc-name {
  font-family: var(--display);
  font-size: 1.5rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--wine);
  margin-bottom: 0.25rem;
}
.faces__npc-role {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 1.1rem;
  color: var(--ink-faded);
  margin-bottom: 1rem;
}
.faces__npc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1rem;
}
.faces__field-label {
  font-family: var(--display);
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faded);
  margin-bottom: 0.25rem;
}
.faces__field-value {
  font-family: var(--rubric);
  font-size: 1.05rem;
  line-height: 1.4;
  color: var(--ink);
}
.faces__roster {
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: var(--rule);
}
.faces__roster-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 0.75rem;
  margin-top: 1rem;
}
.faces__roster-card {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 0.85rem;
  cursor: pointer;
  transition: border-color 0.15s;
}
.faces__roster-card:hover { border-color: var(--gold-d); }
.faces__roster-name { font-family: var(--display); font-size: 0.95rem; letter-spacing: 0.08em; text-transform: uppercase; }
.faces__roster-role { font-family: var(--rubric); font-style: italic; color: var(--ink-faded); font-size: 0.9rem; }
.faces__actions { display: flex; gap: 0.5rem; margin-top: 1rem; }

/* ----- MODULE: LISTS (Initiative) -------------------------------------- */
.lists__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.75rem; }
.lists__round {
  font-family: var(--display);
  font-size: 1.4rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
.lists__round small {
  display: block;
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.85rem;
  text-transform: none;
  letter-spacing: 0;
  color: var(--ink-faded);
}
.lists__add { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 0.5rem; margin-bottom: 1rem; }
@media (max-width: 720px) { .lists__add { grid-template-columns: 1fr 1fr; } }
.lists__roster { display: flex; flex-direction: column; gap: 0.4rem; }
.lists__row {
  display: grid;
  grid-template-columns: 56px 1fr 1fr 90px auto;
  gap: 0.6rem;
  align-items: center;
  background: var(--p-0);
  border: 1px solid var(--p-3);
  border-left: 4px solid var(--p-3);
  padding: 0.6rem 0.75rem;
  transition: background 0.15s, border-color 0.15s;
}
.lists__row--active {
  border-left-color: var(--wine);
  background: linear-gradient(90deg, rgba(184,146,58,0.12), var(--p-0));
}
.lists__row--down { opacity: 0.5; }
.lists__init {
  font-family: var(--display);
  font-size: 1.3rem;
  text-align: center;
  color: var(--ink);
}
.lists__name { font-family: var(--rubric); font-size: 1.15rem; }
.lists__name input { background: transparent; border: none; padding: 0; font: inherit; width: 100%; }
.lists__name input:focus { outline: none; }
.lists__conds { display: flex; gap: 0.3rem; flex-wrap: wrap; }
.lists__cond {
  font-family: var(--display);
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 0.1rem 0.45rem;
  background: rgba(92,31,36,0.12);
  border: 1px solid rgba(92,31,36,0.4);
  color: var(--wine);
  cursor: pointer;
}
.lists__cond:hover { background: var(--wine); color: var(--p-0); }
.lists__hp { display: flex; align-items: center; gap: 0.25rem; font-family: var(--display); font-size: 0.95rem; }
.lists__hp input { width: 40px; padding: 0.2rem; text-align: center; border: 1px solid var(--p-3); background: var(--p-0); }
.lists__actions { display: flex; gap: 0.3rem; }
.lists__icon-btn {
  width: 28px; height: 28px;
  background: transparent;
  border: 1px solid var(--p-3);
  color: var(--ink-soft);
  display: flex; align-items: center; justify-content: center;
}
.lists__icon-btn:hover { background: var(--ink); color: var(--p-0); border-color: var(--ink); }

/* table-facing mode */
.lists--big .lists__row { padding: 1rem 1.2rem; grid-template-columns: 90px 1fr 1fr 110px; }
.lists--big .lists__init { font-size: 2rem; }
.lists--big .lists__name { font-size: 1.8rem; }
.lists--big .lists__cond { font-size: 0.85rem; }
.lists--big .lists__actions { display: none; }
.lists--big .lists__hp { font-size: 1.3rem; }
.lists--big .lists__hp input { width: 60px; font-size: 1.2rem; }
.lists--big .lists__add { display: none; }

/* ----- MODULE: HEARTH (Soundscape) ------------------------------------- */
.hearth__intro {
  margin-bottom: 1.5rem;
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-soft);
  max-width: 640px;
}
.hearth__presets {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
  margin-bottom: 1.5rem; padding-bottom: 1rem;
  border-bottom: var(--rule);
}
.hearth__layers {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1rem;
}
.hearth__layer {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1rem;
}
.hearth__layer-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0.75rem;
}
.hearth__layer-name {
  font-family: var(--display);
  font-size: 0.9rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
.hearth__layer-toggle {
  width: 36px; height: 20px;
  background: var(--p-3);
  border: 1px solid var(--ink-whisper);
  border-radius: 12px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}
.hearth__layer-toggle::after {
  content: ""; position: absolute;
  width: 14px; height: 14px;
  background: var(--p-0);
  border: 1px solid var(--ink-soft);
  border-radius: 50%;
  top: 2px; left: 2px;
  transition: left 0.2s;
}
.hearth__layer-toggle--on { background: var(--forest); }
.hearth__layer-toggle--on::after { left: 18px; background: var(--gold-l); border-color: var(--gold-d); }
.hearth__slider {
  width: 100%;
  appearance: none;
  height: 4px;
  background: var(--p-3);
  outline: none;
  margin: 0.4rem 0;
}
.hearth__slider::-webkit-slider-thumb {
  appearance: none;
  width: 16px; height: 16px;
  background: var(--wine);
  border: 1px solid var(--wine-d);
  cursor: pointer;
}
.hearth__layer-desc {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  font-size: 0.9rem;
}
.hearth__master {
  display: flex; align-items: center; gap: 1rem;
  padding: 0.75rem 1rem;
  background: var(--ink);
  color: var(--p-0);
  margin-bottom: 1.5rem;
}
.hearth__master-label {
  font-family: var(--display);
  font-size: 0.75rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.hearth__master input { flex: 1; }

/* ----- HEARTH: From Afar (external streams) -------------------------- */
.hearth__afar {
  margin-top: 1.5rem;
  padding: 1.2rem 1.3rem;
  border: 1px solid var(--p-3);
  background: var(--p-0);
  position: relative;
}
.hearth__afar-head {
  margin-bottom: 1rem;
  padding-bottom: 0.7rem;
  border-bottom: 1px dotted var(--p-3);
}
.hearth__afar-title {
  font-family: var(--display);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-size: 0.78rem;
  color: var(--ink);
  margin-bottom: 0.35rem;
}
.hearth__afar-sub {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.88rem;
  color: var(--ink-faded);
  line-height: 1.45;
}
.hearth__afar-add {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 0.9rem;
  flex-wrap: wrap;
  align-items: center;
}
.hearth__afar-input {
  flex: 1;
  min-width: 200px;
  padding: 0.45rem 0.65rem;
  border: 1px solid var(--p-3);
  background: var(--p-1);
  color: var(--ink);
  font: inherit;
  font-size: 0.92rem;
  font-family: var(--rubric);
}
.hearth__afar-input--name { flex: 0 1 200px; min-width: 140px; }
.hearth__afar-list {
  margin-bottom: 0.6rem;
}
.hearth__afar-list-head {
  font-family: var(--display);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-size: 0.62rem;
  color: var(--ink-faded);
  margin-bottom: 0.4rem;
}
.hearth__afar-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.45rem 0.5rem;
  border-bottom: 1px dotted var(--p-3);
}
.hearth__afar-row:last-child { border-bottom: none; }
.hearth__afar-row--playing {
  background: rgba(184, 146, 58, 0.12);
}
.hearth__afar-row-name {
  flex: 1;
  font-family: var(--rubric);
  font-size: 0.96rem;
  color: var(--ink);
  min-width: 0;
  word-break: break-word;
}
.hearth__afar-row-type {
  font-family: var(--display);
  font-size: 0.58rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 0.1rem 0.45rem;
  background: var(--p-2);
  border: 1px solid var(--p-3);
  color: var(--ink-soft);
  flex-shrink: 0;
}
.hearth__afar-empty {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  padding: 0.6rem 0;
  font-size: 0.92rem;
  line-height: 1.45;
}
.hearth__afar-player {
  margin-top: 0.75rem;
  padding-top: 0.75rem;
  border-top: 1px dotted var(--p-3);
}
.hearth__afar-now {
  font-family: var(--display);
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-d);
  text-align: center;
  margin-bottom: 0.6rem;
}
.hearth__afar-player iframe,
.hearth__afar-player audio {
  display: block;
  width: 100%;
  border: 1px solid var(--p-3);
}
.hearth__afar-player audio { height: 40px; }
.hearth__afar-loading {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  text-align: center;
  padding: 1.5rem;
}
.hearth__afar-error {
  border: 1px solid var(--wine);
  background: rgba(92, 31, 36, 0.06);
  padding: 1rem 1.2rem;
}
[data-theme="dark"] .hearth__afar-error {
  border-color: #c8313e;
  background: rgba(200, 49, 62, 0.12);
}
.hearth__afar-error-head {
  font-family: var(--display);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-size: 0.78rem;
  color: var(--wine);
  margin-bottom: 0.5rem;
}
[data-theme="dark"] .hearth__afar-error-head { color: #e36b78; }
.hearth__afar-error-name {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 1rem;
  color: var(--ink);
  margin-bottom: 0.3rem;
}
.hearth__afar-error-msg {
  font-family: var(--rubric);
  color: var(--ink-soft);
  margin-bottom: 0.5rem;
}
.hearth__afar-error-url {
  font-family: monospace;
  font-size: 0.82rem;
  color: var(--ink-faded);
  padding: 0.4rem 0.55rem;
  background: var(--p-1);
  border: 1px solid var(--p-3);
  margin-bottom: 0.5rem;
  word-break: break-all;
}
.hearth__afar-error-help {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.88rem;
  color: var(--ink-soft);
  line-height: 1.4;
}

/* ----- HEARTH: Popout window mode ------------------------------------ */
/* When the Hearth is opened in its own browser window via the Pop Out
   button, body gets the 'popout-mode' class. We hide the banner, nav,
   folio title (but keep actions so Silence All stays reachable),
   search button, modals, and anything else that's not the Hearth
   controls. The Hearth fills the available space. */
body.popout-mode .banner,
body.popout-mode .nav,
body.popout-mode #nav,
body.popout-mode .folio__title,
body.popout-mode .folio__sub,
body.popout-mode .search-overlay,
body.popout-mode .modal-overlay {
  display: none !important;
}
body.popout-mode .folio__head {
  border-bottom: 1px dotted var(--p-3);
  padding-bottom: 0.6rem;
  margin-bottom: 0.8rem;
  justify-content: flex-end;
}
body.popout-mode .layout {
  display: block !important;
  grid-template-columns: none !important;
  padding: 0.5rem !important;
}
body.popout-mode #folio,
body.popout-mode .folio {
  max-width: none !important;
  padding: 1rem !important;
  margin: 0 !important;
  box-shadow: none !important;
  border: none !important;
}

/* ----- CAMPAIGN CHIP & MENU ------------------------------------------- */
.banner__campaign { position: relative; }

/* ----- MODULE: THE TAVERN --------------------------------------------- */
.tavern { max-width: 760px; margin: 0 auto; }
.tavern__parchment {
  position: relative;
  background:
    radial-gradient(ellipse at 30% 10%, rgba(184,146,58,0.10), transparent 55%),
    radial-gradient(ellipse at 70% 90%, rgba(92,31,36,0.08), transparent 60%),
    linear-gradient(180deg, #f3e5c0, #ebd9af);
  border: 1px solid var(--p-4);
  padding: 2.4rem 2.5rem 2.8rem;
  box-shadow:
    inset 0 0 0 1px rgba(58,47,36,0.08),
    inset 0 0 60px rgba(122,90,50,0.18),
    0 2px 0 rgba(58,47,36,0.06),
    0 12px 32px rgba(58,47,36,0.18);
}
.tavern__parchment::before {
  content: "";
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence baseFrequency='0.72' numOctaves='2' seed='9'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.09 0 0 0 0 0.05 0 0 0 0.18 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  mix-blend-mode: multiply;
  opacity: 0.65;
  pointer-events: none;
}
.tavern__parchment > * { position: relative; z-index: 1; }
.tavern__name {
  font-family: var(--display);
  font-weight: 700;
  font-size: 2.4rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: center;
  color: var(--ink);
  margin: 0 0 0.25rem;
  line-height: 1.1;
}
.tavern__sub {
  text-align: center;
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-soft);
  font-size: 1.1rem;
  margin-bottom: 0.5rem;
}
.tavern__rule {
  text-align: center;
  color: var(--wine);
  font-family: serif;
  letter-spacing: 0.5em;
  margin: 1.25rem 0;
  font-size: 1rem;
}
.tavern__atmosphere {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 1.18rem;
  line-height: 1.55;
  text-align: center;
  margin: 0 0 2rem;
  padding: 0 1rem;
  color: var(--ink-soft);
}
.tavern__section { margin-bottom: 1.75rem; }
.tavern__heading {
  font-family: var(--display);
  font-size: 0.92rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  text-align: center;
  color: var(--wine);
  margin: 0 0 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.8rem;
}
.tavern__heading::before, .tavern__heading::after {
  content: ""; flex: 0 1 80px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--ink-faded), transparent);
}
.tavern__menu {
  list-style: none; padding: 0; margin: 0;
  max-width: 460px; margin: 0 auto;
}
.tavern__menu li {
  display: flex; align-items: baseline; gap: 0.5rem;
  padding: 0.35rem 0;
  border-bottom: 1px dotted rgba(58,47,36,0.25);
  font-size: 1.05rem;
}
.tavern__menu li:last-child { border-bottom: none; }
.tavern__menu-item { flex: 1; }
.tavern__menu-price {
  font-family: var(--display);
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  white-space: nowrap;
}
.tavern__patrons { display: flex; flex-direction: column; gap: 0.85rem; }
.tavern__patron {
  font-size: 1.05rem;
  padding-left: 1.25rem;
  position: relative;
  line-height: 1.45;
}
.tavern__patron::before {
  content: "\2767";
  position: absolute; left: 0; top: 0;
  color: var(--wine);
  font-size: 0.9rem;
}
.tavern__patron strong {
  font-family: var(--display);
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--ink);
  font-size: 0.95rem;
}
.tavern__patron em { color: var(--ink-soft); }
.tavern__rumours { list-style: none; padding: 0; margin: 0; counter-reset: r; }
.tavern__rumour {
  counter-increment: r;
  padding: 0.55rem 0 0.55rem 2.2rem;
  position: relative;
  font-family: var(--rubric);
  font-style: italic;
  font-size: 1.1rem;
  line-height: 1.5;
  display: flex; align-items: flex-start; gap: 0.5rem;
  border-bottom: 1px dotted rgba(58,47,36,0.18);
}
.tavern__rumour:last-child { border-bottom: none; }
.tavern__rumour::before {
  content: counter(r, lower-roman) ".";
  position: absolute; left: 0; top: 0.55rem;
  font-family: var(--display);
  font-style: normal;
  color: var(--wine);
  letter-spacing: 0.1em;
  font-size: 0.85rem;
  text-transform: uppercase;
  min-width: 1.8rem;
}
.tavern__rumour-text { flex: 1; }
.tavern__rumour-reveal {
  flex-shrink: 0;
  font-family: var(--display);
  font-style: normal;
  font-size: 0.65rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 0.2rem 0.6rem;
  background: transparent;
  border: 1px solid var(--p-4);
  color: var(--ink-faded);
  cursor: pointer;
  margin-top: 0.15rem;
}
.tavern__rumour-reveal:hover { background: var(--ink); color: var(--p-0); border-color: var(--ink); }
.tavern__patron { display: flex; align-items: baseline; gap: 0.7rem; }
.tavern__patron-text { flex: 1; }
.tavern__patron-recruit {
  font-family: var(--display);
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 0.25rem 0.55rem;
  background: transparent;
  border: 1px solid var(--ink-soft);
  color: var(--ink-soft);
  cursor: pointer;
  flex-shrink: 0;
}
.tavern__patron-recruit:hover {
  background: var(--ink);
  color: var(--p-0);
  border-color: var(--ink);
}
.tavern__patron-recruit:disabled {
  opacity: 0.45; cursor: default;
}
.tavern__patron-recruit:disabled:hover {
  background: transparent; color: var(--ink-soft); border-color: var(--ink-soft);
}
.tavern__rumour-pin {
  background: transparent;
  border: none;
  color: var(--ink-faded);
  cursor: pointer;
  font-size: 0.95rem;
  padding: 0 0.3rem;
  opacity: 0.55;
  transition: opacity 0.15s, color 0.15s;
  margin-left: 0.4rem;
}
.tavern__rumour-pin:hover { opacity: 1; color: var(--gold-d); }
.tavern__truth {
  flex-shrink: 0;
  font-family: var(--display);
  font-style: normal;
  font-size: 0.65rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 0.2rem 0.6rem;
  border: 1px solid;
  margin-top: 0.15rem;
}
.tavern__truth--true { color: var(--forest); border-color: var(--forest); background: rgba(45,74,53,0.1); }
.tavern__truth--false { color: var(--wine); border-color: var(--wine); background: rgba(92,31,36,0.1); }
.tavern__truth--half { color: var(--gold-d); border-color: var(--gold-d); background: rgba(184,146,58,0.15); }

/* ----- MODULE: FACTION LEDGER ----------------------------------------- */
.factions__head { margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: var(--rule); display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: space-between; }
.factions__count { font-family: var(--rubric); font-style: italic; color: var(--ink-faded); font-size: 0.95rem; }
.factions__grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 1rem;
}
.faction-card {
  --accent: var(--wine);
  --accent-soft: rgba(92,31,36,0.1);
  background: var(--p-0);
  border: 1px solid var(--p-3);
  position: relative;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.faction-card__ribbon {
  height: 6px;
  background: linear-gradient(90deg, var(--accent), var(--accent) 60%, transparent);
}
.faction-card__top {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  gap: 0.85rem;
  align-items: center;
  padding: 0.95rem 1rem 0.75rem;
}
.faction-card__sigil {
  width: 50px; height: 50px;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent-soft);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 1.4rem;
  font-family: var(--display);
}
.faction-card__name {
  font-family: var(--display);
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  margin: 0;
  line-height: 1.1;
}
.faction-card__motto {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--ink-faded);
  margin-top: 0.15rem;
}
.faction-card__expand {
  background: transparent;
  border: 1px solid var(--p-3);
  width: 28px; height: 28px;
  font-family: var(--display);
  font-size: 0.7rem;
  color: var(--ink-soft);
}
.faction-card__expand:hover { background: var(--ink); color: var(--p-0); border-color: var(--ink); }

.faction-card__gauge {
  padding: 0 1rem 0.95rem;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 0.4rem 0.6rem;
  align-items: center;
}
.faction-card__gauge-label {
  font-family: var(--display);
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.faction-card__gauge-value {
  font-family: var(--display);
  font-size: 0.95rem;
  color: var(--ink);
  text-align: right;
}
.gauge {
  grid-column: 1 / -1;
  position: relative;
  height: 10px;
  background: linear-gradient(90deg,
    rgba(92,31,36,0.35) 0%, rgba(92,31,36,0.18) 35%,
    rgba(184,146,58,0.12) 50%,
    rgba(45,74,53,0.18) 65%, rgba(45,74,53,0.35) 100%);
  border: 1px solid var(--p-3);
}
.gauge__notch {
  position: absolute; top: -3px; bottom: -3px;
  width: 3px;
  background: var(--ink);
  transform: translateX(-50%);
  box-shadow: 0 0 0 1px var(--p-0);
}
.gauge__zero {
  position: absolute; top: 0; bottom: 0; left: 50%;
  width: 1px; background: rgba(58,47,36,0.45);
}
.faction-card__gauge-controls {
  grid-column: 1 / -1;
  display: flex; gap: 0.35rem; align-items: center;
}
.gauge-btn {
  width: 28px; height: 26px;
  background: var(--p-0);
  border: 1px solid var(--p-3);
  font-family: var(--display);
  font-size: 0.85rem;
  color: var(--ink-soft);
  cursor: pointer;
}
.gauge-btn:hover { background: var(--ink); color: var(--p-0); border-color: var(--ink); }
.gauge-tick {
  flex: 1;
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.85rem;
  color: var(--ink-faded);
  text-align: center;
}

.faction-card__body {
  border-top: 1px solid var(--p-3);
  padding: 1rem;
  display: none;
}
.faction-card--open .faction-card__body { display: block; }
.faction-card__threats {
  padding: 0.5rem 1rem 0;
}
.faction-card__threat-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: rgba(184,146,58,0.13);
  border: 1px solid rgba(184,146,58,0.40);
  color: var(--gold-d);
  font-family: var(--display);
  font-size: 0.65rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 0.3rem 0.65rem;
  cursor: pointer;
}
.faction-card__threat-chip:hover {
  background: rgba(184,146,58,0.22);
  color: var(--ink);
}
[data-theme="dark"] .faction-card__threat-chip { color: var(--gold-l); }
.faction-card__threat-icon { font-size: 0.95rem; line-height: 1; }
.faction-card__backlinks {
  display: flex; flex-wrap: wrap; gap: 0.35rem;
  margin-top: 0.2rem;
}
.faction-card__backlink {
  background: transparent;
  border: 1px solid var(--p-3);
  color: var(--ink-soft);
  font-family: var(--rubric);
  font-size: 0.85rem;
  letter-spacing: 0;
  text-transform: none;
  padding: 0.2rem 0.55rem;
  cursor: pointer;
}
.faction-card__backlink:hover {
  background: rgba(184,146,58,0.18);
  color: var(--ink);
  border-color: var(--gold-d);
}
.faction-card__field { margin-bottom: 0.85rem; }
.faction-card__field .label { margin-bottom: 0.3rem; }
.faction-card__goal { font-family: var(--rubric); font-style: italic; font-size: 1.02rem; color: var(--ink-soft); }
.faction-card__notes-input { min-height: 96px; }
.faction-card__relations { display: flex; flex-direction: column; gap: 0.4rem; }
.faction-relation {
  display: grid;
  grid-template-columns: 32px 1fr auto auto auto;
  gap: 0.5rem;
  align-items: center;
  padding: 0.45rem 0.55rem;
  background: var(--p-1);
  border: 1px solid var(--p-3);
}
.faction-relation__sigil {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: var(--p-0);
  border: 1px solid var(--accent2, var(--p-3));
  color: var(--accent2, var(--ink-soft));
  font-size: 0.95rem;
}
.faction-relation__name {
  font-family: var(--rubric);
  font-size: 1rem;
}
.faction-relation__label {
  font-family: var(--display);
  font-size: 0.7rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-faded);
  min-width: 7rem;
  text-align: right;
}
.faction-card__actions {
  display: flex; gap: 0.5rem;
  margin-top: 1rem;
  padding-top: 0.75rem;
  border-top: 1px dashed var(--p-3);
}

.faction-form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
}
.faction-form-grid > .full { grid-column: 1 / -1; }
.sigil-picker {
  display: flex; flex-wrap: wrap; gap: 0.3rem;
  margin-top: 0.25rem;
}
.sigil-picker button {
  width: 36px; height: 36px;
  background: var(--p-0);
  border: 1px solid var(--p-3);
  font-size: 1.1rem;
  color: var(--ink-soft);
  cursor: pointer;
}
.sigil-picker button:hover { background: rgba(184,146,58,0.15); }
.sigil-picker button.is-selected { background: var(--ink); color: var(--p-0); border-color: var(--ink); }
.color-picker { display: flex; gap: 0.35rem; margin-top: 0.25rem; flex-wrap: wrap; }
.color-swatch {
  width: 32px; height: 32px;
  border: 2px solid transparent;
  cursor: pointer;
  position: relative;
}
.color-swatch.is-selected { border-color: var(--ink); box-shadow: inset 0 0 0 2px var(--p-0); }

/* ----- CROSS-MODULE: today, NPC wikilink, modal, backlinks ------------ */
.almanac__day--current {
  background: rgba(184,146,58,0.18);
  box-shadow: inset 0 0 0 2px var(--gold);
}
.almanac__day--current .almanac__daynum { color: var(--wine); font-weight: 700; }
.almanac__today-badge {
  display: inline-flex; align-items: center; gap: 0.45rem;
  padding: 0.3rem 0.7rem;
  background: rgba(184,146,58,0.18);
  border: 1px solid var(--gold-d);
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.92rem;
  color: var(--ink-soft);
}
.almanac__today-badge strong {
  font-family: var(--display); font-style: normal;
  font-size: 0.78rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--wine);
}

.archive__wikilink--npc {
  background: rgba(45,74,53,0.13);
  border-bottom-color: var(--forest);
  color: var(--forest);
}
.archive__wikilink--npc::before { content: "\263F\00A0"; opacity: 0.6; font-size: 0.85em; }

.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(26,22,18,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.modal-card {
  max-width: 460px; width: 90%;
  max-height: 80vh;
  display: flex; flex-direction: column;
  background: var(--p-0);
  border: 1px solid var(--p-3);
  box-shadow: var(--shadow-folio);
  padding: 1.25rem;
  position: relative;
}
.modal-card__scroll { overflow-y: auto; flex: 1; margin: 0.5rem 0 0.8rem; }
.modal-card__close {
  display: flex; justify-content: flex-end; gap: 0.5rem;
  border-top: var(--rule);
  padding-top: 0.8rem;
}

.roster-pick {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%;
  padding: 0.6rem 0.7rem;
  background: transparent;
  border: 1px solid var(--p-3);
  margin-bottom: 0.4rem;
  text-align: left;
  font-family: var(--serif);
  cursor: pointer;
  color: var(--ink);
}
.roster-pick:hover { background: rgba(184,146,58,0.12); border-color: var(--gold-d); }
.roster-pick__name { font-family: var(--rubric); font-size: 1.05rem; }
.roster-pick__role { font-family: var(--rubric); font-style: italic; color: var(--ink-faded); font-size: 0.85rem; }

.faces__backlinks {
  margin-top: 1rem;
  padding-top: 0.75rem;
  border-top: 1px dashed var(--p-3);
}
.faces__backlinks .tag {
  cursor: pointer;
  margin: 0.15rem 0.25rem 0.15rem 0;
  transition: background 0.15s;
}
.faces__backlinks .tag:hover { background: rgba(184,146,58,0.32); }

.pin-btn {
  margin-top: 1rem;
}


.campaign-chip {
  display: flex; align-items: center; gap: 0.55rem;
  padding: 0.5rem 0.85rem;
  background: var(--p-2);
  border: 1px solid var(--p-3);
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.98rem;
  color: var(--ink-soft);
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.campaign-chip:hover { background: rgba(184,146,58,0.18); border-color: var(--gold-d); color: var(--ink); }
.campaign-chip__sigil { color: var(--wine); font-size: 1.1rem; line-height: 1; }
.campaign-chip__name { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.campaign-chip__chevron { font-size: 0.7rem; color: var(--ink-faded); }

.campaign-menu {
  position: absolute; right: 0; top: calc(100% + 0.5rem);
  background: var(--p-0);
  border: 1px solid var(--p-3);
  box-shadow: var(--shadow-folio);
  min-width: 260px;
  z-index: 50;
  padding: 0.35rem;
}
.campaign-menu[hidden] { display: none; }
.campaign-menu__item {
  display: flex; gap: 0.55rem; align-items: center;
  width: 100%;
  padding: 0.5rem 0.65rem;
  background: transparent;
  border: none;
  text-align: left;
  font-family: var(--rubric);
  font-size: 1rem;
  color: var(--ink-soft);
  cursor: pointer;
}
.campaign-menu__item:hover { background: rgba(184,146,58,0.12); color: var(--ink); }
.campaign-menu__item--active { color: var(--wine); }
.campaign-menu__check { width: 1.1rem; color: var(--wine); }
.campaign-menu__divider {
  height: 1px;
  background: var(--p-3);
  margin: 0.35rem 0;
}

/* ----- MODULE: THE ROLL (Campaigns) ----------------------------------- */
.roll__create {
  display: grid; grid-template-columns: 1fr auto auto; gap: 0.5rem;
  margin-bottom: 1.5rem; padding-bottom: 1.2rem; border-bottom: var(--rule);
}
@media (max-width: 720px) { .roll__create { grid-template-columns: 1fr; } }
.roll__list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1rem;
}
.roll__card {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1.25rem;
  position: relative;
  display: flex; flex-direction: column; gap: 0.6rem;
}
.roll__card--active {
  border-color: var(--wine);
  border-left-width: 4px;
  background: linear-gradient(90deg, rgba(184,146,58,0.08), var(--p-0));
}
.roll__name {
  font-family: var(--display);
  font-size: 1.2rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.roll__meta {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  font-size: 0.88rem;
}
.roll__actions {
  display: flex; gap: 0.4rem; flex-wrap: wrap;
  margin-top: auto;
}

/* ----- POLISH: FOCUS, CRITICAL HP, RECIPROCAL LABELS, WRAP ------------ */
.btn:focus-visible, .nav__btn:focus-visible, .home__tile:focus-visible,
.faction-card__expand:focus-visible, .gauge-btn:focus-visible,
.tavern__rumour-reveal:focus-visible, .lists__icon-btn:focus-visible,
.campaign-chip:focus-visible, .campaign-menu__item:focus-visible {
  outline: 2px solid var(--gold);
  outline-offset: 2px;
}

.lists__row--critical {
  border-left-color: var(--wine);
  background: linear-gradient(90deg, rgba(92,31,36,0.16), var(--p-0));
}
.lists__row--critical .lists__hp { color: var(--wine); font-weight: 600; }
.lists--big .lists__row--critical .lists__hp { font-weight: 700; }

.faction-relation__label-stack {
  display: flex; flex-direction: column;
  align-items: flex-end;
  min-width: 7rem;
  gap: 0.05rem;
}
.faction-relation__label-stack .primary {
  font-family: var(--display);
  font-size: 0.7rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.faction-relation__label-stack .reciprocal {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.78rem;
  color: var(--ink-faded);
  letter-spacing: 0;
  text-transform: none;
}

.almanac__head { flex-wrap: wrap; gap: 0.75rem; }

/* ----- MODULE: THE WAYFARER (PC sheet) -------------------------------- */
.wayfarer__head {
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: var(--rule);
  display: flex; flex-wrap: wrap; gap: 0.7rem;
  align-items: center; justify-content: space-between;
}
.wayfarer__count { font-family: var(--rubric); font-style: italic; color: var(--ink-faded); font-size: 0.95rem; }
.wayfarer__grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
  gap: 1.2rem;
}
.wayfarer__empty {
  text-align: center;
  padding: 3rem 1.5rem;
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
}
.wayfarer__empty-call {
  display: block;
  font-family: var(--display);
  font-size: 1.1rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 1rem;
  font-style: normal;
}

.wayfarer-card {
  --accent: var(--wine);
  --accent-d: var(--wine-d);
  --accent-soft: rgba(92,31,36,0.10);
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1.3rem 1.4rem 1rem;
  position: relative;
  display: flex; flex-direction: column;
}
.wayfarer-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--accent), var(--accent-d));
}
.wayfarer-card--fallen { opacity: 0.6; }

.wayfarer-card__head {
  display: flex; align-items: flex-start; gap: 0.9rem;
  margin: 0.2rem 0 0.6rem;
}
.wayfarer-card__glyph {
  width: 48px; height: 48px;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent-soft);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 1.5rem;
  line-height: 1;
  flex-shrink: 0;
}
.wayfarer-card__title { flex: 1; min-width: 0; }
.wayfarer-card__name {
  font-family: var(--display);
  font-size: 1.35rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--ink);
  line-height: 1.15;
  margin-bottom: 0.2rem;
}
.wayfarer-card__caption {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--ink-faded);
}
.wayfarer-card__status {
  font-family: var(--display);
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 0.15rem 0.5rem;
  background: var(--status-soft, rgba(58,47,36,0.10));
  border: 1px solid var(--status-color, var(--ink-soft));
  color: var(--status-color, var(--ink-soft));
  flex-shrink: 0;
  align-self: flex-start;
}
.wayfarer-card--status-hale      { --status-color: var(--forest); --status-soft: rgba(45,74,53,0.12); }
.wayfarer-card--status-weary     { --status-color: var(--gold-d); --status-soft: rgba(184,146,58,0.16); }
.wayfarer-card--status-wounded   { --status-color: #8a4a2c;       --status-soft: rgba(138,74,44,0.14); }
.wayfarer-card--status-grievous  { --status-color: var(--wine);   --status-soft: rgba(92,31,36,0.14); }
.wayfarer-card--status-fallen    { --status-color: var(--ink-faded); --status-soft: rgba(107,93,74,0.12); }
[data-theme="dark"] .wayfarer-card--status-wounded { --status-color: #b8694a; --status-soft: rgba(184,105,74,0.18); }

.wayfarer-card__sep {
  border: none;
  border-top: 1px dotted var(--p-3);
  margin: 0.5rem 0 0.9rem;
}

.wayfarer-card__field {
  margin-bottom: 0.85rem;
}
.wayfarer-card__field-label {
  font-family: var(--display);
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-faded);
  margin-bottom: 0.25rem;
  padding-bottom: 0.15rem;
  border-bottom: 1px solid var(--p-3);
}
.wayfarer-card__field-value {
  font-family: var(--rubric);
  font-size: 1rem;
  line-height: 1.5;
  color: var(--ink);
  white-space: pre-wrap;
}
.wayfarer-card__field--oath .wayfarer-card__field-value {
  font-style: italic;
  color: var(--accent);
  font-size: 1.05rem;
}
[data-theme="dark"] .wayfarer-card__field--oath .wayfarer-card__field-value {
  color: var(--ink);
  font-style: italic;
}

.wayfarer-card__backlinks {
  display: flex; flex-wrap: wrap; gap: 0.35rem;
  margin: 0.3rem 0 0.6rem;
}

.wayfarer-card__actions {
  display: flex; gap: 0.4rem; flex-wrap: wrap;
  margin-top: auto;
  padding-top: 0.55rem;
  border-top: 1px dashed var(--p-3);
}

.wayfarer-card--highlight {
  animation: keepHighlight 2.2s ease-out;
}

/* ----- MODULE: THE FELLOWSHIP (Companions) ---------------------------- */
.fellowship__head {
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: var(--rule);
  display: flex; flex-wrap: wrap; gap: 0.7rem;
  align-items: center; justify-content: space-between;
}
.fellowship__count { font-family: var(--rubric); font-style: italic; color: var(--ink-faded); font-size: 0.95rem; }
.fellowship__grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 1.1rem;
}

.fellowship-card {
  --accent: var(--ink-soft);
  --accent-d: var(--ink);
  --accent-soft: rgba(58,47,36,0.08);
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1.1rem 1.2rem 0.85rem;
  position: relative;
  display: flex; flex-direction: column;
}
.fellowship-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--accent), var(--accent-d));
}
.fellowship-card--departed { opacity: 0.6; }
.fellowship-card--fallen { opacity: 0.6; }

.fellowship-card__head {
  display: flex; align-items: center; gap: 0.8rem;
  margin: 0.15rem 0 0.5rem;
}
.fellowship-card__glyph {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent-soft);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 1.4rem;
  line-height: 1;
}
.fellowship-card__title { flex: 1; min-width: 0; }
.fellowship-card__name {
  font-family: var(--display);
  font-size: 1.15rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink);
  line-height: 1.15;
}
.fellowship-card__meta {
  display: flex; gap: 0.5rem; align-items: center;
  margin-top: 0.2rem;
  flex-wrap: wrap;
}
.fellowship-card__archetype {
  font-family: var(--display);
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faded);
}
.fellowship-card__status {
  font-family: var(--display);
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 0.15rem 0.5rem;
  background: var(--status-soft, rgba(58,47,36,0.1));
  border: 1px solid var(--status-color, var(--ink-soft));
  color: var(--status-color, var(--ink-soft));
}
.fellowship-card--status-hale      { --status-color: var(--forest); --status-soft: rgba(45,74,53,0.12); }
.fellowship-card--status-wounded   { --status-color: #8a4a2c;       --status-soft: rgba(138,74,44,0.14); }
.fellowship-card--status-lost      { --status-color: #4a5764;       --status-soft: rgba(74,87,100,0.14); }
.fellowship-card--status-fallen    { --status-color: var(--wine);   --status-soft: rgba(92,31,36,0.12); }
.fellowship-card--status-departed  { --status-color: var(--gold-d); --status-soft: rgba(184,146,58,0.16); }
[data-theme="dark"] .fellowship-card--status-wounded { --status-color: #b8694a; --status-soft: rgba(184,105,74,0.18); }
[data-theme="dark"] .fellowship-card--status-lost    { --status-color: #758494; --status-soft: rgba(117,132,148,0.16); }

.fellowship-card__voice {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.95rem;
  line-height: 1.45;
  color: var(--ink-soft);
  margin-bottom: 0.55rem;
}

.fellowship-card__bond {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 0.4rem 0.8rem;
  align-items: center;
  margin-bottom: 0.65rem;
}
.fellowship-card__bond-label {
  font-family: var(--display);
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faded);
}
.fellowship-card__bond-value {
  font-family: var(--rubric);
  font-size: 0.95rem;
  color: var(--ink);
}
.fellowship-card__bond-bar {
  grid-column: 1 / -1;
  margin: 0;
}
.fellowship-card__bond-controls {
  grid-column: 1 / -1;
  display: flex; gap: 0.3rem; justify-content: center;
  margin-top: 0.15rem;
}

.fellowship-card__quote {
  background: var(--p-1);
  border-left: 3px solid var(--accent);
  padding: 0.75rem 0.95rem;
  margin: 0.35rem 0 0.55rem;
  display: flex; align-items: flex-start; gap: 0.6rem;
  min-height: 3.5em;
}
.fellowship-card__quote-text {
  flex: 1;
  font-family: var(--rubric);
  font-style: italic;
  font-size: 1rem;
  color: var(--ink);
  line-height: 1.5;
  animation: fellowshipSpeakIn 0.32s ease-out;
}
.fellowship-card__quote-text::before {
  content: '\201C';
  font-family: var(--serif);
  font-size: 1.4em;
  color: var(--ink-faded);
  vertical-align: -0.18em;
  margin-right: 0.05em;
}
.fellowship-card__quote-text::after {
  content: '\201D';
  font-family: var(--serif);
  font-size: 1.4em;
  color: var(--ink-faded);
  vertical-align: -0.18em;
  margin-left: 0.05em;
}
.fellowship-card__quote--empty .fellowship-card__quote-text {
  font-style: italic;
