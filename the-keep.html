    const CONDITIONS = [
      'poisoned','stunned','prone','bleeding','frightened','charmed',
      'restrained','blinded','burning','silenced','inspired','blessed','hidden'
    ];

    // ===== State ======================================================
    function emptyEncounter() {
      return { status: 'building', combatants: [], round: 1, turnIdx: 0,
        log: [], startedAt: null, endedAt: null, endPending: false };
    }
    let state = (await Vault.get('skirmish-active')) || emptyEncounter();
    if (!state.log) state.log = [];
    if (!state.combatants) state.combatants = [];

    let activePanel = null;       // 'fellowship' | 'faces' | 'quick' | 'epic' | 'custom' | null
    let condMenuFor = null;       // combatant id whose condition menu is open
    let qrPool = [];              // quick roll widget state
    let qrMod = 0;
    let qrRecent = [];

    const today = await Refs.today();

    function dN(count, sides) {
      let t = 0;
      for (let i = 0; i < count; i++) t += 1 + Math.floor(Math.random() * sides);
      return t;
    }
    function randInRange(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }
    function save() { return Vault.set('skirmish-active', state); }
    function logAction(text) {
      state.log.unshift({ round: state.round, ts: Date.now(), text });
      if (state.log.length > 200) state.log.length = 200;
    }

    // ===== Add operations ============================================
    function addCombatant(c) {
      state.combatants.push(c);
    }

    async function pickFellowship(ids, includeWounded) {
      const fellows = (await Vault.get('fellowship')) || [];
      const allowed = fellows.filter(f =>
        ids.includes(f.id) && (f.status === 'hale' || (includeWounded && f.status === 'wounded')));
      for (const f of allowed) {
        const def = allyDefaultsFor(f.archetype);
        addCombatant({
          id: U.uid(),
          side: 'ally',
          source: 'fellowship',
          sourceId: f.id,
          name: f.name,
          kind: (f.archetype || 'companion').charAt(0).toUpperCase() + (f.archetype || 'companion').slice(1),
          flavor: f.voice || '',
          hp: { current: def.hp, max: def.hp },
          initMod: def.mod,
          init: 0,
          conditions: [],
          status: f.status === 'wounded' ? 'wounded-start' : 'active'
        });
      }
    }

    async function pickFaces(ids) {
      const npcs = (await Vault.get('faces-roster')) || [];
      const allowed = npcs.filter(n => ids.includes(n.id));
      for (const n of allowed) {
        addCombatant({
          id: U.uid(),
          side: 'ally',
          source: 'faces',
          sourceId: n.id,
          name: n.name,
          kind: n.role || 'NPC',
          flavor: n.voice || '',
          hp: { current: 14, max: 14 },
          initMod: 1,
          init: 0,
          conditions: [],
          status: 'active'
        });
      }
    }

    function generateQuickFoes(archetypeId, tierId, count) {
      const arch = FOE_TYPES[archetypeId];
      const tier = TIERS.find(t => t.id === tierId);
      if (!arch || !tier) return;
      const namesShuffled = [...arch.names].sort(() => Math.random() - 0.5);
      for (let i = 0; i < count; i++) {
        let name = namesShuffled[i % namesShuffled.length];
        if (i >= namesShuffled.length) name += ' (' + String.fromCharCode(97 + Math.floor(i / namesShuffled.length)) + ')';
        const hp = randInRange(tier.hp[0], tier.hp[1]);
        addCombatant({
          id: U.uid(),
          side: 'foe',
          source: 'generated',
          name,
          kind: arch.label + ' (' + tier.name + ')',
          flavor: '',
          hp: { current: hp, max: hp },
          initMod: tier.mod,
          init: 0,
          conditions: [],
          status: 'active'
        });
      }
    }

    function addEpicFoe(foe) {
      addCombatant({
        id: U.uid(),
        side: 'foe',
        source: 'epic',
        name: foe.name,
        kind: foe.kind,
        flavor: foe.flavor,
        hp: { current: foe.hp, max: foe.hp },
        initMod: foe.mod,
        init: 0,
        conditions: [],
        status: 'active',
        epic: true
      });
    }

    function addCustom(data) {
      const hp = parseInt(data.hp, 10) || 10;
      const mod = parseInt(data.mod, 10) || 0;
      addCombatant({
        id: U.uid(),
        side: data.side,
        source: 'manual',
        name: data.name,
        kind: data.kind || '',
        flavor: '',
        hp: { current: hp, max: hp },
        initMod: mod,
        init: 0,
        conditions: [],
        status: 'active'
      });
    }

    function removeCombatant(id) {
      state.combatants = state.combatants.filter(c => c.id !== id);
    }

    // ===== Combat operations =========================================
    function rollInitiative() {
      state.combatants.forEach(c => { c.init = dN(1, 20) + (c.initMod || 0); });
      state.combatants.sort((a, b) => b.init - a.init);
    }

    function begin() {
      if (state.combatants.length < 2) return;
      state.status = 'active';
      state.round = 1;
      state.turnIdx = 0;
      state.startedAt = Date.now();
      state.log = [];
      logAction('Steel drawn. The fray begins.');
    }

    function indexIsValid(i) {
      const c = state.combatants[i];
      return c && c.status !== 'down';
    }

    function nextTurn() {
      if (!state.combatants.length) return;
      let i = state.turnIdx;
      let attempts = 0;
      do {
        i++;
        if (i >= state.combatants.length) {
          i = 0;
          state.round++;
          logAction('Round ' + state.round + ' begins.');
        }
        attempts++;
      } while (!indexIsValid(i) && attempts < state.combatants.length * 2);
      state.turnIdx = i;
    }

    function changeHP(id, delta) {
      const c = state.combatants.find(x => x.id === id);
      if (!c) return;
      const before = c.hp.current;
      c.hp.current = Math.max(0, Math.min(c.hp.max, c.hp.current + delta));
      const diff = c.hp.current - before;
      if (diff === 0) return;
      if (diff < 0) logAction(c.name + ' \u2212' + Math.abs(diff) + ' HP (' + c.hp.current + '/' + c.hp.max + ')');
      else          logAction(c.name + ' +' + diff + ' HP (' + c.hp.current + '/' + c.hp.max + ')');
      if (c.hp.current === 0 && c.status !== 'down') {
        c.status = 'down';
        logAction(c.name + ' falls.');
      } else if (c.hp.current > 0 && c.status === 'down') {
        c.status = 'active';
        logAction(c.name + ' rises.');
      }
    }

    function toggleCondition(id, cond) {
      const c = state.combatants.find(x => x.id === id);
      if (!c) return;
      if (c.conditions.includes(cond)) {
        c.conditions = c.conditions.filter(x => x !== cond);
        logAction(c.name + ' is no longer ' + cond + '.');
      } else {
        c.conditions.push(cond);
        logAction(c.name + ' is now ' + cond + '.');
      }
    }

    function quickRollFor(c) {
      const roll = dN(1, 20);
      const total = roll + (c.initMod || 0);
      const text = c.name + ' rolls d20+' + (c.initMod || 0) + ': ' + total +
        (roll === 20 ? ' (boon!)' : roll === 1 ? ' (bane!)' : '');
      logAction(text);
      return { roll, total, crit: roll === 20, fumble: roll === 1 };
    }

    // ===== End encounter =============================================
    async function endEncounter(summaryText, casualtyDecisions) {
      // 1. update fellowship statuses for ally combatants that came from Fellowship
      const fellows = (await Vault.get('fellowship')) || [];
      let dirty = false;
      state.combatants.forEach(c => {
        if (c.source !== 'fellowship' || c.side !== 'ally') return;
        const decision = casualtyDecisions[c.id];
        if (!decision) return;
        const f = fellows.find(x => x.id === c.sourceId);
        if (!f) return;
        f.status = decision;
        f.updated = Date.now();
        dirty = true;
      });
      if (dirty) await Vault.set('fellowship', fellows);

      // 2. pin a summary line to today\u2019s note
      const rounds = state.round;
      const allies = state.combatants.filter(c => c.side === 'ally');
      const foes = state.combatants.filter(c => c.side === 'foe');
      const alliesDown = allies.filter(c => c.status === 'down').length;
      const foesDown = foes.filter(c => c.status === 'down').length;
      const auto = 'SKIRMISH: ' + rounds + ' round' + (rounds === 1 ? '' : 's') +
        ', ' + foesDown + '/' + foes.length + ' foes down, ' +
        alliesDown + '/' + allies.length + ' allies down';
      const text = (summaryText && summaryText.trim())
        ? 'SKIRMISH: ' + summaryText.trim() + ' (' + rounds + ' round' + (rounds === 1 ? '' : 's') + ')'
        : auto;
      const t = await Refs.pinToToday(text, {
        module: 'skirmish',
        label: rounds + ' round' + (rounds === 1 ? '' : 's')
      });

      // 3. clear active encounter
      state = emptyEncounter();
      await save();
      U.toast('Encounter ended; pinned to ' + (await Refs.formatDate(t)));
    }

    // ===== Render ====================================================
    function render() {
      body.innerHTML = '';
      const wrap = U.el('div', { class: 'skirmish' });
      body.append(wrap);
      if (state.status === 'building') renderBuilder(wrap);
      else if (state.status === 'active') renderActive(wrap);

      // re-mount the actions area each render so the buttons stay current
      actions.innerHTML = '';
      if (state.status === 'active' && !state.endPending) {
        actions.append(
          U.el('button', {
            class: 'btn btn--ghost btn--small',
            onclick: () => { state.endPending = true; save(); render(); }
          }, 'End Encounter')
        );
      } else if (state.status === 'building' && state.combatants.length) {
        actions.append(
          U.el('button', {
            class: 'btn btn--ghost btn--small',
            onclick: async () => {
              if (!confirm('Clear the entire roster?')) return;
              state = emptyEncounter();
              await save();
              render();
            }
          }, 'Clear Roster')
        );
      }
    }

    // ----- Builder mode ---------------------------------------------
    function renderBuilder(wrap) {
      wrap.append(U.el('div', { class: 'skirmish__intro' },
        'Build the roster, set the wounds, then roll initiative and begin.'));

      // Add buttons row
      const addRow = U.el('div', { class: 'skirmish__add-row' });
      const addBtn = (id, label) => U.el('button', {
        class: 'skirmish__add-btn' + (activePanel === id ? ' skirmish__add-btn--active' : ''),
        onclick: () => { activePanel = (activePanel === id) ? null : id; render(); }
      }, label);
      addRow.append(
        addBtn('fellowship', '+ Fellowship'),
        addBtn('faces',      '+ Hall of Faces'),
        addBtn('quick',      '+ Quick Foes'),
        addBtn('epic',       '+ Epic Foe'),
        addBtn('custom',     '+ Custom')
      );
      wrap.append(addRow);

      if (activePanel) wrap.append(renderAddPanel());

      // Roster
      const roster = U.el('div', { class: 'skirmish__roster' });
      roster.append(renderSide('ally', 'Allies'), renderSide('foe', 'Foes'));
      wrap.append(roster);

      // Roster footer actions
      if (state.combatants.length) {
        const footer = U.el('div', { class: 'skirmish__roster-actions' });
        footer.append(
          U.el('button', {
            class: 'btn btn--ghost',
            onclick: async () => { rollInitiative(); await save(); render(); }
          }, 'Roll Initiative'),
          U.el('button', {
            class: 'skirmish__begin',
            disabled: state.combatants.length < 2,
            title: state.combatants.length < 2 ? 'Need at least 2 combatants' : 'Begin the encounter',
            onclick: async () => {
              if (state.combatants.every(c => !c.init)) rollInitiative();
              begin();
              await save();
              render();
            }
          }, 'Begin Encounter')
        );
        wrap.append(footer);
      }
    }

    function renderAddPanel() {
      if (activePanel === 'fellowship') return renderFellowshipPanel();
      if (activePanel === 'faces')      return renderFacesPanel();
      if (activePanel === 'quick')      return renderQuickPanel();
      if (activePanel === 'epic')       return renderEpicPanel();
      if (activePanel === 'custom')     return renderCustomPanel();
      return document.createElement('div');
    }

    function renderFellowshipPanel() {
      const panel = U.el('div', { class: 'skirmish__add-panel' });
      panel.append(U.el('div', { class: 'skirmish__add-panel-head' }, 'Allies from the Fellowship'));
      const selected = new Set();
      const includeWounded = { value: false };
      const list = U.el('div', { class: 'skirmish__pick-list' });
      panel.append(list);
      // load and render
      (async () => {
        const fellows = (await Vault.get('fellowship')) || [];
        const eligible = fellows.filter(f => f.status === 'hale' || f.status === 'wounded');
        if (!eligible.length) {
          list.append(U.el('div', { class: 'skirmish__add-empty' },
            'No hale or wounded companions in the Fellowship.'));
          return;
        }
        const renderRow = (f) => {
          const row = U.el('div', {
            class: 'skirmish__pick-row' + (selected.has(f.id) ? ' skirmish__pick-row--selected' : '')
          });
          row.onclick = () => {
            if (selected.has(f.id)) selected.delete(f.id);
            else selected.add(f.id);
            row.className = 'skirmish__pick-row' + (selected.has(f.id) ? ' skirmish__pick-row--selected' : '');
          };
          row.append(
            U.el('div', { class: 'skirmish__pick-name' }, f.name),
            U.el('div', { class: 'skirmish__pick-meta' }, f.archetype || ''),
            U.el('div', { class: 'skirmish__pick-status skirmish__pick-status--' + f.status }, f.status)
          );
          return row;
        };
        const renderList = () => {
          list.innerHTML = '';
          const shown = eligible.filter(f => f.status === 'hale' || includeWounded.value);
          if (!shown.length) {
            list.append(U.el('div', { class: 'skirmish__add-empty' }, 'No companions match.'));
            return;
          }
          shown.forEach(f => list.append(renderRow(f)));
        };
        renderList();
        // wounded toggle
        const woundedToggle = U.el('label', { style: 'display:flex;align-items:center;gap:0.4rem;cursor:pointer;font-family:var(--rubric);font-style:italic;color:var(--ink-soft);margin-bottom:0.7rem;' });
        const cb = U.el('input', { type: 'checkbox', onchange: (e) => { includeWounded.value = e.target.checked; renderList(); } });
        woundedToggle.append(cb, document.createTextNode(' include wounded companions'));
        panel.insertBefore(woundedToggle, list);
        // add button
        panel.append(U.el('button', {
          class: 'btn btn--primary btn--small',
          onclick: async () => {
            if (!selected.size) return;
            await pickFellowship([...selected], includeWounded.value);
            activePanel = null;
            await save();
            render();
          }
        }, 'Add Selected'));
      })();
      return panel;
    }

    function renderFacesPanel() {
      const panel = U.el('div', { class: 'skirmish__add-panel' });
      panel.append(U.el('div', { class: 'skirmish__add-panel-head' }, 'NPCs from the Hall of Faces'));
      const selected = new Set();
      const list = U.el('div', { class: 'skirmish__pick-list' });
      panel.append(list);
      (async () => {
        const npcs = (await Vault.get('faces-roster')) || [];
        if (!npcs.length) {
          list.append(U.el('div', { class: 'skirmish__add-empty' },
            'No NPCs inducted into the Hall yet.'));
          return;
        }
        npcs.forEach(n => {
          const row = U.el('div', { class: 'skirmish__pick-row' });
          row.onclick = () => {
            if (selected.has(n.id)) selected.delete(n.id);
            else selected.add(n.id);
            row.className = 'skirmish__pick-row' + (selected.has(n.id) ? ' skirmish__pick-row--selected' : '');
          };
          row.append(
            U.el('div', { class: 'skirmish__pick-name' }, n.name),
            U.el('div', { class: 'skirmish__pick-meta' }, (n.role || '') + (n.culture ? ' \u00B7 ' + n.culture : ''))
          );
          list.append(row);
        });
        panel.append(U.el('button', {
          class: 'btn btn--primary btn--small',
          onclick: async () => {
            if (!selected.size) return;
            await pickFaces([...selected]);
            activePanel = null;
            await save();
            render();
          }
        }, 'Add Selected'));
      })();
      return panel;
    }

    function renderQuickPanel() {
      const panel = U.el('div', { class: 'skirmish__add-panel' });
      panel.append(U.el('div', { class: 'skirmish__add-panel-head' }, 'Quick Foes (anonymous archetype)'));
      const form = U.el('div', { class: 'skirmish__inline-form' });
      const archSel = U.el('select', { class: 'skirmish__select' });
      Object.entries(FOE_TYPES).forEach(([id, t]) => {
        archSel.append(U.el('option', { value: id }, t.label));
      });
      const tierSel = U.el('select', { class: 'skirmish__select' });
      TIERS.forEach(t => tierSel.append(U.el('option', { value: t.id }, t.name + ' \u2014 HP ' + t.hp[0] + '\u2013' + t.hp[1])));
      tierSel.value = 'regular';
      const countInp = U.el('input', { type: 'number', min: '1', max: '12', value: '3', class: 'skirmish__input' });
      form.append(
        U.el('label', {}, ['Archetype', archSel]),
        U.el('label', {}, ['Tier', tierSel]),
        U.el('label', {}, ['Count', countInp])
      );
      panel.append(form);
      panel.append(U.el('button', {
        class: 'btn btn--primary btn--small',
        onclick: async () => {
          const n = Math.max(1, Math.min(12, parseInt(countInp.value, 10) || 1));
          generateQuickFoes(archSel.value, tierSel.value, n);
          activePanel = null;
          await save();
          render();
        }
      }, 'Generate'));
      return panel;
    }

    function renderEpicPanel() {
      const panel = U.el('div', { class: 'skirmish__add-panel' });
      panel.append(U.el('div', { class: 'skirmish__add-panel-head' }, 'Epic Foe (named, with flavor)'));
      panel.append(U.el('button', {
        class: 'btn btn--ghost btn--small',
        style: 'margin-bottom:0.7rem;',
        onclick: async () => {
          addEpicFoe(U.pick(EPIC_FOES));
          activePanel = null;
          await save();
          render();
        }
      }, '\u2767 Choose for me (random)'));
      const list = U.el('div', { class: 'skirmish__epic-list' });
      EPIC_FOES.forEach(foe => {
        const row = U.el('button', {
          class: 'skirmish__epic-row',
          onclick: async () => {
            addEpicFoe(foe);
            activePanel = null;
            await save();
            render();
          }
        });
        row.append(
          U.el('div', { class: 'skirmish__epic-name' }, foe.name),
          U.el('div', { class: 'skirmish__epic-kind' }, foe.kind + ' \u00B7 HP ' + foe.hp + ' \u00B7 init +' + foe.mod),
          U.el('div', { class: 'skirmish__epic-flavor' }, foe.flavor)
        );
        list.append(row);
      });
      panel.append(list);
      return panel;
    }

    function renderCustomPanel() {
      const panel = U.el('div', { class: 'skirmish__add-panel' });
      panel.append(U.el('div', { class: 'skirmish__add-panel-head' }, 'Custom Combatant'));
      const sideSel = U.el('select', { class: 'skirmish__select' });
      sideSel.append(
        U.el('option', { value: 'ally' }, 'Ally'),
        U.el('option', { value: 'foe' }, 'Foe')
      );
      const nameInp = U.el('input', { type: 'text', class: 'skirmish__input', placeholder: 'Name' });
      const kindInp = U.el('input', { type: 'text', class: 'skirmish__input', placeholder: 'e.g. Bandit, Knight' });
      const hpInp = U.el('input', { type: 'number', min: '1', value: '10', class: 'skirmish__input' });
      const modInp = U.el('input', { type: 'number', value: '0', class: 'skirmish__input' });
      const form = U.el('div', { class: 'skirmish__inline-form' });
      form.append(
        U.el('label', {}, ['Side', sideSel]),
        U.el('label', {}, ['Name', nameInp]),
        U.el('label', {}, ['Kind', kindInp]),
        U.el('label', {}, ['Max HP', hpInp]),
        U.el('label', {}, ['Init Mod', modInp])
      );
      panel.append(form);
      panel.append(U.el('button', {
        class: 'btn btn--primary btn--small',
        onclick: async () => {
          if (!nameInp.value.trim()) { U.toast('Name required.'); return; }
          addCustom({
            side: sideSel.value,
            name: nameInp.value.trim(),
            kind: kindInp.value.trim(),
            hp: hpInp.value,
            mod: modInp.value
          });
          activePanel = null;
          await save();
          render();
        }
      }, 'Add'));
      return panel;
    }

    function renderSide(side, label) {
      const sideDiv = U.el('div', { class: 'skirmish__side skirmish__side--' + (side === 'ally' ? 'allies' : 'foes') });
      const list = state.combatants.filter(c => c.side === side);
      const head = U.el('div', { class: 'skirmish__side-head' });
      head.append(
        U.el('span', {}, label),
        U.el('span', { class: 'skirmish__side-count' }, list.length + ' on the field')
      );
      sideDiv.append(head);
      if (!list.length) {
        sideDiv.append(U.el('div', { class: 'skirmish__side-empty' },
          side === 'ally' ? 'No allies yet. Add some from the Fellowship.'
                          : 'No foes yet. Generate some.'));
        return sideDiv;
      }
      list.forEach(c => sideDiv.append(renderCombatant(c)));
      return sideDiv;
    }

    // ----- Active mode ----------------------------------------------
    function renderActive(wrap) {
      // End-encounter dialog overlay
      if (state.endPending) {
        wrap.append(renderEndPanel());
        return;
      }

      const current = state.combatants[state.turnIdx];
      const head = U.el('div', { class: 'skirmish__round-head' });
      head.append(
        U.el('span', { class: 'skirmish__round-label' }, 'Round ' + state.round),
        U.el('span', { class: 'skirmish__round-turn' },
          current ? ['turn of ', U.el('b', {}, current.name)] : 'no combatants on the field'),
        U.el('div', { class: 'skirmish__round-actions' }, [
          U.el('button', {
            class: 'skirmish__next-turn',
            onclick: async () => { nextTurn(); await save(); render(); }
          }, 'Next Turn')
        ])
      );
      wrap.append(head);

      // sides
      const roster = U.el('div', { class: 'skirmish__roster' });
      roster.append(renderSide('ally', 'Allies'), renderSide('foe', 'Foes'));
      wrap.append(roster);

      // action log
      const log = U.el('div', { class: 'skirmish__log' });
      log.append(U.el('div', { class: 'skirmish__log-head' }, 'Action Log'));
      const logList = U.el('div', { class: 'skirmish__log-list' });
      if (!state.log.length) {
        logList.append(U.el('div', { class: 'skirmish__log-empty' }, 'No actions yet.'));
      } else {
        state.log.forEach(entry => {
          const row = U.el('div', { class: 'skirmish__log-row' });
          row.append(
            U.el('span', { class: 'skirmish__log-round' }, 'R' + entry.round),
            U.el('span', { class: 'skirmish__log-text' }, entry.text)
          );
          logList.append(row);
        });
      }
      log.append(logList);
      wrap.append(log);

      // quick roll
      wrap.append(renderQuickRoll());
    }

    function renderCombatant(c) {
      const isCurrent = state.status === 'active' &&
        state.combatants[state.turnIdx] && state.combatants[state.turnIdx].id === c.id;
      const card = U.el('div', {
        class: 'skirmish__combatant'
          + ' skirmish__combatant--' + (c.side === 'ally' ? 'ally' : 'foe')
          + (isCurrent ? ' skirmish__combatant--active' : '')
          + (c.status === 'down' ? ' skirmish__combatant--down' : '')
      });

      const headWrap = U.el('div', {});
      const headLine = U.el('div', { class: 'skirmish__c-head' });
      headLine.append(
        U.el('span', { class: 'skirmish__c-name' }, c.name),
        c.kind ? U.el('span', { class: 'skirmish__c-kind' }, c.kind) : null
      );
      headWrap.append(headLine);
      if (c.flavor && (c.epic || state.status === 'building')) {
        headWrap.append(U.el('div', { class: 'skirmish__c-flavor' }, c.flavor));
      }
      card.append(headWrap);

      const initBox = U.el('div', { class: 'skirmish__c-init' });
      if (state.status === 'active') {
        initBox.append('init', U.el('b', {}, c.init.toString()));
      } else {
        initBox.append('mod +' + (c.initMod || 0));
      }
      card.append(initBox);

      // HP bar
      const pct = c.hp.max ? Math.max(0, (c.hp.current / c.hp.max) * 100) : 0;
      const bar = U.el('div', { class: 'skirmish__hpbar' });
      bar.append(U.el('div', { class: 'skirmish__hpbar-fill', style: { width: pct + '%' } }));
      card.append(bar);
      const hpText = U.el('div', { class: 'skirmish__hp-text' });
      hpText.append(
        U.el('span', {}, c.status === 'down' ? 'DOWN' : 'HP'),
        U.el('span', { class: 'skirmish__hp-current' }, c.hp.current + ' / ' + c.hp.max)
      );
      card.append(hpText);

      // HP buttons (only in active mode)
      if (state.status === 'active') {
        const hpBtns = U.el('div', { class: 'skirmish__hp-buttons' });
        const customInp = U.el('input', { type: 'number', placeholder: 'n', class: 'skirmish__hp-custom' });
        const applyN = async (sign) => {
          const v = parseInt(customInp.value, 10);
          if (!v || isNaN(v)) return;
          changeHP(c.id, sign * Math.abs(v));
          customInp.value = '';
          await save();
          render();
        };
        const hpBtn = (label, delta, cls) => U.el('button', {
          class: 'skirmish__hp-btn skirmish__hp-btn--' + cls,
          onclick: async () => { changeHP(c.id, delta); await save(); render(); }
        }, label);
        hpBtns.append(
          hpBtn('\u22125', -5, 'dmg'),
          hpBtn('\u22121', -1, 'dmg'),
          hpBtn('+1', +1, 'heal'),
          hpBtn('+5', +5, 'heal'),
          customInp,
          U.el('button', { class: 'skirmish__hp-btn skirmish__hp-btn--dmg', onclick: () => applyN(-1) }, 'dmg'),
          U.el('button', { class: 'skirmish__hp-btn skirmish__hp-btn--heal', onclick: () => applyN(+1) }, 'heal')
        );
        card.append(hpBtns);
      }

      // conditions
      const condsWrap = U.el('div', { class: 'skirmish__conds' });
      c.conditions.forEach(cond => {
        condsWrap.append(U.el('button', {
          class: 'skirmish__cond skirmish__cond--' + cond,
          title: 'click to remove ' + cond,
          onclick: async () => { toggleCondition(c.id, cond); await save(); render(); }
        }, [cond, U.el('span', { class: 'skirmish__cond-x' }, '\u00D7')]));
      });
      const addCondWrap = U.el('span', { class: 'skirmish__cond-add' });
      const addBtn = U.el('button', {
        class: 'skirmish__cond-add-btn',
        onclick: (e) => {
          e.stopPropagation();
          condMenuFor = (condMenuFor === c.id) ? null : c.id;
          render();
        }
      }, '+ condition');
      addCondWrap.append(addBtn);
      if (condMenuFor === c.id) {
        const menu = U.el('div', { class: 'skirmish__cond-menu' });
        CONDITIONS.filter(x => !c.conditions.includes(x)).forEach(cond => {
          menu.append(U.el('button', {
            class: 'skirmish__cond-menu-item',
            onclick: async (e) => {
              e.stopPropagation();
              toggleCondition(c.id, cond);
              condMenuFor = null;
              await save();
              render();
            }
          }, cond));
        });
        addCondWrap.append(menu);
      }
      condsWrap.append(addCondWrap);
      card.append(condsWrap);

      // controls
      const controls = U.el('div', { class: 'skirmish__c-controls' });
      if (state.status === 'active') {
        const rollResultSpan = U.el('span', { class: 'skirmish__c-roll-result' });
        controls.append(
          U.el('button', {
            class: 'skirmish__c-action',
            onclick: async () => {
              const r = quickRollFor(c);
              rollResultSpan.textContent = 'd20+' + (c.initMod || 0) + ' = ' + r.total;
              rollResultSpan.className = 'skirmish__c-roll-result' +
                (r.crit ? ' skirmish__c-roll-result--crit' : '') +
                (r.fumble ? ' skirmish__c-roll-result--fumble' : '');
              await save();
              // partial: refresh just the log without losing this card's roll display
              const logList = body.querySelector('.skirmish__log-list');
              if (logList) {
                logList.innerHTML = '';
                state.log.forEach(entry => {
                  const row = U.el('div', { class: 'skirmish__log-row' });
                  row.append(
                    U.el('span', { class: 'skirmish__log-round' }, 'R' + entry.round),
                    U.el('span', { class: 'skirmish__log-text' }, entry.text)
                  );
                  logList.append(row);
                });
              }
            }
          }, 'Roll d20+' + (c.initMod || 0)),
          rollResultSpan
        );
        if (c.status === 'down') {
          controls.append(U.el('button', {
            class: 'skirmish__c-action',
            onclick: async () => {
              c.status = 'active';
              c.hp.current = Math.max(1, Math.floor(c.hp.max / 4));
              logAction(c.name + ' is restored to ' + c.hp.current + ' HP.');
              await save();
              render();
            }
          }, 'Restore'));
        }
      }
      controls.append(U.el('button', {
        class: 'skirmish__c-action',
        onclick: async () => {
          removeCombatant(c.id);
          await save();
          render();
        }
      }, state.status === 'active' ? 'Remove' : 'Remove'));
      card.append(controls);

      return card;
    }

    function renderQuickRoll() {
      const widget = U.el('div', { class: 'skirmish__quickroll' });
      widget.append(U.el('div', { class: 'skirmish__quickroll-head' }, 'Quick Roll'));
      const controls = U.el('div', { class: 'skirmish__quickroll-controls' });
      [4, 6, 8, 10, 12, 20, 100].forEach(s => {
        controls.append(U.el('button', {
          class: 'skirmish__qr-die',
          onclick: () => {
            const ex = qrPool.find(g => g.sides === s);
            if (ex) ex.count++;
            else qrPool.push({ sides: s, count: 1 });
            renderQRPool();
          }
        }, 'd' + s));
      });
      const modBox = U.el('div', { class: 'skirmish__qr-mod' });
      modBox.append(U.el('span', { class: 'skirmish__qr-mod-label' }, 'mod'));
      modBox.append(U.el('button', {
        class: 'btn btn--ghost btn--small',
        onclick: () => { qrMod--; renderQRMod(); }
      }, '\u2212'));
      const modVal = U.el('span', { class: 'skirmish__qr-mod-value' }, '0');
      modBox.append(modVal);
      modBox.append(U.el('button', {
        class: 'btn btn--ghost btn--small',
        onclick: () => { qrMod++; renderQRMod(); }
      }, '+'));
      controls.append(modBox);
      controls.append(U.el('button', {
        class: 'skirmish__qr-clear',
        onclick: () => { qrPool = []; qrMod = 0; renderQRPool(); renderQRMod(); }
      }, 'clear'));
      widget.append(controls);

      const pool = U.el('div', { class: 'skirmish__qr-pool' });
      widget.append(pool);

      const castBtn = U.el('button', {
        class: 'skirmish__qr-cast',
        onclick: () => {
          if (!qrPool.length && !qrMod) return;
          let total = qrMod;
          const parts = [];
          qrPool.forEach(g => {
            const rolls = [];
            for (let i = 0; i < g.count; i++) rolls.push(1 + Math.floor(Math.random() * g.sides));
            total += rolls.reduce((a, b) => a + b, 0);
            parts.push(g.count + 'd' + g.sides + ': ' + rolls.join(','));
          });
          const expr = qrPool.map(g => g.count + 'd' + g.sides).join('+') +
            (qrMod ? (qrMod > 0 ? '+' + qrMod : qrMod) : '');
          qrRecent.unshift({ expr, total, parts });
          if (qrRecent.length > 5) qrRecent.length = 5;
          renderQRRecent();
        }
      }, 'Cast');
      widget.append(castBtn);

      const recent = U.el('div', { class: 'skirmish__qr-recent' });
      widget.append(recent);

      function renderQRPool() {
        pool.innerHTML = '';
        if (!qrPool.length) {
          pool.append(U.el('span', { class: 'skirmish__qr-pool-empty' },
            'Tap a die to add. Tap a chip to remove one.'));
          return;
        }
        qrPool.sort((a, b) => a.sides - b.sides);
        qrPool.forEach(g => {
          pool.append(U.el('button', {
            class: 'skirmish__qr-chip',
            onclick: () => {
              g.count--;
              if (g.count <= 0) qrPool = qrPool.filter(x => x !== g);
              renderQRPool();
            }
          }, g.count + 'd' + g.sides));
        });
      }
      function renderQRMod() {
        modVal.textContent = qrMod === 0 ? '0' : (qrMod > 0 ? '+' + qrMod : qrMod.toString());
      }
      function renderQRRecent() {
        recent.innerHTML = '';
        if (!qrRecent.length) return;
        recent.append(U.el('span', { class: 'skirmish__qr-recent-label' }, 'recent:'));
        qrRecent.forEach((r, idx) => {
          recent.append(U.el('span', {
            class: 'skirmish__qr-recent-item' + (idx === 0 ? ' skirmish__qr-recent-item--latest' : ''),
            title: r.parts.join('; ')
          }, r.expr + ' \u2192 ' + r.total));
        });
      }
      renderQRPool();
      renderQRMod();
      renderQRRecent();
      return widget;
    }

    // ----- End encounter panel --------------------------------------
    function renderEndPanel() {
      const panel = U.el('div', { class: 'skirmish__end-panel' });
      panel.append(U.el('div', { class: 'skirmish__end-head' }, '\u2767 End the Encounter \u2767'));
      const rounds = state.round;
      const allies = state.combatants.filter(c => c.side === 'ally');
      const foes = state.combatants.filter(c => c.side === 'foe');
      const alliesDown = allies.filter(c => c.status === 'down');
      const foesDown = foes.filter(c => c.status === 'down');
      panel.append(U.el('div', { class: 'skirmish__end-summary' },
        rounds + ' round' + (rounds === 1 ? '' : 's') + '. ' +
        foesDown.length + ' of ' + foes.length + ' foes down. ' +
        alliesDown.length + ' of ' + allies.length + ' allies down.'));

      const summaryInp = U.el('input', {
        type: 'text',
        class: 'skirmish__end-input',
        placeholder: 'A line for the Almanac (optional)'
      });
      panel.append(U.el('label', {
        style: 'display:block;font-family:var(--display);font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-faded);margin-bottom:0.4rem;'
      }, 'Summary line'));
      panel.append(summaryInp);

      const casualtyDecisions = {};
      const fellowshipDowned = allies.filter(c => c.status === 'down' && c.source === 'fellowship');
      if (fellowshipDowned.length) {
        panel.append(U.el('label', {
          style: 'display:block;font-family:var(--display);font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-faded);margin-bottom:0.4rem;'
        }, 'Fellowship casualties'));
        const cas = U.el('div', { class: 'skirmish__end-casualties' });
        fellowshipDowned.forEach(c => {
          const row = U.el('div', { class: 'skirmish__end-casualty' });
          const sel = U.el('select', { class: 'skirmish__select' });
          ['wounded', 'lost', 'fallen'].forEach(opt => {
            sel.append(U.el('option', { value: opt }, opt));
          });
          sel.value = 'wounded';
          casualtyDecisions[c.id] = 'wounded';
          sel.onchange = () => { casualtyDecisions[c.id] = sel.value; };
          row.append(
            U.el('span', { class: 'skirmish__end-casualty-name' }, c.name),
            U.el('span', { style: 'font-family:var(--rubric);font-style:italic;color:var(--ink-soft);' }, 'mark as'),
            sel
          );
          cas.append(row);
        });
        panel.append(cas);
      }

      const actionsDiv = U.el('div', { class: 'skirmish__end-actions' });
      actionsDiv.append(
        U.el('button', {
          class: 'btn btn--ghost',
          onclick: async () => {
            state.endPending = false;
            await save();
            render();
          }
        }, 'Cancel'),
        U.el('button', {
          class: 'btn btn--ghost',
          onclick: async () => {
            // Compute a tier suggestion from the foe count BEFORE
            // endEncounter clears state. Heuristic: 1 foe paltry,
            // 2-3 modest, 4-5 rich, 6+ royal.
            const foeCount = state.combatants.filter(c => c.side === 'foe').length;
            const suggestedTier =
              foeCount <= 1 ? 'paltry' :
              foeCount <= 3 ? 'modest' :
              foeCount <= 5 ? 'rich' :
              'royal';
            await endEncounter(summaryInp.value, casualtyDecisions);
            await Vault.set('loot-tier', suggestedTier);
            await Keep.mount('loot');
          }
        }, 'End, Pin, and Roll Loot'),
        U.el('button', {
          class: 'btn btn--primary',
          onclick: async () => {
            await endEncounter(summaryInp.value, casualtyDecisions);
            render();
          }
        }, 'End and Pin to Almanac')
      );
      panel.append(actionsDiv);
      return panel;
    }

    // Click outside condition menu closes it
    document.addEventListener('click', (e) => {
      if (!condMenuFor) return;
      if (e.target.closest('.skirmish__cond-add')) return;
      condMenuFor = null;
      render();
    });

    render();
  }
});

/* =========================================================================
   MODULE: THE BONES (Dice Roller)
   Build a pool of dice (any count of any die type), set a modifier, then
   cast. Each die animates in and is highlighted when it shows a max
   value (boon) or a natural 1 on a d20/d100 (bane). History persists
   per chronicle; results can be pinned to the Almanac.
   ========================================================================= */
Keep.register({
  id: 'bones',
  name: 'The Bones',
  category: 'table',
  glyph: 'g-dice',
  tagline: 'Cast bones, count the spots.',
  sub: 'Roll any dice in any number. The chronicler keeps the tallies.',

  async mount(body, actions) {
    const DICE_TYPES = [4, 6, 8, 10, 12, 20, 100];
    let pool = [];   // [{ sides, count }]
    let modifier = 0;
    const history = (await Vault.get('bones-history')) || [];

    const wrap = U.el('div', { class: 'bones' });

    // ---- BUILDER -----------------------------------------------------
    const builder = U.el('div', { class: 'bones__builder' });
    builder.append(U.el('div', { class: 'bones__section-head' }, 'Your Pool'));

    const picker = U.el('div', { class: 'bones__picker' });
    DICE_TYPES.forEach(sides => {
      picker.append(U.el('button', {
        class: 'bones__die-btn',
        title: 'Add a d' + sides + ' to the pool',
        onclick: () => addDie(sides)
      }, 'd' + sides));
    });
    builder.append(picker);

    const poolDisplay = U.el('div', { class: 'bones__pool-display' });
    builder.append(poolDisplay);

    const modSection = U.el('div', { class: 'bones__mod-section' });
    const modLabel = U.el('span', { class: 'bones__mod-label' }, 'Modifier');
    const modMinus = U.el('button', {
      class: 'btn btn--small btn--ghost',
      onclick: () => setModifier(modifier - 1)
    }, '\u2212');
    const modValue = U.el('span', { class: 'bones__mod-value' }, '0');
    const modPlus = U.el('button', {
      class: 'btn btn--small btn--ghost',
      onclick: () => setModifier(modifier + 1)
    }, '+');
    modSection.append(modLabel, modMinus, modValue, modPlus);
    builder.append(modSection);

    builder.append(U.el('button', {
      class: 'bones__cast',
      onclick: () => cast()
    }, 'Cast the Bones'));

    // ---- RESULT (hidden until first cast) ----------------------------
    const result = U.el('div', { class: 'bones__result' });
    result.style.display = 'none';

    // ---- HISTORY -----------------------------------------------------
    const historyDiv = U.el('div', { class: 'bones__history' });

    wrap.append(builder, result, historyDiv);
    body.append(wrap);

    // ---- POOL OPERATIONS --------------------------------------------
    function addDie(sides) {
      const existing = pool.find(g => g.sides === sides);
      if (existing) existing.count++;
      else pool.push({ sides, count: 1 });
      renderPool();
    }
    function removeDie(sides) {
      const existing = pool.find(g => g.sides === sides);
      if (!existing) return;
      existing.count--;
      if (existing.count <= 0) pool = pool.filter(g => g.sides !== sides);
      renderPool();
    }
    function setModifier(v) {
      modifier = v;
      modValue.textContent = v === 0 ? '0' : (v > 0 ? '+' + v : v.toString());
    }
    function renderPool() {
      poolDisplay.innerHTML = '';
      if (!pool.length) {
        poolDisplay.append(U.el('span', { class: 'bones__pool-empty' },
          'No dice in pool. Tap a die above to add it.'));
        return;
      }
      // sort by sides ascending for consistent display
      const sorted = [...pool].sort((a, b) => a.sides - b.sides);
      sorted.forEach(g => {
        poolDisplay.append(U.el('button', {
          class: 'bones__pool-chip',
          title: 'Click to remove one d' + g.sides,
          onclick: () => removeDie(g.sides)
        }, [
          U.el('span', {}, g.count + 'd' + g.sides),
          U.el('span', { class: 'bones__pool-chip-x' }, '\u00D7')
        ]));
      });
    }

    function formatExpression(p, mod) {
      const sorted = [...p].sort((a, b) => a.sides - b.sides);
      const parts = sorted.map(g => g.count + 'd' + g.sides);
      let expr = parts.join(' + ');
      if (mod > 0) expr += ' + ' + mod;
      if (mod < 0) expr += ' \u2212 ' + Math.abs(mod);
      return expr;
    }

    // ---- CAST --------------------------------------------------------
    async function cast() {
      if (!pool.length) {
        poolDisplay.classList.add('bones__pool-display--shake');
        setTimeout(() => poolDisplay.classList.remove('bones__pool-display--shake'), 420);
        return;
      }
      const sortedPool = [...pool].sort((a, b) => a.sides - b.sides);
      const groups = sortedPool.map(g => {
        const rolls = [];
        for (let i = 0; i < g.count; i++) {
          rolls.push(1 + Math.floor(Math.random() * g.sides));
        }
        return { sides: g.sides, count: g.count, rolls };
      });
      const groupSum = groups.reduce((s, g) =>
        s + g.rolls.reduce((a, b) => a + b, 0), 0);
      const rollData = {
        ts: Date.now(),
        groups,
        modifier,
        total: groupSum + modifier,
        expression: formatExpression(pool, modifier)
      };
      renderResult(rollData);
      history.unshift(rollData);
      if (history.length > 50) history.length = 50;
      await Vault.set('bones-history', history);
      renderHistory();
    }

    function renderResult(roll) {
      result.innerHTML = '';
      result.style.display = '';
      result.append(
        U.el('div', { class: 'bones__result-head' }, '\u2767 The Cast \u2767'),
        U.el('div', { class: 'bones__result-expr' }, roll.expression)
      );
      const breakdown = U.el('div', { class: 'bones__result-breakdown' });
      roll.groups.forEach(g => {
        const row = U.el('div', { class: 'bones__result-row' });
        row.append(U.el('span', { class: 'bones__result-row-label' },
          g.count + 'd' + g.sides + ':'));
        const rolls = U.el('span', { class: 'bones__result-row-rolls' });
        g.rolls.forEach(r => {
          const isMax = r === g.sides;
          // fumble styling reserved for d20 and d100 (the systems where
          // a natural 1 is meaningful); on smaller dice a 1 is mundane
          const isMin = r === 1 && (g.sides === 20 || g.sides === 100);
          const cls = 'bones__result-die' +
            (isMax ? ' bones__result-die--max' : '') +
            (isMin ? ' bones__result-die--min' : '');
          rolls.append(U.el('span', { class: cls }, r.toString()));
        });
        row.append(rolls);
        if (g.count > 1) {
          const sum = g.rolls.reduce((a, b) => a + b, 0);
          row.append(U.el('span', { class: 'bones__result-row-sum' }, '= ' + sum));
        }
        breakdown.append(row);
      });
      if (roll.modifier !== 0) {
        const row = U.el('div', { class: 'bones__result-row' });
        row.append(
          U.el('span', { class: 'bones__result-row-label' }, 'Modifier:'),
          U.el('span', { class: 'bones__result-row-rolls' },
            roll.modifier > 0 ? '+' + roll.modifier : roll.modifier.toString())
        );
        breakdown.append(row);
      }
      result.append(breakdown);
      result.append(U.el('div', { class: 'bones__divider' }));
      result.append(U.el('div', { class: 'bones__result-total' }, [
        U.el('span', { class: 'bones__result-total-label' }, 'Total'),
        U.el('span', { class: 'bones__result-total-value' }, roll.total.toString())
      ]));
      result.append(U.el('div', { class: 'bones__result-actions' }, [
        U.el('button', {
          class: 'btn btn--ghost btn--small',
          onclick: async () => {
            const breakdownText = roll.groups
              .map(g => g.count + 'd' + g.sides + ': ' + g.rolls.join(', '))
              .join('; ');
            const modText = roll.modifier !== 0
              ? '; modifier ' + (roll.modifier > 0 ? '+' : '') + roll.modifier
              : '';
            const text = 'BONES: ' + roll.expression + ' \u2192 ' + roll.total +
              ' (' + breakdownText + modText + ')';
            const today = await Refs.pinToToday(text, {
              module: 'bones',
              label: roll.expression + ' = ' + roll.total
            });
            U.toast('Pinned to ' + (await Refs.formatDate(today)));
          }
        }, 'Pin to Almanac'),
        U.el('button', {
          class: 'btn btn--ghost btn--small',
          onclick: () => cast()
        }, 'Cast Again')
      ]));
    }

    // ---- HISTORY ----------------------------------------------------
    function renderHistory() {
      historyDiv.innerHTML = '';
      if (!history.length) {
        historyDiv.style.display = 'none';
        return;
      }
      historyDiv.style.display = '';
      historyDiv.append(U.el('div', { class: 'bones__history-head' }, 'Past Casts'));
      const list = U.el('div', { class: 'bones__history-list' });
      history.slice(0, 12).forEach(h => {
        const time = new Date(h.ts);
        const tStr = time.getHours().toString().padStart(2, '0') + ':' +
          time.getMinutes().toString().padStart(2, '0');
        const row = U.el('div', { class: 'bones__history-row' });
        row.append(
          U.el('span', { class: 'bones__history-time' }, tStr),
          U.el('span', { class: 'bones__history-expr' }, h.expression),
          U.el('span', { class: 'bones__history-arrow' }, '\u2192'),
          U.el('span', { class: 'bones__history-total' }, h.total.toString())
        );
        list.append(row);
      });
      historyDiv.append(list);
    }

    renderPool();
    renderHistory();
    setModifier(0);

    actions.append(
      U.el('button', {
        class: 'btn btn--ghost btn--small',
        onclick: async () => {
          if (!history.length) return;
          if (!confirm('Clear all past casts?')) return;
          history.length = 0;
          await Vault.set('bones-history', history);
          renderHistory();
        }
      }, 'Clear History')
    );
  }
});

/* =========================================================================
   MODULE: HEARTH (Soundscape Mixer)
   Web Audio synthesis. Layered ambient.
   ========================================================================= */
Keep.register({
  id: 'hearth',
  name: 'The Hearth',
  category: 'table',
  glyph: 'g-flame',
  tagline: 'Ambient layers, synthesised from silence.',
  sub: 'Press a layer to wake it. Mix to your scene. Save the scene.',

  audio: null,
  layers: {},
  master: null,
  active: false,

  async mount(body, actions) {

    // Pop Out opens the Hearth in a new browser window via #hearth-popout.

    // the main window freely; the popup keeps playing. Closing the popup
    // stops the audio. Button hides in popout mode (would be redundant).
    const isPopout = window.location.hash === '#hearth-popout';
    if (!isPopout) {

          class: 'btn btn--ghost',
