  border-color: var(--gold);
}
.bones__die-btn:active { transform: translateY(1px); }

.bones__pool-display {
  min-height: 52px;
  padding: 0.7rem 0.8rem;
  background: var(--p-2);
  border: 1px solid var(--p-3);
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  align-items: center;
  margin-bottom: 0.9rem;
}
.bones__pool-empty {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
}
.bones__pool-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.35rem 0.6rem 0.35rem 0.75rem;
  background: var(--p-0);
  border: 1px solid var(--ink-soft);
  color: var(--ink);
  font-family: var(--display);
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.bones__pool-chip:hover {
  background: rgba(92, 31, 36, 0.08);
  border-color: var(--wine);
}
.bones__pool-chip-x {
  color: var(--ink-faded);
  font-size: 1.1rem;
  line-height: 1;
}
.bones__pool-chip:hover .bones__pool-chip-x { color: var(--wine); }
[data-theme="dark"] .bones__pool-chip:hover .bones__pool-chip-x { color: #e36b78; }
.bones__pool-display--shake { animation: bonesShake 0.4s; }
@keyframes bonesShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-3px); }
}

.bones__mod-section {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  margin-bottom: 1.2rem;
}
.bones__mod-label {
  font-family: var(--display);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-size: 0.72rem;
  color: var(--ink-faded);
  margin-right: 0.4rem;
}
.bones__mod-value {
  font-family: var(--display);
  font-size: 1.15rem;
  color: var(--ink);
  min-width: 2.4rem;
  text-align: center;
}

.bones__cast {
  display: block;
  width: 100%;
  padding: 0.9rem 2rem;
  background: var(--wine);
  color: #f5ebd6;
  border: 1px solid var(--wine-d);
  font-family: var(--display);
  font-size: 0.95rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  cursor: pointer;
  transition: filter 0.15s, transform 0.08s;
}
.bones__cast:hover { filter: brightness(1.08); }
.bones__cast:active { transform: translateY(1px); }

/* Result card */
.bones__result {
  background: var(--p-0);
  border: 1px solid var(--gold);
  padding: 1.4rem 1.5rem;
  position: relative;
}
.bones__result-head {
  font-family: var(--display);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-size: 0.78rem;
  color: var(--gold-d);
  text-align: center;
  margin-bottom: 0.5rem;
}
[data-theme="dark"] .bones__result-head { color: var(--gold-l); }
.bones__result-expr {
  font-family: var(--rubric);
  font-style: italic;
  text-align: center;
  font-size: 1.05rem;
  color: var(--ink-soft);
  margin-bottom: 1rem;
  padding-bottom: 0.8rem;
  border-bottom: 1px dotted var(--p-3);
}
.bones__result-breakdown {
  display: flex; flex-direction: column;
  gap: 0.55rem;
  margin-bottom: 0.6rem;
}
.bones__result-row {
  display: flex;
  align-items: center;
  gap: 0.7rem;
  flex-wrap: wrap;
}
.bones__result-row-label {
  font-family: var(--display);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-size: 0.72rem;
  color: var(--ink-faded);
  min-width: 4rem;
}
.bones__result-row-rolls {
  display: inline-flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}
.bones__result-die {
  display: inline-flex;
  align-items: center; justify-content: center;
  min-width: 2.4rem;
  height: 2.4rem;
  padding: 0 0.4rem;
  background: var(--p-1);
  border: 1px solid var(--p-3);
  font-family: var(--display);
  font-size: 1rem;
  color: var(--ink);
  animation: bonesDieIn 0.32s ease-out;
}
@keyframes bonesDieIn {
  0% { transform: scale(0.5) rotate(-90deg); opacity: 0; }
  60% { transform: scale(1.08) rotate(8deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}
.bones__result-die--max {
  background: rgba(184, 146, 58, 0.20);
  border-color: var(--gold);
  color: var(--gold-d);
  font-weight: 600;
  box-shadow: 0 0 0 2px rgba(184, 146, 58, 0.18);
}
[data-theme="dark"] .bones__result-die--max {
  background: rgba(184, 146, 58, 0.24);
  color: var(--gold-l);
  box-shadow: 0 0 0 2px rgba(184, 146, 58, 0.26);
}
.bones__result-die--min {
  background: rgba(92, 31, 36, 0.14);
  border-color: var(--wine);
  color: var(--wine);
  font-weight: 600;
}
[data-theme="dark"] .bones__result-die--min {
  background: rgba(200, 49, 62, 0.20);
  border-color: #c8313e;
  color: #e36b78;
}
.bones__result-row-sum {
  margin-left: auto;
  font-family: var(--display);
  font-size: 0.88rem;
  color: var(--ink-soft);
  letter-spacing: 0.06em;
}
.bones__divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--p-3), transparent);
  margin: 0.9rem 0;
}
.bones__result-total {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.bones__result-total-label {
  font-family: var(--display);
  letter-spacing: 0.20em;
  text-transform: uppercase;
  font-size: 0.85rem;
  color: var(--ink);
}
.bones__result-total-value {
  font-family: var(--display);
  font-size: 2.4rem;
  color: var(--gold-d);
  font-weight: 600;
  line-height: 1;
}
[data-theme="dark"] .bones__result-total-value { color: var(--gold-l); }
.bones__result-actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 1.1rem;
  justify-content: center;
  flex-wrap: wrap;
}

/* History */
.bones__history {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1.1rem 1.2rem;
}
.bones__history-head {
  font-family: var(--display);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 0.72rem;
  color: var(--ink-faded);
  margin-bottom: 0.7rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px dotted var(--p-3);
}
.bones__history-list { display: flex; flex-direction: column; }
.bones__history-row {
  display: flex;
  align-items: baseline;
  gap: 0.7rem;
  padding: 0.45rem 0.2rem;
  border-bottom: 1px dotted var(--p-3);
}
.bones__history-row:last-child { border-bottom: none; }
.bones__history-time {
  font-family: var(--display);
  font-size: 0.66rem;
  letter-spacing: 0.12em;
  color: var(--ink-faded);
  min-width: 3rem;
}
.bones__history-expr {
  font-family: var(--rubric);
  font-size: 0.92rem;
  color: var(--ink-soft);
  flex: 1;
  min-width: 0;
  word-break: break-word;
}
.bones__history-arrow {
  font-family: var(--display);
  color: var(--ink-faded);
}
.bones__history-total {
  font-family: var(--display);
  font-size: 0.95rem;
  color: var(--ink);
  font-weight: 600;
  min-width: 2.2rem;
  text-align: right;
}

/* ----- MODULE: HEARTH (Soundscape) ------------------------------------- */
.hearth__intro {
  margin-bottom: 1.5rem;
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-soft);
  max-width: 640px;
}
.hearth__presets {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
  margin-bottom: 1.5rem; padding-bottom: 1rem;
  border-bottom: var(--rule);
}
.hearth__layers {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1rem;
}
.hearth__layer {
  background: var(--p-0);
  border: 1px solid var(--p-3);
  padding: 1rem;
}
.hearth__layer-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0.75rem;
}
.hearth__layer-name {
  font-family: var(--display);
  font-size: 0.9rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
.hearth__layer-toggle {
  width: 36px; height: 20px;
  background: var(--p-3);
  border: 1px solid var(--ink-whisper);
  border-radius: 12px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}
.hearth__layer-toggle::after {
  content: ""; position: absolute;
  width: 14px; height: 14px;
  background: var(--p-0);
  border: 1px solid var(--ink-soft);
  border-radius: 50%;
  top: 2px; left: 2px;
  transition: left 0.2s;
}
.hearth__layer-toggle--on { background: var(--forest); }
.hearth__layer-toggle--on::after { left: 18px; background: var(--gold-l); border-color: var(--gold-d); }
.hearth__slider {
  width: 100%;
  appearance: none;
  height: 4px;
  background: var(--p-3);
  outline: none;
  margin: 0.4rem 0;
}
.hearth__slider::-webkit-slider-thumb {
  appearance: none;
  width: 16px; height: 16px;
  background: var(--wine);
  border: 1px solid var(--wine-d);
  cursor: pointer;
}
.hearth__layer-desc {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  font-size: 0.9rem;
}
.hearth__master {
  display: flex; align-items: center; gap: 1rem;
  padding: 0.75rem 1rem;
  background: var(--ink);
  color: var(--p-0);
  margin-bottom: 1.5rem;
}
.hearth__master-label {
  font-family: var(--display);
  font-size: 0.75rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.hearth__master input { flex: 1; }

/* ----- HEARTH: From Afar (external streams) -------------------------- */
.hearth__afar {
  margin-top: 1.5rem;
  padding: 1.2rem 1.3rem;
  border: 1px solid var(--p-3);
  background: var(--p-0);
  position: relative;
}
.hearth__afar-head {
  margin-bottom: 1rem;
  padding-bottom: 0.7rem;
  border-bottom: 1px dotted var(--p-3);
}
.hearth__afar-title {
  font-family: var(--display);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-size: 0.78rem;
  color: var(--ink);
  margin-bottom: 0.35rem;
}
.hearth__afar-sub {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.88rem;
  color: var(--ink-faded);
  line-height: 1.45;
}
.hearth__afar-add {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 0.9rem;
  flex-wrap: wrap;
  align-items: center;
}
.hearth__afar-input {
  flex: 1;
  min-width: 200px;
  padding: 0.45rem 0.65rem;
  border: 1px solid var(--p-3);
  background: var(--p-1);
  color: var(--ink);
  font: inherit;
  font-size: 0.92rem;
  font-family: var(--rubric);
}
.hearth__afar-input--name { flex: 0 1 200px; min-width: 140px; }
.hearth__afar-list {
  margin-bottom: 0.6rem;
}
.hearth__afar-list-head {
  font-family: var(--display);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-size: 0.62rem;
  color: var(--ink-faded);
  margin-bottom: 0.4rem;
}
.hearth__afar-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.45rem 0.5rem;
  border-bottom: 1px dotted var(--p-3);
}
.hearth__afar-row:last-child { border-bottom: none; }
.hearth__afar-row--playing {
  background: rgba(184, 146, 58, 0.12);
}
.hearth__afar-row-name {
  flex: 1;
  font-family: var(--rubric);
  font-size: 0.96rem;
  color: var(--ink);
  min-width: 0;
  word-break: break-word;
}
.hearth__afar-row-type {
  font-family: var(--display);
  font-size: 0.58rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 0.1rem 0.45rem;
  background: var(--p-2);
  border: 1px solid var(--p-3);
  color: var(--ink-soft);
  flex-shrink: 0;
}
.hearth__afar-empty {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  padding: 0.6rem 0;
  font-size: 0.92rem;
  line-height: 1.45;
}
.hearth__afar-player {
  margin-top: 0.75rem;
  padding-top: 0.75rem;
  border-top: 1px dotted var(--p-3);
}
.hearth__afar-now {
  font-family: var(--display);
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-d);
  text-align: center;
  margin-bottom: 0.6rem;
}
.hearth__afar-player iframe,
.hearth__afar-player audio {
  display: block;
  width: 100%;
  border: 1px solid var(--p-3);
}
.hearth__afar-player audio { height: 40px; }
.hearth__afar-loading {
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-faded);
  text-align: center;
  padding: 1.5rem;
}
.hearth__afar-error {
  border: 1px solid var(--wine);
  background: rgba(92, 31, 36, 0.06);
  padding: 1rem 1.2rem;
}
[data-theme="dark"] .hearth__afar-error {
  border-color: #c8313e;
  background: rgba(200, 49, 62, 0.12);
}
.hearth__afar-error-head {
  font-family: var(--display);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-size: 0.78rem;
  color: var(--wine);
  margin-bottom: 0.5rem;
}
[data-theme="dark"] .hearth__afar-error-head { color: #e36b78; }
.hearth__afar-error-name {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 1rem;
  color: var(--ink);
  margin-bottom: 0.3rem;
}
.hearth__afar-error-msg {
  font-family: var(--rubric);
  color: var(--ink-soft);
  margin-bottom: 0.5rem;
}
.hearth__afar-error-url {
  font-family: monospace;
  font-size: 0.82rem;
  color: var(--ink-faded);
  padding: 0.4rem 0.55rem;
  background: var(--p-1);
  border: 1px solid var(--p-3);
  margin-bottom: 0.5rem;
  word-break: break-all;
}
.hearth__afar-error-help {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.88rem;
  color: var(--ink-soft);
  line-height: 1.4;
}

/* ----- HEARTH: Popout window mode ------------------------------------ */
/* When the Hearth is opened in its own browser window via the Pop Out
   button, body gets the 'popout-mode' class. We hide the banner, nav,
   folio title (but keep actions so Silence All stays reachable),
   search button, modals, and anything else that's not the Hearth
   controls. The Hearth fills the available space. */
body.popout-mode .banner,
body.popout-mode .nav,
body.popout-mode #nav,
body.popout-mode .folio__title,
body.popout-mode .folio__sub,
body.popout-mode .search-overlay,
body.popout-mode .modal-overlay {
  display: none !important;
}
body.popout-mode .folio__head {
  border-bottom: 1px dotted var(--p-3);
  padding-bottom: 0.6rem;
  margin-bottom: 0.8rem;
  justify-content: flex-end;
}
body.popout-mode .layout {
  display: block !important;
  grid-template-columns: none !important;
  padding: 0.5rem !important;
}
body.popout-mode #folio,
body.popout-mode .folio {
  max-width: none !important;
  padding: 1rem !important;
  margin: 0 !important;
  box-shadow: none !important;
  border: none !important;
}

/* ----- CAMPAIGN CHIP & MENU ------------------------------------------- */
.banner__campaign { position: relative; }

/* ----- MODULE: THE TAVERN --------------------------------------------- */
.tavern { max-width: 760px; margin: 0 auto; }
.tavern__parchment {
  position: relative;
  background:
    radial-gradient(ellipse at 30% 10%, rgba(184,146,58,0.10), transparent 55%),
    radial-gradient(ellipse at 70% 90%, rgba(92,31,36,0.08), transparent 60%),
    linear-gradient(180deg, #f3e5c0, #ebd9af);
  border: 1px solid var(--p-4);
  padding: 2.4rem 2.5rem 2.8rem;
  box-shadow:
    inset 0 0 0 1px rgba(58,47,36,0.08),
    inset 0 0 60px rgba(122,90,50,0.18),
    0 2px 0 rgba(58,47,36,0.06),
    0 12px 32px rgba(58,47,36,0.18);
}
.tavern__parchment::before {
  content: "";
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence baseFrequency='0.72' numOctaves='2' seed='9'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.09 0 0 0 0 0.05 0 0 0 0.18 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  mix-blend-mode: multiply;
  opacity: 0.65;
  pointer-events: none;
}
.tavern__parchment > * { position: relative; z-index: 1; }
.tavern__name {
  font-family: var(--display);
  font-weight: 700;
  font-size: 2.4rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: center;
  color: var(--ink);
  margin: 0 0 0.25rem;
  line-height: 1.1;
}
.tavern__sub {
  text-align: center;
  font-family: var(--rubric);
  font-style: italic;
  color: var(--ink-soft);
  font-size: 1.1rem;
  margin-bottom: 0.5rem;
}
.tavern__rule {
  text-align: center;
  color: var(--wine);
  font-family: serif;
  letter-spacing: 0.5em;
  margin: 1.25rem 0;
  font-size: 1rem;
}
.tavern__atmosphere {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 1.18rem;
  line-height: 1.55;
  text-align: center;
  margin: 0 0 2rem;
  padding: 0 1rem;
  color: var(--ink-soft);
}
.tavern__section { margin-bottom: 1.75rem; }
.tavern__heading {
  font-family: var(--display);
  font-size: 0.92rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  text-align: center;
  color: var(--wine);
  margin: 0 0 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.8rem;
}
.tavern__heading::before, .tavern__heading::after {
  content: ""; flex: 0 1 80px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--ink-faded), transparent);
}
.tavern__menu {
  list-style: none; padding: 0; margin: 0;
  max-width: 460px; margin: 0 auto;
}
.tavern__menu li {
  display: flex; align-items: baseline; gap: 0.5rem;
  padding: 0.35rem 0;
  border-bottom: 1px dotted rgba(58,47,36,0.25);
  font-size: 1.05rem;
}
.tavern__menu li:last-child { border-bottom: none; }
.tavern__menu-item { flex: 1; }
.tavern__menu-price {
  font-family: var(--display);
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
  white-space: nowrap;
}
.tavern__patrons { display: flex; flex-direction: column; gap: 0.85rem; }
.tavern__patron {
  font-size: 1.05rem;
  padding-left: 1.25rem;
  position: relative;
  line-height: 1.45;
}
.tavern__patron::before {
  content: "\2767";
  position: absolute; left: 0; top: 0;
  color: var(--wine);
  font-size: 0.9rem;
}
.tavern__patron strong {
  font-family: var(--display);
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--ink);
  font-size: 0.95rem;
}
.tavern__patron em { color: var(--ink-soft); }
.tavern__rumours { list-style: none; padding: 0; margin: 0; counter-reset: r; }
.tavern__rumour {
  counter-increment: r;
  padding: 0.55rem 0 0.55rem 2.2rem;
  position: relative;
  font-family: var(--rubric);
  font-style: italic;
  font-size: 1.1rem;
  line-height: 1.5;
  display: flex; align-items: flex-start; gap: 0.5rem;
  border-bottom: 1px dotted rgba(58,47,36,0.18);
}
.tavern__rumour:last-child { border-bottom: none; }
.tavern__rumour::before {
  content: counter(r, lower-roman) ".";
  position: absolute; left: 0; top: 0.55rem;
  font-family: var(--display);
  font-style: normal;
  color: var(--wine);
  letter-spacing: 0.1em;
  font-size: 0.85rem;
  text-transform: uppercase;
  min-width: 1.8rem;
}
.tavern__rumour-text { flex: 1; }
.tavern__rumour-reveal {
  flex-shrink: 0;
  font-family: var(--display);
  font-style: normal;
  font-size: 0.65rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 0.2rem 0.6rem;
  background: transparent;
  border: 1px solid var(--p-4);
  color: var(--ink-faded);
  cursor: pointer;
  margin-top: 0.15rem;
}
.tavern__rumour-reveal:hover { background: var(--ink); color: var(--p-0); border-color: var(--ink); }
.tavern__patron { display: flex; align-items: baseline; gap: 0.7rem; }
.tavern__patron-text { flex: 1; }
.tavern__patron-recruit {
  font-family: var(--display);
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 0.25rem 0.55rem;
  background: transparent;
  border: 1px solid var(--ink-soft);
  color: var(--ink-soft);
  cursor: pointer;
  flex-shrink: 0;
}
.tavern__patron-recruit:hover {
  background: var(--ink);
  color: var(--p-0);
  border-color: var(--ink);
}
.tavern__patron-recruit:disabled {
  opacity: 0.45; cursor: default;
}
.tavern__patron-recruit:disabled:hover {
  background: transparent; color: var(--ink-soft); border-color: var(--ink-soft);
}
.tavern__rumour-pin {
  background: transparent;
  border: none;
  color: var(--ink-faded);
  cursor: pointer;
  font-size: 0.95rem;
  padding: 0 0.3rem;
  opacity: 0.55;
  transition: opacity 0.15s, color 0.15s;
  margin-left: 0.4rem;
}
.tavern__rumour-pin:hover { opacity: 1; color: var(--gold-d); }
.tavern__truth {
  flex-shrink: 0;
  font-family: var(--display);
  font-style: normal;
  font-size: 0.65rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 0.2rem 0.6rem;
  border: 1px solid;
  margin-top: 0.15rem;
}
.tavern__truth--true { color: var(--forest); border-color: var(--forest); background: rgba(45,74,53,0.1); }
.tavern__truth--false { color: var(--wine); border-color: var(--wine); background: rgba(92,31,36,0.1); }
.tavern__truth--half { color: var(--gold-d); border-color: var(--gold-d); background: rgba(184,146,58,0.15); }

/* ----- MODULE: FACTION LEDGER ----------------------------------------- */
.factions__head { margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: var(--rule); display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: space-between; }
.factions__count { font-family: var(--rubric); font-style: italic; color: var(--ink-faded); font-size: 0.95rem; }
.factions__grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 1rem;
}
.faction-card {
  --accent: var(--wine);
  --accent-soft: rgba(92,31,36,0.1);
  background: var(--p-0);
  border: 1px solid var(--p-3);
  position: relative;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.faction-card__ribbon {
  height: 6px;
  background: linear-gradient(90deg, var(--accent), var(--accent) 60%, transparent);
}
.faction-card__top {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  gap: 0.85rem;
  align-items: center;
  padding: 0.95rem 1rem 0.75rem;
}
.faction-card__sigil {
  width: 50px; height: 50px;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent-soft);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: 1.4rem;
  font-family: var(--display);
}
.faction-card__name {
  font-family: var(--display);
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  margin: 0;
  line-height: 1.1;
}
.faction-card__motto {
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.95rem;
  color: var(--ink-faded);
  margin-top: 0.15rem;
}
.faction-card__origin {
  margin: 0.3rem 0 0.45rem 0;
}
.faction-card__origin-chip {
  background: rgba(184,146,58,0.14);
  border-color: rgba(184,146,58,0.50);
  color: var(--gold-d);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.faction-card__origin-chip:hover { background: rgba(184,146,58,0.28); border-color: var(--gold); }
[data-theme="dark"] .faction-card__origin-chip { color: var(--gold-l); }
.faction-card__expand {
  background: transparent;
  border: 1px solid var(--p-3);
  width: 28px; height: 28px;
  font-family: var(--display);
  font-size: 0.7rem;
  color: var(--ink-soft);
}
.faction-card__expand:hover { background: var(--ink); color: var(--p-0); border-color: var(--ink); }

.faction-card__gauge {
  padding: 0 1rem 0.95rem;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 0.4rem 0.6rem;
  align-items: center;
}
.faction-card__gauge-label {
  font-family: var(--display);
  font-size: 0.72rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.faction-card__gauge-value {
  font-family: var(--display);
  font-size: 0.95rem;
  color: var(--ink);
  text-align: right;
}
.gauge {
  grid-column: 1 / -1;
  position: relative;
  height: 10px;
  background: linear-gradient(90deg,
    rgba(92,31,36,0.35) 0%, rgba(92,31,36,0.18) 35%,
    rgba(184,146,58,0.12) 50%,
    rgba(45,74,53,0.18) 65%, rgba(45,74,53,0.35) 100%);
  border: 1px solid var(--p-3);
}
.gauge__notch {
  position: absolute; top: -3px; bottom: -3px;
  width: 3px;
  background: var(--ink);
  transform: translateX(-50%);
  box-shadow: 0 0 0 1px var(--p-0);
}
.gauge__zero {
  position: absolute; top: 0; bottom: 0; left: 50%;
  width: 1px; background: rgba(58,47,36,0.45);
}
.faction-card__gauge-controls {
  grid-column: 1 / -1;
  display: flex; gap: 0.35rem; align-items: center;
}
.gauge-btn {
  width: 28px; height: 26px;
  background: var(--p-0);
  border: 1px solid var(--p-3);
  font-family: var(--display);
  font-size: 0.85rem;
  color: var(--ink-soft);
  cursor: pointer;
}
.gauge-btn:hover { background: var(--ink); color: var(--p-0); border-color: var(--ink); }
.gauge-tick {
  flex: 1;
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.85rem;
  color: var(--ink-faded);
  text-align: center;
}

.faction-card__body {
  border-top: 1px solid var(--p-3);
  padding: 1rem;
  display: none;
}
.faction-card--open .faction-card__body { display: block; }
.faction-card__threats {
  padding: 0.5rem 1rem 0;
}
.faction-card__threat-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  background: rgba(184,146,58,0.13);
  border: 1px solid rgba(184,146,58,0.40);
  color: var(--gold-d);
  font-family: var(--display);
  font-size: 0.65rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 0.3rem 0.65rem;
  cursor: pointer;
}
.faction-card__threat-chip:hover {
  background: rgba(184,146,58,0.22);
  color: var(--ink);
}
[data-theme="dark"] .faction-card__threat-chip { color: var(--gold-l); }
.faction-card__threat-icon { font-size: 0.95rem; line-height: 1; }
.faction-card__backlinks {
  display: flex; flex-wrap: wrap; gap: 0.35rem;
  margin-top: 0.2rem;
}
.faction-card__backlink {
  background: transparent;
  border: 1px solid var(--p-3);
  color: var(--ink-soft);
  font-family: var(--rubric);
  font-size: 0.85rem;
  letter-spacing: 0;
  text-transform: none;
  padding: 0.2rem 0.55rem;
  cursor: pointer;
}
.faction-card__backlink:hover {
  background: rgba(184,146,58,0.18);
  color: var(--ink);
  border-color: var(--gold-d);
}
.faction-card__field { margin-bottom: 0.85rem; }
.faction-card__field .label { margin-bottom: 0.3rem; }
.faction-card__goal { font-family: var(--rubric); font-style: italic; font-size: 1.02rem; color: var(--ink-soft); }
.faction-card__notes-input { min-height: 96px; }
.faction-card__relations { display: flex; flex-direction: column; gap: 0.4rem; }
.faction-relation {
  display: grid;
  grid-template-columns: 32px 1fr auto auto auto;
  gap: 0.5rem;
  align-items: center;
  padding: 0.45rem 0.55rem;
  background: var(--p-1);
  border: 1px solid var(--p-3);
}
.faction-relation__sigil {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: var(--p-0);
  border: 1px solid var(--accent2, var(--p-3));
  color: var(--accent2, var(--ink-soft));
  font-size: 0.95rem;
}
.faction-relation__name {
  font-family: var(--rubric);
  font-size: 1rem;
}
.faction-relation__label {
  font-family: var(--display);
  font-size: 0.7rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-faded);
  min-width: 7rem;
  text-align: right;
}
.faction-card__actions {
  display: flex; gap: 0.5rem;
  margin-top: 1rem;
  padding-top: 0.75rem;
  border-top: 1px dashed var(--p-3);
}

.faction-form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
}
.faction-form-grid > .full { grid-column: 1 / -1; }
.sigil-picker {
  display: flex; flex-wrap: wrap; gap: 0.3rem;
  margin-top: 0.25rem;
}
.sigil-picker button {
  width: 36px; height: 36px;
  background: var(--p-0);
  border: 1px solid var(--p-3);
  font-size: 1.1rem;
  color: var(--ink-soft);
  cursor: pointer;
}
.sigil-picker button:hover { background: rgba(184,146,58,0.15); }
.sigil-picker button.is-selected { background: var(--ink); color: var(--p-0); border-color: var(--ink); }
.color-picker { display: flex; gap: 0.35rem; margin-top: 0.25rem; flex-wrap: wrap; }
.color-swatch {
  width: 32px; height: 32px;
  border: 2px solid transparent;
  cursor: pointer;
  position: relative;
}
.color-swatch.is-selected { border-color: var(--ink); box-shadow: inset 0 0 0 2px var(--p-0); }

/* ----- CROSS-MODULE: today, NPC wikilink, modal, backlinks ------------ */
.almanac__day--current {
  background: rgba(184,146,58,0.18);
  box-shadow: inset 0 0 0 2px var(--gold);
}
.almanac__day--current .almanac__daynum { color: var(--wine); font-weight: 700; }
.almanac__today-badge {
  display: inline-flex; align-items: center; gap: 0.45rem;
  padding: 0.3rem 0.7rem;
  background: rgba(184,146,58,0.18);
  border: 1px solid var(--gold-d);
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.92rem;
  color: var(--ink-soft);
}
.almanac__today-badge strong {
  font-family: var(--display); font-style: normal;
  font-size: 0.78rem; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--wine);
}

.archive__wikilink--npc {
  background: rgba(45,74,53,0.13);
  border-bottom-color: var(--forest);
  color: var(--forest);
}
.archive__wikilink--npc::before { content: "\263F\00A0"; opacity: 0.6; font-size: 0.85em; }

.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(26,22,18,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.modal-card {
  max-width: 460px; width: 90%;
  max-height: 80vh;
  display: flex; flex-direction: column;
  background: var(--p-0);
  border: 1px solid var(--p-3);
  box-shadow: var(--shadow-folio);
  padding: 1.25rem;
  position: relative;
}
.modal-card__scroll { overflow-y: auto; flex: 1; margin: 0.5rem 0 0.8rem; }
.modal-card__close {
  display: flex; justify-content: flex-end; gap: 0.5rem;
  border-top: var(--rule);
  padding-top: 0.8rem;
}

.roster-pick {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%;
  padding: 0.6rem 0.7rem;
  background: transparent;
  border: 1px solid var(--p-3);
  margin-bottom: 0.4rem;
  text-align: left;
  font-family: var(--serif);
  cursor: pointer;
  color: var(--ink);
}
.roster-pick:hover { background: rgba(184,146,58,0.12); border-color: var(--gold-d); }
.roster-pick__name { font-family: var(--rubric); font-size: 1.05rem; }
.roster-pick__role { font-family: var(--rubric); font-style: italic; color: var(--ink-faded); font-size: 0.85rem; }

.faces__backlinks {
  margin-top: 1rem;
  padding-top: 0.75rem;
  border-top: 1px dashed var(--p-3);
}
.faces__backlinks .tag {
  cursor: pointer;
  margin: 0.15rem 0.25rem 0.15rem 0;
  transition: background 0.15s;
}
.faces__backlinks .tag:hover { background: rgba(184,146,58,0.32); }

.cabinet-card__backlinks {
  margin-top: 0.55rem;
  padding-top: 0.5rem;
  border-top: 1px dotted var(--p-3);
}
.cabinet-card__backlinks-label {
  font-family: var(--display);
  font-size: 0.58rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faded);
  margin-bottom: 0.25rem;
}
.cabinet-card__backlinks-row {
  display: flex; flex-wrap: wrap; gap: 0.25rem;
}
.cabinet-card__backlinks-row .tag {
  cursor: pointer;
  transition: background 0.15s;
}
.cabinet-card__backlinks-row .tag:hover { background: rgba(184,146,58,0.32); }
.cabinet-card__origin-chip {
  background: rgba(184,146,58,0.14);
  border-color: rgba(184,146,58,0.50);
  color: var(--gold-d);
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.cabinet-card__origin-chip:hover { background: rgba(184,146,58,0.28); border-color: var(--gold); }
[data-theme="dark"] .cabinet-card__origin-chip { color: var(--gold-l); }

.pin-btn {
  margin-top: 1rem;
}


.campaign-chip {
  display: flex; align-items: center; gap: 0.55rem;
  padding: 0.5rem 0.85rem;
  background: var(--p-2);
  border: 1px solid var(--p-3);
  font-family: var(--rubric);
  font-style: italic;
  font-size: 0.98rem;
  color: var(--ink-soft);
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.campaign-chip:hover { background: rgba(184,146,58,0.18); border-color: var(--gold-d); color: var(--ink); }
.campaign-chip__sigil { color: var(--wine); font-size: 1.1rem; line-height: 1; }
.campaign-chip__name { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.campaign-chip__chevron { font-size: 0.7rem; color: var(--ink-faded); }

.campaign-menu {
  position: absolute; right: 0; top: calc(100% + 0.5rem);
  background: var(--p-0);
  border: 1px solid var(--p-3);
