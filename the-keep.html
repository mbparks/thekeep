    const CATEGORIES = [
      { id: 'all',          name: 'All' },
      { id: 'image',        name: 'Image' },
      { id: 'complication', name: 'Complication' },
      { id: 'mood',         name: 'Mood' },
      { id: 'presence',     name: 'Presence' },
      { id: 'omen',         name: 'Omen' },
      { id: 'overheard',    name: 'Overheard' },
      { id: 'token',        name: 'Token' },
      { id: 'turn',         name: 'Turn' },
      { id: 'thread',       name: 'Thread' }
    ];
    function catName(id) { const c = CATEGORIES.find(x => x.id === id); return c ? c.name : id; }

    // flat list of all phrases, each tagged with its category
    const ALL_PHRASES = [];
    for (const [cat, lines] of Object.entries(POOLS)) {
      lines.forEach(text => ALL_PHRASES.push({ text, category: cat }));
    }

    let history = (await Vault.get('spark-history')) || [];
    let activeCat = (await Vault.get('spark-category')) || 'all';
    let current = history[0] || null;

    const catRow = U.el('div', { class: 'spark__categories' });
    const display = U.el('div', { class: 'spark__display' });
    const controls = U.el('div', { class: 'spark__controls' });
    const histWrap = U.el('div', { class: 'spark__history' });
    body.append(catRow, display, controls, histWrap);

    async function saveHistory() { await Vault.set('spark-history', history.slice(0, 50)); }
    async function saveCat() { await Vault.set('spark-category', activeCat); }

    function strike() {
      // Thread is a composed prompt: pick one person + one need + one
      // complication and stitch them together. Recent-avoidance still
      // applies, comparing against the full composed string.
      if (activeCat === 'thread') {
        const recentTexts = history.slice(0, 8).map(h => h.text);
        let composed;
        for (let attempt = 0; attempt < 12; attempt++) {
          const p = U.pick(THREAD.persons);
          const n = U.pick(THREAD.needs);
          const c = U.pick(THREAD.complications);
          composed = p + ' ' + n + ', ' + c + '.';
          if (!recentTexts.includes(composed)) break;
        }
        current = { text: composed, category: 'thread', ts: Date.now() };
        history.unshift(current);
        history = history.slice(0, 50);
        saveHistory();
        renderDisplay();
        renderHistory();
        return;
      }
      const pool = activeCat === 'all' ? ALL_PHRASES : ALL_PHRASES.filter(p => p.category === activeCat);
      // avoid the most recent draws so it does not immediately repeat
      const recentTexts = history.slice(0, Math.min(20, Math.floor(pool.length / 3))).map(h => h.text);
      const available = pool.filter(p => !recentTexts.includes(p.text));
      const picked = U.pick(available.length ? available : pool);
      current = { text: picked.text, category: picked.category, ts: Date.now() };
      history.unshift(current);
      history = history.slice(0, 50);
      saveHistory();
      renderDisplay();
      renderHistory();
    }

    function renderCategories() {
      catRow.innerHTML = '';
      CATEGORIES.forEach(c => {
        const b = U.el('button', {
          class: 'spark__category' + (activeCat === c.id ? ' is-active' : ''),
          onclick: async () => {
            activeCat = c.id;
            await saveCat();
            renderCategories();
          }
        }, c.name);
        catRow.append(b);
      });
    }

    function renderDisplay() {
      display.innerHTML = '';
      if (!current) {
        display.className = 'spark__display spark__display--empty';
        display.append(U.el('div', { class: 'spark__display-text' }, 'Press Strike.'));
        return;
      }
      display.className = 'spark__display';
      display.append(
        U.el('div', { class: 'spark__display-text' }, current.text),
        U.el('div', { class: 'spark__display-cat' }, catName(current.category))
      );
    }

    function renderControls() {
      controls.innerHTML = '';
      const strikeBtn = U.el('button', { class: 'spark__strike', onclick: () => strike() }, 'Strike');
      const pinBtn = U.el('button', {
        class: 'spark__pin',
        disabled: !current,
        onclick: async () => {
          if (!current) return;
          const text = 'SPARK [' + catName(current.category).toLowerCase() + ']: ' + current.text;
          const today = await Refs.pinToToday(text, {
            module: 'spark',
            label: catName(current.category)
          });
          U.toast('Pinned to ' + (await Refs.formatDate(today)));
        }
      }, 'Pin to Almanac');
      controls.append(strikeBtn, pinBtn);
    }

    function renderHistory() {
      histWrap.innerHTML = '';
      histWrap.append(U.el('div', { class: 'spark__history-head' }, 'Recent Sparks'));
      const list = U.el('div', { class: 'spark__history-list' });
      if (!history.length) {
        list.append(U.el('div', { class: 'spark__history-empty' }, 'None yet.'));
      } else {
        // show last 12, skip the most recent (which is already displayed)
        const visible = history.slice(current ? 1 : 0, current ? 13 : 12);
        if (!visible.length) {
          list.append(U.el('div', { class: 'spark__history-empty' }, 'Strike again to fill the kindling.'));
        } else {
          visible.forEach(h => {
            const item = U.el('button', {
              class: 'spark__history-item',
              title: 'Show this spark again',
              onclick: () => {
                current = h;
                renderDisplay();
                renderControls();
              }
            }, [
              U.el('span', { class: 'spark__history-text' }, h.text),
              U.el('span', { class: 'spark__history-cat' }, catName(h.category))
            ]);
            list.append(item);
          });
        }
      }
      histWrap.append(list);
    }

    renderCategories();
    renderDisplay();
    renderControls();
    renderHistory();
  }
});

/* =========================================================================
   MODULE: ALMANAC (in-world calendar)
   ========================================================================= */
Keep.register({
  id: 'almanac',
  name: 'The Almanac',
  category: 'mysteries',
  glyph: 'g-moon',
  tagline: 'Track the turning year, the moon, and the weather.',
  sub: 'The calendar of your world. Press a day to record what happened there.',

  async mount(body, actions) {
    let calendar = await Vault.get('almanac-calendar');
    if (!calendar) {
      calendar = { ...DEFAULT_CALENDAR };
      await Vault.set('almanac-calendar', calendar);
    }
    let view = await Vault.get('almanac-view') || { month: 0, year: calendar.year };
    let notes = await Vault.get('almanac-notes') || {};
    let campaignToday = await Refs.today();
    let selectedKey = null;

    // honor incoming navigation (e.g. from the Cabinet's date links)
    const pending = await Vault.get('almanac-selected');
    if (pending && typeof pending === 'object' && 'year' in pending) {
      await Vault.remove('almanac-selected');
      view.month = pending.month;
      view.year = pending.year;
      selectedKey = pending.year + '-' + pending.month + '-' + pending.day;
    }

    const grid = U.el('div', { class: 'almanac__grid' });
    const panel = U.el('div', { class: 'almanac__panel' });
    const head = U.el('div', { class: 'almanac__head' });
    const wrap = U.el('div', { class: 'almanac' });

    const prev = U.el('button', { class: 'btn btn--ghost btn--small', title: 'previous month', onclick: () => { view.month--; if (view.month < 0) { view.month = calendar.months.length - 1; view.year--; } render(); } }, '\u2190');
    const next = U.el('button', { class: 'btn btn--ghost btn--small', title: 'next month', onclick: () => { view.month++; if (view.month >= calendar.months.length) { view.month = 0; view.year++; } render(); } }, '\u2192');
    const todayBtn = U.el('button', { class: 'btn btn--small', title: 'jump to campaign today', onclick: () => {
      view.month = campaignToday.month; view.year = campaignToday.year;
      selectedKey = `${campaignToday.year}-${campaignToday.month}-${campaignToday.day}`;
      render(); renderPanel();
    }}, 'Today');
    const advanceBtn = U.el('button', { class: 'btn btn--small btn--primary', title: 'advance one day', onclick: async () => {
      campaignToday = await Refs.advanceToday(1);
      view.month = campaignToday.month; view.year = campaignToday.year;
      render();
      U.toast('Advanced to ' + (await Refs.formatDate(campaignToday)));
    }}, '+1 day');

    const calCol = U.el('div');
    calCol.append(head, grid);
    wrap.append(calCol, panel);
    body.append(wrap);

    actions.append(
      U.el('button', { class: 'btn btn--ghost', onclick: () => editCalendar() }, 'Calendar Settings')
    );

    function moonPhase(absoluteDay) {
      // synodic period ~ 29.5 days
      const phase = ((absoluteDay % 29.5) / 29.5);
      return phase;
    }
    function moonLabel(p) {
      const labels = [
        [0.03, 'New Moon'], [0.22, 'Waxing Crescent'], [0.28, 'First Quarter'],
        [0.47, 'Waxing Gibbous'], [0.53, 'Full Moon'], [0.72, 'Waning Gibbous'],
        [0.78, 'Last Quarter'], [0.97, 'Waning Crescent'], [1, 'New Moon']
      ];
      for (const [t, n] of labels) if (p <= t) return n;
      return 'New Moon';
    }
    function moonSwatch(p) {
      const m = U.el('div', { class: 'almanac__moon' });
      const inner = U.el('div', { class: 'almanac__moon-light' });
      const lit = Math.sin(p * Math.PI) ** 1.5;
      if (p < 0.5) {
        inner.style.left = (100 - lit * 100) + '%';
        inner.style.right = '0';
      } else {
        inner.style.left = '0';
        inner.style.right = (100 - lit * 100) + '%';
      }
      inner.style.width = (lit * 100) + '%';
      if (lit < 0.05) inner.style.display = 'none';
      m.append(inner);
      return m;
    }
    function dayKey(y, m, d) { return `${y}-${m}-${d}`; }
    function absoluteDay(y, m, d) {
      return (y - calendar.year) * calendar.months.length * calendar.daysPerMonth + m * calendar.daysPerMonth + (d - 1);
    }
    function isCampaignToday(y, m, d) {
      return campaignToday && campaignToday.year === y && campaignToday.month === m && campaignToday.day === d;
    }

    function render() {
      head.innerHTML = '';
      const todayChip = U.el('div', { class: 'almanac__today-badge' }, [
        U.el('strong', {}, 'Campaign Today'),
        document.createTextNode(Refs.formatDateWith(campaignToday, calendar))
      ]);
      head.append(
        U.el('div', {}, [
          U.el('div', { class: 'almanac__month' }, calendar.months[view.month]),
          U.el('div', { class: 'almanac__year' }, `year ${view.year} ${calendar.yearLabel}`),
          todayChip
        ]),
        U.el('div', { class: 'almanac__nav' }, [prev, todayBtn, advanceBtn, next])
      );

      grid.innerHTML = '';
      calendar.daynames.forEach(dn => grid.append(U.el('div', { class: 'almanac__dayname' }, dn.slice(0, 3))));
      const dpw = calendar.daynames.length;
      for (let d = 1; d <= calendar.daysPerMonth; d++) {
        const key = dayKey(view.year, view.month, d);
        const note = notes[key];
        const ad = absoluteDay(view.year, view.month, d);
        const phase = moonPhase(ad);
        const cls = ['almanac__day'];
        if (note) cls.push('almanac__day--has-note');
        if (isCampaignToday(view.year, view.month, d)) cls.push('almanac__day--current');
        const cell = U.el('div', { class: cls.join(' ') });
        cell.append(U.el('div', { class: 'almanac__daynum' }, d));
        if (note && note.weather) cell.append(U.el('div', { style: { fontSize: '0.78rem', color: 'var(--ink-faded)', fontStyle: 'italic' } }, note.weather));
        cell.append(moonSwatch(phase));
        cell.addEventListener('click', () => { selectedKey = key; renderPanel(); });
        grid.append(cell);
      }
      const totalCells = calendar.daysPerMonth;
      const rem = (totalCells % dpw === 0) ? 0 : dpw - (totalCells % dpw);
      for (let i = 0; i < rem; i++) grid.append(U.el('div', { class: 'almanac__day almanac__day--outside' }));

      Vault.set('almanac-view', view);
    }
    function renderPanel() {
      panel.innerHTML = '';
      if (!selectedKey) {
        panel.append(
          U.el('div', { class: 'empty' }, [
            U.el('div', { class: 'empty__ornament' }, '\u263D'),
            U.el('div', {}, 'Press a day to inscribe its notes.')
          ])
        );
        return;
      }
      const [y, m, d] = selectedKey.split('-').map(Number);
      const note = notes[selectedKey] || { weather: '', body: '' };
      const ad = absoluteDay(y, m, d);
      const phase = moonPhase(ad);
      const isToday = isCampaignToday(y, m, d);
      panel.append(
        U.el('div', { class: 'almanac__panel-date' }, Refs.formatDateLongWith({ year: y, month: m, day: d }, calendar) + (isToday ? '  \u2730' : '')),
        U.el('div', { class: 'almanac__panel-moon' }, moonLabel(phase))
      );
      const weatherInput = U.el('input', { class: 'input', placeholder: 'Weather (e.g. cold rain, no wind)', value: note.weather });
      const bodyInput = U.el('textarea', { class: 'textarea', placeholder: 'What happened on this day?', style: { minHeight: '160px' } });
      bodyInput.value = note.body || '';
      const save = async () => {
        const prior = notes[selectedKey] || {};
        const next = {
          weather: weatherInput.value,
          body: bodyInput.value,
          updated: Date.now()
        };
        // Preserve module-pinned entries; user editing the body should
        // not erase the structured pin records.
        if (prior.pins && prior.pins.length) next.pins = prior.pins;
        notes[selectedKey] = next;
        if (!weatherInput.value && !bodyInput.value && !(next.pins && next.pins.length)) {
          delete notes[selectedKey];
        }
        await Vault.set('almanac-notes', notes);
        render();
      };
      weatherInput.addEventListener('input', save);
      bodyInput.addEventListener('input', save);
      panel.append(
        U.el('div', { class: 'label' }, 'Weather'),
        weatherInput
      );

      // Module-pinned entries: read-only chips with Jump-to-source links.
      // The body textarea below remains the user-editable narrative; pins
      // duplicate into the body for excerpt/search continuity, but the
      // chips give the round-trip navigation that body text can't.
      if (note.pins && note.pins.length) {
        const pinsWrap = U.el('div', { class: 'almanac__pins' });
        pinsWrap.append(U.el('div', { class: 'label', style: { marginTop: '0.8rem' } }, 'Pinned here'));
        const row = U.el('div', { class: 'almanac__pins-row' });
        note.pins.forEach(p => {
          const label = (p.origin && p.origin.label) || (p.origin && p.origin.module) || 'pin';
          const moduleName = (p.origin && p.origin.module) ? p.origin.module : '';
          const chip = U.el('button', {
            class: 'almanac__pin-chip',
            title: p.text ? p.text.slice(0, 200) : '',
            onclick: () => Refs.jumpToOrigin(p.origin)
          }, [
            U.el('span', { class: 'almanac__pin-chip-mod' }, moduleName),
            U.el('span', { class: 'almanac__pin-chip-label' }, label)
          ]);
          row.append(chip);
        });
        pinsWrap.append(row);
        panel.append(pinsWrap);
      }

      panel.append(
        U.el('div', { class: 'label', style: { marginTop: '0.8rem' } }, 'Inscription'),
        bodyInput
      );
      if (!isToday) {
        panel.append(U.el('button', {
          class: 'btn btn--small btn--ghost',
          style: { marginTop: '0.75rem' },
          onclick: async () => {
            campaignToday = { year: y, month: m, day: d };
            await Refs.setToday(campaignToday);
            render(); renderPanel();
            U.toast('Set as campaign today');
          }
        }, 'Set as Today'));
      }
    }

    function editCalendar() {
      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card' });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, 'Calendar of the Realm')
      );
      const scrollWrap = U.el('div', { class: 'modal-card__scroll' });
      const monthsInput = U.el('textarea', { class: 'textarea' }, calendar.months.join('\n'));
      const dayInput = U.el('input', { class: 'input', type: 'number', value: calendar.daysPerMonth });
      const daynames = U.el('textarea', { class: 'textarea', style: { minHeight: '110px' } }, calendar.daynames.join('\n'));
      const yearStart = U.el('input', { class: 'input', type: 'number', value: calendar.year });
      const yearLabel = U.el('input', { class: 'input', value: calendar.yearLabel });
      scrollWrap.append(
        U.el('div', { class: 'label' }, 'Months (one per line)'),
        monthsInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Days per Month'),
        dayInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Day Names (one per line)'),
        daynames,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Starting Year'),
        yearStart,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Year Title'),
        yearLabel
      );
      dialog.append(scrollWrap);
      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--ghost', onclick: () => ov.remove() }, 'Cancel'),
        U.el('button', { class: 'btn btn--primary', onclick: async () => {
          calendar = {
            months: monthsInput.value.split('\n').map(s => s.trim()).filter(Boolean),
            daysPerMonth: Math.max(1, +dayInput.value || 30),
            daynames: daynames.value.split('\n').map(s => s.trim()).filter(Boolean),
            year: +yearStart.value || 1,
            yearLabel: yearLabel.value
          };
          await Vault.set('almanac-calendar', calendar);
          ov.remove();
          render();
          renderPanel();
        }}, 'Set')
      ]));
      ov.append(dialog);
      document.body.append(ov);
    }

    render();
    renderPanel();
  }
});

/* =========================================================================
   MODULE: THREATS (Clocks)
   Forged in the Dark style ticking clocks for ongoing dangers.
   ========================================================================= */
Keep.register({
  id: 'threats',
  name: 'Threats',
  category: 'mysteries',
  glyph: 'g-hourglass',
  tagline: 'Clocks for the dangers that tick beneath the world.',
  sub: 'Each clock counts a doom. Tick when pressure builds. Fill when the doom arrives.',

  async mount(body, actions) {
    const SEG_OPTIONS = [4, 6, 8, 12];
    const COLORS = U.PALETTE;
    function colorFor(id) { return U.colorFromPalette(id); }

    let threats = await Vault.get('threats');
    if (!threats || !threats.length) {
      threats = [
        { id: U.uid(), name: "The Long Comet's Return", total: 12, filled: 2,
          description: 'The sky-stone falls. The old prophecies wake.',
          color: 'indigo', factionId: null,
          created: Date.now(), updated: Date.now() },
        { id: U.uid(), name: 'The Pass Will Close With Snow', total: 8, filled: 5,
          description: 'The road through Greyfern is barred until thaw.',
          color: 'iron', factionId: null,
          created: Date.now(), updated: Date.now() }
      ];
      await Vault.set('threats', threats);
    }
    let factions = (await Vault.get('factions')) || [];

    // Atlas (or another module) can drop a threats-poi-hint with
    // { poiName, poiType, region, biome, backstory } to open a new
    // long-running threat anchored to that place. One-shot: read,
    // delete, append.
    const threatHint = await Vault.get('threats-poi-hint');
    if (threatHint && threatHint.poiName) {
      await Vault.remove('threats-poi-hint');
      threats.push({
        id: U.uid(),
        name: threatHint.poiName + ' \u00B7 ' + (threatHint.poiType || 'menace'),
        total: 8,
        filled: 0,
        description: threatHint.backstory || ('A threat from ' + (threatHint.region || 'the map') + '.'),
        color: threatHint.suggestedColor || 'wine',
        factionId: null,
        created: Date.now(),
        updated: Date.now()
      });
      await Vault.set('threats', threats);
      U.toast('New threat: ' + threatHint.poiName);
    }

    const head = U.el('div', { class: 'threats__head' });
    const grid = U.el('div', { class: 'threats__grid' });
    body.append(head, grid);

    actions.append(
      U.el('button', { class: 'btn btn--primary', onclick: () => openThreatForm() }, 'New Threat')
    );

    async function save() { await Vault.set('threats', threats); }

    function findFaction(id) { return factions.find(f => f.id === id); }
    function factionColorVar(f) {
      // mirror the faction module's tiny color helper
      const map = { wine: 'var(--wine)', forest: 'var(--forest)', gold: 'var(--gold-d)',
        indigo: 'var(--indigo)', ink: 'var(--ink-soft)', salt: '#7a6c52',
        iron: '#4a5764', rust: '#8a4a2c' };
      return f && map[f.color] ? map[f.color] : 'var(--ink-soft)';
    }

    function render() {
      head.innerHTML = '';
      const active = threats.filter(t => t.filled < t.total).length;
      const done = threats.length - active;
      head.append(
        U.el('div', { class: 'threats__count' },
          threats.length + ' clock' + (threats.length === 1 ? '' : 's') +
          (done ? ' (' + done + ' fulfilled)' : '')),
        U.el('div', {}, [
          U.el('button', { class: 'btn btn--small', onclick: () => openThreatForm() }, '+ New Threat')
        ])
      );

      grid.innerHTML = '';
      if (!threats.length) {
        grid.append(U.el('div', { class: 'empty' }, 'No clocks yet. Set one above.'));
        return;
      }
      // active first, then completed
      const sorted = [...threats].sort((a, b) => {
        const aDone = a.filled >= a.total ? 1 : 0;
        const bDone = b.filled >= b.total ? 1 : 0;
        if (aDone !== bDone) return aDone - bDone;
        return (b.updated || 0) - (a.updated || 0);
      });
      sorted.forEach(t => grid.append(renderCard(t)));
      applyPendingHighlight();
    }

    let pendingHighlight = await Vault.get('threats-highlight');
    if (pendingHighlight) await Vault.remove('threats-highlight');
    function applyPendingHighlight() {
      if (!pendingHighlight) return;
      const card = grid.querySelector('[data-tid="' + pendingHighlight + '"]');
      if (card) {
        setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 30);
        card.classList.add('threat-card--highlight');
        setTimeout(() => card.classList.remove('threat-card--highlight'), 2400);
      }
      pendingHighlight = null;
    }

    function clockSvg(filled, total) {
      const ns = 'http://www.w3.org/2000/svg';
      const cx = 50, cy = 50, r = 42;
      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', '0 0 100 100');
      svg.setAttribute('class', 'clock');

      const rim = document.createElementNS(ns, 'circle');
      rim.setAttribute('cx', cx); rim.setAttribute('cy', cy); rim.setAttribute('r', r);
      rim.setAttribute('class', 'clock__rim');
      svg.appendChild(rim);

      for (let i = 0; i < total; i++) {
        const a1 = (-Math.PI / 2) + (i / total) * Math.PI * 2;
        const a2 = (-Math.PI / 2) + ((i + 1) / total) * Math.PI * 2;
        const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
        const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
        const large = ((a2 - a1) > Math.PI) ? 1 : 0;
        const path = document.createElementNS(ns, 'path');
        path.setAttribute('d', `M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z`);
        path.setAttribute('class', 'clock__slice clock__slice--' + (i < filled ? 'filled' : 'empty'));
        path.dataset.idx = i;
        svg.appendChild(path);
      }
      const cap = document.createElementNS(ns, 'circle');
      cap.setAttribute('cx', cx); cap.setAttribute('cy', cy); cap.setAttribute('r', 5);
      cap.setAttribute('class', 'clock__center');
      svg.appendChild(cap);
      return svg;
    }

    function renderCard(t) {
      const isComplete = t.filled >= t.total;
      const c = colorFor(t.color || 'wine');
      const card = U.el('div', { class: 'threat-card' + (isComplete ? ' threat-card--complete' : ''),
        style: { '--accent': c.var } });
      card.dataset.tid = t.id;

      // clock svg
      const clockBox = U.el('div', { class: 'threat-card__clock' });
      const svg = clockSvg(t.filled, t.total);
      svg.querySelectorAll('.clock__slice').forEach(s => {
        s.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = +s.dataset.idx;
          const targetFill = (t.filled === idx + 1) ? idx : idx + 1;
          adjust(t, targetFill - t.filled);
        });
      });
      clockBox.append(svg);
      card.append(clockBox);

      // body
      const bodyEl = U.el('div', { class: 'threat-card__body' });
      bodyEl.append(U.el('div', { class: 'threat-card__name' }, t.name));
      if (t.description) bodyEl.append(U.el('div', { class: 'threat-card__desc' }, t.description));

      if (t.factionId) {
        const f = findFaction(t.factionId);
        if (f) {
          const fBtn = U.el('button', { class: 'threat-card__faction',
            title: 'Open the Faction Ledger',
            onclick: (e) => { e.stopPropagation(); Keep.mount('factions'); } });
          fBtn.style.setProperty('--accent2', factionColorVar(f));
          fBtn.append(
            U.el('span', { class: 'threat-card__faction-sigil' }, f.sigil || '?'),
            U.el('span', {}, f.name)
          );
          bodyEl.append(fBtn);
        }
      }

      const ctrls = U.el('div', { class: 'threat-card__controls' });
      ctrls.append(
        U.el('button', { class: 'gauge-btn', onclick: () => adjust(t, -1) }, '\u2212'),
        U.el('div', { class: 'threat-card__fill' },
          isComplete ? 'fulfilled' : (t.filled + '/' + t.total)),
        U.el('button', { class: 'gauge-btn', onclick: () => adjust(t, 1) }, '+')
      );
      bodyEl.append(ctrls);

      const acts = U.el('div', { class: 'threat-card__actions' });
      acts.append(
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          const text = 'THREAT: ' + t.name + ' (' + t.filled + '/' + t.total + ')' +
            (t.description ? '\n' + t.description : '');
          const today = await Refs.pinToToday(text, {
            module: 'threats',
            id: t.id,
            label: t.name
          });
          U.toast('Pinned to ' + (await Refs.formatDate(today)));
        }}, 'Pin'),
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => openThreatForm(t) }, 'Edit'),
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          if (!confirm('Retire "' + t.name + '"? The clock will be erased.')) return;
          threats = threats.filter(x => x.id !== t.id);
          await save();
          render();
        }}, 'Retire')
      );
      bodyEl.append(acts);

      card.append(bodyEl);
      return card;
    }

    async function adjust(t, delta) {
      const wasComplete = t.filled >= t.total;
      t.filled = Math.max(0, Math.min(t.total, t.filled + delta));
      t.updated = Date.now();
      await save();
      const isComplete = t.filled >= t.total;
      if (!wasComplete && isComplete) {
        const text = 'THREAT FULFILLED: ' + t.name + '.' +
          (t.description ? '\n' + t.description : '');
        const today = await Refs.pinToToday(text, {
          module: 'threats',
          id: t.id,
          label: t.name + ' fulfilled'
        });
        U.toast('"' + t.name + '" fulfilled. Pinned to ' + (await Refs.formatDate(today)));
      }
      render();
    }

    function openThreatForm(existing) {
      const isEdit = !!existing;
      const draft = existing
        ? { ...existing }
        : { id: U.uid(), name: '', total: 6, filled: 0, description: '',
            color: 'wine', factionId: null,
            created: Date.now(), updated: Date.now() };

      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card', style: { maxWidth: '520px' } });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, isEdit ? 'Edit Threat' : 'Set a New Threat')
      );
      const scroll = U.el('div', { class: 'modal-card__scroll' });

      const nameInput = U.el('input', { class: 'input', placeholder: 'The cult\u2019s ritual, the duke\u2019s patience, the road thaws...', value: draft.name });
      const descInput = U.el('textarea', { class: 'textarea', placeholder: 'What happens when the clock fills.', style: { minHeight: '80px' } });
      descInput.value = draft.description || '';

      // segment count picker
      const segWrap = U.el('div', { class: 'seg-picker' });
      SEG_OPTIONS.forEach(n => {
        const b = U.el('button', { onclick: () => {
          draft.total = n;
          if (draft.filled > n) draft.filled = n;
          segWrap.querySelectorAll('button').forEach(x => x.classList.toggle('is-selected', +x.textContent === n));
        }}, String(n));
        if (n === draft.total) b.classList.add('is-selected');
        segWrap.append(b);
      });

      // colour picker (reuses the faction picker pattern)
      const colorWrap = U.el('div', { class: 'color-picker' });
      COLORS.forEach(c => {
        const sw = U.el('button', { class: 'color-swatch',
          style: { background: c.hex }, title: c.id,
          onclick: () => {
            draft.color = c.id;
            colorWrap.querySelectorAll('.color-swatch').forEach(x => x.classList.toggle('is-selected', x.dataset.cid === c.id));
          }});
        sw.dataset.cid = c.id;
        if (c.id === draft.color) sw.classList.add('is-selected');
        colorWrap.append(sw);
      });

      // faction select
      const factionSelect = U.el('select', { class: 'select' });
      factionSelect.append(U.el('option', { value: '' }, '(none)'));
      factions.forEach(f => {
        const opt = U.el('option', { value: f.id }, (f.sigil || '?') + '  ' + f.name);
        if (draft.factionId === f.id) opt.selected = 'selected';
        factionSelect.append(opt);
      });

      scroll.append(
        U.el('div', { class: 'label' }, 'Name'),
        nameInput,
        U.el('div', { class: 'label', style: { marginTop: '0.75rem' } }, 'When the clock fills'),
        descInput,
        U.el('div', { class: 'label', style: { marginTop: '0.75rem' } }, 'Segments'),
        segWrap,
        U.el('div', { class: 'label', style: { marginTop: '0.75rem' } }, 'Colour'),
        colorWrap,
        U.el('div', { class: 'label', style: { marginTop: '0.75rem' } }, 'Linked Faction (optional)'),
        factionSelect
      );
      dialog.append(scroll);

      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--ghost', onclick: () => ov.remove() }, 'Cancel'),
        U.el('button', { class: 'btn btn--primary', onclick: async () => {
          if (!nameInput.value.trim()) { nameInput.focus(); return; }
          draft.name = nameInput.value.trim();
          draft.description = descInput.value.trim();
          draft.factionId = factionSelect.value || null;
          draft.updated = Date.now();
          if (isEdit) {
            const idx = threats.findIndex(x => x.id === existing.id);
            if (idx >= 0) threats[idx] = draft;
          } else {
            threats.unshift(draft);
          }
          await save();
          ov.remove();
          render();
        }}, isEdit ? 'Save' : 'Set the Clock')
      ]));
      ov.append(dialog);
      document.body.append(ov);
      setTimeout(() => nameInput.focus(), 50);
    }

    render();
  }
});

/* =========================================================================
   MODULE: ARCHIVE (Lore Vault)
   ========================================================================= */
Keep.register({
  id: 'archive',
  name: 'The Archive',
  category: 'workshop',
  glyph: 'g-book',
  tagline: 'A campaign wiki. Wikilinks. Search. All yours.',
  sub: 'Press [[name]] to forge a new entry, or to link two together.',

  async mount(body, actions) {
    const ENTRY_TYPES = [
      { id: 'person',  name: 'Person',  color: 'var(--forest)',  rgba: 'rgba(45,74,53,0.18)' },
      { id: 'place',   name: 'Place',   color: 'var(--indigo)',  rgba: 'rgba(42,40,72,0.18)' },
      { id: 'thing',   name: 'Thing',   color: 'var(--gold-d)',  rgba: 'rgba(184,146,58,0.20)' },
      { id: 'event',   name: 'Event',   color: 'var(--wine)',    rgba: 'rgba(92,31,36,0.18)' },
      { id: 'faction', name: 'Faction', color: '#8a4a2c',        rgba: 'rgba(138,74,44,0.18)' },
      { id: 'lore',    name: 'Lore',    color: 'var(--ink-faded)', rgba: 'rgba(107,93,74,0.12)' }
    ];
    const TYPE_BY_ID = Object.fromEntries(ENTRY_TYPES.map(t => [t.id, t]));

    let entries = await Vault.get('archive-entries') || {};
    let npcByName = await Refs.npcByName();
    let atlasByName = await Refs.atlasByName();
    if (!Object.keys(entries).length) {
      entries = {
        'The Keep': { title: 'The Keep', type: 'place', body: '# The Keep\n\nA fortress at the cleft of the [[Greyfern Pass]], held in trust since the [[Long Comet]] of year 712. The walls have weathered six sieges. The seventh, they say, is yet to come.\n\nSee also: [[Margrave of Ashlow]].', updated: Date.now() },
        'Greyfern Pass': { title: 'Greyfern Pass', type: 'place', body: '# Greyfern Pass\n\nThe only road between the salt valleys and the [[Hollow Court]]. Closed at dusk by old custom. Travellers winter at [[The Keep]] when the snows come early.', updated: Date.now() }
      };
      await Vault.set('archive-entries', entries);
    }

    // back-fill: any entry whose name matches an NPC in the roster is a Person
    let backfillDirty = false;
    for (const [name, e] of Object.entries(entries)) {
      if (!e.type && npcByName.has(name)) {
        e.type = 'person';
        backfillDirty = true;
      }
    }
    if (backfillDirty) await Vault.set('archive-entries', entries);

    let currentId = await Vault.get('archive-current') || Object.keys(entries)[0];
    let editing = false;
    let query = '';

    const sidebar = U.el('div', { class: 'archive__sidebar' });
    const main = U.el('div', { class: 'archive__main' });
    body.append(U.el('div', { class: 'archive' }, [sidebar, main]));

    actions.append(
      U.el('button', { class: 'btn btn--ghost', onclick: () => exportAll() }, 'Export'),
      U.el('button', { class: 'btn', onclick: () => { editing = !editing; renderMain(); } }, 'Toggle View')
    );

    function renderSidebar() {
      sidebar.innerHTML = '';
      const search = U.el('input', { class: 'input archive__search', placeholder: 'Search the archive', value: query });
      search.addEventListener('input', () => { query = search.value; renderSidebar(); search.focus(); });
      const add = U.el('button', { class: 'btn archive__new', onclick: () => newEntry() }, 'New Entry');
      sidebar.append(search, add);
      const list = U.el('ul', { class: 'archive__list' });
      const q = query.trim().toLowerCase();
      const names = Object.keys(entries).sort();
      const matches = names.filter(n =>
        !q || n.toLowerCase().includes(q) || (entries[n].body || '').toLowerCase().includes(q)
      );

      // group by type, in canonical order, untyped → 'lore'
      const groups = new Map();
      ENTRY_TYPES.forEach(t => groups.set(t.id, []));
      matches.forEach(name => {
        const t = entries[name].type || 'lore';
        if (!groups.has(t)) groups.set(t, []);
        groups.get(t).push(name);
      });

      const populatedGroups = [...groups.entries()].filter(([, arr]) => arr.length);
      const showHeaders = populatedGroups.length > 1;

      function renderEntry(name) {
        const e = entries[name];
        const nameLow = name.toLowerCase();
        const bodyLow = (e.body || '').toLowerCase();
        const nameMatch = q && nameLow.includes(q);
        const bodyMatch = q && bodyLow.includes(q);

        const item = U.el('li', {
          class: 'archive__entry archive__entry--type-' + (e.type || 'lore') +
            (name === currentId ? ' archive__entry--active' : ''),
          onclick: () => { currentId = name; Vault.set('archive-current', name); renderSidebar(); renderMain(); }
        });
        const nameEl = U.el('span', { class: 'archive__entry-name' });
        nameEl.innerHTML = nameMatch ? highlightHtml(name, q) : escapeHtml(name);
        item.append(nameEl);
        if (q && bodyMatch && !nameMatch) {
          const snip = makeExcerpt(e.body || '', q);
          if (snip) {
            const ex = U.el('span', { class: 'archive__entry-excerpt' });
            ex.innerHTML = snip;
            item.append(ex);
          }
        }
        return item;
      }

      populatedGroups.forEach(([typeId, ents]) => {
        if (showHeaders) {
          list.append(U.el('li', { class: 'archive__group-head' }, (TYPE_BY_ID[typeId] || { name: typeId.toUpperCase() }).name));
        }
        ents.forEach(n => list.append(renderEntry(n)));
      });

      if (!matches.length) {
        list.append(U.el('li', { class: 'empty', style: { padding: '1rem 0.5rem' } }, q ? 'No entries match.' : 'No entries yet.'));
      }
      sidebar.append(list);
    }

    function makeExcerpt(body, q) {
      const lowBody = body.toLowerCase();
      const idx = lowBody.indexOf(q);
      if (idx < 0) return null;
      const start = Math.max(0, idx - 32);
      const end = Math.min(body.length, idx + q.length + 64);
      let snippet = body.slice(start, end).replace(/\s+/g, ' ').trim();
      const pre = start > 0 ? '\u2026' : '';
      const post = end < body.length ? '\u2026' : '';
      return pre + highlightHtml(snippet, q) + post;
    }
    function highlightHtml(text, q) {
      if (!q) return escapeHtml(text);
      const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp(safe, 'gi');
      return escapeHtml(text).replace(re, m => `<mark class="archive__hit">${m}</mark>`);
    }

    function renderMain() {
      main.innerHTML = '';
      const e = entries[currentId];
      if (!e) {
        main.append(U.el('div', { class: 'empty' }, 'No entry selected.'));
        return;
      }
      const title = U.el('input', { class: 'archive__title', value: e.title });
      let renameTimeout;
      title.addEventListener('input', () => {
        clearTimeout(renameTimeout);
        renameTimeout = setTimeout(async () => {
          const newTitle = title.value.trim();
          const oldId = currentId;
          if (!newTitle || newTitle === oldId) return;
          if (entries[newTitle]) {
            // collision: revert visible title to the live id, leave entry where it was
            title.value = oldId;
            U.toast('Already a "' + newTitle + '"');
            return;
          }
          e.title = newTitle;
          delete entries[oldId];
          entries[newTitle] = e;
          currentId = newTitle;
          e.updated = Date.now();
          await Vault.set('archive-current', currentId);
          await Vault.set('archive-entries', entries);
          renderSidebar();
        }, 400);
      });
      main.append(title);

      // type picker
      const typeRow = U.el('div', { class: 'archive__type-picker' });
      const setType = async (t) => {
        e.type = t || null;
        e.updated = Date.now();
        await Vault.set('archive-entries', entries);
        renderSidebar();
        // refresh active state of pills
        typeRow.querySelectorAll('.archive__type-pill').forEach(p => {
          p.classList.toggle('is-active', p.dataset.type === (e.type || ''));
        });
      };
      ENTRY_TYPES.forEach(t => {
        const pill = U.el('button', {
          class: 'archive__type-pill' + ((e.type || '') === t.id ? ' is-active' : ''),
          style: { '--type-color': t.color, '--type-soft': t.rgba },
          title: 'Tag this entry as ' + t.name,
          onclick: () => setType(t.id === e.type ? null : t.id)
        }, t.name);
        pill.dataset.type = t.id;
        typeRow.append(pill);
      });
      main.append(typeRow);

      const metaRow = U.el('div', { class: 'archive__meta' }, [
        U.el('span', { class: 'tag' }, new Date(e.updated || Date.now()).toLocaleDateString())
      ]);
      // If this entry was forged from another room (Atlas POI, future
      // tavern dossier, faction record, etc.), surface a chip that
      // navigates back to its origin.
      if (e.origin && e.origin.module) {
        const o = e.origin;
        const moduleLabel = o.module.charAt(0).toUpperCase() + o.module.slice(1);
        metaRow.append(U.el('button', {
          class: 'tag archive__origin-chip',
          title: 'Jump to ' + moduleLabel + (o.label ? ' \u00b7 ' + o.label : ''),
          onclick: () => Refs.jumpToOrigin(o)
        }, '\u21AA  ' + moduleLabel + (o.label ? ' \u00b7 ' + o.label : '')));
      }
      main.append(metaRow);
      if (editing) {
        const ta = U.el('textarea', { class: 'archive__editor' });
        ta.value = e.body || '';
        ta.addEventListener('input', async () => {
          e.body = ta.value; e.updated = Date.now();
          await Vault.set('archive-entries', entries);
        });
        main.append(ta);
      } else {
        const rendered = U.el('div', { class: 'archive__rendered' });
        rendered.innerHTML = renderMarkdown(e.body || '');
        rendered.querySelectorAll('.archive__wikilink').forEach(link => {
          link.addEventListener('click', async () => {
            hideTooltip();
            const tgt = link.dataset.target;
            // Resolution order: Atlas POI/region first (navigates out of
            // Archive into the map), then existing Archive entry, then
            // NPC (auto-forges an Archive page from the roster), then a
            // blank Archive page as a forging hook.
            const atlasRef = atlasByName.get(tgt);
            if (atlasRef) {
              await Refs.openAtlasPoi(atlasRef);
              return;
            }
            if (!entries[tgt]) {
              const npc = npcByName.get(tgt);
              const body = npc ? Refs.npcAsMarkdown(npc) : `# ${tgt}\n\n`;
              entries[tgt] = { title: tgt, body, type: npc ? 'person' : null, updated: Date.now() };
              Vault.set('archive-entries', entries);
            }
            currentId = tgt;
            Vault.set('archive-current', currentId);
            renderSidebar();
            renderMain();
          });
          link.addEventListener('mouseenter', () => showTooltip(link));
          link.addEventListener('mouseleave', hideTooltip);
        });
        main.append(rendered);
      }
    }

    let activeTooltip = null;
    function hideTooltip() {
      if (activeTooltip) { activeTooltip.remove(); activeTooltip = null; }
    }
    function showTooltip(link) {
      hideTooltip();
      const tgt = link.dataset.target;
      const archived = entries[tgt];
      const npc = npcByName.get(tgt);
      const atlasRef = atlasByName.get(tgt);
      let kind, body;
      if (atlasRef) {
        if (atlasRef.kind === 'poi') {
          kind = { label: 'Atlas POI', cls: 'wikilink-tooltip__type--atlas' };
          const typeLabel = (atlasRef.type || '').replace(/_/g, ' ');
          body = (typeLabel ? typeLabel + ' \u00b7 ' : '') + atlasRef.mapName + '. ' + (atlasRef.preview || '');
        } else {
          kind = { label: 'Atlas Region', cls: 'wikilink-tooltip__type--atlas' };
          body = atlasRef.preview || '';
        }
      } else if (archived) {
        kind = { label: 'Archive', cls: '' };
        const lines = (archived.body || '').split('\n');
        const para = lines.find(l => l.trim() && !/^#+\s/.test(l) && !/^>\s/.test(l)) || '';
        body = para.replace(/\*\*|\*|\[\[|\]\]/g, '').slice(0, 220);
        if (!body) body = '(no body yet)';
      } else if (npc) {
        kind = { label: 'NPC', cls: 'wikilink-tooltip__type--npc' };
        body = npc.role + '. ' + npc.want + '.';
      } else {
        kind = { label: 'not yet noted', cls: 'wikilink-tooltip__type--missing' };
        body = 'Click to forge a new entry.';
      }
      const tip = U.el('div', { class: 'wikilink-tooltip' }, [
        U.el('div', { class: 'wikilink-tooltip__title' }, [
          U.el('span', {}, tgt),
          U.el('span', { class: 'wikilink-tooltip__type ' + kind.cls }, kind.label)
        ]),
        U.el('div', { class: 'wikilink-tooltip__body' }, body)
      ]);
      document.body.append(tip);
      activeTooltip = tip;

      // position below link, flip above if no room
      const r = link.getBoundingClientRect();
      const tipH = tip.offsetHeight;
      const tipW = tip.offsetWidth;
      let top = r.bottom + 6;
      if (top + tipH > window.innerHeight - 8) top = Math.max(8, r.top - tipH - 6);
      let left = r.left;
      if (left + tipW > window.innerWidth - 8) left = window.innerWidth - tipW - 8;
      tip.style.top = top + 'px';
      tip.style.left = left + 'px';
    }

    function newEntry() {
      const name = prompt('Name this entry');
      if (!name) return;
      if (!entries[name]) entries[name] = { title: name, body: `# ${name}\n\n`, updated: Date.now() };
      currentId = name;
      editing = true;
      Vault.set('archive-current', currentId);
      Vault.set('archive-entries', entries);
      renderSidebar();
      renderMain();
    }

    function escapeHtml(s) { return s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

    function renderMarkdown(src) {
      const lines = src.split('\n');
      const out = [];
      let inList = false;
      const close = () => { if (inList) { out.push('</ul>'); inList = false; } };
      for (let raw of lines) {
        const line = raw;
        if (/^#\s+/.test(line)) { close(); out.push('<h1>' + inlineMd(line.replace(/^#\s+/, '')) + '</h1>'); }
        else if (/^##\s+/.test(line)) { close(); out.push('<h2>' + inlineMd(line.replace(/^##\s+/, '')) + '</h2>'); }
        else if (/^###\s+/.test(line)) { close(); out.push('<h3>' + inlineMd(line.replace(/^###\s+/, '')) + '</h3>'); }
        else if (/^>\s+/.test(line)) { close(); out.push('<blockquote>' + inlineMd(line.replace(/^>\s+/, '')) + '</blockquote>'); }
        else if (/^-\s+/.test(line)) {
          if (!inList) { out.push('<ul>'); inList = true; }
          out.push('<li>' + inlineMd(line.replace(/^-\s+/, '')) + '</li>');
        }
        else if (line.trim() === '') { close(); out.push(''); }
        else { close(); out.push('<p>' + inlineMd(line) + '</p>'); }
      }
      close();
      return out.join('\n');
    }
    function inlineMd(s) {
      s = escapeHtml(s);
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
      s = s.replace(/\[\[([^\]]+)\]\]/g, (m, name) => {
        const existsInArchive = entries[name];
        const isNpc = npcByName.has(name);
        let cls = 'archive__wikilink';
        if (!existsInArchive && !isNpc) cls += ' archive__wikilink--missing';
        else if (!existsInArchive && isNpc) cls += ' archive__wikilink--npc';
        return `<span class="${cls}" data-target="${escapeHtml(name)}">${escapeHtml(name)}</span>`;
      });
      return s;
    }

    function exportAll() {
      const data = JSON.stringify(entries, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'archive-' + Date.now() + '.json';
      document.body.appendChild(a); a.click(); a.remove();
    }

    renderSidebar();
    renderMain();
  },

  unmount() {
    document.querySelectorAll('.wikilink-tooltip').forEach(t => t.remove());
  }
});

/* =========================================================================
   MODULE: THE WAYFARER (PC sheet)
   The player character. Distinct from Hall of Faces (the world's people) and
   The Fellowship (those who walk beside the PC); this is the chronicler's
   own. Multiple PCs supported for parties; one is the common case for solo.
   ========================================================================= */
Keep.register({
  id: 'wayfarer',
  name: 'The Wayfarer',
  category: 'workshop',
  glyph: 'g-wayfarer',
  tagline: 'You who walk. The chronicler\u2019s own.',
  sub: 'Name yourself. Carry what you carry. Remember why you walk.',

  async mount(body, actions) {
    const STATUSES = [
      { id: 'hale',     name: 'Hale' },
      { id: 'weary',    name: 'Weary' },
      { id: 'wounded',  name: 'Wounded' },
      { id: 'grievous', name: 'Grievous' },
      { id: 'fallen',   name: 'Fallen' }
    ];
    const COLORS = U.PALETTE;
    function colorOf(id)  { return U.colorFromPalette(id); }
    function statusOf(id) { return STATUSES.find(s => s.id === id) || STATUSES[0]; }

    // ----- Crossing (Odyssey interop) -----------------------------
    // status (text tag) ↔ HP (numeric) translation. Keep stays narrative;
    // Odyssey gets numbers. Stats default to zero on first export and the
    // player tunes them in Odyssey. The pc.odyssey blob round-trips
    // Odyssey-only data (stats, almanac, traits) so subsequent crossings
    // preserve mid-game state.
    const STATUS_TO_HP = { hale: 6, weary: 4, wounded: 2, grievous: 1, fallen: 0 };
    function hpToStatus(hp) {
      if (!hp || !hp.max) return 'hale';
      const pct = hp.current / hp.max;
      if (pct >= 0.8) return 'hale';
      if (pct >= 0.5) return 'weary';
      if (pct >= 0.3) return 'wounded';
      if (pct >  0)   return 'grievous';
      return 'fallen';
    }

    function wayfarerToOdyssey(pc) {
      const o = pc.odyssey || {};
      return {
        format: 'odyssey-wayfarer',
        version: 1,
        exportedAt: new Date().toISOString(),
        exportedFrom: 'The Keep',
        character: {
          id: pc.id,
          name: pc.name,
          archetype: pc.calling || '',
          level: o.level || 1,
          stats: o.stats || { might: 0, wits: 0, grace: 0, heart: 0 },
          hp: o.hp || { max: 6, current: STATUS_TO_HP[pc.status] != null ? STATUS_TO_HP[pc.status] : 6 },
          traits: Array.isArray(o.traits) ? o.traits : [],
          inventory: (pc.carried || '').split(/[,\n]/).map(s => s.trim()).filter(Boolean),
          almanac: o.almanac || { marks: {} },
          notes: pc.notes || '',
          schemaVersion: 1,
          x: { 'the-keep': {
            lineage: pc.lineage || '',
            oath: pc.oath || '',
            bonds: pc.bonds || '',
            description: pc.description || '',
            color: pc.color || 'wine',
            status: pc.status || 'hale',
            created: pc.created || Date.now()
          }}
        }
      };
    }

    function odysseyToWayfarer(envelope) {
      // Accept either an envelope or a raw character object.
      const c = (envelope && envelope.format === 'odyssey-wayfarer' && envelope.character)
        ? envelope.character
        : envelope;
      if (!c || typeof c !== 'object' || !c.id || !c.name) {
        throw new Error('That is not a legible wayfarer.');
      }
      const k = (c.x && c.x['the-keep']) || {};
      return {
        id: c.id,
        name: c.name,
        lineage: k.lineage || '',
        calling: c.archetype || '',
        description: k.description || '',
        oath: k.oath || '',
        bonds: k.bonds || '',
        carried: Array.isArray(c.inventory) ? c.inventory.join('\n') : '',
        notes: c.notes || '',
        // Prefer hp-derived status (canonical mechanical state from Odyssey
        // play); fall back to preserved Keep status only when hp is missing.
        status: c.hp ? hpToStatus(c.hp) : (k.status || 'hale'),
        color: k.color || 'wine',
        created: k.created || Date.now(),
        updated: Date.now(),
        // Preserve Odyssey-only data so the next Send to Odyssey carries
        // forward stats/traits/almanac without losing mid-game progress.
        odyssey: {
          level: c.level,
          stats: c.stats,
          hp: c.hp,
          traits: c.traits,
          almanac: c.almanac
        }
      };
    }

    function openCrossingExport(pc) {
      const envelope = wayfarerToOdyssey(pc);
      const json = JSON.stringify(envelope, null, 2);
      const safeName = (pc.name || 'wayfarer')
        .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card', style: { maxWidth: '560px' } });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, 'Send to Odyssey')
      );

      const scroll = U.el('div', { class: 'modal-card__scroll' });
      scroll.append(
        U.el('p', { style: { fontStyle: 'italic', color: 'var(--ink-faded)', marginBottom: '0.6rem' } },
          pc.name + '. Copy this text, or download it, to carry into Odyssey.')
      );
      const ta = U.el('textarea', {
        class: 'textarea',
        style: { minHeight: '220px', fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace', fontSize: '0.78rem' },
        readonly: true
      });
      ta.value = json;
      scroll.append(ta);
      dialog.append(scroll);

      const feedback = U.el('span', { style: { marginLeft: '0.6rem', fontStyle: 'italic', color: 'var(--forest)' } }, '');

      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--ghost', onclick: () => ov.remove() }, 'Close'),
        U.el('button', { class: 'btn', onclick: () => {
          const done = () => {
            feedback.textContent = 'Copied.';
            setTimeout(() => { feedback.textContent = ''; }, 2000);
          };
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(json).then(done).catch(() => { ta.select(); document.execCommand('copy'); done(); });
          } else {
            ta.select();
            try { document.execCommand('copy'); done(); }
            catch (e) { feedback.textContent = 'Copy failed.'; }
          }
        }}, 'Copy'),
        U.el('button', { class: 'btn', onclick: () => {
          const blob = new Blob([json], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = U.el('a', { href: url, download: 'odyssey-wayfarer-' + safeName + '.json' });
          document.body.append(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 200);
        }}, 'Download'),
        feedback
      ]));

      ov.append(dialog);
      document.body.append(ov);
    }

    function openCrossingImport() {
      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card', style: { maxWidth: '560px' } });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, 'Bring from Odyssey')
      );

      const scroll = U.el('div', { class: 'modal-card__scroll' });
      scroll.append(
        U.el('p', { style: { fontStyle: 'italic', color: 'var(--ink-faded)', marginBottom: '0.6rem' } },
          'Paste a wayfarer\u2019s JSON below. If their id already lives in your Keep, that wayfarer will be updated. Otherwise a new one will be added.')
      );
      const ta = U.el('textarea', {
        class: 'textarea',
        style: { minHeight: '220px', fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace', fontSize: '0.78rem' },
        placeholder: 'Paste a wayfarer\u2019s JSON here...'
      });
      scroll.append(ta);

      const status = U.el('p', { style: { marginTop: '0.6rem', fontStyle: 'italic', minHeight: '1.2em' } }, '');
      scroll.append(status);
      dialog.append(scroll);

      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--ghost', onclick: () => ov.remove() }, 'Cancel'),
        U.el('button', { class: 'btn btn--primary', onclick: async () => {
          const text = ta.value.trim();
          if (!text) { ta.focus(); return; }
          let parsed;
          try { parsed = JSON.parse(text); }
          catch (e) {
            status.style.color = 'var(--wine)';
            status.textContent = 'That is not legible JSON.';
            return;
          }
          let imported;
          try { imported = odysseyToWayfarer(parsed); }
          catch (e) {
            status.style.color = 'var(--wine)';
            status.textContent = e.message;
            return;
          }
          const idx = pcs.findIndex(x => x.id === imported.id);
          if (idx >= 0) {
            if (!confirm('A wayfarer with that id already lives here (\u201c' + pcs[idx].name + '\u201d). Replace?')) return;
            pcs[idx] = imported;
          } else {
            pcs.unshift(imported);
          }
          await save();
          await Vault.set('wayfarer-highlight', imported.id);
          ov.remove();
          render();
        }}, 'Bring in')
      ]));

      ov.append(dialog);
      document.body.append(ov);
      setTimeout(() => ta.focus(), 50);
    }

    let pcs = (await Vault.get('wayfarer')) || [];

    // archive backlinks
    let archiveEntries = await Refs.archiveEntries();
    function backlinksFor(name) {
      const out = [];
      const safe = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp('\\[\\[' + safe + '\\]\\]');
      for (const [k, e] of Object.entries(archiveEntries)) {
        if (re.test(e.body || '')) out.push(k);
      }
      return out;
    }

    const head = U.el('div', { class: 'wayfarer__head' });
    const grid = U.el('div', { class: 'wayfarer__grid' });
    body.append(head, grid);

    actions.append(
      U.el('button', { class: 'btn btn--primary', onclick: () => openWayfarerForm() }, 'Name Yourself'),
      U.el('button', { class: 'btn btn--ghost', onclick: () => openCrossingImport() }, 'Bring from Odyssey')
    );

    async function save() { await Vault.set('wayfarer', pcs); }

    function render() {
      head.innerHTML = '';
      head.append(
        U.el('div', { class: 'wayfarer__count' },
          pcs.length === 0 ? 'No wayfarer yet'
            : pcs.length === 1 ? 'One wayfarer'
            : pcs.length + ' wayfarers'),
        U.el('div', {}, [
          U.el('button', { class: 'btn btn--small', onclick: () => openWayfarerForm() }, '+ Name Yourself')
        ])
      );

      grid.innerHTML = '';
      if (!pcs.length) {
        const empty = U.el('div', { class: 'wayfarer__empty' });
        empty.append(
          U.el('span', { class: 'wayfarer__empty-call' }, 'Who walks?'),
          document.createTextNode('The Wayfarer is your own card. Name yourself, set your calling, mark what you carry. Solo players keep one. Parties may keep several.'),
          U.el('div', { style: { marginTop: '1.2rem' } }, [
            U.el('button', { class: 'btn btn--primary', onclick: () => openWayfarerForm() }, 'Name Yourself')
          ])
        );
        grid.append(empty);
        return;
      }

      // sort: hale first, fallen last, otherwise by name
      const order = { hale: 0, weary: 1, wounded: 2, grievous: 3, fallen: 4 };
      const sorted = [...pcs].sort((a, b) => {
        const ao = order[a.status] ?? 99;
        const bo = order[b.status] ?? 99;
        if (ao !== bo) return ao - bo;
        return (a.name || '').localeCompare(b.name || '');
      });
      sorted.forEach(pc => grid.append(renderCard(pc)));
      applyPendingHighlight();
    }

    function renderCard(pc) {
      const s = statusOf(pc.status);
      const c = colorOf(pc.color || 'wine');
      const card = U.el('div', {
        class: 'wayfarer-card wayfarer-card--status-' + s.id + (s.id === 'fallen' ? ' wayfarer-card--fallen' : ''),
        style: { '--accent': c.var, '--accent-d': c.varD, '--accent-soft': c.soft }
      });
      card.dataset.pcid = pc.id;

      // caption: lineage and calling, joined cleanly
      const captionBits = [];
      if (pc.lineage) captionBits.push(pc.lineage);
      if (pc.calling) captionBits.push(pc.calling);
      const caption = captionBits.join(' \u00b7 ');

      card.append(U.el('div', { class: 'wayfarer-card__head' }, [
        U.el('div', { class: 'wayfarer-card__glyph' }, '\u2022'),
        U.el('div', { class: 'wayfarer-card__title' }, [
          U.el('div', { class: 'wayfarer-card__name' }, pc.name),
          caption ? U.el('div', { class: 'wayfarer-card__caption' }, caption) : null
        ].filter(Boolean)),
        U.el('div', { class: 'wayfarer-card__status' }, s.name)
      ]));
      card.append(U.el('hr', { class: 'wayfarer-card__sep' }));

      function addField(label, value, modifier) {
        if (!value || !String(value).trim()) return;
        const field = U.el('div', { class: 'wayfarer-card__field' + (modifier ? ' wayfarer-card__field--' + modifier : '') });
        field.append(
          U.el('div', { class: 'wayfarer-card__field-label' }, label),
          U.el('div', { class: 'wayfarer-card__field-value' }, value)
        );
        card.append(field);
      }

      addField('Description', pc.description);
      addField('Oath', pc.oath, 'oath');
      addField('Bonds', pc.bonds);
      addField('Carried', pc.carried);
      addField('Notes', pc.notes);

      // archive backlinks
      const backs = backlinksFor(pc.name);
      if (backs.length) {
        const backField = U.el('div', { class: 'wayfarer-card__field' });
        backField.append(
          U.el('div', { class: 'wayfarer-card__field-label' }, 'Mentioned In')
        );
        const backWrap = U.el('div', { class: 'wayfarer-card__backlinks' });
        backs.forEach(name => {
          backWrap.append(U.el('button', {
            class: 'tag',
            title: 'Open in the Archive',
            onclick: () => Refs.openArchiveEntry(name)
          }, name));
        });
        backField.append(backWrap);
        card.append(backField);
      }

      // actions
      const acts = U.el('div', { class: 'wayfarer-card__actions' });
      acts.append(
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => openWayfarerForm(pc) }, 'Edit'),
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => openCrossingExport(pc) }, 'Send to Odyssey'),
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          if (!confirm('Retire "' + pc.name + '"? Their card will be erased.')) return;
          pcs = pcs.filter(x => x.id !== pc.id);
          await save();
          render();
        }}, 'Retire')
      );
      card.append(acts);

      return card;
    }

    let pendingHighlight = await Vault.get('wayfarer-highlight');
    if (pendingHighlight) await Vault.remove('wayfarer-highlight');
    function applyPendingHighlight() {
      if (!pendingHighlight) return;
      const card = grid.querySelector('[data-pcid="' + pendingHighlight + '"]');
      if (card) {
        setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 30);
        card.classList.add('wayfarer-card--highlight');
        setTimeout(() => card.classList.remove('wayfarer-card--highlight'), 2400);
      }
      pendingHighlight = null;
    }

    function openWayfarerForm(existing) {
      const isEdit = !!existing;
      const draft = existing
        ? { ...existing }
        : { id: U.uid(), name: '', lineage: '', calling: '', description: '',
            oath: '', bonds: '', carried: '', notes: '',
            status: 'hale', color: 'wine',
            created: Date.now(), updated: Date.now() };

      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card', style: { maxWidth: '560px' } });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, isEdit ? 'Edit ' + (existing.name || 'Wayfarer') : 'Name Yourself')
      );
      const scroll = U.el('div', { class: 'modal-card__scroll' });

      const nameInput    = U.el('input',    { class: 'input', placeholder: 'The name you carry', value: draft.name });
      const lineageInput = U.el('input',    { class: 'input', placeholder: 'Of Greyfern, half-Northron, lowborn...', value: draft.lineage });
      const callingInput = U.el('input',    { class: 'input', placeholder: 'Hedge-knight, wanderer, apostate priest...', value: draft.calling });
      const descInput    = U.el('textarea', { class: 'textarea', placeholder: 'Appearance, manner, how you carry yourself.', style: { minHeight: '70px' } });
      descInput.value    = draft.description || '';
      const oathInput    = U.el('textarea', { class: 'textarea', placeholder: 'Why you walk. The thing you swore.', style: { minHeight: '60px' } });
      oathInput.value    = draft.oath || '';
      const bondsInput   = U.el('textarea', { class: 'textarea', placeholder: 'The people, places, vows that bind you.', style: { minHeight: '70px' } });
      bondsInput.value   = draft.bonds || '';
      const carriedInput = U.el('textarea', { class: 'textarea', placeholder: 'What you carry: blade, coin, keepsake, supply.', style: { minHeight: '70px' } });
      carriedInput.value = draft.carried || '';
      const notesInput   = U.el('textarea', { class: 'textarea', placeholder: 'Anything else.', style: { minHeight: '60px' } });
      notesInput.value   = draft.notes || '';

      // status picker
      const statusWrap = U.el('div', { class: 'status-picker' });
      STATUSES.forEach(s => {
        const b = U.el('button', { onclick: () => {
          draft.status = s.id;
          statusWrap.querySelectorAll('button').forEach(x => x.classList.toggle('is-selected', x.dataset.sid === s.id));
        }}, s.name);
        b.dataset.sid = s.id;
        if (s.id === draft.status) b.classList.add('is-selected');
        statusWrap.append(b);
      });

      // colour picker
      const colorWrap = U.el('div', { class: 'color-picker' });
      COLORS.forEach(co => {
        const sw = U.el('button', { class: 'color-swatch',
          style: { background: co.hex }, title: co.id,
          onclick: () => {
            draft.color = co.id;
            colorWrap.querySelectorAll('.color-swatch').forEach(x => x.classList.toggle('is-selected', x.dataset.cid === co.id));
          }});
        sw.dataset.cid = co.id;
        if (co.id === draft.color) sw.classList.add('is-selected');
        colorWrap.append(sw);
      });

      scroll.append(
        U.el('div', { class: 'label' }, 'Name'),
        nameInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Lineage'),
        lineageInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Calling'),
        callingInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Description'),
        descInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Oath'),
        oathInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Bonds'),
        bondsInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Carried'),
        carriedInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Notes'),
        notesInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Condition'),
        statusWrap,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Accent Colour'),
        colorWrap
      );
      dialog.append(scroll);

      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--ghost', onclick: () => ov.remove() }, 'Cancel'),
        U.el('button', { class: 'btn btn--primary', onclick: async () => {
          if (!nameInput.value.trim()) { nameInput.focus(); return; }
          draft.name        = nameInput.value.trim();
          draft.lineage     = lineageInput.value.trim();
          draft.calling     = callingInput.value.trim();
          draft.description = descInput.value.trim();
          draft.oath        = oathInput.value.trim();
          draft.bonds       = bondsInput.value.trim();
          draft.carried     = carriedInput.value.trim();
          draft.notes       = notesInput.value.trim();
          draft.updated     = Date.now();
          if (isEdit) {
            const idx = pcs.findIndex(x => x.id === existing.id);
            if (idx >= 0) pcs[idx] = draft;
          } else {
            pcs.unshift(draft);
          }
          await save();
          ov.remove();
          render();
        }}, isEdit ? 'Save' : 'Name')
      ]));
      ov.append(dialog);
      document.body.append(ov);
      setTimeout(() => nameInput.focus(), 50);
    }

    render();
  }
});

/* =========================================================================
   MODULE: HALL OF FACES (NPC Conjurer)
   ========================================================================= */
Keep.register({
  id: 'faces',
  name: 'Hall of Faces',
  category: 'workshop',
  glyph: 'g-mask',
  tagline: 'Conjure a townsfolk, a stranger, a name to remember.',
  sub: 'Press the bell. A face appears. Keep the ones who matter.',

  async mount(body, actions) {
    const stage = U.el('div');
    const rosterWrap = U.el('div', { class: 'faces__roster' });
    body.append(stage, rosterWrap);

    actions.append(U.el('button', { class: 'btn btn--primary', onclick: () => roll() }, 'Conjure'));

    const cultures = {
      'northron': {
        first: ['Bjorn','Astrid','Halla','Sigrid','Eyvind','Ulrich','Gudrun','Magnus','Solveig','Thorvald','Ingrid','Olaf','Freya','Brand','Helka','Ragnar','Liv','Knut'],
