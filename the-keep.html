        last: ['Vance','Crouse','Holloway','Ashwell','Drummond','Mire','Beckford','Halewood','Carrow','Stillwater','Penance','Greenmoor']
      },
      'southern': {
        first: ['Idris','Soraya','Rashid','Layla','Kalim','Nahla','Faruq','Yara','Selim','Amara','Tariq','Zaina','Hadi','Nasrin'],
        last: ['al-Saif','of Brassgate','the Patient','of the Golden Quarter','ben-Ehud','ad-Diwan','of Five Wells','the Cup-bearer']
      }
    };

    const occupations = [
      'wheelwright','tax collector','traveling friar','disgraced knight','blacksmith\u2019s widow','ratcatcher','letter-carrier','market scribe','herbalist','dock foreman','retired duellist','wet-nurse','wandering bard','grave-digger','ferry-keeper','candle-maker','tax-evading cobbler','seamstress with a side trade','keeper of birds','minor magistrate','wood-cutter','salt-merchant','exiled scholar','tomb warden','village midwife','road-warden'
    ];
    const voices = [
      'clipped, like she is always interrupting herself',
      'a soft baritone with a slight whistle on s-sounds',
      'reedy, breaks at the top of every sentence',
      'gravel, slow, never finishes a word',
      'lilting, sing-songy, never quite sober',
      'measured, dry, leaves you waiting at the end',
      'breathless, like he just ran here, even seated',
      'mutters between words, as if cursing the air',
      'theatrical, even at breakfast',
      'a half-whisper, never above',
      'a faint accent from somewhere no one places',
      'pitched too high for the body it comes from'
    ];
    const secrets = [
      'is not who they say they are',
      'owes a debt to someone dangerous',
      'witnessed a killing and never spoke of it',
      'is in love with the wrong person',
      'is dying, and only the apothecary knows',
      'stole something small and irreplaceable',
      'serves a rival house in secret',
      'fled a war years ago, under another name',
      'has a child no one knows about',
      'is being blackmailed for a crime they did not commit',
      'practices a forbidden craft after dark',
      'is searching for a sibling thought lost'
    ];
    const wants = [
      'a quiet evening, just once',
      'a letter delivered, but not opened',
      'to leave this town before winter',
      'their name on something that will outlast them',
      'revenge, but is not sure on whom yet',
      'to be believed, just by one person',
      'their daughter back',
      'to make a thing that cannot be unmade',
      'forgiveness, from someone who is dead',
      'the truth about a dream they keep having',
      'an apprentice who will not run off',
      'one more good summer'
    ];
    const mannerisms = [
      'taps the rim of any cup three times before drinking',
      'never sits with their back to a door',
      'is always carrying a small folded paper',
      'apologises before asking any question',
      'pronounces one common word strangely',
      'will not eat anything red',
      'wears a ring on a chain, not a finger',
      'closes one eye when listening hard',
      'collects feathers and is very particular about them',
      'has a small dog no one else can see',
      'crosses themselves at every bell',
      'will not say the name of their home village'
    ];
    const physical = [
      'a long scar through the right brow',
      'one milky eye and one sharp',
      'hands stained dark from old ink',
      'a missing little finger, never explained',
      'hair shockingly white, despite being young',
      'a tattoo on the back of the neck, a date',
      'a slight limp on cold mornings',
      'always slightly damp, somehow',
      'tall, but stoops as if used to lower ceilings',
      'a soft burn-scar along the jaw',
      'eyes set very wide, like a creature watching two directions',
      'thin, restless hands; cannot hold them still'
    ];

    function newNpc(seed) {
      const cultKey = U.pick(Object.keys(cultures));
      const cult = cultures[cultKey];
      const name = U.pick(cult.first) + ' ' + U.pick(cult.last);
      const npc = {
        id: U.uid(),
        name, culture: cultKey,
        role: U.pick(occupations),
        voice: U.pick(voices),
        secret: U.pick(secrets),
        want: U.pick(wants),
        mannerism: U.pick(mannerisms),
        physical: U.pick(physical),
        created: Date.now()
      };
      if (seed && seed.poiName) {
        npc.location = seed.poiName + (seed.region ? ', ' + seed.region : '');
      }
      return npc;
    }
    async function renderNpc(npc, opts = {}) {
      const fields = [
        ['Voice', npc.voice],
        ['Wants', npc.want],
        ['Mannerism', npc.mannerism],
        ['Appearance', npc.physical],
        ['Secret', npc.secret]
      ];
      const card = U.el('div', { class: 'faces__npc' });
      card.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('div', { class: 'faces__npc-name' }, npc.name),
        U.el('div', { class: 'faces__npc-role' }, npc.role + ' \u00B7 ' + (npc.culture.charAt(0).toUpperCase() + npc.culture.slice(1)) + (npc.location ? ' \u00B7 in ' + npc.location : '')),
        U.el('div', { class: 'faces__npc-grid' },
          fields.map(([l, v]) => U.el('div', {}, [
            U.el('div', { class: 'faces__field-label' }, l),
            U.el('div', { class: 'faces__field-value' }, v)
          ]))
        )
      );

      // backlinks: archive entries that reference this name with [[wikilink]]
      const links = await Refs.backlinks(npc.name);
      if (links.length) {
        const linksWrap = U.el('div', { class: 'faces__backlinks' });
        linksWrap.append(U.el('div', { class: 'faces__field-label' }, 'Mentioned in'));
        const row = U.el('div');
        links.forEach(name => {
          row.append(U.el('button', {
            class: 'tag',
            onclick: () => Refs.openArchiveEntry(name)
          }, name));
        });
        linksWrap.append(row);
        card.append(linksWrap);
      }

      // cabinet items this NPC is recorded as holding
      const cabItems = ((await Vault.get('cabinet')) || []).filter(it => it.heldBy === npc.name);
      if (cabItems.length) {
        const cabWrap = U.el('div', { class: 'faces__backlinks' });
        cabWrap.append(U.el('div', { class: 'faces__field-label' }, 'Carries'));
        const row = U.el('div');
        const kindGlyphs = { relic: '\u2720', weapon: '\u2694', tome: '\u2766', letter: '\u2709',
          trinket: '\u2726', tool: '\u2692', curiosity: '\u2742', other: '\u2767' };
        cabItems.forEach(it => {
          row.append(U.el('button', {
            class: 'tag',
            title: 'Open in The Cabinet',
            onclick: async () => {
              await Vault.set('cabinet-highlight', it.id);
              await Keep.mount('cabinet');
            }
          }, (kindGlyphs[it.kind] || '') + '  ' + it.name));
        });
        cabWrap.append(row);
        card.append(cabWrap);
      }

      const acts = U.el('div', { class: 'faces__actions' });
      if (!opts.inRoster) {
        acts.append(U.el('button', { class: 'btn btn--small', onclick: async () => {
          const r = await Vault.get('faces-roster') || [];
          r.unshift(npc);
          await Vault.set('faces-roster', r.slice(0, 200));
          U.toast('Inducted into the roster');
          renderRoster();
        }}, 'Keep'));
        acts.append(U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => roll() }, 'Roll Again'));
      } else {
        acts.append(U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => Refs.openArchiveEntry(npc.name) }, 'Open in Archive'));
        acts.append(U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          let r = await Vault.get('faces-roster') || [];
          r = r.filter(x => x.id !== npc.id);
          await Vault.set('faces-roster', r);
          renderRoster();
        }}, 'Forget'));
      }
      card.append(acts);
      return card;
    }
    async function renderRoster() {
      rosterWrap.innerHTML = '';
      const r = await Vault.get('faces-roster') || [];
      rosterWrap.append(U.el('h2', {}, 'The Roster'));
      if (!r.length) {
        rosterWrap.append(U.el('div', { class: 'empty' }, 'No one yet. Keep faces you want to remember.'));
        return;
      }
      const grid = U.el('div', { class: 'faces__roster-grid' });
      r.forEach(npc => {
        const card = U.el('div', { class: 'faces__roster-card', onclick: async () => {
          stage.innerHTML = '';
          stage.append(await renderNpc(npc, { inRoster: true }));
        }});
        card.append(
          U.el('div', { class: 'faces__roster-name' }, npc.name),
          U.el('div', { class: 'faces__roster-role' }, npc.role)
        );
        grid.append(card);
      });
      rosterWrap.append(grid);
    }
    async function roll(seed) {
      stage.innerHTML = '';
      stage.append(await renderNpc(newNpc(seed)));
    }

    // Atlas (or any other module) can drop a faces-location-hint with
    // { poiName, poiType, region, biome } to anchor a freshly rolled NPC
    // to a place. One-shot: read, delete, apply.
    const facesHint = await Vault.get('faces-location-hint');
    if (facesHint) await Vault.remove('faces-location-hint');

    // honour incoming search navigation: if faces-show is set, display that
    // roster NPC in the stage instead of rolling fresh
    const pendingNpc = await Vault.get('faces-show');
    if (pendingNpc) {
      await Vault.remove('faces-show');
      const roster = await Vault.get('faces-roster') || [];
      const found = roster.find(n => n.id === pendingNpc);
      if (found) {
        stage.innerHTML = '';
        stage.append(await renderNpc(found, { inRoster: true }));
      } else {
        await roll(facesHint);
      }
    } else {
      await roll(facesHint);
    }
    renderRoster();
  }
});

          'You looked tired this morning.',
          'Eat something. Please.', 'I have been worried.',
          'Do not try to lie to me. I know your faces.',
          'You forget that you are also worth saving.',
          'If they come for you, they come through me first.',
          'I have a bad feeling about this. But I follow.',
          'Take this. I brought it for you.',
          'Sleep. I will keep watch.',
          'You are not alone in this.',
          'I have known you longer than I have known peace.',
          'Promise me one thing. Promise me you will come back.',
          'I named my horse after you. It is a bad horse.',
          'You are stronger than you think.',
          'Do not apologise. Not to me.',
          'I would die for this. For you.',
          'Whatever you decide. I am with you.',
          'We have been through worse.',
          'Look at me. You are not lost.',
          'Together, then.',
          'I prayed for you.'
        ]
      },
      { id: 'reluctant', name: 'Reluctant', glyph: '\u2601', accent: '#7a6c52', accentD: '#4f4530', soft: 'rgba(122,108,82,0.13)',
        lines: [
          'We are going to die out here.', 'Fine. Fine.',
          'I told you this was a bad idea.',
          'Of course it is haunted. Why would it not be haunted.',
          'I want it noted, for the record, that I objected.',
          'You owe me. Heavily.',
          'Three days of walking for this?',
          'Lead on, then. As always.',
          'Could be worse. Do not ask how.',
          'Why do I follow you. I really must consider this.',
          'Wonderful. More stairs.',
          'I hate everything about this.',
          'Look at it. Look at it.',
          'I will require strong drink later.',
          'We could just turn around. Just saying.',
          'I should have stayed at the inn.',
          'Wake me when it is over.',
          'If I die, I will haunt you. Specifically.',
          'And here I thought today might be peaceful.',
          'Marvellous. Truly.',
          'You owe me a meal. A real one. Not jerky.',
          'I will follow you into the next disaster also. I know.',
          'Yes, yes. I am coming.',
          'We had food yesterday. Now we have rumours. Tremendous.',
          'After you, hero.'
        ]
      }
    ];

    const STATUSES = [
      { id: 'hale',     name: 'Hale' },
      { id: 'wounded',  name: 'Wounded' },
      { id: 'lost',     name: 'Lost' },
      { id: 'fallen',   name: 'Fallen' },
      { id: 'departed', name: 'Departed' }
    ];

    function bondLabel(v) {
      if (v <= -3) return 'Estranged';
      if (v <= -1) return 'Cold';
      if (v === 0) return 'Stranger';
      if (v <= 2)  return 'Travel-Mate';
      if (v <= 4)  return 'Trusted';
      if (v <= 6)  return 'Close';
      if (v <= 8)  return 'Sworn';
      return 'Heart-Bound';
    }

    function archetypeOf(id) { return ARCHETYPES.find(a => a.id === id) || ARCHETYPES[0]; }
    function statusOf(id)    { return STATUSES.find(s => s.id === id) || STATUSES[0]; }

    let companions = await Vault.get('fellowship');
    if (!companions || !companions.length) {
      companions = [
        {
          id: U.uid(),
          name: 'Mira Greycloak',
          archetype: 'scout',
          voice: 'A wry, quiet thing. Walks lighter than her boots should allow.',
          bond: 4,
          status: 'hale',
          customLines: [],
          speakHistory: [],
          created: Date.now(),
          updated: Date.now()
        },
        {
          id: U.uid(),
          name: 'Brother Halric',
          archetype: 'healer',
          voice: 'Wears the green sash of a Greyfern wayfarer-priest. Carries more bandages than blessings.',
          bond: 6,
          status: 'hale',
          customLines: [],
          speakHistory: [],
          created: Date.now(),
          updated: Date.now()
        }
      ];
      await Vault.set('fellowship', companions);
    }

    // archive backlinks
    let archiveEntries = await Refs.archiveEntries();
    function backlinksFor(name) {
      const out = [];
      const safe = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp('\\[\\[' + safe + '\\]\\]');
      for (const [k, e] of Object.entries(archiveEntries)) {
        if (re.test(e.body || '')) out.push(k);
      }
      return out;
    }

    const head = U.el('div', { class: 'fellowship__head' });
    const grid = U.el('div', { class: 'fellowship__grid' });
    body.append(head, grid);

    actions.append(
      U.el('button', { class: 'btn btn--primary', onclick: () => openCompanionForm() }, 'Welcome a Companion')
    );

    async function save() { await Vault.set('fellowship', companions); }

    function speakAs(c) {
      const arch = archetypeOf(c.archetype);
      const pool = [...arch.lines, ...(c.customLines || [])];
      const recent = (c.speakHistory || []).slice(0, Math.min(6, Math.floor(pool.length / 3)));
      const available = pool.filter(l => !recent.includes(l));
      const line = U.pick(available.length ? available : pool);
      c.speakHistory = [line, ...(c.speakHistory || [])].slice(0, 12);
      c.lastSpoken = line;
      return line;
    }

    function statusOrder(s) {
      return ['hale','wounded','lost','fallen','departed'].indexOf(s) + 1 || 99;
    }

    function render() {
      head.innerHTML = '';
      const alive = companions.filter(c => c.status !== 'fallen' && c.status !== 'departed').length;
      head.append(
        U.el('div', { class: 'fellowship__count' },
          alive + ' walk with you' +
          (companions.length > alive ? ' (' + (companions.length - alive) + ' remembered)' : '')),
        U.el('div', {}, [
          U.el('button', { class: 'btn btn--small', onclick: () => openCompanionForm() }, '+ Welcome a Companion')
        ])
      );

      grid.innerHTML = '';
      if (!companions.length) {
        grid.append(U.el('div', { class: 'empty' }, 'No companions yet. Welcome one above.'));
        return;
      }
      const sorted = [...companions].sort((a, b) => {
        const ao = statusOrder(a.status), bo = statusOrder(b.status);
        if (ao !== bo) return ao - bo;
        return (b.bond || 0) - (a.bond || 0);
      });
      sorted.forEach(c => grid.append(renderCard(c)));
      applyPendingHighlight();
    }

    let pendingHighlight = await Vault.get('fellowship-highlight');
    if (pendingHighlight) await Vault.remove('fellowship-highlight');
    function applyPendingHighlight() {
      if (!pendingHighlight) return;
      const card = grid.querySelector('[data-cid="' + pendingHighlight + '"]');
      if (card) {
        setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 30);
        card.classList.add('fellowship-card--highlight');
        setTimeout(() => card.classList.remove('fellowship-card--highlight'), 2400);
      }
      pendingHighlight = null;
    }

    function renderCard(c) {
      const arch = archetypeOf(c.archetype);
      const s = statusOf(c.status);
      const card = U.el('div', {
        class: 'fellowship-card fellowship-card--status-' + s.id +
          (s.id === 'fallen' || s.id === 'departed' ? ' fellowship-card--' + s.id : ''),
        style: { '--accent': arch.accent, '--accent-d': arch.accentD, '--accent-soft': arch.soft }
      });
      card.dataset.cid = c.id;

      // head
      card.append(U.el('div', { class: 'fellowship-card__head' }, [
        U.el('div', { class: 'fellowship-card__glyph' }, arch.glyph),
        U.el('div', { class: 'fellowship-card__title' }, [
          U.el('div', { class: 'fellowship-card__name' }, c.name),
          U.el('div', { class: 'fellowship-card__meta' }, [
            U.el('span', { class: 'fellowship-card__archetype' }, arch.name),
            U.el('span', { class: 'fellowship-card__status' }, s.name)
          ])
        ])
      ]));

      if (c.voice) card.append(U.el('div', { class: 'fellowship-card__voice' }, c.voice));

      // bond gauge
      const bond = U.el('div', { class: 'fellowship-card__bond' });
      bond.append(
        U.el('div', { class: 'fellowship-card__bond-label' }, 'Bond'),
        U.el('div', { class: 'fellowship-card__bond-value' },
          bondLabel(c.bond || 0) + ' (' + ((c.bond || 0) >= 0 ? '+' : '') + (c.bond || 0) + ')')
      );
      const bar = U.el('div', { class: 'gauge fellowship-card__bond-bar' });
      bar.append(U.el('div', { class: 'gauge__zero' }));
      bar.append(U.el('div', { class: 'gauge__notch', style: { left: (((c.bond || 0) + 5) / 15 * 100) + '%' } }));
      bond.append(bar);
      const bondCtrls = U.el('div', { class: 'fellowship-card__bond-controls' });
      const adjust = (delta) => async () => {
        c.bond = Math.max(-5, Math.min(10, (c.bond || 0) + delta));
        c.updated = Date.now();
        await save();
        render();
      };
      bondCtrls.append(
        U.el('button', { class: 'gauge-btn', onclick: adjust(-1), title: 'closer to estrangement' }, '\u2212'),
        U.el('button', { class: 'gauge-btn', onclick: adjust(1), title: 'closer to bond' }, '+')
      );
      bond.append(bondCtrls);
      card.append(bond);

      // quote display
      const isQuiet = !c.lastSpoken;
      const quote = U.el('div', { class: 'fellowship-card__quote' + (isQuiet ? ' fellowship-card__quote--empty' : '') });
      const quoteText = U.el('div', { class: 'fellowship-card__quote-text' },
        isQuiet ? 'silent' : c.lastSpoken);
      quote.append(quoteText);
      const qActs = U.el('div', { class: 'fellowship-card__quote-actions' });
      qActs.append(
        U.el('button', {
          class: 'fellowship-card__quote-act',
          title: 'Pin this line to the Almanac',
          disabled: isQuiet,
          onclick: async () => {
            if (!c.lastSpoken) return;
            const text = c.name.toUpperCase() + ' SAID: \u201C' + c.lastSpoken + '\u201D';
            const today = await Refs.pinToToday(text, {
              module: 'fellowship',
              id: c.id,
              label: c.name
            });
            U.toast('Pinned to ' + (await Refs.formatDate(today)));
          }
        }, '\u2767')
      );
      quote.append(qActs);
      card.append(quote);

      // SPEAK button
      const speakBtn = U.el('button', {
        class: 'fellowship-card__speak',
        disabled: s.id === 'fallen' || s.id === 'departed',
        onclick: async () => {
          const line = speakAs(c);
          await save();
          // animate the quote update without a full re-render
          const newQuote = U.el('div', { class: 'fellowship-card__quote' });
          const newText = U.el('div', { class: 'fellowship-card__quote-text' }, line);
          const newActs = U.el('div', { class: 'fellowship-card__quote-actions' }, [
            U.el('button', {
              class: 'fellowship-card__quote-act',
              title: 'Pin this line to the Almanac',
              onclick: async () => {
                const text = c.name.toUpperCase() + ' SAID: \u201C' + line + '\u201D';
                const today = await Refs.pinToToday(text, {
                  module: 'fellowship',
                  id: c.id,
                  label: c.name
                });
                U.toast('Pinned to ' + (await Refs.formatDate(today)));
              }
            }, '\u2767')
          ]);
          newQuote.append(newText, newActs);
          quote.replaceWith(newQuote);
        }
      }, s.id === 'fallen' ? 'Silent' : (s.id === 'departed' ? 'Gone' : 'Speak'));
      card.append(speakBtn);

      // archive backlinks
      const backs = backlinksFor(c.name);
      if (backs.length) {
        const backWrap = U.el('div', { class: 'fellowship-card__backlinks' });
        backs.forEach(name => {
          backWrap.append(U.el('button', {
            class: 'tag',
            title: 'Open in the Archive',
            onclick: () => Refs.openArchiveEntry(name)
          }, name));
        });
        card.append(backWrap);
      }

      // actions
      const acts = U.el('div', { class: 'fellowship-card__actions' });
      acts.append(
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => openCompanionForm(c) }, 'Edit'),
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          if (!confirm('Release "' + c.name + '" from the Fellowship?')) return;
          companions = companions.filter(x => x.id !== c.id);
          await save();
          render();
        }}, 'Release')
      );
      card.append(acts);

      return card;
    }

    function openCompanionForm(existing) {
      const isEdit = !!existing;
      const draft = existing
        ? { ...existing, customLines: [...(existing.customLines || [])] }
        : { id: U.uid(), name: '', archetype: 'stoic', voice: '', bond: 1, status: 'hale',
            customLines: [], speakHistory: [], created: Date.now(), updated: Date.now() };

      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card', style: { maxWidth: '560px' } });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, isEdit ? 'Edit Companion' : 'Welcome a Companion')
      );
      const scroll = U.el('div', { class: 'modal-card__scroll' });

      const nameInput = U.el('input', { class: 'input', placeholder: 'Mira Greycloak, Brother Halric...', value: draft.name });
      const voiceInput = U.el('textarea', { class: 'textarea', placeholder: 'How they carry themselves. Accent, manner, appearance.', style: { minHeight: '70px' } });
      voiceInput.value = draft.voice || '';

      // archetype picker
      const archWrap = U.el('div', { class: 'archetype-picker' });
      ARCHETYPES.forEach(a => {
        const b = U.el('button', { onclick: () => {
          draft.archetype = a.id;
          archWrap.querySelectorAll('button').forEach(x => x.classList.toggle('is-selected', x.dataset.aid === a.id));
        }}, [
          U.el('span', { class: 'archetype-picker__glyph' }, a.glyph),
          U.el('span', {}, a.name)
        ]);
        b.dataset.aid = a.id;
        if (a.id === draft.archetype) b.classList.add('is-selected');
        archWrap.append(b);
      });

      // status picker
      const statusWrap = U.el('div', { class: 'status-picker' });
      STATUSES.forEach(s => {
        const b = U.el('button', { onclick: () => {
          draft.status = s.id;
          statusWrap.querySelectorAll('button').forEach(x => x.classList.toggle('is-selected', x.dataset.sid === s.id));
        }}, s.name);
        b.dataset.sid = s.id;
        if (s.id === draft.status) b.classList.add('is-selected');
        statusWrap.append(b);
      });

      const linesInput = U.el('textarea', { class: 'textarea',
        placeholder: 'Your own lines for this companion, one per line. These join the archetype\u2019s default pool.',
        style: { minHeight: '110px' } });
      linesInput.value = (draft.customLines || []).join('\n');

      scroll.append(
        U.el('div', { class: 'label' }, 'Name'),
        nameInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Archetype'),
        archWrap,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Voice & Appearance'),
        voiceInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Status'),
        statusWrap,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Custom Lines (optional)'),
        linesInput
      );
      dialog.append(scroll);

      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--ghost', onclick: () => ov.remove() }, 'Cancel'),
        U.el('button', { class: 'btn btn--primary', onclick: async () => {
          if (!nameInput.value.trim()) { nameInput.focus(); return; }
          draft.name = nameInput.value.trim();
          draft.voice = voiceInput.value.trim();
          draft.customLines = linesInput.value.split('\n').map(s => s.trim()).filter(Boolean);
          draft.updated = Date.now();
          if (isEdit) {
            const idx = companions.findIndex(x => x.id === existing.id);
            if (idx >= 0) companions[idx] = draft;
          } else {
            companions.unshift(draft);
          }
          await save();
          ov.remove();
          render();
        }}, isEdit ? 'Save' : 'Welcome')
      ]));
      ov.append(dialog);
      document.body.append(ov);
      setTimeout(() => nameInput.focus(), 50);
    }

    render();
  }
});

/* =========================================================================
   MODULE: ATLAS (Region Map Generator)
   Pick a biome, set a POI count, optionally name the region. Produces a
   hand-drawn SVG map of a dozen places, each with a 3-4 sentence
   backstory composed from per-type sub-pools (establish, detail,
   complication, hook). Maps are stored in a library; Print/PDF produces
   a clean letter-paper layout (map then numbered legend) suitable for
   browser Save-as-PDF. POIs hand off to Quest (when type maps to a
   Quest setting), the Tavern (for towns), and the Archive (always).
   Inspirational, not authoritative; biome constraints keep shipwrecks
   on coasts, oases in deserts, etc.
   ========================================================================= */

    const SVG_NS = 'http://www.w3.org/2000/svg';

      const el = document.createElementNS(SVG_NS, tag);
      if (attrs) for (const k in attrs) {
        if (attrs[k] != null) el.setAttribute(k, attrs[k]);
      }
      if (kids != null) {
        const arr = Array.isArray(kids) ? kids : [kids];
        for (const c of arr) {
          if (c == null) continue;
          if (typeof c === 'string') el.appendChild(document.createTextNode(c));

    // when Atlas mounts. One-shot: read, locate the containing map,
    // delete the hint, render, then open the popover.
    let pendingPoiId = await Vault.get('atlas-poi-show');
    if (pendingPoiId) {
      await Vault.remove('atlas-poi-show');
      const owning = maps.find(mp => (mp.pois || []).some(p => p.id === pendingPoiId));
      if (owning) {
        activeMapId = owning.id;
        await Vault.set('atlas-active', activeMapId);

    function generateRegionName(biomeId) {
      return 'The ' + pick(REGION_ADJS) + ' ' + pick(BIOMES[biomeId].regionNouns);
    }

    // Mitchell's best-candidate algorithm for organic distribution.
    function placePois(count, w, h, padding) {
      const points = [];
      for (let i = 0; i < count; i++) {
        let best = null, bestDist = -1;
        const tries = i === 0 ? 1 : 10;
        for (let t = 0; t < tries; t++) {
          const x = padding + Math.random() * (w - 2 * padding);
          const y = padding + Math.random() * (h - 2 * padding);
          let minDist = Infinity;
          for (const p of points) {
            const d = Math.hypot(p.x - x, p.y - y);
            if (d < minDist) minDist = d;
          }
          if (minDist > bestDist) { bestDist = minDist; best = { x, y }; }
        }
        points.push(best);
      }
      return points;
    }

    function generateBackstoryFor(typeId, name) {
      const bs = POI_TYPES[typeId].backstory;
      return [pick(bs.establish), pick(bs.detail), pick(bs.complication), pick(bs.hook)]
        .join(' ').replace(/\{name\}/g, name);
    }

    function pickPoiTypesForBiome(biomeId, count) {
      const eligible = Object.entries(POI_TYPES).filter(([id, t]) => t.biomes.includes(biomeId));
      // Universal (in 5+ biomes) gets weight 2; specialised gets weight 4.
      const weighted = [];
      for (const [id, t] of eligible) {
        const weight = t.biomes.length >= 5 ? 2 : 4;
        for (let w = 0; w < weight; w++) weighted.push(id);
      }
      const result = [];
      // Ensure at least one settlement on inhabitable biomes.
      if (biomeId !== 'subterranean' && POI_TYPES.town.biomes.includes(biomeId)) {
        result.push('town');
      }
      const used = {};
      let tries = 0;
      while (result.length < count && tries++ < 200) {
        const id = pick(weighted);
        used[id] = (used[id] || 0) + 1;
        if (used[id] <= 3) result.push(id);
      }
      // Shuffle so the town isn't always first.
      for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = result[i]; result[i] = result[j]; result[j] = tmp;
      }
      return result;
    }

    function generateMap(biomeId, poiCount, suppliedName) {
      const typeIds = pickPoiTypesForBiome(biomeId, poiCount);
      const W = 800, H = 540;
      const positions = placePois(poiCount, W, H, 80);
      const usedNames = new Set();
      const pois = typeIds.map((typeId, i) => {
        const type = POI_TYPES[typeId];
        let name = pick(type.names);
        let nTries = 8;
        while (usedNames.has(name) && nTries-- > 0) name = pick(type.names);
        if (usedNames.has(name)) name = name + ' (lesser)';
        usedNames.add(name);
        return {
          id: U.uid(),
          type: typeId,
          name,
          x: Math.round(positions[i].x),
          y: Math.round(positions[i].y),
          backstory: generateBackstoryFor(typeId, name)
        };
      });
      return {
        id: U.uid(),
        name: (suppliedName && suppliedName.trim()) || generateRegionName(biomeId),
        biome: biomeId,
        poiCount,
        pois,
        created: Date.now()
      };
    }

    async function addFactionFromPoi(poi, map) {
      const type = POI_TYPES[poi.type];
      // POI-type-specific naming patterns: a bandit camp becomes a crew,
      // a monastery becomes an order, etc. Falls back to the POI name.
      const factionNamePatterns = {
        bandit_camp:    '{n}\u2019s Crew',
        pirate_haven:   'Captains of {n}',
        monastery:      'Order of {n}',
        smugglers_cave: 'Smugglers of {n}',
        druid_grove:    'Druids of {n}',
        jaguar_shrine:  'Cult of {n}',
        sunless_city:   'Remnant of {n}',
        manor:          'House of {n}'
      };
      const pattern = factionNamePatterns[poi.type] || '{n}';
      const factionName = pattern.replace('{n}', poi.name);
      await Vault.set('factions-poi-hint', {
        poiName: poi.name, poiType: type.typeLabel,
        factionName, region: map.name, biome: BIOMES[map.biome].name,
        mapId: map.id, poiId: poi.id,
        suggestedColor: colorForPoiType(poi.type)
      });
      closePopover();
      U.toast('Factions: seeding ' + factionName);
      await Keep.mount('factions');
    }

    async function launchQuestFromPoi(poi, map) {
      const questSetting = POI_TYPES[poi.type].questSetting;
      if (!questSetting) return;
      const existing = await Vault.get('quest-active');
      if (existing && existing.status && existing.status !== 'building') {
        if (!confirm('A quest is already in progress. Replace it?')) return;
      }
      const questState = {
        status: 'building',
        setting: questSetting,
        beatCount: 5,
        climaxType: 'surprise',
        companions: [],
        beats: [],
        beatIdx: 0,
        resolvedClimaxType: null,
        climaxText: '',
        findData: null,
        startedAt: null,
        summary: '',
        originPoi: map ? {
          name: poi.name,
          type: POI_TYPES[poi.type].typeLabel,
          region: map.name,
          biome: BIOMES[map.biome].name
        } : null
      };
      await Vault.set('quest-active', questState);
      U.toast('Quest pre-set to ' + questSetting + (map ? ' at ' + poi.name : '') + '. Add companions, then Begin.');
      closePopover();
      await Keep.mount('quest');
    }

    async function createArchiveFromPoi(poi, map) {
      // Archive entries are object-keyed by title; previous Atlas code
      // pushed into an array, which the rest of the codebase never read.
      // Migrate to the correct schema and tag origin so the entry can
      // jump back to this POI on the map.
      const entries = (await Vault.get('archive-entries')) || {};
      const type = POI_TYPES[poi.type];
      const body = poi.backstory + '\n\nLocated in ' + map.name + ' (' + BIOMES[map.biome].name.toLowerCase() + '). Type: ' + type.typeLabel + '.';
      const origin = { module: 'atlas', mapId: map.id, poiId: poi.id, label: poi.name };
      const existing = entries[poi.name];
      if (existing) {
        existing.body = body;
        existing.origin = origin;
        existing.updated = Date.now();
        await Vault.set('archive-entries', entries);
        U.toast('Archive entry updated.');
      } else {
        entries[poi.name] = {
          title: poi.name,
          body,
          type: 'place',
          origin,
          created: Date.now(),
          updated: Date.now()
        };
        await Vault.set('archive-entries', entries);
        U.toast('Added to the Archive.');
      }
    }

    async function pinPoiToAlmanac(poi, map) {
      const type = POI_TYPES[poi.type];
      const text = 'ATLAS [' + map.name + ']: ' + poi.name + ' (' + type.typeLabel + '). ' + poi.backstory;
      const t = await Refs.pinToToday(text, {
        module: 'atlas',
        mapId: map.id,
        poiId: poi.id,
        label: poi.name + ' \u00b7 ' + type.typeLabel
      });
      U.toast('Pinned to ' + (await Refs.formatDate(t)));
    }

    // -- UI ACTIONS --
    async function createMap() {
      const map = generateMap(buildState.biome, buildState.poiCount, buildState.name);
      maps.unshift(map);
      activeMapId = map.id;
      buildState.name = '';
      await saveMaps();
      await saveActive();
      render();
    }
    async function selectMap(id) {
      activeMapId = id;
      await saveActive();
      closePopover();
      render();
    }
    async function deleteMap(id) {
      if (!confirm('Delete this map? It cannot be recovered.')) return;
      maps = maps.filter(m => m.id !== id);
      if (activeMapId === id) activeMapId = maps[0] ? maps[0].id : null;
      await saveMaps();
      await saveActive();
      render();
    }
    async function renameMap(id, newName) {
      const m = maps.find(x => x.id === id);
      if (!m || !newName.trim()) return;
      m.name = newName.trim();
      await saveMaps();
      render();
    }
    function printMap() { window.print(); }
