        }}, [
          U.el('span', { class: 'archetype-picker__glyph' }, a.glyph),
          U.el('span', {}, a.name)
        ]);
        b.dataset.aid = a.id;
        if (a.id === draft.archetype) b.classList.add('is-selected');
        archWrap.append(b);
      });

      // status picker
      const statusWrap = U.el('div', { class: 'status-picker' });
      STATUSES.forEach(s => {
        const b = U.el('button', { onclick: () => {
          draft.status = s.id;
          statusWrap.querySelectorAll('button').forEach(x => x.classList.toggle('is-selected', x.dataset.sid === s.id));
        }}, s.name);
        b.dataset.sid = s.id;
        if (s.id === draft.status) b.classList.add('is-selected');
        statusWrap.append(b);
      });

      const linesInput = U.el('textarea', { class: 'textarea',
        placeholder: 'Your own lines for this companion, one per line. These join the archetype\u2019s default pool.',
        style: { minHeight: '110px' } });
      linesInput.value = (draft.customLines || []).join('\n');

      scroll.append(
        U.el('div', { class: 'label' }, 'Name'),
        nameInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Archetype'),
        archWrap,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Voice & Appearance'),
        voiceInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Status'),
        statusWrap,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Custom Lines (optional)'),
        linesInput
      );
      dialog.append(scroll);

      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--ghost', onclick: () => ov.remove() }, 'Cancel'),
        U.el('button', { class: 'btn btn--primary', onclick: async () => {
          if (!nameInput.value.trim()) { nameInput.focus(); return; }
          draft.name = nameInput.value.trim();
          draft.voice = voiceInput.value.trim();
          draft.customLines = linesInput.value.split('\n').map(s => s.trim()).filter(Boolean);
          draft.updated = Date.now();
          if (isEdit) {
            const idx = companions.findIndex(x => x.id === existing.id);
            if (idx >= 0) companions[idx] = draft;
          } else {
            companions.unshift(draft);
          }
          await save();
          ov.remove();
          render();
        }}, isEdit ? 'Save' : 'Welcome')
      ]));
      ov.append(dialog);
      document.body.append(ov);
      setTimeout(() => nameInput.focus(), 50);
    }

    render();
  }
});

/* =========================================================================
   MODULE: THE CABINET (Things Found)
   A registry of relics, letters, weapons, and curiosities the party has
   acquired or seen. Different from the Archive: structured fields, status
   colour-coding, and date-stamped to the in-world calendar.
   ========================================================================= */
Keep.register({
  id: 'cabinet',
  name: 'The Cabinet',
  category: 'workshop',
  glyph: 'g-cabinet',
  tagline: 'Relics, letters, and curiosities. The catalogue of what the party has touched.',
  sub: 'Each drawer holds a finding. Note what it is, who carries it, where it surfaced, and when.',

  async mount(body, actions) {
    const KINDS = [
      { id: 'relic',     name: 'Relic',     glyph: '\u2720' },
      { id: 'weapon',    name: 'Weapon',    glyph: '\u2694' },
      { id: 'tome',      name: 'Tome',      glyph: '\u2766' },
      { id: 'letter',    name: 'Letter',    glyph: '\u2709' },
      { id: 'trinket',   name: 'Trinket',   glyph: '\u2726' },
      { id: 'tool',      name: 'Tool',      glyph: '\u2692' },
      { id: 'curiosity', name: 'Curiosity', glyph: '\u2742' },
      { id: 'other',     name: 'Other',     glyph: '\u2767' }
    ];
    const STATUSES = [
      { id: 'held',      name: 'Held' },
      { id: 'lost',      name: 'Lost' },
      { id: 'hidden',    name: 'Hidden' },
      { id: 'given',     name: 'Given' },
      { id: 'destroyed', name: 'Destroyed' }
    ];

    function kindOf(id)   { return KINDS.find(k => k.id === id) || KINDS[KINDS.length - 1]; }
    function statusOf(id) { return STATUSES.find(s => s.id === id) || STATUSES[0]; }

    const calendar = await Refs.calendar();
    const todayDate = await Refs.today();
    function fmtDate(d) {
      if (!d || typeof d !== 'object') return '(unknown)';
      return d.day + ' ' + calendar.months[d.month] + ', ' + d.year;
    }

    let items = await Vault.get('cabinet');
    if (!items || !items.length) {
      items = [
        {
          id: U.uid(),
          name: 'The Brass Compass',
          kind: 'curiosity',
          status: 'held',
          description: 'The needle does not point north. It points at the bearer\u2019s greatest fear.',
          heldBy: 'the party',
          foundAt: 'a drowned chapel beneath the salt road',
          foundOn: { ...todayDate },
          worth: 'priceless',
          created: Date.now(), updated: Date.now()
        },
        {
          id: U.uid(),
          name: 'Letter Sealed with Black Wax',
          kind: 'letter',
          status: 'held',
          description: 'Unopened. Addressed to a name no one in the lower city will speak aloud.',
          heldBy: 'the party',
          foundAt: 'a courier\u2019s body in the snow above Greyfern',
          foundOn: { ...todayDate },
          worth: 'unknown',
          created: Date.now(), updated: Date.now()
        }
      ];
      await Vault.set('cabinet', items);
    }

    let filter = 'all';

    const head = U.el('div', { class: 'cabinet__head' });
    const grid = U.el('div', { class: 'cabinet__grid' });
    body.append(head, grid);

    actions.append(
      U.el('button', { class: 'btn btn--primary', onclick: () => openItemForm() }, 'Catalogue a Find')
    );

    async function save() { await Vault.set('cabinet', items); }

    function statusOrder(s) {
      return ['held','lost','hidden','given','destroyed'].indexOf(s) + 1 || 99;
    }

    function render() {
      head.innerHTML = '';
      const counts = { all: items.length };
      STATUSES.forEach(s => { counts[s.id] = items.filter(i => i.status === s.id).length; });

      const filters = U.el('div', { class: 'cabinet__filters' });
      const opts = [{ id: 'all', name: 'All' }, ...STATUSES];
      opts.forEach(o => {
        const b = U.el('button', {
          class: 'cabinet__filter' + (filter === o.id ? ' is-active' : ''),
          onclick: () => { filter = o.id; render(); }
        }, [
          document.createTextNode(o.name),
          U.el('span', { class: 'cabinet__filter-count' }, String(counts[o.id] || 0))
        ]);
        filters.append(b);
      });
      head.append(filters);
      head.append(U.el('div', {}, [
        U.el('button', { class: 'btn btn--small', onclick: () => openItemForm() }, '+ Catalogue a Find')
      ]));

      grid.innerHTML = '';
      const visible = items.filter(i => filter === 'all' || i.status === filter);
      if (!visible.length) {
        grid.append(U.el('div', { class: 'empty' },
          filter === 'all' ? 'No finds yet. Catalogue one above.' : 'Nothing here in this state.'));
        return;
      }
      // sort: by status group, then by updated desc
      const sorted = [...visible].sort((a, b) => {
        const ao = statusOrder(a.status), bo = statusOrder(b.status);
        if (ao !== bo) return ao - bo;
        return (b.updated || 0) - (a.updated || 0);
      });
      sorted.forEach(it => grid.append(renderCard(it)));
      applyPendingHighlight();
    }

    let pendingHighlight = await Vault.get('cabinet-highlight');
    if (pendingHighlight) await Vault.remove('cabinet-highlight');
    function applyPendingHighlight() {
      if (!pendingHighlight) return;
      // if filter is hiding the item, switch to all
      const target = items.find(i => i.id === pendingHighlight);
      if (target && filter !== 'all' && target.status !== filter) {
        filter = 'all';
        pendingHighlight = pendingHighlight; // keep for re-render
        render();
        return;
      }
      const card = grid.querySelector('[data-itemid="' + pendingHighlight + '"]');
      if (card) {
        setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 30);
        card.classList.add('cabinet-card--highlight');
        setTimeout(() => card.classList.remove('cabinet-card--highlight'), 2400);
      }
      pendingHighlight = null;
    }

    function renderCard(it) {
      const k = kindOf(it.kind);
      const s = statusOf(it.status);
      const card = U.el('div', { class: 'cabinet-card cabinet-card--' + s.id });
      card.dataset.itemid = it.id;
      card.append(
        U.el('div', { class: 'cabinet-card__kind', title: k.name }, k.glyph)
      );
      const bodyEl = U.el('div', { class: 'cabinet-card__body' });
      bodyEl.append(
        U.el('div', { class: 'cabinet-card__head' }, [
          U.el('div', { class: 'cabinet-card__name' }, it.name),
          U.el('div', { class: 'cabinet-card__status' }, s.name)
        ])
      );
      if (it.description) {
        bodyEl.append(U.el('div', { class: 'cabinet-card__desc' }, it.description));
      }

      const meta = U.el('dl', { class: 'cabinet-card__meta' });
      function row(label, valNode) {
        meta.append(U.el('dt', {}, label), U.el('dd', {}, [valNode]));
      }
      if (it.heldBy) {
        // if it matches a roster NPC, render as a link to their archive
        const match = npcLookup(it.heldBy);
        row('Held By', match ? linkToArchive(it.heldBy) : document.createTextNode(it.heldBy));
      }
      if (it.foundAt) {
        row('Found', document.createTextNode(it.foundAt));
      }
      if (it.foundOn) {
        row('On', linkToAlmanac(it.foundOn));
      }
      if (it.worth) {
        row('Worth', document.createTextNode(it.worth));
      }
      if (meta.children.length) bodyEl.append(meta);

      const acts = U.el('div', { class: 'cabinet-card__actions' });
      acts.append(
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          const text = 'CABINET: ' + it.name + ' [' + s.name.toLowerCase() + '].' +
            (it.description ? '\n' + it.description : '');
          const today = await Refs.pinToToday(text);
          U.toast('Pinned to ' + (await Refs.formatDate(today)));
        }}, 'Pin'),
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => openItemForm(it) }, 'Edit'),
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          if (!confirm('Remove "' + it.name + '" from the catalogue?')) return;
          items = items.filter(x => x.id !== it.id);
          await save();
          render();
        }}, 'Remove')
      );
      bodyEl.append(acts);

      card.append(bodyEl);
      return card;
    }

    // sync lookups (npcs already loaded in mount scope)
    let npcRosterCache = null;
    function npcLookup(name) {
      if (!npcRosterCache) npcRosterCache = [];
      return npcRosterCache.find(n => n.name === name) || null;
    }
    function linkToArchive(name) {
      const btn = U.el('button', { class: 'cabinet-card__meta-link',
        title: 'Open in the Archive',
        onclick: () => Refs.openArchiveEntry(name)
      }, name);
      return btn;
    }
    function linkToAlmanac(date) {
      const btn = U.el('button', { class: 'cabinet-card__meta-link',
        title: 'Open this day in the Almanac',
        onclick: () => Refs.openAlmanacAt(date)
      }, fmtDate(date));
      return btn;
    }

    function openItemForm(existing) {
      const isEdit = !!existing;
      const draft = existing
        ? { ...existing, foundOn: existing.foundOn ? { ...existing.foundOn } : { ...todayDate } }
        : { id: U.uid(), name: '', kind: 'curiosity', status: 'held',
            description: '', heldBy: 'the party', foundAt: '',
            foundOn: { ...todayDate }, worth: '',
            created: Date.now(), updated: Date.now() };

      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card', style: { maxWidth: '560px' } });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, isEdit ? 'Edit Find' : 'Catalogue a Find')
      );
      const scroll = U.el('div', { class: 'modal-card__scroll' });

      const nameInput = U.el('input', { class: 'input', placeholder: 'The Brass Compass, Wolfshade\u2019s Knife...', value: draft.name });
      const descInput = U.el('textarea', { class: 'textarea', placeholder: 'What is it? What is strange about it? What does it want?', style: { minHeight: '90px' } });
      descInput.value = draft.description || '';
      const heldByInput = U.el('input', { class: 'input', placeholder: 'the party, an NPC name, a place', value: draft.heldBy });
      const foundAtInput = U.el('input', { class: 'input', placeholder: 'a drowned chapel beneath the salt road', value: draft.foundAt });
      const worthInput = U.el('input', { class: 'input', placeholder: 'priceless, 300 gp, a few coppers', value: draft.worth });

      // kind picker
      const kindWrap = U.el('div', { class: 'kind-picker' });
      KINDS.forEach(k => {
        const b = U.el('button', { onclick: () => {
          draft.kind = k.id;
          kindWrap.querySelectorAll('button').forEach(x => x.classList.toggle('is-selected', x.dataset.kid === k.id));
        }}, [
          U.el('span', { class: 'kind-picker__glyph' }, k.glyph),
          U.el('span', {}, k.name)
        ]);
        b.dataset.kid = k.id;
        if (k.id === draft.kind) b.classList.add('is-selected');
        kindWrap.append(b);
      });

      // status picker
      const statusWrap = U.el('div', { class: 'status-picker' });
      STATUSES.forEach(s => {
        const b = U.el('button', { onclick: () => {
          draft.status = s.id;
          statusWrap.querySelectorAll('button').forEach(x => x.classList.toggle('is-selected', x.dataset.sid === s.id));
        }}, s.name);
        b.dataset.sid = s.id;
        if (s.id === draft.status) b.classList.add('is-selected');
        statusWrap.append(b);
      });

      // date editor
      const dateWrap = U.el('div', { class: 'cabinet-date' });
      const dayInput = U.el('input', { class: 'input', type: 'number', min: 1, max: calendar.daysPerMonth, value: draft.foundOn.day });
      const monthSelect = U.el('select', { class: 'select' });
      calendar.months.forEach((mn, i) => {
        const opt = U.el('option', { value: i }, mn);
        if (i === draft.foundOn.month) opt.selected = 'selected';
        monthSelect.append(opt);
      });
      const yearInput = U.el('input', { class: 'input', type: 'number', value: draft.foundOn.year });
      const todayBtn = U.el('button', { class: 'btn btn--small btn--ghost', type: 'button', onclick: () => {
        dayInput.value = todayDate.day;
        monthSelect.value = todayDate.month;
        yearInput.value = todayDate.year;
      }}, 'Today');
      dateWrap.append(dayInput, monthSelect, yearInput, todayBtn);

      scroll.append(
        U.el('div', { class: 'label' }, 'Name'),
        nameInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Kind'),
        kindWrap,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Description'),
        descInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Status'),
        statusWrap,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Held By'),
        heldByInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Found At'),
        foundAtInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Found On'),
        dateWrap,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Worth'),
        worthInput
      );
      dialog.append(scroll);

      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--ghost', onclick: () => ov.remove() }, 'Cancel'),
        U.el('button', { class: 'btn btn--primary', onclick: async () => {
          if (!nameInput.value.trim()) { nameInput.focus(); return; }
          draft.name = nameInput.value.trim();
          draft.description = descInput.value.trim();
          draft.heldBy = heldByInput.value.trim();
          draft.foundAt = foundAtInput.value.trim();
          draft.worth = worthInput.value.trim();
          draft.foundOn = {
            day: Math.max(1, Math.min(calendar.daysPerMonth, +dayInput.value || 1)),
            month: +monthSelect.value,
            year: +yearInput.value || calendar.year
          };
          draft.updated = Date.now();
          if (isEdit) {
            const idx = items.findIndex(x => x.id === existing.id);
            if (idx >= 0) items[idx] = draft;
          } else {
            items.unshift(draft);
          }
          await save();
          ov.remove();
          render();
        }}, isEdit ? 'Save' : 'Catalogue')
      ]));
      ov.append(dialog);
      document.body.append(ov);
      setTimeout(() => nameInput.focus(), 50);
    }

    // load NPC roster for the heldBy link lookup
    npcRosterCache = await Refs.npcRoster();

    render();
  }
});

      const foods = U.pickN(banks.foods, U.randInt(3, 4));

      const surnames = ['Greyfell','Crouse','Vance','Mire','Ashwell','Halewood','Salt-river','Penance','Wintergrieve','Halloway','Beckford','Drummond','Stillwater','Carrow','al-Saif','of Brassgate','the Patient','ben-Ehud','of Five Wells','the Late','Cup-bearer','of the Three Falls'];

        proprietor: {
          name: personName(),

        patrons: Array.from({ length: 3 }, () => ({

          doing: U.pick(banks.patronDoing)

        rumours: Array.from({ length: 3 }, () => {

      out += s.atmosphere + '\n';
      out += 'Patrons: ' + s.patrons.map(p => p.name + ' (' + p.role + ')').join('; ') + '.\n';
      out += 'Rumours: ' + s.rumours.map((r, i) => (i + 1) + '. ' + r.text + ' [' + (r.truth === 'half' ? 'half-true' : r.truth) + ']').join(' ');
      return out;
    }

    function render() {
      // clear sheet contents but keep corners
      sheet.innerHTML = '';
      sheet.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', { class: 'tavern__name' }, state.name),
        U.el('div', { class: 'tavern__sub' }, U.el('em', {}, 'kept by ' + state.proprietor.role)),
        U.el('div', { class: 'tavern__rule' }, '\u2767 \u2767 \u2767'),
        U.el('div', { class: 'tavern__atmosphere' }, state.atmosphere)
      );

      // Menu
      const menuSec = U.el('div', { class: 'tavern__section' }, [
        U.el('h3', { class: 'tavern__heading' }, 'Bill of Fare'),
        (() => {
          const ul = U.el('ul', { class: 'tavern__menu' });
          state.menu.forEach(m => {
            ul.append(U.el('li', {}, [
              U.el('span', { class: 'tavern__menu-item' }, m.item),
              U.el('span', { class: 'tavern__menu-price' }, m.price)
            ]));
          });
          return ul;
        })()
      ]);
      sheet.append(menuSec);

      // Patrons
      const patSec = U.el('div', { class: 'tavern__section' }, [
        U.el('h3', { class: 'tavern__heading' }, 'Common Room'),
        (() => {
          const wrap = U.el('div', { class: 'tavern__patrons' });
          state.patrons.forEach(p => {
            const row = U.el('div', { class: 'tavern__patron' });
            const main = U.el('div', { class: 'tavern__patron-text' }, [
              U.el('strong', {}, p.name),
              document.createTextNode(', ' + p.role + '. '),
              U.el('em', {}, p.doing)
            ]);
            const recruit = U.el('button', {
              class: 'tavern__patron-recruit',
              title: 'Add to the Hall of Faces roster',
              onclick: async () => {
                const roster = (await Vault.get('faces-roster')) || [];
                if (roster.some(n => n.name === p.name)) {
                  U.toast(p.name + ' is already in the roster');
                  return;
                }
                const cultures = ['northron', 'rivenmark', 'southern'];
                const npc = {
                  id: U.uid(),
                  name: p.name,
                  culture: U.pick(cultures),
                  role: p.role,
                  voice: '',
                  want: '',
                  mannerism: p.doing,
                  physical: '',
                  secret: '',
                  created: Date.now(),
                  recruitedFrom: state.name || 'a tavern'
                };
                roster.push(npc);
                await Vault.set('faces-roster', roster.slice(0, 200));
                recruit.disabled = true;
                recruit.textContent = 'Recruited';
                U.toast(p.name + ' added to the roster');
              }
            }, 'Recruit');
            row.append(main, recruit);
            wrap.append(row);
          });
          return wrap;
        })()
      ]);
      sheet.append(patSec);

      // Rumours
      const rumSec = U.el('div', { class: 'tavern__section' }, [
        U.el('h3', { class: 'tavern__heading' }, 'Whispered Over Cups'),
        (() => {
          const ol = U.el('ol', { class: 'tavern__rumours' });
          state.rumours.forEach((r, i) => {
            const li = U.el('li', { class: 'tavern__rumour' });
            li.append(U.el('span', { class: 'tavern__rumour-text' }, r.text));
            if (!r.revealed) {
              li.append(U.el('button', { class: 'tavern__rumour-reveal', onclick: async () => {
                state.rumours[i].revealed = true;
                await save();
                render();
              }}, 'Reveal'));
            } else {
              const label = r.truth === 'true' ? 'True' : (r.truth === 'half' ? 'Half-true' : 'False');
              li.append(U.el('span', { class: 'tavern__truth tavern__truth--' + (r.truth === 'half' ? 'half' : r.truth) }, label));
            }
            // small pin icon: pins this single rumour to today's day note
            li.append(U.el('button', {
              class: 'tavern__rumour-pin',
              title: 'Pin this rumour to the Almanac',
              onclick: async () => {
                const truthTag = r.revealed
                  ? ' [' + (r.truth === 'half' ? 'half-true' : r.truth) + ']'
                  : ' [unverified]';
                const text = 'RUMOUR at ' + (state.name || 'the tavern') + ': ' + r.text + truthTag;
                const today = await Refs.pinToToday(text);
                U.toast('Pinned to ' + (await Refs.formatDate(today)));
              }
            }, '\u2767'));
            ol.append(li);
          });
          return ol;
        })()
      ]);
      sheet.append(rumSec);
    }

    render();
  }
});

/* =========================================================================
   MODULE: FACTION LEDGER
   ========================================================================= */
Keep.register({
  id: 'factions',
  name: 'Faction Ledger',
  category: 'workshop',
  glyph: 'g-standard',
  tagline: 'Who stands with whom. Who is owed. Who is owed pain.',
  sub: 'Note the powers your party crosses. Gauge their stance, and theirs to each other.',

  async mount(body, actions) {
    const SIGILS = ['\u2694','\u269C','\u26B0','\u271D','\u2625','\u2628','\u2693','\u2696','\u269D','\u2734','\u2735','\u2736','\u2766','\u2767','\u269A','\u2698','\u26A1','\u2620','\u2604','\u2616','\u2617','\u26AB','\u25C6','\u25D8'];
    const COLORS = [
      { id: 'wine',   var: 'var(--wine)',   soft: 'rgba(92,31,36,0.10)',  hex: '#5c1f24' },
      { id: 'forest', var: 'var(--forest)', soft: 'rgba(45,74,53,0.12)',  hex: '#2d4a35' },
      { id: 'gold',   var: 'var(--gold-d)', soft: 'rgba(184,146,58,0.16)', hex: '#8a6c25' },
      { id: 'indigo', var: 'var(--indigo)', soft: 'rgba(42,40,72,0.13)',   hex: '#2a2848' },
      { id: 'ink',    var: 'var(--ink-soft)', soft: 'rgba(58,47,36,0.10)', hex: '#3a2f24' },
      { id: 'salt',   var: '#7a6c52',       soft: 'rgba(122,108,82,0.12)', hex: '#7a6c52' },
      { id: 'iron',   var: '#4a5764',       soft: 'rgba(74,87,100,0.13)',  hex: '#4a5764' },
      { id: 'rust',   var: '#8a4a2c',       soft: 'rgba(138,74,44,0.13)',  hex: '#8a4a2c' }
    ];

    function standingLabel(v) {
      v = Math.max(-10, Math.min(10, v|0));
      if (v <= -8) return 'Blood Enemy';
      if (v <= -5) return 'Hostile';
      if (v <= -2) return 'Suspicious';
      if (v <= 1)  return 'Neutral';
      if (v <= 4)  return 'Cordial';
      if (v <= 7)  return 'Allied';
      return 'Sworn';
    }
    function colorFor(id) { return COLORS.find(c => c.id === id) || COLORS[0]; }

    let factions = await Vault.get('factions');
    if (!factions || !factions.length) {
      factions = [
        { id: U.uid(), name: 'House Ashlow', sigil: '\u269C', color: 'wine',
          motto: 'By the cleft, we stand.',
          goal: 'Hold the Greyfern Pass against any claimant from the Hollow Court.',
          party: 2, notes: '', relations: {} },
        { id: U.uid(), name: 'The Greyfern Order', sigil: '\u271D', color: 'forest',
          motto: 'Watch the pass. Always.',
          goal: 'Tend the road and the standing stones, and never speak of what they mean.',
          party: 0, notes: '', relations: {} }
      ];
      // mutual suspicion between seed factions
      factions[0].relations[factions[1].id] = { value: -3, note: 'They do not trust the order\u2019s silences.' };
      factions[1].relations[factions[0].id] = { value: -3, note: 'They mistrust any house that takes its name from a cleft of land.' };
      await Vault.set('factions', factions);
    }

    const head = U.el('div', { class: 'factions__head' });
    const grid = U.el('div', { class: 'factions__grid' });
    const matrixWrap = U.el('div', { class: 'matrix-wrap', style: { display: 'none' } });
    body.append(head, grid, matrixWrap);

    let view = (await Vault.get('factions-view')) || 'cards';
    let pendingExpand = await Vault.get('factions-expand');
    if (pendingExpand) await Vault.remove('factions-expand');
    if (pendingExpand) view = 'cards'; // expand only makes sense in cards mode

    // cross-module data cached at mount time for backlinks and threat counts
    let archiveEntries = await Refs.archiveEntries();
    let threatsLinked = (await Vault.get('threats')) || [];
    function backlinksFor(name) {
      const out = [];
      const safe = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp('\\[\\[' + safe + '\\]\\]');
      for (const [k, e] of Object.entries(archiveEntries)) {
        if (re.test(e.body || '')) out.push(k);
      }
      return out;
    }

    actions.append(
      U.el('button', { class: 'btn btn--primary', onclick: () => openFactionForm() }, 'Found a Faction')
    );

    async function save() { await Vault.set('factions', factions); }
    async function saveView() { await Vault.set('factions-view', view); }

    function applyPendingExpand() {
      if (!pendingExpand) return;
      const card = grid.querySelector('[data-fid="' + pendingExpand + '"]');
      if (card) {
        card.classList.add('faction-card--open');
        setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 30);
      }
      pendingExpand = null;
    }

    function render() {
      // hide any open matrix editor
      document.querySelectorAll('.matrix__editor').forEach(e => e.remove());

      head.innerHTML = '';
      head.append(
        U.el('div', { class: 'factions__count' },
          factions.length + ' faction' + (factions.length === 1 ? '' : 's') + ' tracked'),
        U.el('div', { class: 'factions__toggle' }, [
          U.el('button', { class: 'factions__toggle-btn' + (view === 'cards' ? ' is-active' : ''),
            onclick: async () => { view = 'cards'; await saveView(); render(); } }, 'Cards'),
          U.el('button', { class: 'factions__toggle-btn' + (view === 'matrix' ? ' is-active' : ''),
            onclick: async () => { view = 'matrix'; await saveView(); render(); } }, 'Matrix')
        ]),
        U.el('div', {}, [
          U.el('button', { class: 'btn btn--small', onclick: () => openFactionForm() }, '+ Found a Faction')
        ])
      );

      if (view === 'matrix' && factions.length >= 2) {
        grid.style.display = 'none';
        matrixWrap.style.display = '';
        renderMatrix();
      } else {
        grid.style.display = '';
        matrixWrap.style.display = 'none';
        renderCards();
        applyPendingExpand();
      }
    }

    function renderCards() {
      grid.innerHTML = '';
      if (!factions.length) {
        grid.append(U.el('div', { class: 'empty' }, 'No factions yet. Found one above.'));
        return;
      }
      factions.forEach(f => grid.append(renderCard(f)));
    }

    function relColor(v) {
      if (v < 0) return `rgba(var(--rel-neg-rgb), ${(-v / 10) * 0.45 + 0.05})`;
      if (v > 0) return `rgba(var(--rel-pos-rgb), ${(v / 10) * 0.45 + 0.05})`;
      return 'rgba(var(--rel-zero-rgb), 0.16)';
    }

    function renderMatrix() {
      matrixWrap.innerHTML = '';
      if (factions.length < 2) {
        matrixWrap.append(U.el('div', { class: 'empty' }, 'Found at least two factions to see the matrix.'));
        return;
      }
      const table = U.el('table', { class: 'matrix' });
      const thead = U.el('thead');
      const headRow = U.el('tr');
      headRow.append(U.el('th', { class: 'matrix__corner' }, ''));
      factions.forEach(c => {
        const cc = colorFor(c.color);
        headRow.append(U.el('th', {
          class: 'matrix__col-head',
          style: { '--accent': cc.var },
          title: c.name
        }, [
          U.el('span', { class: 'matrix__col-head-sigil' }, c.sigil || '?'),
          U.el('span', {}, c.name.slice(0, 3))
        ]));
      });
      thead.append(headRow);
      table.append(thead);

      const tbody = U.el('tbody');
      factions.forEach(rowF => {
        const rc = colorFor(rowF.color);
        const tr = U.el('tr');
        tr.append(U.el('th', { class: 'matrix__row-head', style: { '--accent': rc.var } }, [
          U.el('span', { class: 'matrix__row-head-sigil' }, rowF.sigil || '?'),
          document.createTextNode(rowF.name)
        ]));
        factions.forEach(colF => {
          if (rowF.id === colF.id) {
            tr.append(U.el('td', { class: 'matrix__cell matrix__cell--self' }, 'self'));
            return;
          }
          const rel = (rowF.relations && rowF.relations[colF.id]) ? rowF.relations[colF.id] : null;
          const v = rel ? rel.value : 0;
          const cell = U.el('td', {
            class: 'matrix__cell',
            style: { background: relColor(v) },
            title: rowF.name + ' \u2192 ' + colF.name + ': ' + standingLabel(v) + ' (' + (v >= 0 ? '+' : '') + v + ')'
          }, (v >= 0 ? '+' : '') + v);
          cell.dataset.from = rowF.id;
          cell.dataset.to = colF.id;
          cell.addEventListener('click', (e) => {
            e.stopPropagation();
            openMatrixEditor(rowF, colF, cell);
          });
          tr.append(cell);
        });
        tbody.append(tr);
      });
      table.append(tbody);
      matrixWrap.append(table);
    }

    function openMatrixEditor(fromF, toF, anchorEl) {
      document.querySelectorAll('.matrix__editor').forEach(e => e.remove());
      const editor = U.el('div', { class: 'matrix__editor' });

      const labelEl = U.el('div', { class: 'matrix__editor-label' });
      function syncLabel() {
        const v = (fromF.relations && fromF.relations[toF.id]) ? fromF.relations[toF.id].value : 0;
        labelEl.textContent = standingLabel(v) + ' (' + (v >= 0 ? '+' : '') + v + ')';
      }
      const adj = (delta) => async () => {
        if (!fromF.relations) fromF.relations = {};
        if (!fromF.relations[toF.id]) fromF.relations[toF.id] = { value: 0, note: '' };
        fromF.relations[toF.id].value = Math.max(-10, Math.min(10, fromF.relations[toF.id].value + delta));
        fromF.updated = Date.now();
        await save();
        renderMatrix();
        syncLabel();
        // re-append editor (matrix rebuild detached anchorEl's children but editor lives on body)
      };

      editor.append(
        U.el('div', { class: 'matrix__editor-title' }, fromF.name + ' \u2192 ' + toF.name),
        labelEl,
        U.el('div', { class: 'matrix__editor-buttons' }, [
          U.el('button', { class: 'gauge-btn', onclick: adj(-5) }, '\u22125'),
          U.el('button', { class: 'gauge-btn', onclick: adj(-1) }, '\u22121'),
          U.el('button', { class: 'gauge-btn', onclick: adj(1) }, '+1'),
          U.el('button', { class: 'gauge-btn', onclick: adj(5) }, '+5')
        ])
      );
      syncLabel();
      document.body.append(editor);

      // position to the right of the anchor cell, flip left if no room
      const r = anchorEl.getBoundingClientRect();
      const eh = editor.offsetHeight, ew = editor.offsetWidth;
      let left = r.right + 8;
      if (left + ew > window.innerWidth - 8) left = Math.max(8, r.left - ew - 8);
      let top = r.top;
      if (top + eh > window.innerHeight - 8) top = Math.max(8, window.innerHeight - eh - 8);
      editor.style.left = left + 'px';
      editor.style.top = top + 'px';

      // close on outside click
      setTimeout(() => {
        const close = (e) => {
          if (editor.contains(e.target)) return;
          if (e.target.classList && e.target.classList.contains('matrix__cell')) return;
          editor.remove();
          document.removeEventListener('click', close);
        };
        document.addEventListener('click', close);
      }, 50);
    }

    function renderCard(f) {
      const c = colorFor(f.color);
      const card = U.el('div', { class: 'faction-card', style: { '--accent': c.var, '--accent-soft': c.soft } });
      card.dataset.fid = f.id;

      card.append(U.el('div', { class: 'faction-card__ribbon' }));

      const top = U.el('div', { class: 'faction-card__top' });
      top.append(
        U.el('div', { class: 'faction-card__sigil' }, f.sigil || '?'),
        U.el('div', {}, [
          U.el('div', { class: 'faction-card__name' }, f.name),
          U.el('div', { class: 'faction-card__motto' }, f.motto || '\u00A0')
        ]),
        U.el('button', { class: 'faction-card__expand', title: 'expand', onclick: () => { card.classList.toggle('faction-card--open'); } }, '\u25BE')
      );
      card.append(top);

      const gauge = U.el('div', { class: 'faction-card__gauge' });
      gauge.append(
        U.el('div', { class: 'faction-card__gauge-label' }, 'Party Standing'),
        U.el('div', { class: 'faction-card__gauge-value' }, standingLabel(f.party) + ' (' + (f.party >= 0 ? '+' : '') + f.party + ')')
      );
      const bar = U.el('div', { class: 'gauge' });
      bar.append(U.el('div', { class: 'gauge__zero' }));
      bar.append(U.el('div', { class: 'gauge__notch', style: { left: ((f.party + 10) / 20 * 100) + '%' } }));
      gauge.append(bar);
      const controls = U.el('div', { class: 'faction-card__gauge-controls' });
      const adj = (delta) => async () => {
        f.party = Math.max(-10, Math.min(10, (f.party || 0) + delta));
        f.updated = Date.now();
        await save();
        render();
        // re-open this card if it was open
        const same = grid.querySelector(`[data-fid="${f.id}"]`);
        if (same && card.classList.contains('faction-card--open')) same.classList.add('faction-card--open');
      };
      controls.append(
        U.el('button', { class: 'gauge-btn', onclick: adj(-5), title: 'much worse' }, '\u22125'),
        U.el('button', { class: 'gauge-btn', onclick: adj(-1), title: 'worse' }, '\u22121'),
        U.el('div', { class: 'gauge-tick' }, standingLabel(f.party)),
        U.el('button', { class: 'gauge-btn', onclick: adj(1), title: 'better' }, '+1'),
        U.el('button', { class: 'gauge-btn', onclick: adj(5), title: 'much better' }, '+5')
      );
      gauge.append(controls);
      card.append(gauge);

      // threat count badge (visible without expanding)
      const linkedThreats = threatsLinked.filter(t => t.factionId === f.id);
      if (linkedThreats.length) {
        const activeCount = linkedThreats.filter(t => t.filled < t.total).length;
        const allCount = linkedThreats.length;
        const meta = U.el('div', { class: 'faction-card__threats' });
        const summary = activeCount === allCount
          ? activeCount + ' clock' + (activeCount === 1 ? '' : 's') + ' ticking'
          : activeCount + ' of ' + allCount + ' clocks ticking';
        const chip = U.el('button', {
          class: 'faction-card__threat-chip',
          title: 'Open Threats and review the linked clocks',
          onclick: async () => {
            // navigate to threats; if there's a particular clock, highlight the first active one
            const first = linkedThreats.find(t => t.filled < t.total) || linkedThreats[0];
            if (first) await Vault.set('threats-highlight', first.id);
            await Keep.mount('threats');
          }
        }, [
          U.el('span', { class: 'faction-card__threat-icon' }, '\u29D7'),
          U.el('span', {}, summary)
        ]);
        meta.append(chip);
        card.append(meta);
      }

      const bodyEl = U.el('div', { class: 'faction-card__body' });

      if (f.goal) {
        bodyEl.append(U.el('div', { class: 'faction-card__field' }, [
          U.el('div', { class: 'label' }, 'Goal'),
          U.el('div', { class: 'faction-card__goal' }, f.goal)
        ]));
      }

      const notesField = U.el('div', { class: 'faction-card__field' });
      notesField.append(U.el('div', { class: 'label' }, 'Notes'));
      const notesTa = U.el('textarea', { class: 'textarea faction-card__notes-input', placeholder: 'Internal politics, recent moves, debts, scars...' });
      notesTa.value = f.notes || '';
      let savingTimeout;
      notesTa.addEventListener('input', () => {
        f.notes = notesTa.value;
        clearTimeout(savingTimeout);
        savingTimeout = setTimeout(save, 350);
      });
      notesField.append(notesTa);
      bodyEl.append(notesField);

      // relations
      const others = factions.filter(x => x.id !== f.id);
      if (others.length) {
        const relField = U.el('div', { class: 'faction-card__field' });
        relField.append(U.el('div', { class: 'label' }, 'Stance Toward Others'));
        const relList = U.el('div', { class: 'faction-card__relations' });
        others.forEach(o => {
          const rel = f.relations && f.relations[o.id] ? f.relations[o.id] : { value: 0, note: '' };
          const reverseRel = (o.relations && o.relations[f.id]) ? o.relations[f.id] : null;
          const oc = colorFor(o.color);
          const row = U.el('div', { class: 'faction-relation', style: { '--accent2': oc.var } });
          row.append(
            U.el('div', { class: 'faction-relation__sigil' }, o.sigil || '?'),
            U.el('div', { class: 'faction-relation__name' }, o.name),
            U.el('div', { class: 'faction-relation__label-stack' }, [
              U.el('div', { class: 'primary' }, standingLabel(rel.value) + ' (' + (rel.value >= 0 ? '+' : '') + rel.value + ')'),
              U.el('div', { class: 'reciprocal' }, reverseRel ? 'they: ' + standingLabel(reverseRel.value).toLowerCase() : 'they: not yet noted')
            ]),
            U.el('button', { class: 'gauge-btn', onclick: async () => {
              if (!f.relations) f.relations = {};
              if (!f.relations[o.id]) f.relations[o.id] = { value: 0, note: '' };
              f.relations[o.id].value = Math.max(-10, f.relations[o.id].value - 1);
              f.updated = Date.now();
              await save(); render();
              const same = grid.querySelector(`[data-fid="${f.id}"]`);
              if (same) same.classList.add('faction-card--open');
            }}, '\u2212'),
            U.el('button', { class: 'gauge-btn', onclick: async () => {
              if (!f.relations) f.relations = {};
              if (!f.relations[o.id]) f.relations[o.id] = { value: 0, note: '' };
              f.relations[o.id].value = Math.min(10, f.relations[o.id].value + 1);
              f.updated = Date.now();
              await save(); render();
              const same = grid.querySelector(`[data-fid="${f.id}"]`);
              if (same) same.classList.add('faction-card--open');
            }}, '+')
          );
          relList.append(row);
        });
        relField.append(relList);
        bodyEl.append(relField);
      }

      // Archive backlinks: entries that mention this faction with [[wikilink]]
      const archBacks = backlinksFor(f.name);
      if (archBacks.length) {
        const backField = U.el('div', { class: 'faction-card__field' });
        backField.append(U.el('div', { class: 'label' }, 'Mentioned In'));
        const list = U.el('div', { class: 'faction-card__backlinks' });
        archBacks.forEach(name => {
          list.append(U.el('button', {
            class: 'tag faction-card__backlink',
            title: 'Open in the Archive',
            onclick: () => Refs.openArchiveEntry(name)
          }, name));
        });
        backField.append(list);
        bodyEl.append(backField);
      }

      const cardActions = U.el('div', { class: 'faction-card__actions' });
      cardActions.append(
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => openFactionForm(f) }, 'Edit'),
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          if (!confirm(`Retire "${f.name}"? Relations to and from this faction will be lost.`)) return;
          factions = factions.filter(x => x.id !== f.id);
          // clean relations on others
          for (const x of factions) { if (x.relations && x.relations[f.id]) delete x.relations[f.id]; }
          await save();
          render();
        }}, 'Retire')
      );
      bodyEl.append(cardActions);

      card.append(bodyEl);
      return card;
    }

    function openFactionForm(existing) {
      const isEdit = !!existing;
      const draft = existing ? { ...existing, relations: { ...(existing.relations || {}) } }
                             : { id: U.uid(), name: '', sigil: '\u2694', color: 'wine', motto: '', goal: '', party: 0, notes: '', relations: {} };

      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card', style: { maxWidth: '520px' } });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, isEdit ? 'Edit ' + existing.name : 'Found a Faction')
      );
      const scroll = U.el('div', { class: 'modal-card__scroll' });

      const nameInput = U.el('input', { class: 'input', placeholder: 'House Ashlow, Greyfern Order, etc.', value: draft.name });
      const mottoInput = U.el('input', { class: 'input', placeholder: 'Optional motto', value: draft.motto });
      const goalInput = U.el('textarea', { class: 'textarea', placeholder: 'What does this faction want?', style: { minHeight: '80px' } });
      goalInput.value = draft.goal;

      // sigil picker
      const sigilWrap = U.el('div', { class: 'sigil-picker' });
      SIGILS.forEach(s => {
        const b = U.el('button', { onclick: () => {
          draft.sigil = s;
          sigilWrap.querySelectorAll('button').forEach(x => x.classList.toggle('is-selected', x.textContent === s));
        }}, s);
        if (s === draft.sigil) b.classList.add('is-selected');
        sigilWrap.append(b);
      });

      // color picker
      const colorWrap = U.el('div', { class: 'color-picker' });
      COLORS.forEach(c => {
        const sw = U.el('button', { class: 'color-swatch', style: { background: c.hex }, onclick: () => {
          draft.color = c.id;
          colorWrap.querySelectorAll('.color-swatch').forEach(x => x.classList.toggle('is-selected', x.dataset.cid === c.id));
        }, title: c.id });
        sw.dataset.cid = c.id;
        if (c.id === draft.color) sw.classList.add('is-selected');
        colorWrap.append(sw);
      });

      scroll.append(
        U.el('div', { class: 'faction-form-grid' }, [
          U.el('div', { class: 'full' }, [U.el('div', { class: 'label' }, 'Name'), nameInput]),
          U.el('div', { class: 'full' }, [U.el('div', { class: 'label' }, 'Motto'), mottoInput]),
          U.el('div', { class: 'full' }, [U.el('div', { class: 'label' }, 'Goal'), goalInput]),
          U.el('div', { class: 'full' }, [U.el('div', { class: 'label' }, 'Sigil'), sigilWrap]),
          U.el('div', { class: 'full' }, [U.el('div', { class: 'label' }, 'Colour'), colorWrap])
        ])
      );
      dialog.append(scroll);

      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--ghost', onclick: () => ov.remove() }, 'Cancel'),
        U.el('button', { class: 'btn btn--primary', onclick: async () => {
          if (!nameInput.value.trim()) { nameInput.focus(); return; }
          draft.name = nameInput.value.trim();
          draft.motto = mottoInput.value.trim();
          draft.goal = goalInput.value.trim();
          draft.updated = Date.now();
          if (isEdit) {
            const idx = factions.findIndex(x => x.id === existing.id);
            if (idx >= 0) factions[idx] = draft;
          } else {
            factions.push(draft);
          }
          await save();
          ov.remove();
          render();
        }}, isEdit ? 'Save' : 'Found')
      ]));
      ov.append(dialog);
      document.body.append(ov);
      setTimeout(() => nameInput.focus(), 50);
    }

    render();
  },

  unmount() {
    document.querySelectorAll('.matrix__editor').forEach(e => e.remove());
  }
});

/* =========================================================================
   MODULE: THE LISTS (Initiative Tracker)
   ========================================================================= */
Keep.register({
  id: 'lists',
  name: 'The Lists',
  category: 'table',
  glyph: 'g-sword',
  tagline: 'Initiative, conditions, the press of melee.',
  sub: 'Order of arms. Track wounds. Mark the turning of the round.',

  async mount(body, actions) {
    let state = await Vault.get('lists-state') || { round: 1, turn: 0, combatants: [], big: false };
    let dragSourceIdx = null;

    const head = U.el('div', { class: 'lists__head' });
    const add = U.el('div', { class: 'lists__add' });
    const roster = U.el('div', { class: 'lists__roster' });
    const wrap = U.el('div', { class: 'lists' + (state.big ? ' lists--big' : '') });
    wrap.append(head, add, roster);
    body.append(wrap);

    actions.append(
      U.el('button', { class: 'btn btn--ghost', onclick: () => openRosterPicker() }, 'From Roster'),
      U.el('button', { class: 'btn btn--ghost', onclick: () => { state.big = !state.big; save(); render(); } }, 'Big Mode'),
      U.el('button', { class: 'btn btn--ghost', onclick: () => { state.combatants = []; state.round = 1; state.turn = 0; save(); render(); } }, 'Clear'),
      U.el('button', { class: 'btn btn--primary', onclick: () => nextTurn() }, 'Next Turn')
    );

    const condTypes = ['Prone','Bleed','Stun','Hex','Burn','Mark','Shield','Hidden'];

    function render() {
      wrap.classList.toggle('lists--big', state.big);
      head.innerHTML = '';
      head.append(U.el('div', { class: 'lists__round' }, [
        document.createTextNode('Round ' + state.round),
        U.el('small', {}, state.combatants.length ? `it is the turn of ${(state.combatants[state.turn % state.combatants.length] || {}).name || '?'}` : 'no combatants on the field')
      ]));

      add.innerHTML = '';
      const nameI = U.el('input', { class: 'input', placeholder: 'Name' });
      const initI = U.el('input', { class: 'input', placeholder: 'Init', type: 'number' });
      const hpI = U.el('input', { class: 'input', placeholder: 'HP', type: 'number' });
      const addBtn = U.el('button', { class: 'btn btn--primary', onclick: () => {
        if (!nameI.value) return;
        const newC = {
          id: U.uid(),
          name: nameI.value,
          init: +initI.value || U.randInt(1, 20),
          hp: +hpI.value || 10,
          maxHp: +hpI.value || 10,
          conds: [],
          down: false
        };
        // insert at position matching init, preserving manual reorder of others
        const at = state.combatants.findIndex(c => c.init < newC.init);
        if (at < 0) state.combatants.push(newC);
        else state.combatants.splice(at, 0, newC);
        nameI.value = ''; initI.value = ''; hpI.value = '';
        save(); render();
      }}, 'Add');
      add.append(nameI, initI, hpI, addBtn);

      roster.innerHTML = '';
      state.combatants.forEach((c, idx) => {
        const active = idx === (state.turn % state.combatants.length);
        const critical = !c.down && c.maxHp > 0 && (c.hp / c.maxHp) <= 0.25;
        const row = U.el('div', { class: 'lists__row' + (active ? ' lists__row--active' : '') + (c.down ? ' lists__row--down' : '') + (critical ? ' lists__row--critical' : '') });

        // drag handle (six-dot grip): initiates row drag on grab
        const gripSvg = `<svg viewBox="0 0 8 14" xmlns="http://www.w3.org/2000/svg"><circle cx="2" cy="2" r="0.9"/><circle cx="6" cy="2" r="0.9"/><circle cx="2" cy="7" r="0.9"/><circle cx="6" cy="7" r="0.9"/><circle cx="2" cy="12" r="0.9"/><circle cx="6" cy="12" r="0.9"/></svg>`;
        const grip = U.el('div', { class: 'lists__grip', draggable: 'true', title: 'drag to reorder', html: gripSvg });
        grip.addEventListener('dragstart', (e) => {
          dragSourceIdx = idx;
          row.classList.add('lists__row--dragging');
          if (e.dataTransfer) {
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', String(idx));
          }
        });
        row.addEventListener('dragover', (e) => {
          if (dragSourceIdx == null) return;
          e.preventDefault();
          if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
          const r = row.getBoundingClientRect();
          const top = (e.clientY - r.top) < r.height / 2;
          row.classList.toggle('lists__row--drop-top', top);
          row.classList.toggle('lists__row--drop-bot', !top);
        });
        row.addEventListener('dragleave', () => {
          row.classList.remove('lists__row--drop-top', 'lists__row--drop-bot');
        });
        row.addEventListener('drop', (e) => {
          e.preventDefault();
          const from = dragSourceIdx;
          dragSourceIdx = null;
          if (from == null || from === idx) {
            row.classList.remove('lists__row--drop-top', 'lists__row--drop-bot');
            return;
          }
          const r = row.getBoundingClientRect();
          const top = (e.clientY - r.top) < r.height / 2;
          let to = top ? idx : idx + 1;
          const [moved] = state.combatants.splice(from, 1);
          if (from < to) to--;
          state.combatants.splice(to, 0, moved);
          save(); render();
        });
        grip.addEventListener('dragend', () => {
          dragSourceIdx = null;
          document.querySelectorAll('.lists__row').forEach(r => {
            r.classList.remove('lists__row--dragging', 'lists__row--drop-top', 'lists__row--drop-bot');
          });
        });

        const init = U.el('div', { class: 'lists__init' }, String(c.init));
        const nameField = U.el('div', { class: 'lists__name' }, [
          (() => {
            const inp = U.el('input', { value: c.name });
            inp.addEventListener('input', () => { c.name = inp.value; save(); });
            return inp;
          })()
        ]);

        const conds = U.el('div', { class: 'lists__conds' });
        c.conds.forEach(cd => {
          const cn = U.el('span', { class: 'lists__cond', onclick: () => { c.conds = c.conds.filter(x => x !== cd); save(); render(); } }, cd);
          conds.append(cn);
        });
        const condAdd = U.el('select', { class: 'select', style: { padding: '0.15rem', fontSize: '0.7rem' } });
        condAdd.append(U.el('option', { value: '' }, '+ cond'));
        condTypes.filter(ct => !c.conds.includes(ct)).forEach(ct => condAdd.append(U.el('option', { value: ct }, ct)));
        condAdd.addEventListener('change', () => { if (condAdd.value) { c.conds.push(condAdd.value); save(); render(); } });
        conds.append(condAdd);

        const hpWrap = U.el('div', { class: 'lists__hp' });
        const hpInput = U.el('input', { value: c.hp });
        hpInput.addEventListener('change', () => { c.hp = +hpInput.value || 0; c.down = c.hp <= 0; save(); render(); });
        hpWrap.append(hpInput, document.createTextNode('/' + c.maxHp));

        const acts = U.el('div', { class: 'lists__actions' });
        const dmgBtn = U.el('button', { class: 'lists__icon-btn', title: 'damage', onclick: () => {
          const v = prompt('Damage (negative to heal)'); if (v == null) return;
          c.hp = Math.max(0, Math.min(c.maxHp, c.hp - (+v || 0)));
          c.down = c.hp <= 0; save(); render();
        }}, '\u2694');
        const delBtn = U.el('button', { class: 'lists__icon-btn', title: 'remove', onclick: () => {
          state.combatants = state.combatants.filter(x => x.id !== c.id); save(); render();
        }}, '\u2717');
        acts.append(dmgBtn, delBtn);

        row.append(grip, init, nameField, conds, hpWrap, acts);
        roster.append(row);
      });

      if (!state.combatants.length) roster.append(U.el('div', { class: 'empty' }, [
        U.el('div', { class: 'empty__ornament' }, '\u2694'),
        U.el('div', {}, 'The field is empty. Add combatants above.')
      ]));
    }

    function nextTurn() {
      if (!state.combatants.length) return;
      state.turn++;
      if (state.turn >= state.combatants.length) { state.turn = 0; state.round++; }
      save(); render();
    }

    async function openRosterPicker() {
      const roster = await Refs.npcRoster();
      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card' });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, 'Call from the Roster')
      );
      const scroll = U.el('div', { class: 'modal-card__scroll' });
      if (!roster.length) {
        scroll.append(U.el('div', { class: 'empty' }, 'The roster is empty. Conjure NPCs in the Hall of Faces first.'));
      } else {
        // exclude NPCs already on the field by npcId
        const onField = new Set(state.combatants.filter(c => c.npcId).map(c => c.npcId));
        roster.forEach(npc => {
          const pick = U.el('button', {
            class: 'roster-pick',
            onclick: () => {
              const newC = {
                id: U.uid(),
                npcId: npc.id,
                name: npc.name,
                init: U.randInt(1, 20),
                hp: 10,
                maxHp: 10,
                conds: [],
                down: false
              };
              const at = state.combatants.findIndex(c => c.init < newC.init);
              if (at < 0) state.combatants.push(newC);
              else state.combatants.splice(at, 0, newC);
              save(); render();
              pick.style.opacity = '0.45';
              pick.disabled = true;
            }
          }, [
            U.el('span', {}, [
              U.el('div', { class: 'roster-pick__name' }, npc.name),
              U.el('div', { class: 'roster-pick__role' }, npc.role)
            ]),
            U.el('span', { class: 'tag' }, onField.has(npc.id) ? 'on field' : 'call')
          ]);
          if (onField.has(npc.id)) { pick.style.opacity = '0.45'; pick.disabled = true; }
          scroll.append(pick);
        });
      }
      dialog.append(scroll);
      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--primary', onclick: () => ov.remove() }, 'Done')
      ]));
      ov.append(dialog);
      document.body.append(ov);
    }

    function save() { Vault.set('lists-state', state); }

    // keyboard: 'n' or right arrow advances the turn when nothing is focused
    this._keyHandler = (e) => {
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
      if (e.key === 'n' || e.key === 'N' || e.key === 'ArrowRight') {
        e.preventDefault();
        nextTurn();
      }
    };
    document.addEventListener('keydown', this._keyHandler);

    render();
  },

  unmount() {
    if (this._keyHandler) {
      document.removeEventListener('keydown', this._keyHandler);
      this._keyHandler = null;
    }
  }
});

/* =========================================================================
   MODULE: HEARTH (Soundscape Mixer)
   Web Audio synthesis. Layered ambient.
   ========================================================================= */
Keep.register({
  id: 'hearth',
  name: 'The Hearth',
  category: 'table',
  glyph: 'g-flame',
  tagline: 'Ambient layers, synthesised from silence.',
  sub: 'Press a layer to wake it. Mix to your scene. Save the scene.',

  audio: null,
  layers: {},
  master: null,
  active: false,

  async mount(body, actions) {
    const self = this;
    const intro = U.el('div', { class: 'hearth__intro' },
      'No samples, no downloads. Every layer here is woven on the spot from oscillators and noise. Wake the audio engine to begin, then mix to taste.'
    );
    const masterPanel = U.el('div', { class: 'hearth__master' });
    const masterSlider = U.el('input', { type: 'range', min: 0, max: 1, step: 0.01, value: 0.6, class: 'hearth__slider' });
    masterSlider.addEventListener('input', () => { if (self.master) self.master.gain.value = +masterSlider.value; });
    const wakeBtn = U.el('button', { class: 'btn btn--primary', onclick: () => wake() }, 'Wake Engine');
    masterPanel.append(U.el('span', { class: 'hearth__master-label' }, 'Master'), masterSlider, wakeBtn);

    const presetRow = U.el('div', { class: 'hearth__presets' });
    const layersGrid = U.el('div', { class: 'hearth__layers' });
    const fromAfar = U.el('div', { class: 'hearth__afar' });

    body.append(intro, masterPanel, presetRow, layersGrid, fromAfar);

    // Pop Out opens the Hearth in a new browser window via #hearth-popout.
    // That window loads the same HTML file, detects the hash, hides all
    // chrome, and runs an independent AudioContext. The user can navigate
    // the main window freely; the popup keeps playing. Closing the popup
    // stops the audio. Button hides in popout mode (would be redundant).
    const isPopout = window.location.hash === '#hearth-popout';
    if (!isPopout) {
      actions.append(
        U.el('button', {
          class: 'btn btn--ghost',
          title: 'Open the Hearth in a separate window so audio continues while you navigate the rest of the Keep',
          onclick: () => {
            window.open(
              window.location.pathname + window.location.search + '#hearth-popout',
              'theKeepHearth',
              'width=720,height=820,resizable=yes,scrollbars=yes'
            );
          }
        }, 'Pop Out')
      );
    }

    actions.append(
      U.el('button', { class: 'btn btn--ghost', onclick: () => { silence(); }}, 'Silence All')
    );

    // layer definitions
    const layerDefs = [
      { id: 'rain',     name: 'Rain on Stone',  desc: 'A soft hiss, filtered to the eaves. Distant thunder, seldom.', build: buildRain },
      { id: 'wind',     name: 'Cold Wind',      desc: 'Low, slow gusts through narrow rooms. A distant bell, sometimes.', build: buildWind },
      { id: 'fire',     name: 'Hearthfire',     desc: 'Bass rumble with occasional pops. A log collapses now and then.', build: buildFire },
      { id: 'drone',    name: 'Cavern Drone',   desc: 'Deep oscillators with slow detune. Water drips far away.', build: buildDrone },
      { id: 'bells',    name: 'Distant Bell',   desc: 'A struck bell, far and seldom.', build: buildBells },
      { id: 'tavern',   name: 'Tavern Murmur',  desc: 'A busy room: warm bed, cup clinks, occasional laughter. Pair with From Afar for voices.', build: buildTavern },
      { id: 'waves',    name: 'Slow Surf',      desc: 'A long swell, in and out. The cry of a gull, occasionally.', build: buildWaves },
      { id: 'crows',    name: 'Crow Cry',       desc: 'Occasional rasps from the wood.', build: buildCrows },
      { id: 'wolf',     name: 'Wolves at Night',desc: 'A lone howl, and sometimes a more distant answer.', build: buildWolf },
      { id: 'market',   name: 'Market Day',     desc: 'Footfalls, vendor calls, hammers and coins. Pair with From Afar for crowd chatter.', build: buildMarket },
      { id: 'stone',    name: 'Stone Grinding', desc: 'Low rumble of something massive being moved. Dust falls.', build: buildStone }
    ];

    // build layer cards
    layerDefs.forEach(def => {
      const card = U.el('div', { class: 'hearth__layer' });
      const toggle = U.el('button', { class: 'hearth__layer-toggle' });
      const slider = U.el('input', { type: 'range', min: 0, max: 1, step: 0.01, value: 0.5, class: 'hearth__slider' });
      slider.addEventListener('input', () => {
        if (self.layers[def.id]) self.layers[def.id].gain.gain.value = +slider.value;
      });
      toggle.addEventListener('click', async () => {
        if (!self.audio) await wake();
        toggleLayer(def, toggle, slider);
      });
      card.append(
        U.el('div', { class: 'hearth__layer-head' }, [
          U.el('div', { class: 'hearth__layer-name' }, def.name),
          toggle
        ]),
        slider,
        U.el('div', { class: 'hearth__layer-desc' }, def.desc)
      );
      card._def = def; card._toggle = toggle; card._slider = slider;
      layersGrid.append(card);
    });

    // presets
    const presets = [
      { name: 'Storm Vigil',    layers: { rain: 0.65, wind: 0.55, drone: 0.2 } },
      { name: 'The Tavern',     layers: { tavern: 0.7, fire: 0.4, bells: 0.15 } },
      { name: 'Crypt',          layers: { drone: 0.6, wind: 0.3, bells: 0.1 } },
      { name: 'Cliffside',      layers: { waves: 0.7, wind: 0.5, crows: 0.25 } },
      { name: 'Hearthside',     layers: { fire: 0.7, wind: 0.15 } },
      { name: 'Lonely Wood',    layers: { wind: 0.4, crows: 0.3, drone: 0.2 } },
      { name: 'Wolves at Door', layers: { wind: 0.45, wolf: 0.7, drone: 0.2 } },
      { name: 'Market Square',  layers: { market: 0.7, bells: 0.15 } },
      { name: 'Forge Depths',   layers: { stone: 0.7, drone: 0.3, fire: 0.25 } }
    ];
    presets.forEach(p => {
      presetRow.append(U.el('button', { class: 'btn btn--ghost btn--small', onclick: async () => { await applyPreset(p); }}, p.name));
    });

    // ---- FROM AFAR (external streams) ----------------------------------
    // Plays user-provided YouTube videos or direct audio URLs as
    // accompanying ambience. Independent of the synth engine: streams
    // play through their own HTML element (iframe for YouTube, <audio>
    // for direct URLs) and have their own volume controls. Streams are
    // persisted per-chronicle under 'hearth-streams'.
    //
    // On first visit, seeds eight curated ambience videos covering the
    // common fantasy-GM scenes. These are well-established YouTube
    // uploads from long-standing ambience channels (Sword Coast
    // Soundscapes, Michael Ghelfi, Relaxing White Noise, Calmed by
    // Nature, etc), chosen for likely persistence. If any URL stops
    // working, the YouTube IFrame Player API surfaces the error and
    // we display a clear message with the URL so the user can replace it.
    const SEED_STREAMS = [
      { name: 'Medieval Tavern',     url: 'https://www.youtube.com/watch?v=KecVJnJcSI4' },
      { name: 'Medieval Market',     url: 'https://www.youtube.com/watch?v=XZ5CB5s2WRY' },
      { name: 'Crackling Fireplace', url: 'https://www.youtube.com/watch?v=K33gndcdmqg' },
      { name: 'Cave / Dungeon',      url: 'https://www.youtube.com/watch?v=XZTfth3W1Wc' },
      { name: 'Heavy Thunderstorm',  url: 'https://www.youtube.com/watch?v=nDq6TstdEi8' },
      { name: 'Forest at Night',     url: 'https://www.youtube.com/watch?v=hTnDmWid0tY' },
      { name: 'Coast and Sea',       url: 'https://www.youtube.com/watch?v=376zx9crLP8' },
      { name: 'Castle in Snow',      url: 'https://www.youtube.com/watch?v=NVLeh6x0VdU' }
    ];

    const streams = (await Vault.get('hearth-streams')) || [];
    const seeded = await Vault.get('hearth-streams-seeded');
    if (!seeded && !streams.length) {
      SEED_STREAMS.forEach(s => {
        streams.push({ id: U.uid(), name: s.name, url: s.url, type: 'youtube' });
      });
      await Vault.set('hearth-streams', streams);
      await Vault.set('hearth-streams-seeded', true);
    }

    // Lazy-load the YouTube IFrame Player API. We use it (instead of a
    // raw iframe) so onError fires when a video is removed, made
    // private, or blocked from embedded playback, letting us replace
    // the player with a clear error message.
    self.ytApiState = self.ytApiState || { loaded: false, loading: false, callbacks: [] };
    function loadYouTubeAPI() {
      return new Promise((resolve, reject) => {
        if (window.YT && window.YT.Player) {
          self.ytApiState.loaded = true;
          resolve();
          return;
        }
        self.ytApiState.callbacks.push({ resolve, reject });
        if (self.ytApiState.loading) return;
        self.ytApiState.loading = true;
        const timeout = setTimeout(() => {
          self.ytApiState.loading = false;
          const cbs = self.ytApiState.callbacks;
          self.ytApiState.callbacks = [];
          cbs.forEach(cb => cb.reject(new Error('YouTube IFrame API failed to load')));
        }, 10000);
        window.onYouTubeIframeAPIReady = () => {
          clearTimeout(timeout);
          self.ytApiState.loaded = true;
          self.ytApiState.loading = false;
          const cbs = self.ytApiState.callbacks;
          self.ytApiState.callbacks = [];
          cbs.forEach(cb => cb.resolve());
        };
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);
      });
    }

    fromAfar.append(
      U.el('div', { class: 'hearth__afar-head' }, [
        U.el('div', { class: 'hearth__afar-title' }, '\u2767 From Afar \u2767'),
        U.el('div', { class: 'hearth__afar-sub' },
          'Pipe in atmosphere from elsewhere. Eight ambience videos are seeded for common fantasy scenes; add your own YouTube links or direct audio URLs below. Network access is required for this feature only; everything else runs offline. If a seeded URL stops working, the player will show an error with the URL so you can replace it.')
      ])
    );

    const urlInput = U.el('input', { type: 'text', placeholder: 'Paste URL...', class: 'hearth__afar-input' });
    const nameInput = U.el('input', { type: 'text', placeholder: 'Name (optional)', class: 'hearth__afar-input hearth__afar-input--name' });
    const saveBtn = U.el('button', { class: 'btn btn--small' }, '+ Save Stream');
    const addRow = U.el('div', { class: 'hearth__afar-add' });
    addRow.append(urlInput, nameInput, saveBtn);
    fromAfar.append(addRow);

    const list = U.el('div', { class: 'hearth__afar-list' });
    const playerArea = U.el('div', { class: 'hearth__afar-player' });
    fromAfar.append(list, playerArea);

    // YouTube URL parsing for common formats
    function parseYouTubeId(url) {
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/.*[?&]v=([a-zA-Z0-9_-]{11})/
      ];
      for (const p of patterns) {
        const m = url.match(p);
        if (m) return m[1];
      }
      return null;
    }

    function autoNameFromUrl(url) {
      const ytId = parseYouTubeId(url);
      if (ytId) return 'YouTube \u00b7 ' + ytId.slice(0, 6);
      try {
        const u = new URL(url);
        return u.hostname.replace(/^www\./, '');
      } catch {
        return 'Stream';
      }
    }

    function stopStream() {
      if (!self.currentStreamId && !self.streamEl && !self.streamPlayer) return;
      try {
        if (self.streamPlayer && self.streamPlayer.destroy) {
          self.streamPlayer.destroy();
        }
        if (self.streamEl) {
          if (self.streamEl.tagName === 'AUDIO') {
            self.streamEl.pause();
            self.streamEl.src = '';
          }
          try { self.streamEl.remove(); } catch {}
        }
      } catch {}
      self.streamEl = null;
      self.streamPlayer = null;
      self.currentStreamId = null;
      playerArea.innerHTML = '';
      renderList();
    }

    async function playStream(s) {
      if (self.currentStreamId === s.id) {
        stopStream();
        return;
      }
      stopStream();
      self.currentStreamId = s.id;

      // Render an error block in the player area when a stream fails.
      // Shows the stream name, the failure reason, the full URL (so the
      // user can see exactly which one to fix), and a hint to use Edit.
      function handleError(msg) {
        playerArea.innerHTML = '';
        playerArea.append(
          U.el('div', { class: 'hearth__afar-error' }, [
            U.el('div', { class: 'hearth__afar-error-head' }, '\u26A0 Stream Failed'),
            U.el('div', { class: 'hearth__afar-error-name' }, '\u201C' + s.name + '\u201D'),
            U.el('div', { class: 'hearth__afar-error-msg' }, msg),
            U.el('div', { class: 'hearth__afar-error-url' }, s.url),
            U.el('div', { class: 'hearth__afar-error-help' },
              'The URL may be outdated, removed, or blocked from embedded playback. Click Edit on this stream to replace the URL, or Remove to delete it.')
          ])
        );
        self.streamEl = null;
        self.streamPlayer = null;
        self.currentStreamId = null;
        renderList();
      }

      const ytId = parseYouTubeId(s.url);

      if (ytId) {
        // YouTube: wrap iframe with YT.Player so we can listen for onError.
        playerArea.append(U.el('div', { class: 'hearth__afar-loading' }, 'Loading player\u2026'));
        let player;
        try {
          await loadYouTubeAPI();
        } catch (e) {
          handleError('YouTube player failed to load: ' + (e.message || 'network or blocker'));
          return;
        }
        // The user may have stopped/changed streams while loading
        if (self.currentStreamId !== s.id) return;
        playerArea.innerHTML = '';
        playerArea.append(U.el('div', { class: 'hearth__afar-now' }, '\u2767 Now: ' + s.name + ' \u2767'));
        const div = document.createElement('div');
        div.id = 'yt-player-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
        playerArea.append(div);
        try {
          player = new window.YT.Player(div.id, {
            width: '100%',
            height: '220',
            videoId: ytId,
            playerVars: {
              autoplay: 1,
              loop: 1,
              playlist: ytId,
              controls: 1,
              rel: 0,
              modestbranding: 1
            },
            events: {
              onError: (event) => {
                // YouTube Player error codes. 101, 150, and 153 are all
                // variants of "embedded playback disabled by uploader";
                // 153 is undocumented but observed in the wild. Unknown
                // codes most commonly mean the same thing, so the
                // fallback message says so plainly.
                const errorMsgs = {
                  2:   'invalid video ID',
                  5:   'HTML5 player error',
                  100: 'video not found, removed, or made private',
                  101: 'embedded playback disabled by the video owner',
                  150: 'embedded playback disabled by the video owner',
                  153: 'embedded playback disabled by the video owner'
                };
                const msg = errorMsgs[event.data] ||
                  ('YouTube error code ' + event.data + ' (likely embedded playback disabled)');
                handleError(msg);
              }
            }
          });
          self.streamPlayer = player;
          self.streamEl = div;
        } catch (e) {
          handleError('YouTube player could not start: ' + (e.message || 'unknown'));
          return;
        }
      } else {
        // Direct audio: HTML5 <audio> with error event listener.
        playerArea.innerHTML = '';
        playerArea.append(U.el('div', { class: 'hearth__afar-now' }, '\u2767 Now: ' + s.name + ' \u2767'));
        const audio = document.createElement('audio');
        audio.src = s.url;
        audio.loop = true;
        audio.controls = true;
        audio.autoplay = true;
        audio.addEventListener('error', () => {
          handleError('audio failed to load (URL may be invalid, removed, or in an unsupported format)');
        });
        playerArea.append(audio);
        self.streamEl = audio;
      }
      renderList();
    }

    async function saveCurrentStream() {
      const url = urlInput.value.trim();
      if (!url) { urlInput.focus(); return; }
      const name = nameInput.value.trim() || autoNameFromUrl(url);
      const type = parseYouTubeId(url) ? 'youtube' : 'audio';
      streams.push({ id: U.uid(), name, url, type });
      await Vault.set('hearth-streams', streams);
      urlInput.value = '';
      nameInput.value = '';
      renderList();
    }
    saveBtn.addEventListener('click', saveCurrentStream);
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveCurrentStream(); });
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveCurrentStream(); });

    async function editStream(s) {
      const newName = prompt('Name:', s.name);
      if (newName === null) return;
      const newUrl = prompt('URL:', s.url);
      if (newUrl === null) return;
      s.name = (newName.trim() || s.name);
      s.url = (newUrl.trim() || s.url);
      s.type = parseYouTubeId(s.url) ? 'youtube' : 'audio';
      await Vault.set('hearth-streams', streams);
      // if it was playing, reload it
      if (self.currentStreamId === s.id) {
        stopStream();
        playStream(s);
      } else {
        renderList();
      }
    }

    async function removeStream(s) {
      if (!confirm('Remove "' + s.name + '"?')) return;
      if (self.currentStreamId === s.id) stopStream();
      const idx = streams.findIndex(x => x.id === s.id);
      if (idx >= 0) streams.splice(idx, 1);
      await Vault.set('hearth-streams', streams);
      renderList();
    }

    function renderList() {
      list.innerHTML = '';
      if (!streams.length) {
        list.append(U.el('div', { class: 'hearth__afar-empty' },
          'No streams yet. Paste a URL above and save it. Saved streams persist with this chronicle.'));
        return;
      }
      list.append(U.el('div', { class: 'hearth__afar-list-head' }, 'Saved Streams'));
      streams.forEach(s => {
        const isPlaying = self.currentStreamId === s.id;
        const row = U.el('div', {
          class: 'hearth__afar-row' + (isPlaying ? ' hearth__afar-row--playing' : '')
        });
        row.append(
          U.el('div', { class: 'hearth__afar-row-name' }, s.name),
          U.el('div', { class: 'hearth__afar-row-type' }, s.type === 'youtube' ? 'YouTube' : 'Audio'),
          U.el('button', {
            class: 'btn btn--small' + (isPlaying ? '' : ' btn--ghost'),
            onclick: () => playStream(s)
          }, isPlaying ? 'Stop' : 'Play'),
          U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => editStream(s) }, 'Edit'),
          U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => removeStream(s) }, '\u2715')
        );
        list.append(row);
      });
    }
    renderList();

    async function wake() {
      if (self.audio) return;
      self.audio = new (window.AudioContext || window.webkitAudioContext)();
      self.master = self.audio.createGain();
      self.master.gain.value = +masterSlider.value;
      self.master.connect(self.audio.destination);
      self.active = true;
      wakeBtn.textContent = 'Engine Awake';
      wakeBtn.disabled = true;
      wakeBtn.classList.add('btn--ghost');
      wakeBtn.classList.remove('btn--primary');
    }

    function toggleLayer(def, toggle, slider) {
      if (self.layers[def.id]) {
        try { self.layers[def.id].stop(); } catch {}
        delete self.layers[def.id];
        toggle.classList.remove('hearth__layer-toggle--on');
        return;
      }
      const layer = def.build(self.audio, self.master);
      layer.gain.gain.value = +slider.value;
      self.layers[def.id] = layer;
      toggle.classList.add('hearth__layer-toggle--on');
    }

    function silence() {
      Object.entries(self.layers).forEach(([id, l]) => { try { l.stop(); } catch {} });
      self.layers = {};
      layersGrid.querySelectorAll('.hearth__layer-toggle').forEach(t => t.classList.remove('hearth__layer-toggle--on'));
    }

    async function applyPreset(p) {
      if (!self.audio) await wake();
      silence();
      Object.entries(p.layers).forEach(([id, vol]) => {
        const card = [...layersGrid.children].find(c => c._def && c._def.id === id);
        if (!card) return;
        card._slider.value = vol;
        toggleLayer(card._def, card._toggle, card._slider);
      });
    }

    // ---- BUILDERS ------------------------------------------------------
    function noiseSource(audio, type = 'white') {
      const len = audio.sampleRate * 2;
      const buf = audio.createBuffer(1, len, audio.sampleRate);
      const data = buf.getChannelData(0);
      if (type === 'brown') {
        let last = 0;
        for (let i = 0; i < len; i++) {
          const w = Math.random() * 2 - 1;
          last = (last + 0.02 * w) / 1.02;
          data[i] = last * 3.5;
        }
      } else if (type === 'pink') {
        let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
        for (let i = 0; i < len; i++) {
          const w = Math.random() * 2 - 1;
          b0 = 0.99886 * b0 + w * 0.0555179;
          b1 = 0.99332 * b1 + w * 0.0750759;
          b2 = 0.96900 * b2 + w * 0.1538520;
          b3 = 0.86650 * b3 + w * 0.3104856;
          b4 = 0.55000 * b4 + w * 0.5329522;
          b5 = -0.7616 * b5 - w * 0.0168980;
          data[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;
          b6 = w * 0.115926;
        }
      } else {
        for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
      }
