        const cell = U.el('div', { class: cls.join(' ') });
        cell.append(U.el('div', { class: 'almanac__daynum' }, d));
        if (note && note.weather) cell.append(U.el('div', { style: { fontSize: '0.78rem', color: 'var(--ink-faded)', fontStyle: 'italic' } }, note.weather));
        cell.append(moonSwatch(phase));
        cell.addEventListener('click', () => { selectedKey = key; renderPanel(); });
        grid.append(cell);
      }
      const totalCells = calendar.daysPerMonth;
      const rem = (totalCells % dpw === 0) ? 0 : dpw - (totalCells % dpw);
      for (let i = 0; i < rem; i++) grid.append(U.el('div', { class: 'almanac__day almanac__day--outside' }));

      Vault.set('almanac-view', view);
    }
    function renderPanel() {
      panel.innerHTML = '';
      if (!selectedKey) {
        panel.append(
          U.el('div', { class: 'empty' }, [
            U.el('div', { class: 'empty__ornament' }, '\u263D'),
            U.el('div', {}, 'Press a day to inscribe its notes.')
          ])
        );
        return;
      }
      const [y, m, d] = selectedKey.split('-').map(Number);
      const note = notes[selectedKey] || { weather: '', body: '' };
      const ad = absoluteDay(y, m, d);
      const phase = moonPhase(ad);
      const isToday = isCampaignToday(y, m, d);
      panel.append(
        U.el('div', { class: 'almanac__panel-date' }, `${calendar.daynames[(d - 1) % calendar.daynames.length]}, ${d} ${calendar.months[m]} ${y}` + (isToday ? '  \u2730' : '')),
        U.el('div', { class: 'almanac__panel-moon' }, moonLabel(phase))
      );
      const weatherInput = U.el('input', { class: 'input', placeholder: 'Weather (e.g. cold rain, no wind)', value: note.weather });
      const bodyInput = U.el('textarea', { class: 'textarea', placeholder: 'What happened on this day?', style: { minHeight: '160px' } });
      bodyInput.value = note.body || '';
      const save = async () => {
        notes[selectedKey] = { weather: weatherInput.value, body: bodyInput.value, updated: Date.now() };
        if (!weatherInput.value && !bodyInput.value) delete notes[selectedKey];
        await Vault.set('almanac-notes', notes);
        render();
      };
      weatherInput.addEventListener('input', save);
      bodyInput.addEventListener('input', save);
      panel.append(
        U.el('div', { class: 'label' }, 'Weather'),
        weatherInput,
        U.el('div', { class: 'label', style: { marginTop: '0.8rem' } }, 'Inscription'),
        bodyInput
      );
      if (!isToday) {
        panel.append(U.el('button', {
          class: 'btn btn--small btn--ghost',
          style: { marginTop: '0.75rem' },
          onclick: async () => {
            campaignToday = { year: y, month: m, day: d };
            await Refs.setToday(campaignToday);
            render(); renderPanel();
            U.toast('Set as campaign today');
          }
        }, 'Set as Today'));
      }
    }

    function editCalendar() {
      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card' });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, 'Calendar of the Realm')
      );
      const scrollWrap = U.el('div', { class: 'modal-card__scroll' });
      const monthsInput = U.el('textarea', { class: 'textarea' }, calendar.months.join('\n'));
      const dayInput = U.el('input', { class: 'input', type: 'number', value: calendar.daysPerMonth });
      const daynames = U.el('textarea', { class: 'textarea', style: { minHeight: '110px' } }, calendar.daynames.join('\n'));
      const yearStart = U.el('input', { class: 'input', type: 'number', value: calendar.year });
      const yearLabel = U.el('input', { class: 'input', value: calendar.yearLabel });
      scrollWrap.append(
        U.el('div', { class: 'label' }, 'Months (one per line)'),
        monthsInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Days per Month'),
        dayInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Day Names (one per line)'),
        daynames,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Starting Year'),
        yearStart,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Year Title'),
        yearLabel
      );
      dialog.append(scrollWrap);
      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--ghost', onclick: () => ov.remove() }, 'Cancel'),
        U.el('button', { class: 'btn btn--primary', onclick: async () => {
          calendar = {
            months: monthsInput.value.split('\n').map(s => s.trim()).filter(Boolean),
            daysPerMonth: Math.max(1, +dayInput.value || 30),
            daynames: daynames.value.split('\n').map(s => s.trim()).filter(Boolean),
            year: +yearStart.value || 1,
            yearLabel: yearLabel.value
          };
          await Vault.set('almanac-calendar', calendar);
          ov.remove();
          render();
          renderPanel();
        }}, 'Set')
      ]));
      ov.append(dialog);
      document.body.append(ov);
    }

    render();
    renderPanel();
  }
});

/* =========================================================================
   MODULE: THREATS (Clocks)
   Forged in the Dark style ticking clocks for ongoing dangers.
   ========================================================================= */
Keep.register({
  id: 'threats',
  name: 'Threats',
  category: 'mysteries',
  glyph: 'g-hourglass',
  tagline: 'Clocks for the dangers that tick beneath the world.',
  sub: 'Each clock counts a doom. Tick when pressure builds. Fill when the doom arrives.',

  async mount(body, actions) {
    const SEG_OPTIONS = [4, 6, 8, 12];
    const COLORS = [
      { id: 'wine',   var: 'var(--wine)',     hex: '#5c1f24' },
      { id: 'forest', var: 'var(--forest)',   hex: '#2d4a35' },
      { id: 'gold',   var: 'var(--gold-d)',   hex: '#8a6c25' },
      { id: 'indigo', var: 'var(--indigo)',   hex: '#2a2848' },
      { id: 'ink',    var: 'var(--ink-soft)', hex: '#3a2f24' },
      { id: 'salt',   var: '#7a6c52',         hex: '#7a6c52' },
      { id: 'iron',   var: '#4a5764',         hex: '#4a5764' },
      { id: 'rust',   var: '#8a4a2c',         hex: '#8a4a2c' }
    ];
    function colorFor(id) { return COLORS.find(c => c.id === id) || COLORS[0]; }

    let threats = await Vault.get('threats');
    if (!threats || !threats.length) {
      threats = [
        { id: U.uid(), name: "The Long Comet's Return", total: 12, filled: 2,
          description: 'The sky-stone falls. The old prophecies wake.',
          color: 'indigo', factionId: null,
          created: Date.now(), updated: Date.now() },
        { id: U.uid(), name: 'The Pass Will Close With Snow', total: 8, filled: 5,
          description: 'The road through Greyfern is barred until thaw.',
          color: 'iron', factionId: null,
          created: Date.now(), updated: Date.now() }
      ];
      await Vault.set('threats', threats);
    }
    let factions = (await Vault.get('factions')) || [];

    const head = U.el('div', { class: 'threats__head' });
    const grid = U.el('div', { class: 'threats__grid' });
    body.append(head, grid);

    actions.append(
      U.el('button', { class: 'btn btn--primary', onclick: () => openThreatForm() }, 'New Threat')
    );

    async function save() { await Vault.set('threats', threats); }

    function findFaction(id) { return factions.find(f => f.id === id); }
    function factionColorVar(f) {
      // mirror the faction module's tiny color helper
      const map = { wine: 'var(--wine)', forest: 'var(--forest)', gold: 'var(--gold-d)',
        indigo: 'var(--indigo)', ink: 'var(--ink-soft)', salt: '#7a6c52',
        iron: '#4a5764', rust: '#8a4a2c' };
      return f && map[f.color] ? map[f.color] : 'var(--ink-soft)';
    }

    function render() {
      head.innerHTML = '';
      const active = threats.filter(t => t.filled < t.total).length;
      const done = threats.length - active;
      head.append(
        U.el('div', { class: 'threats__count' },
          threats.length + ' clock' + (threats.length === 1 ? '' : 's') +
          (done ? ' (' + done + ' fulfilled)' : '')),
        U.el('div', {}, [
          U.el('button', { class: 'btn btn--small', onclick: () => openThreatForm() }, '+ New Threat')
        ])
      );

      grid.innerHTML = '';
      if (!threats.length) {
        grid.append(U.el('div', { class: 'empty' }, 'No clocks yet. Set one above.'));
        return;
      }
      // active first, then completed
      const sorted = [...threats].sort((a, b) => {
        const aDone = a.filled >= a.total ? 1 : 0;
        const bDone = b.filled >= b.total ? 1 : 0;
        if (aDone !== bDone) return aDone - bDone;
        return (b.updated || 0) - (a.updated || 0);
      });
      sorted.forEach(t => grid.append(renderCard(t)));
      applyPendingHighlight();
    }

    let pendingHighlight = await Vault.get('threats-highlight');
    if (pendingHighlight) await Vault.remove('threats-highlight');
    function applyPendingHighlight() {
      if (!pendingHighlight) return;
      const card = grid.querySelector('[data-tid="' + pendingHighlight + '"]');
      if (card) {
        setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 30);
        card.classList.add('threat-card--highlight');
        setTimeout(() => card.classList.remove('threat-card--highlight'), 2400);
      }
      pendingHighlight = null;
    }

    function clockSvg(filled, total) {
      const ns = 'http://www.w3.org/2000/svg';
      const cx = 50, cy = 50, r = 42;
      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', '0 0 100 100');
      svg.setAttribute('class', 'clock');

      const rim = document.createElementNS(ns, 'circle');
      rim.setAttribute('cx', cx); rim.setAttribute('cy', cy); rim.setAttribute('r', r);
      rim.setAttribute('class', 'clock__rim');
      svg.appendChild(rim);

      for (let i = 0; i < total; i++) {
        const a1 = (-Math.PI / 2) + (i / total) * Math.PI * 2;
        const a2 = (-Math.PI / 2) + ((i + 1) / total) * Math.PI * 2;
        const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
        const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
        const large = ((a2 - a1) > Math.PI) ? 1 : 0;
        const path = document.createElementNS(ns, 'path');
        path.setAttribute('d', `M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z`);
        path.setAttribute('class', 'clock__slice clock__slice--' + (i < filled ? 'filled' : 'empty'));
        path.dataset.idx = i;
        svg.appendChild(path);
      }
      const cap = document.createElementNS(ns, 'circle');
      cap.setAttribute('cx', cx); cap.setAttribute('cy', cy); cap.setAttribute('r', 5);
      cap.setAttribute('class', 'clock__center');
      svg.appendChild(cap);
      return svg;
    }

    function renderCard(t) {
      const isComplete = t.filled >= t.total;
      const c = colorFor(t.color || 'wine');
      const card = U.el('div', { class: 'threat-card' + (isComplete ? ' threat-card--complete' : ''),
        style: { '--accent': c.var } });
      card.dataset.tid = t.id;

      // clock svg
      const clockBox = U.el('div', { class: 'threat-card__clock' });
      const svg = clockSvg(t.filled, t.total);
      svg.querySelectorAll('.clock__slice').forEach(s => {
        s.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = +s.dataset.idx;
          const targetFill = (t.filled === idx + 1) ? idx : idx + 1;
          adjust(t, targetFill - t.filled);
        });
      });
      clockBox.append(svg);
      card.append(clockBox);

      // body
      const bodyEl = U.el('div', { class: 'threat-card__body' });
      bodyEl.append(U.el('div', { class: 'threat-card__name' }, t.name));
      if (t.description) bodyEl.append(U.el('div', { class: 'threat-card__desc' }, t.description));

      if (t.factionId) {
        const f = findFaction(t.factionId);
        if (f) {
          const fBtn = U.el('button', { class: 'threat-card__faction',
            title: 'Open the Faction Ledger',
            onclick: (e) => { e.stopPropagation(); Keep.mount('factions'); } });
          fBtn.style.setProperty('--accent2', factionColorVar(f));
          fBtn.append(
            U.el('span', { class: 'threat-card__faction-sigil' }, f.sigil || '?'),
            U.el('span', {}, f.name)
          );
          bodyEl.append(fBtn);
        }
      }

      const ctrls = U.el('div', { class: 'threat-card__controls' });
      ctrls.append(
        U.el('button', { class: 'gauge-btn', onclick: () => adjust(t, -1) }, '\u2212'),
        U.el('div', { class: 'threat-card__fill' },
          isComplete ? 'fulfilled' : (t.filled + '/' + t.total)),
        U.el('button', { class: 'gauge-btn', onclick: () => adjust(t, 1) }, '+')
      );
      bodyEl.append(ctrls);

      const acts = U.el('div', { class: 'threat-card__actions' });
      acts.append(
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          const text = 'THREAT: ' + t.name + ' (' + t.filled + '/' + t.total + ')' +
            (t.description ? '\n' + t.description : '');
          const today = await Refs.pinToToday(text);
          U.toast('Pinned to ' + (await Refs.formatDate(today)));
        }}, 'Pin'),
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => openThreatForm(t) }, 'Edit'),
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          if (!confirm('Retire "' + t.name + '"? The clock will be erased.')) return;
          threats = threats.filter(x => x.id !== t.id);
          await save();
          render();
        }}, 'Retire')
      );
      bodyEl.append(acts);

      card.append(bodyEl);
      return card;
    }

    async function adjust(t, delta) {
      const wasComplete = t.filled >= t.total;
      t.filled = Math.max(0, Math.min(t.total, t.filled + delta));
      t.updated = Date.now();
      await save();
      const isComplete = t.filled >= t.total;
      if (!wasComplete && isComplete) {
        const text = 'THREAT FULFILLED: ' + t.name + '.' +
          (t.description ? '\n' + t.description : '');
        const today = await Refs.pinToToday(text);
        U.toast('"' + t.name + '" fulfilled. Pinned to ' + (await Refs.formatDate(today)));
      }
      render();
    }

    function openThreatForm(existing) {
      const isEdit = !!existing;
      const draft = existing
        ? { ...existing }
        : { id: U.uid(), name: '', total: 6, filled: 0, description: '',
            color: 'wine', factionId: null,
            created: Date.now(), updated: Date.now() };

      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card', style: { maxWidth: '520px' } });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, isEdit ? 'Edit Threat' : 'Set a New Threat')
      );
      const scroll = U.el('div', { class: 'modal-card__scroll' });

      const nameInput = U.el('input', { class: 'input', placeholder: 'The cult\u2019s ritual, the duke\u2019s patience, the road thaws...', value: draft.name });
      const descInput = U.el('textarea', { class: 'textarea', placeholder: 'What happens when the clock fills.', style: { minHeight: '80px' } });
      descInput.value = draft.description || '';

      // segment count picker
      const segWrap = U.el('div', { class: 'seg-picker' });
      SEG_OPTIONS.forEach(n => {
        const b = U.el('button', { onclick: () => {
          draft.total = n;
          if (draft.filled > n) draft.filled = n;
          segWrap.querySelectorAll('button').forEach(x => x.classList.toggle('is-selected', +x.textContent === n));
        }}, String(n));
        if (n === draft.total) b.classList.add('is-selected');
        segWrap.append(b);
      });

      // colour picker (reuses the faction picker pattern)
      const colorWrap = U.el('div', { class: 'color-picker' });
      COLORS.forEach(c => {
        const sw = U.el('button', { class: 'color-swatch',
          style: { background: c.hex }, title: c.id,
          onclick: () => {
            draft.color = c.id;
            colorWrap.querySelectorAll('.color-swatch').forEach(x => x.classList.toggle('is-selected', x.dataset.cid === c.id));
          }});
        sw.dataset.cid = c.id;
        if (c.id === draft.color) sw.classList.add('is-selected');
        colorWrap.append(sw);
      });

      // faction select
      const factionSelect = U.el('select', { class: 'select' });
      factionSelect.append(U.el('option', { value: '' }, '(none)'));
      factions.forEach(f => {
        const opt = U.el('option', { value: f.id }, (f.sigil || '?') + '  ' + f.name);
        if (draft.factionId === f.id) opt.selected = 'selected';
        factionSelect.append(opt);
      });

      scroll.append(
        U.el('div', { class: 'label' }, 'Name'),
        nameInput,
        U.el('div', { class: 'label', style: { marginTop: '0.75rem' } }, 'When the clock fills'),
        descInput,
        U.el('div', { class: 'label', style: { marginTop: '0.75rem' } }, 'Segments'),
        segWrap,
        U.el('div', { class: 'label', style: { marginTop: '0.75rem' } }, 'Colour'),
        colorWrap,
        U.el('div', { class: 'label', style: { marginTop: '0.75rem' } }, 'Linked Faction (optional)'),
        factionSelect
      );
      dialog.append(scroll);

      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--ghost', onclick: () => ov.remove() }, 'Cancel'),
        U.el('button', { class: 'btn btn--primary', onclick: async () => {
          if (!nameInput.value.trim()) { nameInput.focus(); return; }
          draft.name = nameInput.value.trim();
          draft.description = descInput.value.trim();
          draft.factionId = factionSelect.value || null;
          draft.updated = Date.now();
          if (isEdit) {
            const idx = threats.findIndex(x => x.id === existing.id);
            if (idx >= 0) threats[idx] = draft;
          } else {
            threats.unshift(draft);
          }
          await save();
          ov.remove();
          render();
        }}, isEdit ? 'Save' : 'Set the Clock')
      ]));
      ov.append(dialog);
      document.body.append(ov);
      setTimeout(() => nameInput.focus(), 50);
    }

    render();
  }
});

/* =========================================================================
   MODULE: ARCHIVE (Lore Vault)
   ========================================================================= */
Keep.register({
  id: 'archive',
  name: 'The Archive',
  category: 'workshop',
  glyph: 'g-book',
  tagline: 'A campaign wiki. Wikilinks. Search. All yours.',
  sub: 'Press [[name]] to forge a new entry, or to link two together.',

  async mount(body, actions) {
    const ENTRY_TYPES = [
      { id: 'person',  name: 'Person',  color: 'var(--forest)',  rgba: 'rgba(45,74,53,0.18)' },
      { id: 'place',   name: 'Place',   color: 'var(--indigo)',  rgba: 'rgba(42,40,72,0.18)' },
      { id: 'thing',   name: 'Thing',   color: 'var(--gold-d)',  rgba: 'rgba(184,146,58,0.20)' },
      { id: 'event',   name: 'Event',   color: 'var(--wine)',    rgba: 'rgba(92,31,36,0.18)' },
      { id: 'faction', name: 'Faction', color: '#8a4a2c',        rgba: 'rgba(138,74,44,0.18)' },
      { id: 'lore',    name: 'Lore',    color: 'var(--ink-faded)', rgba: 'rgba(107,93,74,0.12)' }
    ];
    const TYPE_BY_ID = Object.fromEntries(ENTRY_TYPES.map(t => [t.id, t]));

    let entries = await Vault.get('archive-entries') || {};
    let npcByName = await Refs.npcByName();
    if (!Object.keys(entries).length) {
      entries = {
        'The Keep': { title: 'The Keep', type: 'place', body: '# The Keep\n\nA fortress at the cleft of the [[Greyfern Pass]], held in trust since the [[Long Comet]] of year 712. The walls have weathered six sieges. The seventh, they say, is yet to come.\n\nSee also: [[Margrave of Ashlow]].', updated: Date.now() },
        'Greyfern Pass': { title: 'Greyfern Pass', type: 'place', body: '# Greyfern Pass\n\nThe only road between the salt valleys and the [[Hollow Court]]. Closed at dusk by old custom. Travellers winter at [[The Keep]] when the snows come early.', updated: Date.now() }
      };
      await Vault.set('archive-entries', entries);
    }

    // back-fill: any entry whose name matches an NPC in the roster is a Person
    let backfillDirty = false;
    for (const [name, e] of Object.entries(entries)) {
      if (!e.type && npcByName.has(name)) {
        e.type = 'person';
        backfillDirty = true;
      }
    }
    if (backfillDirty) await Vault.set('archive-entries', entries);

    let currentId = await Vault.get('archive-current') || Object.keys(entries)[0];
    let editing = false;
    let query = '';

    const sidebar = U.el('div', { class: 'archive__sidebar' });
    const main = U.el('div', { class: 'archive__main' });
    body.append(U.el('div', { class: 'archive' }, [sidebar, main]));

    actions.append(
      U.el('button', { class: 'btn btn--ghost', onclick: () => exportAll() }, 'Export'),
      U.el('button', { class: 'btn', onclick: () => { editing = !editing; renderMain(); } }, 'Toggle View')
    );

    function renderSidebar() {
      sidebar.innerHTML = '';
      const search = U.el('input', { class: 'input archive__search', placeholder: 'Search the archive', value: query });
      search.addEventListener('input', () => { query = search.value; renderSidebar(); search.focus(); });
      const add = U.el('button', { class: 'btn archive__new', onclick: () => newEntry() }, 'New Entry');
      sidebar.append(search, add);
      const list = U.el('ul', { class: 'archive__list' });
      const q = query.trim().toLowerCase();
      const names = Object.keys(entries).sort();
      const matches = names.filter(n =>
        !q || n.toLowerCase().includes(q) || (entries[n].body || '').toLowerCase().includes(q)
      );

      // group by type, in canonical order, untyped → 'lore'
      const groups = new Map();
      ENTRY_TYPES.forEach(t => groups.set(t.id, []));
      matches.forEach(name => {
        const t = entries[name].type || 'lore';
        if (!groups.has(t)) groups.set(t, []);
        groups.get(t).push(name);
      });

      const populatedGroups = [...groups.entries()].filter(([, arr]) => arr.length);
      const showHeaders = populatedGroups.length > 1;

      function renderEntry(name) {
        const e = entries[name];
        const nameLow = name.toLowerCase();
        const bodyLow = (e.body || '').toLowerCase();
        const nameMatch = q && nameLow.includes(q);
        const bodyMatch = q && bodyLow.includes(q);

        const item = U.el('li', {
          class: 'archive__entry archive__entry--type-' + (e.type || 'lore') +
            (name === currentId ? ' archive__entry--active' : ''),
          onclick: () => { currentId = name; Vault.set('archive-current', name); renderSidebar(); renderMain(); }
        });
        const nameEl = U.el('span', { class: 'archive__entry-name' });
        nameEl.innerHTML = nameMatch ? highlightHtml(name, q) : escapeHtml(name);
        item.append(nameEl);
        if (q && bodyMatch && !nameMatch) {
          const snip = makeExcerpt(e.body || '', q);
          if (snip) {
            const ex = U.el('span', { class: 'archive__entry-excerpt' });
            ex.innerHTML = snip;
            item.append(ex);
          }
        }
        return item;
      }

      populatedGroups.forEach(([typeId, ents]) => {
        if (showHeaders) {
          list.append(U.el('li', { class: 'archive__group-head' }, (TYPE_BY_ID[typeId] || { name: typeId.toUpperCase() }).name));
        }
        ents.forEach(n => list.append(renderEntry(n)));
      });

      if (!matches.length) {
        list.append(U.el('li', { class: 'empty', style: { padding: '1rem 0.5rem' } }, q ? 'No entries match.' : 'No entries yet.'));
      }
      sidebar.append(list);
    }

    function makeExcerpt(body, q) {
      const lowBody = body.toLowerCase();
      const idx = lowBody.indexOf(q);
      if (idx < 0) return null;
      const start = Math.max(0, idx - 32);
      const end = Math.min(body.length, idx + q.length + 64);
      let snippet = body.slice(start, end).replace(/\s+/g, ' ').trim();
      const pre = start > 0 ? '\u2026' : '';
      const post = end < body.length ? '\u2026' : '';
      return pre + highlightHtml(snippet, q) + post;
    }
    function highlightHtml(text, q) {
      if (!q) return escapeHtml(text);
      const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp(safe, 'gi');
      return escapeHtml(text).replace(re, m => `<mark class="archive__hit">${m}</mark>`);
    }

    function renderMain() {
      main.innerHTML = '';
      const e = entries[currentId];
      if (!e) {
        main.append(U.el('div', { class: 'empty' }, 'No entry selected.'));
        return;
      }
      const title = U.el('input', { class: 'archive__title', value: e.title });
      let renameTimeout;
      title.addEventListener('input', () => {
        clearTimeout(renameTimeout);
        renameTimeout = setTimeout(async () => {
          const newTitle = title.value.trim();
          const oldId = currentId;
          if (!newTitle || newTitle === oldId) return;
          if (entries[newTitle]) {
            // collision: revert visible title to the live id, leave entry where it was
            title.value = oldId;
            U.toast('Already a "' + newTitle + '"');
            return;
          }
          e.title = newTitle;
          delete entries[oldId];
          entries[newTitle] = e;
          currentId = newTitle;
          e.updated = Date.now();
          await Vault.set('archive-current', currentId);
          await Vault.set('archive-entries', entries);
          renderSidebar();
        }, 400);
      });
      main.append(title);

      // type picker
      const typeRow = U.el('div', { class: 'archive__type-picker' });
      const setType = async (t) => {
        e.type = t || null;
        e.updated = Date.now();
        await Vault.set('archive-entries', entries);
        renderSidebar();
        // refresh active state of pills
        typeRow.querySelectorAll('.archive__type-pill').forEach(p => {
          p.classList.toggle('is-active', p.dataset.type === (e.type || ''));
        });
      };
      ENTRY_TYPES.forEach(t => {
        const pill = U.el('button', {
          class: 'archive__type-pill' + ((e.type || '') === t.id ? ' is-active' : ''),
          style: { '--type-color': t.color, '--type-soft': t.rgba },
          title: 'Tag this entry as ' + t.name,
          onclick: () => setType(t.id === e.type ? null : t.id)
        }, t.name);
        pill.dataset.type = t.id;
        typeRow.append(pill);
      });
      main.append(typeRow);

      main.append(U.el('div', { class: 'archive__meta' }, [
        U.el('span', { class: 'tag' }, new Date(e.updated || Date.now()).toLocaleDateString())
      ]));
      if (editing) {
        const ta = U.el('textarea', { class: 'archive__editor' });
        ta.value = e.body || '';
        ta.addEventListener('input', async () => {
          e.body = ta.value; e.updated = Date.now();
          await Vault.set('archive-entries', entries);
        });
        main.append(ta);
      } else {
        const rendered = U.el('div', { class: 'archive__rendered' });
        rendered.innerHTML = renderMarkdown(e.body || '');
        rendered.querySelectorAll('.archive__wikilink').forEach(link => {
          link.addEventListener('click', () => {
            hideTooltip();
            const tgt = link.dataset.target;
            if (!entries[tgt]) {
              const npc = npcByName.get(tgt);
              const body = npc ? Refs.npcAsMarkdown(npc) : `# ${tgt}\n\n`;
              entries[tgt] = { title: tgt, body, type: npc ? 'person' : null, updated: Date.now() };
              Vault.set('archive-entries', entries);
            }
            currentId = tgt;
            Vault.set('archive-current', currentId);
            renderSidebar();
            renderMain();
          });
          link.addEventListener('mouseenter', () => showTooltip(link));
          link.addEventListener('mouseleave', hideTooltip);
        });
        main.append(rendered);
      }
    }

    let activeTooltip = null;
    function hideTooltip() {
      if (activeTooltip) { activeTooltip.remove(); activeTooltip = null; }
    }
    function showTooltip(link) {
      hideTooltip();
      const tgt = link.dataset.target;
      const archived = entries[tgt];
      const npc = npcByName.get(tgt);
      let kind, body;
      if (archived) {
        kind = { label: 'Archive', cls: '' };
        const lines = (archived.body || '').split('\n');
        const para = lines.find(l => l.trim() && !/^#+\s/.test(l) && !/^>\s/.test(l)) || '';
        body = para.replace(/\*\*|\*|\[\[|\]\]/g, '').slice(0, 220);
        if (!body) body = '(no body yet)';
      } else if (npc) {
        kind = { label: 'NPC', cls: 'wikilink-tooltip__type--npc' };
        body = npc.role + '. ' + npc.want + '.';
      } else {
        kind = { label: 'not yet noted', cls: 'wikilink-tooltip__type--missing' };
        body = 'Click to forge a new entry.';
      }
      const tip = U.el('div', { class: 'wikilink-tooltip' }, [
        U.el('div', { class: 'wikilink-tooltip__title' }, [
          U.el('span', {}, tgt),
          U.el('span', { class: 'wikilink-tooltip__type ' + kind.cls }, kind.label)
        ]),
        U.el('div', { class: 'wikilink-tooltip__body' }, body)
      ]);
      document.body.append(tip);
      activeTooltip = tip;

      // position below link, flip above if no room
      const r = link.getBoundingClientRect();
      const tipH = tip.offsetHeight;
      const tipW = tip.offsetWidth;
      let top = r.bottom + 6;
      if (top + tipH > window.innerHeight - 8) top = Math.max(8, r.top - tipH - 6);
      let left = r.left;
      if (left + tipW > window.innerWidth - 8) left = window.innerWidth - tipW - 8;
      tip.style.top = top + 'px';
      tip.style.left = left + 'px';
    }

    function newEntry() {
      const name = prompt('Name this entry');
      if (!name) return;
      if (!entries[name]) entries[name] = { title: name, body: `# ${name}\n\n`, updated: Date.now() };
      currentId = name;
      editing = true;
      Vault.set('archive-current', currentId);
      Vault.set('archive-entries', entries);
      renderSidebar();
      renderMain();
    }

    function escapeHtml(s) { return s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

    function renderMarkdown(src) {
      const lines = src.split('\n');
      const out = [];
      let inList = false;
      const close = () => { if (inList) { out.push('</ul>'); inList = false; } };
      for (let raw of lines) {
        const line = raw;
        if (/^#\s+/.test(line)) { close(); out.push('<h1>' + inlineMd(line.replace(/^#\s+/, '')) + '</h1>'); }
        else if (/^##\s+/.test(line)) { close(); out.push('<h2>' + inlineMd(line.replace(/^##\s+/, '')) + '</h2>'); }
        else if (/^###\s+/.test(line)) { close(); out.push('<h3>' + inlineMd(line.replace(/^###\s+/, '')) + '</h3>'); }
        else if (/^>\s+/.test(line)) { close(); out.push('<blockquote>' + inlineMd(line.replace(/^>\s+/, '')) + '</blockquote>'); }
        else if (/^-\s+/.test(line)) {
          if (!inList) { out.push('<ul>'); inList = true; }
          out.push('<li>' + inlineMd(line.replace(/^-\s+/, '')) + '</li>');
        }
        else if (line.trim() === '') { close(); out.push(''); }
        else { close(); out.push('<p>' + inlineMd(line) + '</p>'); }
      }
      close();
      return out.join('\n');
    }
    function inlineMd(s) {
      s = escapeHtml(s);
      s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
      s = s.replace(/\[\[([^\]]+)\]\]/g, (m, name) => {
        const existsInArchive = entries[name];
        const isNpc = npcByName.has(name);
        let cls = 'archive__wikilink';
        if (!existsInArchive && !isNpc) cls += ' archive__wikilink--missing';
        else if (!existsInArchive && isNpc) cls += ' archive__wikilink--npc';
        return `<span class="${cls}" data-target="${escapeHtml(name)}">${escapeHtml(name)}</span>`;
      });
      return s;
    }

    function exportAll() {
      const data = JSON.stringify(entries, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'archive-' + Date.now() + '.json';
      document.body.appendChild(a); a.click(); a.remove();
    }

    renderSidebar();
    renderMain();
  },

  unmount() {
    document.querySelectorAll('.wikilink-tooltip').forEach(t => t.remove());
  }
});

/* =========================================================================
   MODULE: THE WAYFARER (PC sheet)
   The player character. Distinct from Hall of Faces (the world's people) and
   The Fellowship (those who walk beside the PC); this is the chronicler's
   own. Multiple PCs supported for parties; one is the common case for solo.
   ========================================================================= */
Keep.register({
  id: 'wayfarer',
  name: 'The Wayfarer',
  category: 'workshop',
  glyph: 'g-wayfarer',
  tagline: 'You who walk. The chronicler\u2019s own.',
  sub: 'Name yourself. Carry what you carry. Remember why you walk.',

  async mount(body, actions) {
    const STATUSES = [
      { id: 'hale',     name: 'Hale' },
      { id: 'weary',    name: 'Weary' },
      { id: 'wounded',  name: 'Wounded' },
      { id: 'grievous', name: 'Grievous' },
      { id: 'fallen',   name: 'Fallen' }
    ];
    const COLORS = [
      { id: 'wine',   var: 'var(--wine)',     varD: 'var(--wine-d)',   soft: 'rgba(92,31,36,0.10)',   hex: '#5c1f24' },
      { id: 'forest', var: 'var(--forest)',   varD: 'var(--forest-d)', soft: 'rgba(45,74,53,0.12)',   hex: '#2d4a35' },
      { id: 'indigo', var: 'var(--indigo)',   varD: '#1a1834',         soft: 'rgba(42,40,72,0.13)',   hex: '#2a2848' },
      { id: 'gold',   var: 'var(--gold-d)',   varD: '#5a4715',         soft: 'rgba(184,146,58,0.16)', hex: '#8a6c25' },
      { id: 'ink',    var: 'var(--ink-soft)', varD: 'var(--ink)',      soft: 'rgba(58,47,36,0.10)',   hex: '#3a2f24' },
      { id: 'salt',   var: '#7a6c52',         varD: '#4f4530',         soft: 'rgba(122,108,82,0.13)', hex: '#7a6c52' },
      { id: 'iron',   var: '#4a5764',         varD: '#2a3340',         soft: 'rgba(74,87,100,0.14)',  hex: '#4a5764' },
      { id: 'rust',   var: '#8a4a2c',         varD: '#5a2f1c',         soft: 'rgba(138,74,44,0.14)',  hex: '#8a4a2c' }
    ];
    function colorOf(id)  { return COLORS.find(c => c.id === id) || COLORS[0]; }
    function statusOf(id) { return STATUSES.find(s => s.id === id) || STATUSES[0]; }

    let pcs = (await Vault.get('wayfarer')) || [];

    // archive backlinks
    let archiveEntries = await Refs.archiveEntries();
    function backlinksFor(name) {
      const out = [];
      const safe = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp('\\[\\[' + safe + '\\]\\]');
      for (const [k, e] of Object.entries(archiveEntries)) {
        if (re.test(e.body || '')) out.push(k);
      }
      return out;
    }

    const head = U.el('div', { class: 'wayfarer__head' });
    const grid = U.el('div', { class: 'wayfarer__grid' });
    body.append(head, grid);

    actions.append(
      U.el('button', { class: 'btn btn--primary', onclick: () => openWayfarerForm() }, 'Name Yourself')
    );

    async function save() { await Vault.set('wayfarer', pcs); }

    function render() {
      head.innerHTML = '';
      head.append(
        U.el('div', { class: 'wayfarer__count' },
          pcs.length === 0 ? 'No wayfarer yet'
            : pcs.length === 1 ? 'One wayfarer'
            : pcs.length + ' wayfarers'),
        U.el('div', {}, [
          U.el('button', { class: 'btn btn--small', onclick: () => openWayfarerForm() }, '+ Name Yourself')
        ])
      );

      grid.innerHTML = '';
      if (!pcs.length) {
        const empty = U.el('div', { class: 'wayfarer__empty' });
        empty.append(
          U.el('span', { class: 'wayfarer__empty-call' }, 'Who walks?'),
          document.createTextNode('The Wayfarer is your own card. Name yourself, set your calling, mark what you carry. Solo players keep one. Parties may keep several.'),
          U.el('div', { style: { marginTop: '1.2rem' } }, [
            U.el('button', { class: 'btn btn--primary', onclick: () => openWayfarerForm() }, 'Name Yourself')
          ])
        );
        grid.append(empty);
        return;
      }

      // sort: hale first, fallen last, otherwise by name
      const order = { hale: 0, weary: 1, wounded: 2, grievous: 3, fallen: 4 };
      const sorted = [...pcs].sort((a, b) => {
        const ao = order[a.status] ?? 99;
        const bo = order[b.status] ?? 99;
        if (ao !== bo) return ao - bo;
        return (a.name || '').localeCompare(b.name || '');
      });
      sorted.forEach(pc => grid.append(renderCard(pc)));
      applyPendingHighlight();
    }

    function renderCard(pc) {
      const s = statusOf(pc.status);
      const c = colorOf(pc.color || 'wine');
      const card = U.el('div', {
        class: 'wayfarer-card wayfarer-card--status-' + s.id + (s.id === 'fallen' ? ' wayfarer-card--fallen' : ''),
        style: { '--accent': c.var, '--accent-d': c.varD, '--accent-soft': c.soft }
      });
      card.dataset.pcid = pc.id;

      // caption: lineage and calling, joined cleanly
      const captionBits = [];
      if (pc.lineage) captionBits.push(pc.lineage);
      if (pc.calling) captionBits.push(pc.calling);
      const caption = captionBits.join(' \u00b7 ');

      card.append(U.el('div', { class: 'wayfarer-card__head' }, [
        U.el('div', { class: 'wayfarer-card__glyph' }, '\u2022'),
        U.el('div', { class: 'wayfarer-card__title' }, [
          U.el('div', { class: 'wayfarer-card__name' }, pc.name),
          caption ? U.el('div', { class: 'wayfarer-card__caption' }, caption) : null
        ].filter(Boolean)),
        U.el('div', { class: 'wayfarer-card__status' }, s.name)
      ]));
      card.append(U.el('hr', { class: 'wayfarer-card__sep' }));

      function addField(label, value, modifier) {
        if (!value || !String(value).trim()) return;
        const field = U.el('div', { class: 'wayfarer-card__field' + (modifier ? ' wayfarer-card__field--' + modifier : '') });
        field.append(
          U.el('div', { class: 'wayfarer-card__field-label' }, label),
          U.el('div', { class: 'wayfarer-card__field-value' }, value)
        );
        card.append(field);
      }

      addField('Description', pc.description);
      addField('Oath', pc.oath, 'oath');
      addField('Bonds', pc.bonds);
      addField('Carried', pc.carried);
      addField('Notes', pc.notes);

      // archive backlinks
      const backs = backlinksFor(pc.name);
      if (backs.length) {
        const backField = U.el('div', { class: 'wayfarer-card__field' });
        backField.append(
          U.el('div', { class: 'wayfarer-card__field-label' }, 'Mentioned In')
        );
        const backWrap = U.el('div', { class: 'wayfarer-card__backlinks' });
        backs.forEach(name => {
          backWrap.append(U.el('button', {
            class: 'tag',
            title: 'Open in the Archive',
            onclick: () => Refs.openArchiveEntry(name)
          }, name));
        });
        backField.append(backWrap);
        card.append(backField);
      }

      // actions
      const acts = U.el('div', { class: 'wayfarer-card__actions' });
      acts.append(
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => openWayfarerForm(pc) }, 'Edit'),
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          if (!confirm('Retire "' + pc.name + '"? Their card will be erased.')) return;
          pcs = pcs.filter(x => x.id !== pc.id);
          await save();
          render();
        }}, 'Retire')
      );
      card.append(acts);

      return card;
    }

    let pendingHighlight = await Vault.get('wayfarer-highlight');
    if (pendingHighlight) await Vault.remove('wayfarer-highlight');
    function applyPendingHighlight() {
      if (!pendingHighlight) return;
      const card = grid.querySelector('[data-pcid="' + pendingHighlight + '"]');
      if (card) {
        setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 30);
        card.classList.add('wayfarer-card--highlight');
        setTimeout(() => card.classList.remove('wayfarer-card--highlight'), 2400);
      }
      pendingHighlight = null;
    }

    function openWayfarerForm(existing) {
      const isEdit = !!existing;
      const draft = existing
        ? { ...existing }
        : { id: U.uid(), name: '', lineage: '', calling: '', description: '',
            oath: '', bonds: '', carried: '', notes: '',
            status: 'hale', color: 'wine',
            created: Date.now(), updated: Date.now() };

      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card', style: { maxWidth: '560px' } });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, isEdit ? 'Edit ' + (existing.name || 'Wayfarer') : 'Name Yourself')
      );
      const scroll = U.el('div', { class: 'modal-card__scroll' });

      const nameInput    = U.el('input',    { class: 'input', placeholder: 'The name you carry', value: draft.name });
      const lineageInput = U.el('input',    { class: 'input', placeholder: 'Of Greyfern, half-Northron, lowborn...', value: draft.lineage });
      const callingInput = U.el('input',    { class: 'input', placeholder: 'Hedge-knight, wanderer, apostate priest...', value: draft.calling });
      const descInput    = U.el('textarea', { class: 'textarea', placeholder: 'Appearance, manner, how you carry yourself.', style: { minHeight: '70px' } });
      descInput.value    = draft.description || '';
      const oathInput    = U.el('textarea', { class: 'textarea', placeholder: 'Why you walk. The thing you swore.', style: { minHeight: '60px' } });
      oathInput.value    = draft.oath || '';
      const bondsInput   = U.el('textarea', { class: 'textarea', placeholder: 'The people, places, vows that bind you.', style: { minHeight: '70px' } });
      bondsInput.value   = draft.bonds || '';
      const carriedInput = U.el('textarea', { class: 'textarea', placeholder: 'What you carry: blade, coin, keepsake, supply.', style: { minHeight: '70px' } });
      carriedInput.value = draft.carried || '';
      const notesInput   = U.el('textarea', { class: 'textarea', placeholder: 'Anything else.', style: { minHeight: '60px' } });
      notesInput.value   = draft.notes || '';

      // status picker
      const statusWrap = U.el('div', { class: 'status-picker' });
      STATUSES.forEach(s => {
        const b = U.el('button', { onclick: () => {
          draft.status = s.id;
          statusWrap.querySelectorAll('button').forEach(x => x.classList.toggle('is-selected', x.dataset.sid === s.id));
        }}, s.name);
        b.dataset.sid = s.id;
        if (s.id === draft.status) b.classList.add('is-selected');
        statusWrap.append(b);
      });

      // colour picker
      const colorWrap = U.el('div', { class: 'color-picker' });
      COLORS.forEach(co => {
        const sw = U.el('button', { class: 'color-swatch',
          style: { background: co.hex }, title: co.id,
          onclick: () => {
            draft.color = co.id;
            colorWrap.querySelectorAll('.color-swatch').forEach(x => x.classList.toggle('is-selected', x.dataset.cid === co.id));
          }});
        sw.dataset.cid = co.id;
        if (co.id === draft.color) sw.classList.add('is-selected');
        colorWrap.append(sw);
      });

      scroll.append(
        U.el('div', { class: 'label' }, 'Name'),
        nameInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Lineage'),
        lineageInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Calling'),
        callingInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Description'),
        descInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Oath'),
        oathInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Bonds'),
        bondsInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Carried'),
        carriedInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Notes'),
        notesInput,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Condition'),
        statusWrap,
        U.el('div', { class: 'label', style: { marginTop: '0.7rem' } }, 'Accent Colour'),
        colorWrap
      );
      dialog.append(scroll);

      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--ghost', onclick: () => ov.remove() }, 'Cancel'),
        U.el('button', { class: 'btn btn--primary', onclick: async () => {
          if (!nameInput.value.trim()) { nameInput.focus(); return; }
          draft.name        = nameInput.value.trim();
          draft.lineage     = lineageInput.value.trim();
          draft.calling     = callingInput.value.trim();
          draft.description = descInput.value.trim();
          draft.oath        = oathInput.value.trim();
          draft.bonds       = bondsInput.value.trim();
          draft.carried     = carriedInput.value.trim();
          draft.notes       = notesInput.value.trim();
          draft.updated     = Date.now();
          if (isEdit) {
            const idx = pcs.findIndex(x => x.id === existing.id);
            if (idx >= 0) pcs[idx] = draft;
          } else {
            pcs.unshift(draft);
          }
          await save();
          ov.remove();
          render();
        }}, isEdit ? 'Save' : 'Name')
      ]));
      ov.append(dialog);
      document.body.append(ov);
      setTimeout(() => nameInput.focus(), 50);
    }

    render();
  }
});

/* =========================================================================
   MODULE: HALL OF FACES (NPC Conjurer)
   ========================================================================= */
Keep.register({
  id: 'faces',
  name: 'Hall of Faces',
  category: 'workshop',
  glyph: 'g-mask',
  tagline: 'Conjure a townsfolk, a stranger, a name to remember.',
  sub: 'Press the bell. A face appears. Keep the ones who matter.',

  async mount(body, actions) {
    const stage = U.el('div');
    const rosterWrap = U.el('div', { class: 'faces__roster' });
    body.append(stage, rosterWrap);

    actions.append(U.el('button', { class: 'btn btn--primary', onclick: () => roll() }, 'Conjure'));

    const cultures = {
      'northron': {
        first: ['Bjorn','Astrid','Halla','Sigrid','Eyvind','Ulrich','Gudrun','Magnus','Solveig','Thorvald','Ingrid','Olaf','Freya','Brand','Helka','Ragnar','Liv','Knut'],
        last: ['Greyfell','Ironbeard','Stormwood','Wolfshade','Coldhearth','Salt-river','Yew-hand','Snowmark','of the Three Falls','the Late','Wintergrieve','Frosbier']
      },
      'rivenmark': {
        first: ['Aldric','Maren','Cecilia','Lucan','Edric','Cassiana','Wendell','Marcie','Joren','Vesper','Annek','Tobias','Lila','Garran','Senna','Halford'],
        last: ['Vance','Crouse','Holloway','Ashwell','Drummond','Mire','Beckford','Halewood','Carrow','Stillwater','Penance','Greenmoor']
      },
      'southern': {
        first: ['Idris','Soraya','Rashid','Layla','Kalim','Nahla','Faruq','Yara','Selim','Amara','Tariq','Zaina','Hadi','Nasrin'],
        last: ['al-Saif','of Brassgate','the Patient','of the Golden Quarter','ben-Ehud','ad-Diwan','of Five Wells','the Cup-bearer']
      }
    };

    const occupations = [
      'wheelwright','tax collector','traveling friar','disgraced knight','blacksmith\u2019s widow','ratcatcher','letter-carrier','market scribe','herbalist','dock foreman','retired duellist','wet-nurse','wandering bard','grave-digger','ferry-keeper','candle-maker','tax-evading cobbler','seamstress with a side trade','keeper of birds','minor magistrate','wood-cutter','salt-merchant','exiled scholar','tomb warden','village midwife','road-warden'
    ];
    const voices = [
      'clipped, like she is always interrupting herself',
      'a soft baritone with a slight whistle on s-sounds',
      'reedy, breaks at the top of every sentence',
      'gravel, slow, never finishes a word',
      'lilting, sing-songy, never quite sober',
      'measured, dry, leaves you waiting at the end',
      'breathless, like he just ran here, even seated',
      'mutters between words, as if cursing the air',
      'theatrical, even at breakfast',
      'a half-whisper, never above',
      'a faint accent from somewhere no one places',
      'pitched too high for the body it comes from'
    ];
    const secrets = [
      'is not who they say they are',
      'owes a debt to someone dangerous',
      'witnessed a killing and never spoke of it',
      'is in love with the wrong person',
      'is dying, and only the apothecary knows',
      'stole something small and irreplaceable',
      'serves a rival house in secret',
      'fled a war years ago, under another name',
      'has a child no one knows about',
      'is being blackmailed for a crime they did not commit',
      'practices a forbidden craft after dark',
      'is searching for a sibling thought lost'
    ];
    const wants = [
      'a quiet evening, just once',
      'a letter delivered, but not opened',
      'to leave this town before winter',
      'their name on something that will outlast them',
      'revenge, but is not sure on whom yet',
      'to be believed, just by one person',
      'their daughter back',
      'to make a thing that cannot be unmade',
      'forgiveness, from someone who is dead',
      'the truth about a dream they keep having',
      'an apprentice who will not run off',
      'one more good summer'
    ];
    const mannerisms = [
      'taps the rim of any cup three times before drinking',
      'never sits with their back to a door',
      'is always carrying a small folded paper',
      'apologises before asking any question',
      'pronounces one common word strangely',
      'will not eat anything red',
      'wears a ring on a chain, not a finger',
      'closes one eye when listening hard',
      'collects feathers and is very particular about them',
      'has a small dog no one else can see',
      'crosses themselves at every bell',
      'will not say the name of their home village'
    ];
    const physical = [
      'a long scar through the right brow',
      'one milky eye and one sharp',
      'hands stained dark from old ink',
      'a missing little finger, never explained',
      'hair shockingly white, despite being young',
      'a tattoo on the back of the neck, a date',
      'a slight limp on cold mornings',
      'always slightly damp, somehow',
      'tall, but stoops as if used to lower ceilings',
      'a soft burn-scar along the jaw',
      'eyes set very wide, like a creature watching two directions',
      'thin, restless hands; cannot hold them still'
    ];

    function newNpc() {
      const cultKey = U.pick(Object.keys(cultures));
      const cult = cultures[cultKey];
      const name = U.pick(cult.first) + ' ' + U.pick(cult.last);
      return {
        id: U.uid(),
        name, culture: cultKey,
        role: U.pick(occupations),
        voice: U.pick(voices),
        secret: U.pick(secrets),
        want: U.pick(wants),
        mannerism: U.pick(mannerisms),
        physical: U.pick(physical),
        created: Date.now()
      };
    }
    async function renderNpc(npc, opts = {}) {
      const fields = [
        ['Voice', npc.voice],
        ['Wants', npc.want],
        ['Mannerism', npc.mannerism],
        ['Appearance', npc.physical],
        ['Secret', npc.secret]
      ];
      const card = U.el('div', { class: 'faces__npc' });
      card.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('div', { class: 'faces__npc-name' }, npc.name),
        U.el('div', { class: 'faces__npc-role' }, npc.role + ' \u00B7 ' + (npc.culture.charAt(0).toUpperCase() + npc.culture.slice(1))),
        U.el('div', { class: 'faces__npc-grid' },
          fields.map(([l, v]) => U.el('div', {}, [
            U.el('div', { class: 'faces__field-label' }, l),
            U.el('div', { class: 'faces__field-value' }, v)
          ]))
        )
      );

      // backlinks: archive entries that reference this name with [[wikilink]]
      const links = await Refs.backlinks(npc.name);
      if (links.length) {
        const linksWrap = U.el('div', { class: 'faces__backlinks' });
        linksWrap.append(U.el('div', { class: 'faces__field-label' }, 'Mentioned in'));
        const row = U.el('div');
        links.forEach(name => {
          row.append(U.el('button', {
            class: 'tag',
            onclick: () => Refs.openArchiveEntry(name)
          }, name));
        });
        linksWrap.append(row);
        card.append(linksWrap);
      }

      // cabinet items this NPC is recorded as holding
      const cabItems = ((await Vault.get('cabinet')) || []).filter(it => it.heldBy === npc.name);
      if (cabItems.length) {
        const cabWrap = U.el('div', { class: 'faces__backlinks' });
        cabWrap.append(U.el('div', { class: 'faces__field-label' }, 'Carries'));
        const row = U.el('div');
        const kindGlyphs = { relic: '\u2720', weapon: '\u2694', tome: '\u2766', letter: '\u2709',
          trinket: '\u2726', tool: '\u2692', curiosity: '\u2742', other: '\u2767' };
        cabItems.forEach(it => {
          row.append(U.el('button', {
            class: 'tag',
            title: 'Open in The Cabinet',
            onclick: async () => {
              await Vault.set('cabinet-highlight', it.id);
              await Keep.mount('cabinet');
            }
          }, (kindGlyphs[it.kind] || '') + '  ' + it.name));
        });
        cabWrap.append(row);
        card.append(cabWrap);
      }

      const acts = U.el('div', { class: 'faces__actions' });
      if (!opts.inRoster) {
        acts.append(U.el('button', { class: 'btn btn--small', onclick: async () => {
          const r = await Vault.get('faces-roster') || [];
          r.unshift(npc);
          await Vault.set('faces-roster', r.slice(0, 200));
          U.toast('Inducted into the roster');
          renderRoster();
        }}, 'Keep'));
        acts.append(U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => roll() }, 'Roll Again'));
      } else {
        acts.append(U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => Refs.openArchiveEntry(npc.name) }, 'Open in Archive'));
        acts.append(U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          let r = await Vault.get('faces-roster') || [];
          r = r.filter(x => x.id !== npc.id);
          await Vault.set('faces-roster', r);
          renderRoster();
        }}, 'Forget'));
      }
      card.append(acts);
      return card;
    }
    async function renderRoster() {
      rosterWrap.innerHTML = '';
      const r = await Vault.get('faces-roster') || [];
      rosterWrap.append(U.el('h2', {}, 'The Roster'));
      if (!r.length) {
        rosterWrap.append(U.el('div', { class: 'empty' }, 'No one yet. Keep faces you want to remember.'));
        return;
      }
      const grid = U.el('div', { class: 'faces__roster-grid' });
      r.forEach(npc => {
        const card = U.el('div', { class: 'faces__roster-card', onclick: async () => {
          stage.innerHTML = '';
          stage.append(await renderNpc(npc, { inRoster: true }));
        }});
        card.append(
          U.el('div', { class: 'faces__roster-name' }, npc.name),
          U.el('div', { class: 'faces__roster-role' }, npc.role)
        );
        grid.append(card);
      });
      rosterWrap.append(grid);
    }
    async function roll() {
      stage.innerHTML = '';
      stage.append(await renderNpc(newNpc()));
    }

    // honour incoming search navigation: if faces-show is set, display that
    // roster NPC in the stage instead of rolling fresh
    const pendingNpc = await Vault.get('faces-show');
    if (pendingNpc) {
      await Vault.remove('faces-show');
      const roster = await Vault.get('faces-roster') || [];
      const found = roster.find(n => n.id === pendingNpc);
      if (found) {
        stage.innerHTML = '';
        stage.append(await renderNpc(found, { inRoster: true }));
      } else {
        await roll();
      }
    } else {
      await roll();
    }
    renderRoster();
  }
});

/* =========================================================================
   MODULE: THE FELLOWSHIP (Companions)
   The people who walk with the PC. Distinct from the Hall of Faces (which is
   the world's people the PC meets). Each companion carries an archetype with
   a pool of voice lines, a bond gauge, a status, and a Speak button that
   surfaces one in-character line on demand to bridge solo-play loneliness.
   ========================================================================= */
Keep.register({
  id: 'fellowship',
  name: 'The Fellowship',
  category: 'workshop',
  glyph: 'g-fellowship',
  tagline: 'Companions who walk beside you. The bound, the loyal, the worn.',
  sub: 'Each card holds one. Press Speak when you want them present.',

  async mount(body, actions) {
    const ARCHETYPES = [
      { id: 'stoic', name: 'Stoic', glyph: '\u26E8', accent: 'var(--ink-soft)', accentD: 'var(--ink)', soft: 'rgba(58,47,36,0.10)',
        lines: [
          'We move.', 'It will hold.', 'I am still here.', 'Enough talk.',
          'I have seen worse.', 'Then we keep walking.', 'Hold.', 'Look at me. Breathe.',
          'Done.', 'No.', 'Not yet.', 'If you fall, I follow.',
          'The horizon does not care.', 'Sleep. I watch.', 'Sharpen your blade.',
          'It is what it is.', 'We are not finished.', 'This place wants us to leave.',
          'Stand.', 'Worth dying for?', 'I will go first.', 'Quiet now.',
          'My oath stands.', 'We bury our own.', 'Then so be it.'
        ]
      },
      { id: 'sage', name: 'Sage', glyph: '\u2726', accent: 'var(--indigo)', accentD: '#1a1834', soft: 'rgba(42,40,72,0.13)',
        lines: [
          'The wind speaks of three roads.', 'What is named cannot be lost.',
          'I have seen this before. In another life, perhaps.',
          'The river does not argue with the stone.',
          'Patience. The pattern reveals itself.',
          'All bargains have a third party we do not see.',
          'Truth has many doors, but only one threshold.',
          'The young see only what is. The old see what was. The wise see what is becoming.',
          'Listen. The silence here is not empty.',
          'We are not the first to ask.',
          'Names are doors. Be careful which you open.',
          'The dead remember the living more clearly than the living remember the dead.',
          'Salt and iron. Salt and iron.',
          'What did the bird say? It said: look up.',
          'Hmm. Curious.',
          'There is a thread in this. We must pull gently.',
          'A small kindness, now.',
          'Three signs, then a sign refused. So it goes.',
          'Even the moon mourns.',
          'I have read of this. Or dreamt of it.',
          'We are inside someone else\u2019s prayer.',
          'Do not speak its true name aloud.',
          'It is a year of returns.',
          'Wait. Watch.',
          'What we seek seeks us also.'
        ]
      },
      { id: 'scout', name: 'Scout', glyph: '\u27A4', accent: 'var(--forest)', accentD: '#1c2f22', soft: 'rgba(45,74,53,0.12)',
        lines: [
          'Track here. Two days old.', 'Wait. Listen.',
          'Someone has been here.', 'Three of them. Maybe four.',
          'Smoke, that way.', 'Smells wrong.', 'Down. Stay down.',
          'Move. Now.', 'Clear.', 'I count six. Maybe more in the trees.',
          'Do not step there.', 'Bird has gone quiet.', 'Fresh blood.',
          'Not human.', 'We are being followed.', 'I will scout ahead.',
          'Two ways out. Three if we climb.', 'The wind is wrong.',
          'This trail doubles back.', 'Snare. Easy work.',
          'Up here. Better cover.', 'They knew we were coming.',
          'Camp here. Defensible.', 'I will take first watch.',
          'We lose them at the river.'
        ]
      },
      { id: 'healer', name: 'Healer', glyph: '\u271A', accent: '#6b8e6b', accentD: '#3d5a3d', soft: 'rgba(107,142,107,0.13)',
        lines: [
          'You are bleeding.', 'Sit. Drink this.', 'Show me where.',
          'Hold still. This will sting.', 'When did you last eat?',
          'You have not slept in two days.', 'I can save them. Bring them here.',
          'Press here. Hard.', 'Breathe with me. In. Out.',
          'I have done what I can.', 'Pray, if you pray.',
          'You should not have done that.', 'Lie down. Now.',
          'It is not as bad as it looks.', 'It is as bad as it looks.',
          'I need clean water.', 'This is beyond my craft.',
          'They lived. Be grateful.', 'I will not lose another.',
          'The wound is closing. Slowly.',
          'Stay with me. Do you hear me? Stay.',
          'Quiet now. Rest.',
          'Do not move. The poison is still working.',
          'I am sorry. I tried.', 'Live. That is all I ask.'
        ]
      },
      { id: 'bard', name: 'Bard', glyph: '\u266A', accent: 'var(--gold-d)', accentD: '#5a4715', soft: 'rgba(184,146,58,0.16)',
        lines: [
          'Now that is a story.', 'Coin first, then verse.',
          'Oh, oh, this is good. Mark this, mark this.',
          'Three sad endings I know. Pick one.',
          'Light a candle. Pour the wine. I have an audience now.',
          'Was that a compliment? From you?',
          'You see, the secret of any tale is what you leave out.',
          'We are all in the song now, friend. Hope you like your rhymes.',
          'I knew a man like that once. Buried him last spring.',
          'If we die here, promise to remember the third verse exactly.',
          'That, my friends, was style.',
          'What rhymes with disaster? Faster, I suppose.',
          'Drinks first. Plans after.', 'Tell me you brought coin.',
          'I will sing it tomorrow. Probably.',
          'Now listen, this is important. (It is not.)',
          'Have you noticed the innkeeper looks like a man with a secret?',
          'There is always one more thing to learn.',
          'I will write you into the song. Choose your epitaph.',
          'Beauty and ruin, friends. Beauty and ruin.',
          'Yes, yes. We are heroes. Let me eat first.',
          'I owe a man in Greyfern three crowns. Pretend you did not hear that.',
          'Watch this.', 'Ah. That was not supposed to happen.',
          'A song is just a memory that learned to walk.'
        ]
      },
      { id: 'scoundrel', name: 'Scoundrel', glyph: '\u2620', accent: '#4a5764', accentD: '#2a3340', soft: 'rgba(74,87,100,0.14)',
        lines: [
          'And who pays for that?', 'Lock or window?',
          'Walk casually. Like you belong.', 'We could just take it.',
          'I know a man who knows a man.', 'Too easy. Something is off.',
          'Hold this. Do not ask.', 'I was not there. Remember that.',
          'Pockets first, swords later.', 'We split it three ways. Maybe.',
          'If anyone asks, I am your cousin.',
          'There is always a back door.',
          'Coins talk. Silver talks louder.',
          'I owe debts in three cities. We are going nowhere near them.',
          'Trust no one. Especially me.',
          'What is the take?', 'Quiet, you will wake them.',
          'If this goes wrong, I am taking the horse.',
          'Smile. We are old friends.',
          'I lifted this off him. Do not ask.',
          'Honest work? In this town?',
          'I have a plan. It is bad. But it is a plan.',
          'Run, but slowly.', 'Pretend you have seen a ghost.',
          'Tell the truth. Just enough of it.'
        ]
      },
      { id: 'devoted', name: 'Devoted', glyph: '\u2767', accent: 'var(--wine)', accentD: 'var(--wine-d)', soft: 'rgba(92,31,36,0.10)',
        lines: [
          'You should not have done that.', 'I am with you.',
          'Wherever you go.', 'I would not have left you.',
          'You looked tired this morning.',
          'Eat something. Please.', 'I have been worried.',
          'Do not try to lie to me. I know your faces.',
          'You forget that you are also worth saving.',
          'If they come for you, they come through me first.',
          'I have a bad feeling about this. But I follow.',
          'Take this. I brought it for you.',
          'Sleep. I will keep watch.',
          'You are not alone in this.',
          'I have known you longer than I have known peace.',
          'Promise me one thing. Promise me you will come back.',
          'I named my horse after you. It is a bad horse.',
          'You are stronger than you think.',
          'Do not apologise. Not to me.',
          'I would die for this. For you.',
          'Whatever you decide. I am with you.',
          'We have been through worse.',
          'Look at me. You are not lost.',
          'Together, then.',
          'I prayed for you.'
        ]
      },
      { id: 'reluctant', name: 'Reluctant', glyph: '\u2601', accent: '#7a6c52', accentD: '#4f4530', soft: 'rgba(122,108,82,0.13)',
        lines: [
          'We are going to die out here.', 'Fine. Fine.',
          'I told you this was a bad idea.',
          'Of course it is haunted. Why would it not be haunted.',
          'I want it noted, for the record, that I objected.',
          'You owe me. Heavily.',
          'Three days of walking for this?',
          'Lead on, then. As always.',
          'Could be worse. Do not ask how.',
          'Why do I follow you. I really must consider this.',
          'Wonderful. More stairs.',
          'I hate everything about this.',
          'Look at it. Look at it.',
          'I will require strong drink later.',
          'We could just turn around. Just saying.',
          'I should have stayed at the inn.',
          'Wake me when it is over.',
          'If I die, I will haunt you. Specifically.',
          'And here I thought today might be peaceful.',
          'Marvellous. Truly.',
          'You owe me a meal. A real one. Not jerky.',
          'I will follow you into the next disaster also. I know.',
          'Yes, yes. I am coming.',
          'We had food yesterday. Now we have rumours. Tremendous.',
          'After you, hero.'
        ]
      }
    ];

    const STATUSES = [
      { id: 'hale',     name: 'Hale' },
      { id: 'wounded',  name: 'Wounded' },
      { id: 'lost',     name: 'Lost' },
      { id: 'fallen',   name: 'Fallen' },
      { id: 'departed', name: 'Departed' }
    ];

    function bondLabel(v) {
      if (v <= -3) return 'Estranged';
      if (v <= -1) return 'Cold';
      if (v === 0) return 'Stranger';
      if (v <= 2)  return 'Travel-Mate';
      if (v <= 4)  return 'Trusted';
      if (v <= 6)  return 'Close';
      if (v <= 8)  return 'Sworn';
      return 'Heart-Bound';
    }

    function archetypeOf(id) { return ARCHETYPES.find(a => a.id === id) || ARCHETYPES[0]; }
    function statusOf(id)    { return STATUSES.find(s => s.id === id) || STATUSES[0]; }

    let companions = await Vault.get('fellowship');
    if (!companions || !companions.length) {
      companions = [
        {
          id: U.uid(),
          name: 'Mira Greycloak',
          archetype: 'scout',
          voice: 'A wry, quiet thing. Walks lighter than her boots should allow.',
          bond: 4,
          status: 'hale',
          customLines: [],
          speakHistory: [],
          created: Date.now(),
          updated: Date.now()
        },
        {
          id: U.uid(),
          name: 'Brother Halric',
          archetype: 'healer',
          voice: 'Wears the green sash of a Greyfern wayfarer-priest. Carries more bandages than blessings.',
          bond: 6,
          status: 'hale',
          customLines: [],
          speakHistory: [],
          created: Date.now(),
          updated: Date.now()
        }
      ];
      await Vault.set('fellowship', companions);
    }

    // archive backlinks
    let archiveEntries = await Refs.archiveEntries();
    function backlinksFor(name) {
      const out = [];
      const safe = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp('\\[\\[' + safe + '\\]\\]');
      for (const [k, e] of Object.entries(archiveEntries)) {
        if (re.test(e.body || '')) out.push(k);
      }
      return out;
    }

    const head = U.el('div', { class: 'fellowship__head' });
    const grid = U.el('div', { class: 'fellowship__grid' });
    body.append(head, grid);

    actions.append(
      U.el('button', { class: 'btn btn--primary', onclick: () => openCompanionForm() }, 'Welcome a Companion')
    );

    async function save() { await Vault.set('fellowship', companions); }

    function speakAs(c) {
      const arch = archetypeOf(c.archetype);
      const pool = [...arch.lines, ...(c.customLines || [])];
      const recent = (c.speakHistory || []).slice(0, Math.min(6, Math.floor(pool.length / 3)));
      const available = pool.filter(l => !recent.includes(l));
      const line = U.pick(available.length ? available : pool);
      c.speakHistory = [line, ...(c.speakHistory || [])].slice(0, 12);
      c.lastSpoken = line;
      return line;
    }

    function statusOrder(s) {
      return ['hale','wounded','lost','fallen','departed'].indexOf(s) + 1 || 99;
    }

    function render() {
      head.innerHTML = '';
      const alive = companions.filter(c => c.status !== 'fallen' && c.status !== 'departed').length;
      head.append(
        U.el('div', { class: 'fellowship__count' },
          alive + ' walk with you' +
          (companions.length > alive ? ' (' + (companions.length - alive) + ' remembered)' : '')),
        U.el('div', {}, [
          U.el('button', { class: 'btn btn--small', onclick: () => openCompanionForm() }, '+ Welcome a Companion')
        ])
      );

      grid.innerHTML = '';
      if (!companions.length) {
        grid.append(U.el('div', { class: 'empty' }, 'No companions yet. Welcome one above.'));
        return;
      }
      const sorted = [...companions].sort((a, b) => {
        const ao = statusOrder(a.status), bo = statusOrder(b.status);
        if (ao !== bo) return ao - bo;
        return (b.bond || 0) - (a.bond || 0);
      });
      sorted.forEach(c => grid.append(renderCard(c)));
      applyPendingHighlight();
    }

    let pendingHighlight = await Vault.get('fellowship-highlight');
    if (pendingHighlight) await Vault.remove('fellowship-highlight');
    function applyPendingHighlight() {
      if (!pendingHighlight) return;
      const card = grid.querySelector('[data-cid="' + pendingHighlight + '"]');
      if (card) {
        setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 30);
        card.classList.add('fellowship-card--highlight');
        setTimeout(() => card.classList.remove('fellowship-card--highlight'), 2400);
      }
      pendingHighlight = null;
    }

    function renderCard(c) {
      const arch = archetypeOf(c.archetype);
      const s = statusOf(c.status);
      const card = U.el('div', {
        class: 'fellowship-card fellowship-card--status-' + s.id +
          (s.id === 'fallen' || s.id === 'departed' ? ' fellowship-card--' + s.id : ''),
        style: { '--accent': arch.accent, '--accent-d': arch.accentD, '--accent-soft': arch.soft }
      });
      card.dataset.cid = c.id;

      // head
      card.append(U.el('div', { class: 'fellowship-card__head' }, [
        U.el('div', { class: 'fellowship-card__glyph' }, arch.glyph),
        U.el('div', { class: 'fellowship-card__title' }, [
          U.el('div', { class: 'fellowship-card__name' }, c.name),
          U.el('div', { class: 'fellowship-card__meta' }, [
            U.el('span', { class: 'fellowship-card__archetype' }, arch.name),
            U.el('span', { class: 'fellowship-card__status' }, s.name)
          ])
        ])
      ]));

      if (c.voice) card.append(U.el('div', { class: 'fellowship-card__voice' }, c.voice));

      // bond gauge
      const bond = U.el('div', { class: 'fellowship-card__bond' });
      bond.append(
        U.el('div', { class: 'fellowship-card__bond-label' }, 'Bond'),
        U.el('div', { class: 'fellowship-card__bond-value' },
          bondLabel(c.bond || 0) + ' (' + ((c.bond || 0) >= 0 ? '+' : '') + (c.bond || 0) + ')')
      );
      const bar = U.el('div', { class: 'gauge fellowship-card__bond-bar' });
      bar.append(U.el('div', { class: 'gauge__zero' }));
      bar.append(U.el('div', { class: 'gauge__notch', style: { left: (((c.bond || 0) + 5) / 15 * 100) + '%' } }));
      bond.append(bar);
      const bondCtrls = U.el('div', { class: 'fellowship-card__bond-controls' });
      const adjust = (delta) => async () => {
        c.bond = Math.max(-5, Math.min(10, (c.bond || 0) + delta));
        c.updated = Date.now();
        await save();
        render();
      };
      bondCtrls.append(
        U.el('button', { class: 'gauge-btn', onclick: adjust(-1), title: 'closer to estrangement' }, '\u2212'),
        U.el('button', { class: 'gauge-btn', onclick: adjust(1), title: 'closer to bond' }, '+')
      );
      bond.append(bondCtrls);
      card.append(bond);

      // quote display
      const isQuiet = !c.lastSpoken;
      const quote = U.el('div', { class: 'fellowship-card__quote' + (isQuiet ? ' fellowship-card__quote--empty' : '') });
      const quoteText = U.el('div', { class: 'fellowship-card__quote-text' },
        isQuiet ? 'silent' : c.lastSpoken);
      quote.append(quoteText);
      const qActs = U.el('div', { class: 'fellowship-card__quote-actions' });
      qActs.append(
        U.el('button', {
          class: 'fellowship-card__quote-act',
          title: 'Pin this line to the Almanac',
          disabled: isQuiet,
          onclick: async () => {
            if (!c.lastSpoken) return;
            const text = c.name.toUpperCase() + ' SAID: \u201C' + c.lastSpoken + '\u201D';
            const today = await Refs.pinToToday(text);
            U.toast('Pinned to ' + (await Refs.formatDate(today)));
          }
        }, '\u2767')
      );
      quote.append(qActs);
      card.append(quote);

      // SPEAK button
      const speakBtn = U.el('button', {
        class: 'fellowship-card__speak',
        disabled: s.id === 'fallen' || s.id === 'departed',
        onclick: async () => {
          const line = speakAs(c);
          await save();
          // animate the quote update without a full re-render
          const newQuote = U.el('div', { class: 'fellowship-card__quote' });
          const newText = U.el('div', { class: 'fellowship-card__quote-text' }, line);
          const newActs = U.el('div', { class: 'fellowship-card__quote-actions' }, [
            U.el('button', {
              class: 'fellowship-card__quote-act',
              title: 'Pin this line to the Almanac',
              onclick: async () => {
                const text = c.name.toUpperCase() + ' SAID: \u201C' + line + '\u201D';
                const today = await Refs.pinToToday(text);
                U.toast('Pinned to ' + (await Refs.formatDate(today)));
              }
            }, '\u2767')
          ]);
          newQuote.append(newText, newActs);
          quote.replaceWith(newQuote);
        }
      }, s.id === 'fallen' ? 'Silent' : (s.id === 'departed' ? 'Gone' : 'Speak'));
      card.append(speakBtn);

      // archive backlinks
      const backs = backlinksFor(c.name);
      if (backs.length) {
        const backWrap = U.el('div', { class: 'fellowship-card__backlinks' });
        backs.forEach(name => {
          backWrap.append(U.el('button', {
            class: 'tag',
            title: 'Open in the Archive',
            onclick: () => Refs.openArchiveEntry(name)
          }, name));
        });
        card.append(backWrap);
      }

      // actions
      const acts = U.el('div', { class: 'fellowship-card__actions' });
      acts.append(
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => openCompanionForm(c) }, 'Edit'),
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          if (!confirm('Release "' + c.name + '" from the Fellowship?')) return;
          companions = companions.filter(x => x.id !== c.id);
          await save();
          render();
        }}, 'Release')
      );
      card.append(acts);

      return card;
    }

    function openCompanionForm(existing) {
      const isEdit = !!existing;
      const draft = existing
        ? { ...existing, customLines: [...(existing.customLines || [])] }
        : { id: U.uid(), name: '', archetype: 'stoic', voice: '', bond: 1, status: 'hale',
            customLines: [], speakHistory: [], created: Date.now(), updated: Date.now() };

      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card', style: { maxWidth: '560px' } });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, isEdit ? 'Edit Companion' : 'Welcome a Companion')
      );
      const scroll = U.el('div', { class: 'modal-card__scroll' });

      const nameInput = U.el('input', { class: 'input', placeholder: 'Mira Greycloak, Brother Halric...', value: draft.name });
      const voiceInput = U.el('textarea', { class: 'textarea', placeholder: 'How they carry themselves. Accent, manner, appearance.', style: { minHeight: '70px' } });
      voiceInput.value = draft.voice || '';

      // archetype picker
      const archWrap = U.el('div', { class: 'archetype-picker' });
      ARCHETYPES.forEach(a => {
        const b = U.el('button', { onclick: () => {
          draft.archetype = a.id;
          archWrap.querySelectorAll('button').forEach(x => x.classList.toggle('is-selected', x.dataset.aid === a.id));
