    if (!state) state = rollTavern();

    const wrap = U.el('div', { class: 'tavern' });
    const sheet = U.el('div', { class: 'tavern__parchment' });
    sheet.append(
      U.el('div', { class: 'card__corner card__corner--tl' }),
      U.el('div', { class: 'card__corner card__corner--tr' }),
      U.el('div', { class: 'card__corner card__corner--bl' }),
      U.el('div', { class: 'card__corner card__corner--br' })
    );
    wrap.append(sheet);
    body.append(wrap);

    actions.append(
      U.el('button', { class: 'btn btn--primary', onclick: async () => { state = rollTavern(); await save(); render(); } }, 'New Tavern'),
      U.el('button', { class: 'btn btn--ghost', onclick: async () => {
        state.rumours.forEach(r => r.revealed = true);
        await save();
        render();
      }}, 'Reveal Rumours'),
      U.el('button', { class: 'btn btn--ghost', onclick: async () => {
        const text = formatTavernForPin(state);
        const today = await Refs.pinToToday(text, {
          module: 'tavern',
          label: state.name || 'the tavern'
        });
        U.toast('Pinned to ' + (await Refs.formatDate(today)));
      }}, 'Pin to Almanac')
    );

    async function save() { await Vault.set('tavern-current', state); }

    function rollName() {
      const r = Math.random();
      if (r < 0.7) return 'The ' + U.pick(banks.adj) + ' ' + U.pick(banks.noun);
      if (r < 0.85) {
        const a = U.pick(banks.noun), b = U.pick(banks.noun.filter(x => x !== a));
        return 'The ' + a + ' & ' + b;
      }
      const a = U.pick(banks.noun), b = U.pick(banks.noun.filter(x => x !== a));
      return a + ' and ' + b;
    }
    function rollTavern() {
      const foods = U.pickN(banks.foods, U.randInt(3, 4));
      const drinks = U.pickN(banks.drinks, U.randInt(2, 3));
      const surnames = ['Greyfell','Crouse','Vance','Mire','Ashwell','Halewood','Salt-river','Penance','Wintergrieve','Halloway','Beckford','Drummond','Stillwater','Carrow','al-Saif','of Brassgate','the Patient','ben-Ehud','of Five Wells','the Late','Cup-bearer','of the Three Falls'];
      const personName = () => U.pick(banks.keeperFirst) + ' ' + U.pick(surnames);
      return {
        name: rollName(),
        proprietor: {
          name: personName(),
          role: U.pick(banks.keeperRoles)
        },
        atmosphere: U.pick(banks.smells) + ' fills the front room. ' + U.pick(banks.details),
        menu: foods.concat(drinks).map(([item, n, unit]) => {
          const delta = U.randInt(-1, 2);
          const v = Math.max(1, n + delta);
          return { item, price: v + ' ' + unit };
        }),
        patrons: Array.from({ length: 3 }, () => ({
          name: personName(),
          role: U.pick(banks.patronRoles),
          doing: U.pick(banks.patronDoing)
        })),
        rumours: Array.from({ length: 3 }, () => {
          const r = Math.random();
          const truth = r < 0.30 ? 'true' : (r < 0.70 ? 'half' : 'false');
          return {
            text: U.pick(banks.rumourSubject) + ' ' + U.pick(banks.rumourClaim),
            truth,
            revealed: false
          };
        })
      };
    }

    function formatTavernForPin(s) {
      let out = 'TAVERN: ' + s.name + ', kept by ' + s.proprietor.role + '.\n';
      out += s.atmosphere + '\n';
      out += 'Patrons: ' + s.patrons.map(p => p.name + ' (' + p.role + ')').join('; ') + '.\n';
      out += 'Rumours: ' + s.rumours.map((r, i) => (i + 1) + '. ' + r.text + ' [' + (r.truth === 'half' ? 'half-true' : r.truth) + ']').join(' ');
      return out;
    }

    function render() {
      // clear sheet contents but keep corners
      sheet.innerHTML = '';
      sheet.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', { class: 'tavern__name' }, state.name),
        state.location ? U.el('div', { class: 'tavern__sub' }, U.el('em', {}, 'in ' + state.location)) : null,
        U.el('div', { class: 'tavern__sub' }, U.el('em', {}, 'kept by ' + state.proprietor.role)),
        U.el('div', { class: 'tavern__rule' }, '\u2767 \u2767 \u2767'),
        U.el('div', { class: 'tavern__atmosphere' }, state.atmosphere)
      );

      // Menu
      const menuSec = U.el('div', { class: 'tavern__section' }, [
        U.el('h3', { class: 'tavern__heading' }, 'Bill of Fare'),
        (() => {
          const ul = U.el('ul', { class: 'tavern__menu' });
          state.menu.forEach(m => {
            ul.append(U.el('li', {}, [
              U.el('span', { class: 'tavern__menu-item' }, m.item),
              U.el('span', { class: 'tavern__menu-price' }, m.price)
            ]));
          });
          return ul;
        })()
      ]);
      sheet.append(menuSec);

      // Patrons
      const patSec = U.el('div', { class: 'tavern__section' }, [
        U.el('h3', { class: 'tavern__heading' }, 'Common Room'),
        (() => {
          const wrap = U.el('div', { class: 'tavern__patrons' });
          state.patrons.forEach(p => {
            const row = U.el('div', { class: 'tavern__patron' });
            const main = U.el('div', { class: 'tavern__patron-text' }, [
              U.el('strong', {}, p.name),
              document.createTextNode(', ' + p.role + '. '),
              U.el('em', {}, p.doing)
            ]);
            const recruit = U.el('button', {
              class: 'tavern__patron-recruit',
              title: 'Add to the Hall of Faces roster',
              onclick: async () => {
                const roster = (await Vault.get('faces-roster')) || [];
                if (roster.some(n => n.name === p.name)) {
                  U.toast(p.name + ' is already in the roster');
                  return;
                }
                const cultures = ['northron', 'rivenmark', 'southern'];
                const npc = {
                  id: U.uid(),
                  name: p.name,
                  culture: U.pick(cultures),
                  role: p.role,
                  voice: '',
                  want: '',
                  mannerism: p.doing,
                  physical: '',
                  secret: '',
                  created: Date.now(),
                  location: state.name || 'a tavern',
                  recruitedFrom: state.name || 'a tavern'
                };
                roster.push(npc);
                await Vault.set('faces-roster', roster.slice(0, 200));
                recruit.disabled = true;
                recruit.textContent = 'Recruited';
                U.toast(p.name + ' added to the roster');
              }
            }, 'Recruit');
            row.append(main, recruit);
            wrap.append(row);
          });
          return wrap;
        })()
      ]);
      sheet.append(patSec);

      // Rumours
      const rumSec = U.el('div', { class: 'tavern__section' }, [
        U.el('h3', { class: 'tavern__heading' }, 'Whispered Over Cups'),
        (() => {
          const ol = U.el('ol', { class: 'tavern__rumours' });
          state.rumours.forEach((r, i) => {
            const li = U.el('li', { class: 'tavern__rumour' });
            li.append(U.el('span', { class: 'tavern__rumour-text' }, r.text));
            if (!r.revealed) {
              li.append(U.el('button', { class: 'tavern__rumour-reveal', onclick: async () => {
                state.rumours[i].revealed = true;
                await save();
                render();
              }}, 'Reveal'));
            } else {
              const label = r.truth === 'true' ? 'True' : (r.truth === 'half' ? 'Half-true' : 'False');
              li.append(U.el('span', { class: 'tavern__truth tavern__truth--' + (r.truth === 'half' ? 'half' : r.truth) }, label));
            }
            // small pin icon: pins this single rumour to today's day note
            li.append(U.el('button', {
              class: 'tavern__rumour-pin',
              title: 'Pin this rumour to the Almanac',
              onclick: async () => {
                const truthTag = r.revealed
                  ? ' [' + (r.truth === 'half' ? 'half-true' : r.truth) + ']'
                  : ' [unverified]';
                const text = 'RUMOUR at ' + (state.name || 'the tavern') + ': ' + r.text + truthTag;
                const today = await Refs.pinToToday(text, {
                  module: 'tavern',
                  label: 'rumour at ' + (state.name || 'the tavern')
                });
                U.toast('Pinned to ' + (await Refs.formatDate(today)));
              }
            }, '\u2767'));
            ol.append(li);
          });
          return ol;
        })()
      ]);
      sheet.append(rumSec);
    }

    render();
  }
});

/* =========================================================================
   MODULE: FACTION LEDGER
   ========================================================================= */
Keep.register({
  id: 'factions',
  name: 'Faction Ledger',
  category: 'workshop',
  glyph: 'g-standard',
  tagline: 'Who stands with whom. Who is owed. Who is owed pain.',
  sub: 'Note the powers your party crosses. Gauge their stance, and theirs to each other.',

  async mount(body, actions) {
    const SIGILS = ['\u2694','\u269C','\u26B0','\u271D','\u2625','\u2628','\u2693','\u2696','\u269D','\u2734','\u2735','\u2736','\u2766','\u2767','\u269A','\u2698','\u26A1','\u2620','\u2604','\u2616','\u2617','\u26AB','\u25C6','\u25D8'];
    const COLORS = U.PALETTE;

    function standingLabel(v) {
      v = Math.max(-10, Math.min(10, v|0));
      if (v <= -8) return 'Blood Enemy';
      if (v <= -5) return 'Hostile';
      if (v <= -2) return 'Suspicious';
      if (v <= 1)  return 'Neutral';
      if (v <= 4)  return 'Cordial';
      if (v <= 7)  return 'Allied';
      return 'Sworn';
    }
    function colorFor(id) { return U.colorFromPalette(id); }

    let factions = await Vault.get('factions');
    if (!factions || !factions.length) {
      factions = [
        { id: U.uid(), name: 'House Ashlow', sigil: '\u269C', color: 'wine',
          motto: 'By the cleft, we stand.',
          goal: 'Hold the Greyfern Pass against any claimant from the Hollow Court.',
          party: 2, notes: '', relations: {} },
        { id: U.uid(), name: 'The Greyfern Order', sigil: '\u271D', color: 'forest',
          motto: 'Watch the pass. Always.',
          goal: 'Tend the road and the standing stones, and never speak of what they mean.',
          party: 0, notes: '', relations: {} }
      ];
      // mutual suspicion between seed factions
      factions[0].relations[factions[1].id] = { value: -3, note: 'They do not trust the order\u2019s silences.' };
      factions[1].relations[factions[0].id] = { value: -3, note: 'They mistrust any house that takes its name from a cleft of land.' };
      await Vault.set('factions', factions);
    }

    // Atlas (or another module) can drop a factions-poi-hint with
    // { poiName, poiType, factionName, region, biome } to add a
    // freshly-seeded faction tied to a place. One-shot: read, delete,
    // append.
    const factionHint = await Vault.get('factions-poi-hint');
    if (factionHint && factionHint.factionName) {
      await Vault.remove('factions-poi-hint');
      const newFaction = {
        id: U.uid(),
        name: factionHint.factionName,
        sigil: SIGILS[Math.floor(Math.random() * SIGILS.length)],
        color: factionHint.suggestedColor || 'wine',
        motto: '',
        goal: 'Their grip on ' + factionHint.poiName + ' (' + factionHint.region + ').',
        party: 0,
        notes: '',
        relations: {}
      };
      // If the hint included POI references, stamp origin so the
      // faction card can jump back to the map.
      if (factionHint.mapId && factionHint.poiId) {
        newFaction.origin = {
          module: 'atlas',
          mapId: factionHint.mapId,
          poiId: factionHint.poiId,
          label: factionHint.poiName + (factionHint.poiType ? ' \u00b7 ' + factionHint.poiType : '')
        };
      }
      factions.push(newFaction);
      await Vault.set('factions', factions);
      U.toast('Faction added: ' + factionHint.factionName);
    }

    const head = U.el('div', { class: 'factions__head' });
    const grid = U.el('div', { class: 'factions__grid' });
    const matrixWrap = U.el('div', { class: 'matrix-wrap', style: { display: 'none' } });
    body.append(head, grid, matrixWrap);

    let view = (await Vault.get('factions-view')) || 'cards';
    let pendingExpand = await Vault.get('factions-expand');
    if (pendingExpand) await Vault.remove('factions-expand');
    if (pendingExpand) view = 'cards'; // expand only makes sense in cards mode

    // cross-module data cached at mount time for backlinks and threat counts
    let archiveEntries = await Refs.archiveEntries();
    let threatsLinked = (await Vault.get('threats')) || [];
    function backlinksFor(name) {
      const out = [];
      const safe = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp('\\[\\[' + safe + '\\]\\]');
      for (const [k, e] of Object.entries(archiveEntries)) {
        if (re.test(e.body || '')) out.push(k);
      }
      return out;
    }

    actions.append(
      U.el('button', { class: 'btn btn--primary', onclick: () => openFactionForm() }, 'Found a Faction')
    );

    async function save() { await Vault.set('factions', factions); }
    async function saveView() { await Vault.set('factions-view', view); }

    function applyPendingExpand() {
      if (!pendingExpand) return;
      const card = grid.querySelector('[data-fid="' + pendingExpand + '"]');
      if (card) {
        card.classList.add('faction-card--open');
        setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 30);
      }
      pendingExpand = null;
    }

    function render() {
      // hide any open matrix editor
      document.querySelectorAll('.matrix__editor').forEach(e => e.remove());

      head.innerHTML = '';
      head.append(
        U.el('div', { class: 'factions__count' },
          factions.length + ' faction' + (factions.length === 1 ? '' : 's') + ' tracked'),
        U.el('div', { class: 'factions__toggle' }, [
          U.el('button', { class: 'factions__toggle-btn' + (view === 'cards' ? ' is-active' : ''),
            onclick: async () => { view = 'cards'; await saveView(); render(); } }, 'Cards'),
          U.el('button', { class: 'factions__toggle-btn' + (view === 'matrix' ? ' is-active' : ''),
            onclick: async () => { view = 'matrix'; await saveView(); render(); } }, 'Matrix')
        ]),
        U.el('div', {}, [
          U.el('button', { class: 'btn btn--small', onclick: () => openFactionForm() }, '+ Found a Faction')
        ])
      );

      if (view === 'matrix' && factions.length >= 2) {
        grid.style.display = 'none';
        matrixWrap.style.display = '';
        renderMatrix();
      } else {
        grid.style.display = '';
        matrixWrap.style.display = 'none';
        renderCards();
        applyPendingExpand();
      }
    }

    function renderCards() {
      grid.innerHTML = '';
      if (!factions.length) {
        grid.append(U.el('div', { class: 'empty' }, 'No factions yet. Found one above.'));
        return;
      }
      factions.forEach(f => grid.append(renderCard(f)));
    }

    function relColor(v) {
      if (v < 0) return `rgba(var(--rel-neg-rgb), ${(-v / 10) * 0.45 + 0.05})`;
      if (v > 0) return `rgba(var(--rel-pos-rgb), ${(v / 10) * 0.45 + 0.05})`;
      return 'rgba(var(--rel-zero-rgb), 0.16)';
    }

    function renderMatrix() {
      matrixWrap.innerHTML = '';
      if (factions.length < 2) {
        matrixWrap.append(U.el('div', { class: 'empty' }, 'Found at least two factions to see the matrix.'));
        return;
      }
      const table = U.el('table', { class: 'matrix' });
      const thead = U.el('thead');
      const headRow = U.el('tr');
      headRow.append(U.el('th', { class: 'matrix__corner' }, ''));
      factions.forEach(c => {
        const cc = colorFor(c.color);
        headRow.append(U.el('th', {
          class: 'matrix__col-head',
          style: { '--accent': cc.var },
          title: c.name
        }, [
          U.el('span', { class: 'matrix__col-head-sigil' }, c.sigil || '?'),
          U.el('span', {}, c.name.slice(0, 3))
        ]));
      });
      thead.append(headRow);
      table.append(thead);

      const tbody = U.el('tbody');
      factions.forEach(rowF => {
        const rc = colorFor(rowF.color);
        const tr = U.el('tr');
        tr.append(U.el('th', { class: 'matrix__row-head', style: { '--accent': rc.var } }, [
          U.el('span', { class: 'matrix__row-head-sigil' }, rowF.sigil || '?'),
          document.createTextNode(rowF.name)
        ]));
        factions.forEach(colF => {
          if (rowF.id === colF.id) {
            tr.append(U.el('td', { class: 'matrix__cell matrix__cell--self' }, 'self'));
            return;
          }
          const rel = (rowF.relations && rowF.relations[colF.id]) ? rowF.relations[colF.id] : null;
          const v = rel ? rel.value : 0;
          const cell = U.el('td', {
            class: 'matrix__cell',
            style: { background: relColor(v) },
            title: rowF.name + ' \u2192 ' + colF.name + ': ' + standingLabel(v) + ' (' + (v >= 0 ? '+' : '') + v + ')'
          }, (v >= 0 ? '+' : '') + v);
          cell.dataset.from = rowF.id;
          cell.dataset.to = colF.id;
          cell.addEventListener('click', (e) => {
            e.stopPropagation();
            openMatrixEditor(rowF, colF, cell);
          });
          tr.append(cell);
        });
        tbody.append(tr);
      });
      table.append(tbody);
      matrixWrap.append(table);
    }

    function openMatrixEditor(fromF, toF, anchorEl) {
      document.querySelectorAll('.matrix__editor').forEach(e => e.remove());
      const editor = U.el('div', { class: 'matrix__editor' });

      const labelEl = U.el('div', { class: 'matrix__editor-label' });
      function syncLabel() {
        const v = (fromF.relations && fromF.relations[toF.id]) ? fromF.relations[toF.id].value : 0;
        labelEl.textContent = standingLabel(v) + ' (' + (v >= 0 ? '+' : '') + v + ')';
      }
      const adj = (delta) => async () => {
        if (!fromF.relations) fromF.relations = {};
        if (!fromF.relations[toF.id]) fromF.relations[toF.id] = { value: 0, note: '' };
        fromF.relations[toF.id].value = Math.max(-10, Math.min(10, fromF.relations[toF.id].value + delta));
        fromF.updated = Date.now();
        await save();
        renderMatrix();
        syncLabel();
        // re-append editor (matrix rebuild detached anchorEl's children but editor lives on body)
      };

      editor.append(
        U.el('div', { class: 'matrix__editor-title' }, fromF.name + ' \u2192 ' + toF.name),
        labelEl,
        U.el('div', { class: 'matrix__editor-buttons' }, [
          U.el('button', { class: 'gauge-btn', onclick: adj(-5) }, '\u22125'),
          U.el('button', { class: 'gauge-btn', onclick: adj(-1) }, '\u22121'),
          U.el('button', { class: 'gauge-btn', onclick: adj(1) }, '+1'),
          U.el('button', { class: 'gauge-btn', onclick: adj(5) }, '+5')
        ])
      );
      syncLabel();
      document.body.append(editor);

      // position to the right of the anchor cell, flip left if no room
      const r = anchorEl.getBoundingClientRect();
      const eh = editor.offsetHeight, ew = editor.offsetWidth;
      let left = r.right + 8;
      if (left + ew > window.innerWidth - 8) left = Math.max(8, r.left - ew - 8);
      let top = r.top;
      if (top + eh > window.innerHeight - 8) top = Math.max(8, window.innerHeight - eh - 8);
      editor.style.left = left + 'px';
      editor.style.top = top + 'px';

      // close on outside click
      setTimeout(() => {
        const close = (e) => {
          if (editor.contains(e.target)) return;
          if (e.target.classList && e.target.classList.contains('matrix__cell')) return;
          editor.remove();
          document.removeEventListener('click', close);
        };
        document.addEventListener('click', close);
      }, 50);
    }

    function renderCard(f) {
      const c = colorFor(f.color);
      const card = U.el('div', { class: 'faction-card', style: { '--accent': c.var, '--accent-soft': c.soft } });
      card.dataset.fid = f.id;

      card.append(U.el('div', { class: 'faction-card__ribbon' }));

      const top = U.el('div', { class: 'faction-card__top' });
      top.append(
        U.el('div', { class: 'faction-card__sigil' }, f.sigil || '?'),
        U.el('div', {}, [
          U.el('div', { class: 'faction-card__name' }, f.name),
          U.el('div', { class: 'faction-card__motto' }, f.motto || '\u00A0')
        ]),
        U.el('button', { class: 'faction-card__expand', title: 'expand', onclick: () => { card.classList.toggle('faction-card--open'); } }, '\u25BE')
      );
      card.append(top);

      // Origin chip: when this faction was seeded by another room
      // (currently Atlas only), surface a Jump-to-source chip so the
      // ledger remembers where the faction came from.
      if (f.origin && f.origin.module) {
        const o = f.origin;
        const moduleLabel = o.module.charAt(0).toUpperCase() + o.module.slice(1);
        const chipRow = U.el('div', { class: 'faction-card__origin' });
        chipRow.append(U.el('button', {
          class: 'tag faction-card__origin-chip',
          title: 'Jump to ' + moduleLabel + (o.label ? ' \u00b7 ' + o.label : ''),
          onclick: () => Refs.jumpToOrigin(o)
        }, '\u21AA  ' + moduleLabel + (o.label ? ' \u00b7 ' + o.label : '')));
        card.append(chipRow);
      }

      const gauge = U.el('div', { class: 'faction-card__gauge' });
      gauge.append(
        U.el('div', { class: 'faction-card__gauge-label' }, 'Party Standing'),
        U.el('div', { class: 'faction-card__gauge-value' }, standingLabel(f.party) + ' (' + (f.party >= 0 ? '+' : '') + f.party + ')')
      );
      const bar = U.el('div', { class: 'gauge' });
      bar.append(U.el('div', { class: 'gauge__zero' }));
      bar.append(U.el('div', { class: 'gauge__notch', style: { left: ((f.party + 10) / 20 * 100) + '%' } }));
      gauge.append(bar);
      const controls = U.el('div', { class: 'faction-card__gauge-controls' });
      const adj = (delta) => async () => {
        f.party = Math.max(-10, Math.min(10, (f.party || 0) + delta));
        f.updated = Date.now();
        await save();
        render();
        // re-open this card if it was open
        const same = grid.querySelector(`[data-fid="${f.id}"]`);
        if (same && card.classList.contains('faction-card--open')) same.classList.add('faction-card--open');
      };
      controls.append(
        U.el('button', { class: 'gauge-btn', onclick: adj(-5), title: 'much worse' }, '\u22125'),
        U.el('button', { class: 'gauge-btn', onclick: adj(-1), title: 'worse' }, '\u22121'),
        U.el('div', { class: 'gauge-tick' }, standingLabel(f.party)),
        U.el('button', { class: 'gauge-btn', onclick: adj(1), title: 'better' }, '+1'),
        U.el('button', { class: 'gauge-btn', onclick: adj(5), title: 'much better' }, '+5')
      );
      gauge.append(controls);
      card.append(gauge);

      // threat count badge (visible without expanding)
      const linkedThreats = threatsLinked.filter(t => t.factionId === f.id);
      if (linkedThreats.length) {
        const activeCount = linkedThreats.filter(t => t.filled < t.total).length;
        const allCount = linkedThreats.length;
        const meta = U.el('div', { class: 'faction-card__threats' });
        const summary = activeCount === allCount
          ? activeCount + ' clock' + (activeCount === 1 ? '' : 's') + ' ticking'
          : activeCount + ' of ' + allCount + ' clocks ticking';
        const chip = U.el('button', {
          class: 'faction-card__threat-chip',
          title: 'Open Threats and review the linked clocks',
          onclick: async () => {
            // navigate to threats; if there's a particular clock, highlight the first active one
            const first = linkedThreats.find(t => t.filled < t.total) || linkedThreats[0];
            if (first) await Vault.set('threats-highlight', first.id);
            await Keep.mount('threats');
          }
        }, [
          U.el('span', { class: 'faction-card__threat-icon' }, '\u29D7'),
          U.el('span', {}, summary)
        ]);
        meta.append(chip);
        card.append(meta);
      }

      const bodyEl = U.el('div', { class: 'faction-card__body' });

      if (f.goal) {
        bodyEl.append(U.el('div', { class: 'faction-card__field' }, [
          U.el('div', { class: 'label' }, 'Goal'),
          U.el('div', { class: 'faction-card__goal' }, f.goal)
        ]));
      }

      const notesField = U.el('div', { class: 'faction-card__field' });
      notesField.append(U.el('div', { class: 'label' }, 'Notes'));
      const notesTa = U.el('textarea', { class: 'textarea faction-card__notes-input', placeholder: 'Internal politics, recent moves, debts, scars...' });
      notesTa.value = f.notes || '';
      let savingTimeout;
      notesTa.addEventListener('input', () => {
        f.notes = notesTa.value;
        clearTimeout(savingTimeout);
        savingTimeout = setTimeout(save, 350);
      });
      notesField.append(notesTa);
      bodyEl.append(notesField);

      // relations
      const others = factions.filter(x => x.id !== f.id);
      if (others.length) {
        const relField = U.el('div', { class: 'faction-card__field' });
        relField.append(U.el('div', { class: 'label' }, 'Stance Toward Others'));
        const relList = U.el('div', { class: 'faction-card__relations' });
        others.forEach(o => {
          const rel = f.relations && f.relations[o.id] ? f.relations[o.id] : { value: 0, note: '' };
          const reverseRel = (o.relations && o.relations[f.id]) ? o.relations[f.id] : null;
          const oc = colorFor(o.color);
          const row = U.el('div', { class: 'faction-relation', style: { '--accent2': oc.var } });
          row.append(
            U.el('div', { class: 'faction-relation__sigil' }, o.sigil || '?'),
            U.el('div', { class: 'faction-relation__name' }, o.name),
            U.el('div', { class: 'faction-relation__label-stack' }, [
              U.el('div', { class: 'primary' }, standingLabel(rel.value) + ' (' + (rel.value >= 0 ? '+' : '') + rel.value + ')'),
              U.el('div', { class: 'reciprocal' }, reverseRel ? 'they: ' + standingLabel(reverseRel.value).toLowerCase() : 'they: not yet noted')
            ]),
            U.el('button', { class: 'gauge-btn', onclick: async () => {
              if (!f.relations) f.relations = {};
              if (!f.relations[o.id]) f.relations[o.id] = { value: 0, note: '' };
              f.relations[o.id].value = Math.max(-10, f.relations[o.id].value - 1);
              f.updated = Date.now();
              await save(); render();
              const same = grid.querySelector(`[data-fid="${f.id}"]`);
              if (same) same.classList.add('faction-card--open');
            }}, '\u2212'),
            U.el('button', { class: 'gauge-btn', onclick: async () => {
              if (!f.relations) f.relations = {};
              if (!f.relations[o.id]) f.relations[o.id] = { value: 0, note: '' };
              f.relations[o.id].value = Math.min(10, f.relations[o.id].value + 1);
              f.updated = Date.now();
              await save(); render();
              const same = grid.querySelector(`[data-fid="${f.id}"]`);
              if (same) same.classList.add('faction-card--open');
            }}, '+')
          );
          relList.append(row);
        });
        relField.append(relList);
        bodyEl.append(relField);
      }

      // Archive backlinks: entries that mention this faction with [[wikilink]]
      const archBacks = backlinksFor(f.name);
      if (archBacks.length) {
        const backField = U.el('div', { class: 'faction-card__field' });
        backField.append(U.el('div', { class: 'label' }, 'Mentioned In'));
        const list = U.el('div', { class: 'faction-card__backlinks' });
        archBacks.forEach(name => {
          list.append(U.el('button', {
            class: 'tag faction-card__backlink',
            title: 'Open in the Archive',
            onclick: () => Refs.openArchiveEntry(name)
          }, name));
        });
        backField.append(list);
        bodyEl.append(backField);
      }

      const cardActions = U.el('div', { class: 'faction-card__actions' });
      cardActions.append(
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: () => openFactionForm(f) }, 'Edit'),
        U.el('button', { class: 'btn btn--small btn--ghost', onclick: async () => {
          if (!confirm(`Retire "${f.name}"? Relations to and from this faction will be lost.`)) return;
          factions = factions.filter(x => x.id !== f.id);
          // clean relations on others
          for (const x of factions) { if (x.relations && x.relations[f.id]) delete x.relations[f.id]; }
          await save();
          render();
        }}, 'Retire')
      );
      bodyEl.append(cardActions);

      card.append(bodyEl);
      return card;
    }

    function openFactionForm(existing) {
      const isEdit = !!existing;
      const draft = existing ? { ...existing, relations: { ...(existing.relations || {}) } }
                             : { id: U.uid(), name: '', sigil: '\u2694', color: 'wine', motto: '', goal: '', party: 0, notes: '', relations: {} };

      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card', style: { maxWidth: '520px' } });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, isEdit ? 'Edit ' + existing.name : 'Found a Faction')
      );
      const scroll = U.el('div', { class: 'modal-card__scroll' });

      const nameInput = U.el('input', { class: 'input', placeholder: 'House Ashlow, Greyfern Order, etc.', value: draft.name });
      const mottoInput = U.el('input', { class: 'input', placeholder: 'Optional motto', value: draft.motto });
      const goalInput = U.el('textarea', { class: 'textarea', placeholder: 'What does this faction want?', style: { minHeight: '80px' } });
      goalInput.value = draft.goal;

      // sigil picker
      const sigilWrap = U.el('div', { class: 'sigil-picker' });
      SIGILS.forEach(s => {
        const b = U.el('button', { onclick: () => {
          draft.sigil = s;
          sigilWrap.querySelectorAll('button').forEach(x => x.classList.toggle('is-selected', x.textContent === s));
        }}, s);
        if (s === draft.sigil) b.classList.add('is-selected');
        sigilWrap.append(b);
      });

      // color picker
      const colorWrap = U.el('div', { class: 'color-picker' });
      COLORS.forEach(c => {
        const sw = U.el('button', { class: 'color-swatch', style: { background: c.hex }, onclick: () => {
          draft.color = c.id;
          colorWrap.querySelectorAll('.color-swatch').forEach(x => x.classList.toggle('is-selected', x.dataset.cid === c.id));
        }, title: c.id });
        sw.dataset.cid = c.id;
        if (c.id === draft.color) sw.classList.add('is-selected');
        colorWrap.append(sw);
      });

      scroll.append(
        U.el('div', { class: 'faction-form-grid' }, [
          U.el('div', { class: 'full' }, [U.el('div', { class: 'label' }, 'Name'), nameInput]),
          U.el('div', { class: 'full' }, [U.el('div', { class: 'label' }, 'Motto'), mottoInput]),
          U.el('div', { class: 'full' }, [U.el('div', { class: 'label' }, 'Goal'), goalInput]),
          U.el('div', { class: 'full' }, [U.el('div', { class: 'label' }, 'Sigil'), sigilWrap]),
          U.el('div', { class: 'full' }, [U.el('div', { class: 'label' }, 'Colour'), colorWrap])
        ])
      );
      dialog.append(scroll);

      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--ghost', onclick: () => ov.remove() }, 'Cancel'),
        U.el('button', { class: 'btn btn--primary', onclick: async () => {
          if (!nameInput.value.trim()) { nameInput.focus(); return; }
          draft.name = nameInput.value.trim();
          draft.motto = mottoInput.value.trim();
          draft.goal = goalInput.value.trim();
          draft.updated = Date.now();
          if (isEdit) {
            const idx = factions.findIndex(x => x.id === existing.id);
            if (idx >= 0) factions[idx] = draft;
          } else {
            factions.push(draft);
          }
          await save();
          ov.remove();
          render();
        }}, isEdit ? 'Save' : 'Found')
      ]));
      ov.append(dialog);
      document.body.append(ov);
      setTimeout(() => nameInput.focus(), 50);
    }

    render();
  },

  unmount() {
    document.querySelectorAll('.matrix__editor').forEach(e => e.remove());
  }
});

/* =========================================================================
   MODULE: THE LISTS (Initiative Tracker)
   ========================================================================= */
Keep.register({
  id: 'lists',
  name: 'The Lists',
  category: 'table',
  glyph: 'g-sword',
  tagline: 'Initiative, conditions, the press of melee.',
  sub: 'Order of arms. Track wounds. Mark the turning of the round.',

  async mount(body, actions) {
    let state = await Vault.get('lists-state') || { round: 1, turn: 0, combatants: [], big: false };
    let dragSourceIdx = null;

    const head = U.el('div', { class: 'lists__head' });
    const add = U.el('div', { class: 'lists__add' });
    const roster = U.el('div', { class: 'lists__roster' });
    const wrap = U.el('div', { class: 'lists' + (state.big ? ' lists--big' : '') });
    wrap.append(head, add, roster);
    body.append(wrap);

    actions.append(
      U.el('button', { class: 'btn btn--ghost', onclick: () => openRosterPicker() }, 'From Roster'),
      U.el('button', { class: 'btn btn--ghost', onclick: () => { state.big = !state.big; save(); render(); } }, 'Big Mode'),
      U.el('button', { class: 'btn btn--ghost', onclick: () => { state.combatants = []; state.round = 1; state.turn = 0; save(); render(); } }, 'Clear'),
      U.el('button', { class: 'btn btn--primary', onclick: () => nextTurn() }, 'Next Turn')
    );

    const condTypes = ['Prone','Bleed','Stun','Hex','Burn','Mark','Shield','Hidden'];

    function render() {
      wrap.classList.toggle('lists--big', state.big);
      head.innerHTML = '';
      head.append(U.el('div', { class: 'lists__round' }, [
        document.createTextNode('Round ' + state.round),
        U.el('small', {}, state.combatants.length ? `it is the turn of ${(state.combatants[state.turn % state.combatants.length] || {}).name || '?'}` : 'no combatants on the field')
      ]));

      add.innerHTML = '';
      const nameI = U.el('input', { class: 'input', placeholder: 'Name' });
      const initI = U.el('input', { class: 'input', placeholder: 'Init', type: 'number' });
      const hpI = U.el('input', { class: 'input', placeholder: 'HP', type: 'number' });
      const addBtn = U.el('button', { class: 'btn btn--primary', onclick: () => {
        if (!nameI.value) return;
        const newC = {
          id: U.uid(),
          name: nameI.value,
          init: +initI.value || U.randInt(1, 20),
          hp: +hpI.value || 10,
          maxHp: +hpI.value || 10,
          conds: [],
          down: false
        };
        // insert at position matching init, preserving manual reorder of others
        const at = state.combatants.findIndex(c => c.init < newC.init);
        if (at < 0) state.combatants.push(newC);
        else state.combatants.splice(at, 0, newC);
        nameI.value = ''; initI.value = ''; hpI.value = '';
        save(); render();
      }}, 'Add');
      add.append(nameI, initI, hpI, addBtn);

      roster.innerHTML = '';
      state.combatants.forEach((c, idx) => {
        const active = idx === (state.turn % state.combatants.length);
        const critical = !c.down && c.maxHp > 0 && (c.hp / c.maxHp) <= 0.25;
        const row = U.el('div', { class: 'lists__row' + (active ? ' lists__row--active' : '') + (c.down ? ' lists__row--down' : '') + (critical ? ' lists__row--critical' : '') });

        // drag handle (six-dot grip): initiates row drag on grab
        const gripSvg = `<svg viewBox="0 0 8 14" xmlns="http://www.w3.org/2000/svg"><circle cx="2" cy="2" r="0.9"/><circle cx="6" cy="2" r="0.9"/><circle cx="2" cy="7" r="0.9"/><circle cx="6" cy="7" r="0.9"/><circle cx="2" cy="12" r="0.9"/><circle cx="6" cy="12" r="0.9"/></svg>`;
        const grip = U.el('div', { class: 'lists__grip', draggable: 'true', title: 'drag to reorder', html: gripSvg });
        grip.addEventListener('dragstart', (e) => {
          dragSourceIdx = idx;
          row.classList.add('lists__row--dragging');
          if (e.dataTransfer) {
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', String(idx));
          }
        });
        row.addEventListener('dragover', (e) => {
          if (dragSourceIdx == null) return;
          e.preventDefault();
          if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
          const r = row.getBoundingClientRect();
          const top = (e.clientY - r.top) < r.height / 2;
          row.classList.toggle('lists__row--drop-top', top);
          row.classList.toggle('lists__row--drop-bot', !top);
        });
        row.addEventListener('dragleave', () => {
          row.classList.remove('lists__row--drop-top', 'lists__row--drop-bot');
        });
        row.addEventListener('drop', (e) => {
          e.preventDefault();
          const from = dragSourceIdx;
          dragSourceIdx = null;
          if (from == null || from === idx) {
            row.classList.remove('lists__row--drop-top', 'lists__row--drop-bot');
            return;
          }
          const r = row.getBoundingClientRect();
          const top = (e.clientY - r.top) < r.height / 2;
          let to = top ? idx : idx + 1;
          const [moved] = state.combatants.splice(from, 1);
          if (from < to) to--;
          state.combatants.splice(to, 0, moved);
          save(); render();
        });
        grip.addEventListener('dragend', () => {
          dragSourceIdx = null;
          document.querySelectorAll('.lists__row').forEach(r => {
            r.classList.remove('lists__row--dragging', 'lists__row--drop-top', 'lists__row--drop-bot');
          });
        });

        const init = U.el('div', { class: 'lists__init' }, String(c.init));
        const nameField = U.el('div', { class: 'lists__name' }, [
          (() => {
            const inp = U.el('input', { value: c.name });
            inp.addEventListener('input', () => { c.name = inp.value; save(); });
            return inp;
          })()
        ]);

        const conds = U.el('div', { class: 'lists__conds' });
        c.conds.forEach(cd => {
          const cn = U.el('span', { class: 'lists__cond', onclick: () => { c.conds = c.conds.filter(x => x !== cd); save(); render(); } }, cd);
          conds.append(cn);
        });
        const condAdd = U.el('select', { class: 'select', style: { padding: '0.15rem', fontSize: '0.7rem' } });
        condAdd.append(U.el('option', { value: '' }, '+ cond'));
        condTypes.filter(ct => !c.conds.includes(ct)).forEach(ct => condAdd.append(U.el('option', { value: ct }, ct)));
        condAdd.addEventListener('change', () => { if (condAdd.value) { c.conds.push(condAdd.value); save(); render(); } });
        conds.append(condAdd);

        const hpWrap = U.el('div', { class: 'lists__hp' });
        const hpInput = U.el('input', { value: c.hp });
        hpInput.addEventListener('change', () => { c.hp = +hpInput.value || 0; c.down = c.hp <= 0; save(); render(); });
        hpWrap.append(hpInput, document.createTextNode('/' + c.maxHp));

        const acts = U.el('div', { class: 'lists__actions' });
        const dmgBtn = U.el('button', { class: 'lists__icon-btn', title: 'damage', onclick: () => {
          const v = prompt('Damage (negative to heal)'); if (v == null) return;
          c.hp = Math.max(0, Math.min(c.maxHp, c.hp - (+v || 0)));
          c.down = c.hp <= 0; save(); render();
        }}, '\u2694');
        const delBtn = U.el('button', { class: 'lists__icon-btn', title: 'remove', onclick: () => {
          state.combatants = state.combatants.filter(x => x.id !== c.id); save(); render();
        }}, '\u2717');
        acts.append(dmgBtn, delBtn);

        row.append(grip, init, nameField, conds, hpWrap, acts);
        roster.append(row);
      });

      if (!state.combatants.length) roster.append(U.el('div', { class: 'empty' }, [
        U.el('div', { class: 'empty__ornament' }, '\u2694'),
        U.el('div', {}, 'The field is empty. Add combatants above.')
      ]));
    }

    function nextTurn() {
      if (!state.combatants.length) return;
      state.turn++;
      if (state.turn >= state.combatants.length) { state.turn = 0; state.round++; }
      save(); render();
    }

    async function openRosterPicker() {
      const roster = await Refs.npcRoster();
      const ov = U.el('div', { class: 'modal-overlay' });
      const dialog = U.el('div', { class: 'modal-card' });
      dialog.append(
        U.el('div', { class: 'card__corner card__corner--tl' }),
        U.el('div', { class: 'card__corner card__corner--tr' }),
        U.el('div', { class: 'card__corner card__corner--bl' }),
        U.el('div', { class: 'card__corner card__corner--br' }),
        U.el('h2', {}, 'Call from the Roster')
      );
      const scroll = U.el('div', { class: 'modal-card__scroll' });
      if (!roster.length) {
        scroll.append(U.el('div', { class: 'empty' }, 'The roster is empty. Conjure NPCs in the Hall of Faces first.'));
      } else {
        // exclude NPCs already on the field by npcId
        const onField = new Set(state.combatants.filter(c => c.npcId).map(c => c.npcId));
        roster.forEach(npc => {
          const pick = U.el('button', {
            class: 'roster-pick',
            onclick: () => {
              const newC = {
                id: U.uid(),
                npcId: npc.id,
                name: npc.name,
                init: U.randInt(1, 20),
                hp: 10,
                maxHp: 10,
                conds: [],
                down: false
              };
              const at = state.combatants.findIndex(c => c.init < newC.init);
              if (at < 0) state.combatants.push(newC);
              else state.combatants.splice(at, 0, newC);
              save(); render();
              pick.style.opacity = '0.45';
              pick.disabled = true;
            }
          }, [
            U.el('span', {}, [
              U.el('div', { class: 'roster-pick__name' }, npc.name),
              U.el('div', { class: 'roster-pick__role' }, npc.role)
            ]),
            U.el('span', { class: 'tag' }, onField.has(npc.id) ? 'on field' : 'call')
          ]);
          if (onField.has(npc.id)) { pick.style.opacity = '0.45'; pick.disabled = true; }
          scroll.append(pick);
        });
      }
      dialog.append(scroll);
      dialog.append(U.el('div', { class: 'modal-card__close' }, [
        U.el('button', { class: 'btn btn--primary', onclick: () => ov.remove() }, 'Done')
      ]));
      ov.append(dialog);
      document.body.append(ov);
    }

    function save() { Vault.set('lists-state', state); }

    // keyboard: 'n' or right arrow advances the turn when nothing is focused
    this._keyHandler = (e) => {
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
      if (e.key === 'n' || e.key === 'N' || e.key === 'ArrowRight') {
        e.preventDefault();
        nextTurn();
      }
    };
    document.addEventListener('keydown', this._keyHandler);

    render();
  },

  unmount() {
    if (this._keyHandler) {
      document.removeEventListener('keydown', this._keyHandler);
      this._keyHandler = null;
    }
  }
});

/* =========================================================================
   MODULE: QUEST (Exploration Adventure)

   composed beats (Feature + Detail + Hook, drawn from setting-specific

    const ALLY_DEFAULTS = {
      scout:   { hp: 14, mod: 3 }, healer:  { hp: 16, mod: 1 },
      warrior: { hp: 22, mod: 2 }, mage:    { hp: 12, mod: 1 },
      rogue:   { hp: 14, mod: 4 }, bard:    { hp: 14, mod: 2 },
      priest:  { hp: 16, mod: 1 }, archer:  { hp: 14, mod: 3 },
      guard:   { hp: 20, mod: 1 }
    };

    // ===== STATE ======================================================
    function makeEmpty() {
      return {
        status: 'building',
        setting: 'dungeon',
        beatCount: 5,
        climaxType: 'surprise',
        companions: [],
        beats: [],
        beatIdx: 0,
        resolvedClimaxType: null,
        climaxText: '',
        findData: null,
        startedAt: null,
        summary: ''
      };
    }
    let state = (await Vault.get('quest-active')) || makeEmpty();
    if (!state.companions) state.companions = [];
    if (!state.beats) state.beats = [];

    function save() { return Vault.set('quest-active', state); }

    function pickIdx(max) { return Math.floor(Math.random() * max); }
    function dN(count, sides) {
      let t = 0;
      for (let i = 0; i < count; i++) t += 1 + Math.floor(Math.random() * sides);
      return t;
    }
    function randRange(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }

    // Pre-compute companion lookup for rendering
    let allCompanions = (await Vault.get('fellowship')) || [];
    function companionById(id) { return allCompanions.find(c => c.id === id); }

    // ===== BEAT GENERATION ===========================================
    function generateBeats() {
      const setting = SETTINGS[state.setting];
      const usedFeat = new Set(), usedDet = new Set(), usedHook = new Set();
      const pickUnused = (max, used) => {
        if (used.size >= max) used.clear();
        let i;
        do { i = pickIdx(max); } while (used.has(i));
        used.add(i);
        return i;
      };
      const numRegular = state.beatCount - 1;
      state.beats = [];
      for (let i = 0; i < numRegular; i++) {
        const beat = {
          feat: pickUnused(setting.features.length, usedFeat),
          det:  pickUnused(setting.details.length, usedDet),
          hook: pickUnused(setting.hooks.length, usedHook),
          featured: null,
          voiceIdx: 0
        };
        if (state.companions.length && Math.random() < 0.5) {
          beat.featured = state.companions[pickIdx(state.companions.length)];
          beat.voiceIdx = pickIdx(COMPANION_VOICES.length);
        }
        state.beats.push(beat);
      }
      // Resolve climax type
      const climaxType = state.climaxType === 'surprise'
        ? CLIMAX_TYPES[pickIdx(CLIMAX_TYPES.length)]
        : state.climaxType;
      state.resolvedClimaxType = climaxType;
      const climax = setting.climax[climaxType];
      state.climaxText = climax.texts[pickIdx(climax.texts.length)];
      if (climaxType === 'find') {
        state.findData = { ...climax.finds[pickIdx(climax.finds.length)] };
      } else {
        state.findData = null;
      }
    }

    // ===== ACTIONS ===================================================
    async function beginQuest() {
      generateBeats();
      state.status = 'active';
      state.beatIdx = 0;
      state.startedAt = Date.now();
      await save();
      render();
    }

    async function nextBeat() {
      state.beatIdx++;
      if (state.beatIdx >= state.beats.length) {
        state.status = 'climax';
      }
      await save();
      render();
    }

    async function abandonQuest() {
      if (!confirm('Abandon this quest? Progress will be lost.')) return;
      state = makeEmpty();
      await save();
      render();
    }

    // ===== HANDOFFS ==================================================
    async function buildSkirmishAllies() {
      const allies = [];
      for (const id of state.companions) {
        const f = companionById(id);
        if (!f) continue;
        const def = ALLY_DEFAULTS[(f.archetype || '').toLowerCase()] || { hp: 14, mod: 2 };
        allies.push({
          id: U.uid(),
          side: 'ally',
          source: 'fellowship',
          sourceId: f.id,
          name: f.name,
          kind: (f.archetype || 'companion').charAt(0).toUpperCase() + (f.archetype || 'companion').slice(1),
          flavor: f.voice || '',
          hp: { current: def.hp, max: def.hp },
          initMod: def.mod,
          init: 0,
          conditions: [],
          status: 'active'
        });
      }
      return allies;
    }

    function buildSkirmishFoes() {
      const setting = SETTINGS[state.setting];
      const skClimax = setting.climax.skirmish;
      const archetype = skClimax.archetypes[pickIdx(skClimax.archetypes.length)];
      const tier = skClimax.tiers[pickIdx(skClimax.tiers.length)];
      const count = randRange(skClimax.counts[0], skClimax.counts[1]);
      const tierData = TIER_DATA[tier];
      const names = [...FOE_NAMES[archetype]].sort(() => Math.random() - 0.5);
      const foes = [];
      for (let i = 0; i < count; i++) {
        let nm = names[i % names.length];
        if (i >= names.length) nm += ' (' + String.fromCharCode(97 + Math.floor(i / names.length)) + ')';
        const hp = randRange(tierData.hp[0], tierData.hp[1]);
        foes.push({
          id: U.uid(),
          side: 'foe',
          source: 'generated',
          name: nm,
          kind: FOE_LABELS[archetype] + ' (' + tierData.name + ')',
          flavor: '',
          hp: { current: hp, max: hp },
          initMod: tierData.mod,
          init: 0,
          conditions: [],
          status: 'active'
        });
      }
      return foes;
    }

    async function handoffSkirmish() {
      const existing = await Vault.get('skirmish-active');
      if (existing && existing.status === 'active') {
        if (!confirm('A skirmish is already in progress. Replace it?')) return;
      }
      const allies = await buildSkirmishAllies();
      const foes = buildSkirmishFoes();
      const skirmishState = {
        status: 'building',
        combatants: [...allies, ...foes],
        round: 1, turnIdx: 0,
        log: [], startedAt: null, endedAt: null, endPending: false
      };
      await Vault.set('skirmish-active', skirmishState);
      await endQuestPin('Skirmish');
      U.toast('Skirmish prepared. Roll initiative when ready.');
      state = makeEmpty();
      await save();
      await Keep.mount('skirmish');
    }

    async function handoffLoot() {
      const setting = SETTINGS[state.setting];
      await Vault.set('loot-tier', setting.climax.loot.tier);
      await endQuestPin('Loot');
      state = makeEmpty();
      await save();
      await Keep.mount('loot');
    }

    async function handoffFind() {
      const items = (await Vault.get('cabinet')) || [];
      const today = await Refs.today();
      const settingName = SETTINGS[state.setting].name.toLowerCase();
      // If this quest was launched from an Atlas POI, the find traces
      // back to the place. Otherwise it traces back to the quest type.
      const origin = state.originPoi
        ? {
            module: 'atlas',
            mapId: state.originPoi.mapId,
            poiId: state.originPoi.poiId,
            label: state.originPoi.name + ' \u00b7 ' + (state.originPoi.type || 'site')
          }
        : { module: 'quest', label: SETTINGS[state.setting].name + ' quest' };
      items.push({
        id: U.uid(),
        name: state.findData.name,
        kind: state.findData.kind,
        status: 'held',
        description: state.findData.description,
        heldBy: 'the party',
        foundAt: 'on a quest into the ' + settingName,
        foundOn: { ...today },
        worth: 'priceless',
        origin,
        created: Date.now(),
        updated: Date.now()
      });
      await Vault.set('cabinet', items);
      U.toast('Added to the Cabinet');
      await endQuestPin('Find: ' + state.findData.name);
      state = makeEmpty();
      await save();
      render();
    }

    async function walkAway() {
      await endQuestPin('Walked away');
      state = makeEmpty();
      await save();
      render();
    }

    async function endCoda() {
      await endQuestPin('Coda');
      state = makeEmpty();
      await save();
      render();
    }

    async function endQuestPin(climaxLabel) {
      const settingName = SETTINGS[state.setting].name;
      const summary = (state.summary || '').trim();
      const text = 'QUEST [' + settingName + ']: ' +
        (summary || (climaxLabel + ' at the end.'));
      // If the quest was launched from an Atlas POI, the chronicle
      // chip jumps back to the POI on the map rather than to the
      // singleton quest room. Falls back to the quest setting label.
      const origin = state.originPoi
        ? {
            module: 'atlas',
            mapId: state.originPoi.mapId,
            poiId: state.originPoi.poiId,
            label: state.originPoi.name + ' \u00b7 ' + settingName
          }
        : { module: 'quest', label: settingName };
      await Refs.pinToToday(text, origin);
    }

    // ===== RENDER ====================================================
    function render() {
      body.innerHTML = '';
      const wrap = U.el('div', { class: 'quest' });
      body.append(wrap);
      if (state.status === 'building') renderBuilder(wrap);
      else if (state.status === 'active') renderActive(wrap);
      else if (state.status === 'climax') renderClimax(wrap);

      // Actions area
      actions.innerHTML = '';
      if (state.status === 'active' || state.status === 'climax') {
        actions.append(
          U.el('button', {
            class: 'btn btn--ghost btn--small',
            onclick: abandonQuest
          }, 'Abandon Quest')
        );
      }
    }

    // ----- Builder mode --------------------------------------------
    function renderBuilder(wrap) {
      wrap.append(U.el('div', { class: 'quest__intro' },
        'A short going-in. Pick a place, your companions, and the shape of the end.'));

      // If launched from Atlas, surface where this Quest is anchored.
      if (state.originPoi) {
        const banner = U.el('div', { class: 'quest__origin' });
        banner.append(
          U.el('span', { class: 'quest__origin-label' }, 'From the Atlas'),
          U.el('span', { class: 'quest__origin-name' }, state.originPoi.name),
          U.el('span', { class: 'quest__origin-meta' },
            state.originPoi.type + ' \u00B7 ' + state.originPoi.region)
        );
        wrap.append(banner);
      }

      // SETTING
      const settingSection = U.el('div', { class: 'quest__build-section' });
      settingSection.append(U.el('div', { class: 'quest__build-head' }, 'Where'));
      const settingsGrid = U.el('div', { class: 'quest__settings' });
      SETTING_ORDER.forEach(id => {
        const s = SETTINGS[id];
        const card = U.el('button', {
          class: 'quest__setting' + (state.setting === id ? ' quest__setting--selected' : ''),
          onclick: async () => { state.setting = id; await save(); render(); }
        });
        card.append(
          U.el('span', { class: 'quest__setting-name' }, s.name),
          U.el('span', { class: 'quest__setting-sub' }, s.sub),
          s.variants && s.variants.length
            ? U.el('span', { class: 'quest__setting-variants' }, s.variants.join(' \u00B7 '))
            : null
        );
        settingsGrid.append(card);
      });
      settingSection.append(settingsGrid);
      wrap.append(settingSection);

      // BEAT COUNT
      const beatSection = U.el('div', { class: 'quest__build-section' });
      beatSection.append(U.el('div', { class: 'quest__build-head' }, 'How Long'));
      const beatRow = U.el('div', { class: 'quest__option-row' });
      [
        { n: 3, sub: 'quick' },
        { n: 5, sub: 'standard' },
        { n: 7, sub: 'extended' }
      ].forEach(opt => {
        beatRow.append(U.el('button', {
          class: 'quest__option' + (state.beatCount === opt.n ? ' quest__option--selected' : ''),
          onclick: async () => { state.beatCount = opt.n; await save(); render(); }
        }, [opt.n + ' beats', U.el('span', { class: 'quest__option-sub' }, opt.sub)]));
      });
      beatSection.append(beatRow);
      wrap.append(beatSection);

      // CLIMAX TYPE
      const climaxSection = U.el('div', { class: 'quest__build-section' });
      climaxSection.append(U.el('div', { class: 'quest__build-head' }, 'How It Ends'));
      const climaxRow = U.el('div', { class: 'quest__option-row' });
      [
        { id: 'skirmish', label: 'Skirmish', sub: 'a fight at the end' },
        { id: 'loot',     label: 'Loot',     sub: 'a haul to roll' },
        { id: 'find',     label: 'Find',     sub: 'a named thing' },
        { id: 'coda',     label: 'Coda',     sub: 'a quiet end' },
        { id: 'surprise', label: 'Surprise', sub: 'pick at random' }
      ].forEach(opt => {
        climaxRow.append(U.el('button', {
          class: 'quest__option' + (state.climaxType === opt.id ? ' quest__option--selected' : ''),
          onclick: async () => { state.climaxType = opt.id; await save(); render(); }
        }, [opt.label, U.el('span', { class: 'quest__option-sub' }, opt.sub)]));
      });
      climaxSection.append(climaxRow);
      wrap.append(climaxSection);

      // COMPANIONS
      const compSection = U.el('div', { class: 'quest__build-section' });
      compSection.append(U.el('div', { class: 'quest__build-head' }, 'Who Goes With You'));
      const compList = U.el('div', { class: 'quest__companions-list' });
      const eligible = allCompanions.filter(c => c.status === 'hale' || c.status === 'wounded');
      if (!eligible.length) {
        compList.append(U.el('div', { class: 'quest__no-companions' },
          'No hale or wounded companions in the Fellowship. You may quest alone.'));
      } else {
        eligible.forEach(c => {
          const selected = state.companions.includes(c.id);
          const row = U.el('div', {
            class: 'quest__companion-row' + (selected ? ' quest__companion-row--selected' : ''),
            onclick: async () => {
              if (selected) state.companions = state.companions.filter(x => x !== c.id);
              else state.companions.push(c.id);
              await save();
              render();
            }
          });
          row.append(
            U.el('span', { class: 'quest__companion-name' }, c.name),
            U.el('span', { class: 'quest__companion-arch' }, c.archetype || ''),
            U.el('span', { class: 'quest__companion-status quest__companion-status--' + c.status }, c.status)
          );
          compList.append(row);
        });
      }
      compSection.append(compList);
      wrap.append(compSection);

      // BEGIN
      const beginRow = U.el('div', { class: 'quest__begin-row' });
      beginRow.append(U.el('button', {
        class: 'quest__begin',
        onclick: beginQuest
      }, 'Begin the Quest'));
      wrap.append(beginRow);
    }

    // ----- Active mode --------------------------------------------
    function renderActive(wrap) {
      const setting = SETTINGS[state.setting];
      const beat = state.beats[state.beatIdx];

      const head = U.el('div', { class: 'quest__head' });
      // Prefer the Atlas POI's typeLabel when this Quest was launched
      // from a map; it reflects what the player actually picked
      // (e.g. "Monastery" instead of the generic "Castle").
      const whereName = (state.originPoi && state.originPoi.type)
        ? state.originPoi.type.replace(/\b\w/g, c => c.toUpperCase())
        : setting.name;
      head.append(
        U.el('span', { class: 'quest__progress' },
          'Beat ' + (state.beatIdx + 1) + ' of ' + state.beatCount),
        U.el('span', { class: 'quest__where' },
          whereName + (state.originPoi ? ' \u00B7 ' + state.originPoi.name : ''))
      );
      const bar = U.el('div', { class: 'quest__progress-bar' });
      bar.append(U.el('div', {
        class: 'quest__progress-fill',
        style: { width: ((state.beatIdx + 1) / state.beatCount * 100) + '%' }
      }));
      head.append(bar);
      wrap.append(head);

      // Companions ribbon
      if (state.companions.length) {
        const ribbon = U.el('div', { class: 'quest__ribbon' });
        ribbon.append(U.el('span', { class: 'quest__ribbon-label' }, 'with you'));
        state.companions.forEach(id => {
          const c = companionById(id);
          if (!c) return;
          ribbon.append(U.el('span', { class: 'quest__ribbon-name' }, c.name));
        });
        wrap.append(ribbon);
      }

      // Beat card
      const beatCard = U.el('div', { class: 'quest__beat' });
      beatCard.append(U.el('div', { class: 'quest__beat-fleuron' }, '\u2767'));
      const text = setting.features[beat.feat] + ' ' +
        setting.details[beat.det] + ' ' +
        setting.hooks[beat.hook];
      beatCard.append(U.el('div', { class: 'quest__beat-text' }, text));

      if (beat.featured) {
        const c = companionById(beat.featured);
        if (c) {
          const voiceBlock = U.el('div', { class: 'quest__voice' });
          voiceBlock.append(
            U.el('div', { class: 'quest__voice-name' }, c.name),
            U.el('div', { class: 'quest__voice-line' },
              COMPANION_VOICES[beat.voiceIdx].replace('{name}', c.name))
          );
          beatCard.append(voiceBlock);
        }
      }

      const contRow = U.el('div', { class: 'quest__continue-row' });
      const isLast = state.beatIdx === state.beats.length - 1;
      contRow.append(U.el('button', {
        class: 'quest__continue' + (isLast ? ' quest__continue--climax' : ''),
        onclick: nextBeat
      }, isLast ? 'On to the End' : 'Continue'));
      beatCard.append(contRow);
      wrap.append(beatCard);
    }

    // ----- Climax mode --------------------------------------------
    function renderClimax(wrap) {
      const setting = SETTINGS[state.setting];

      // Companions ribbon
      if (state.companions.length) {
        const ribbon = U.el('div', { class: 'quest__ribbon' });
        ribbon.append(U.el('span', { class: 'quest__ribbon-label' }, 'with you'));
        state.companions.forEach(id => {
          const c = companionById(id);
          if (!c) return;
          ribbon.append(U.el('span', { class: 'quest__ribbon-name' }, c.name));
        });
        wrap.append(ribbon);
      }

      const climaxCard = U.el('div', { class: 'quest__climax' });
      climaxCard.append(
        U.el('div', { class: 'quest__climax-head' }, '\u2767 The End of the Way \u2767'),
        U.el('div', { class: 'quest__climax-text' }, state.climaxText)
      );

      if (state.resolvedClimaxType === 'find' && state.findData) {
        const findCard = U.el('div', { class: 'quest__find' });
        findCard.append(
          U.el('div', { class: 'quest__find-label' }, 'You have found'),
          U.el('div', { class: 'quest__find-name' }, state.findData.name),
          U.el('div', { class: 'quest__find-kind' }, state.findData.kind),
          U.el('div', { class: 'quest__find-desc' }, state.findData.description)
        );
        climaxCard.append(findCard);
      }

      // Summary input
      const sumWrap = U.el('div', { class: 'quest__summary-wrap' });
      sumWrap.append(U.el('span', { class: 'quest__summary-label' },
        'Summary for the Almanac (optional)'));
      const sumInput = U.el('input', {
        type: 'text',
        class: 'quest__summary',
        placeholder: 'A line about what happened, in your own words',
        value: state.summary || '',
        oninput: (e) => { state.summary = e.target.value; save(); }
      });
      sumWrap.append(sumInput);
      climaxCard.append(sumWrap);

      // Action buttons (depend on climax type)
      const actionsRow = U.el('div', { class: 'quest__climax-actions' });
      const ct = state.resolvedClimaxType;
      if (ct === 'skirmish') {
        actionsRow.append(
          U.el('button', {
            class: 'quest__action-primary quest__action-primary--skirmish',
            onclick: handoffSkirmish
          }, 'Launch Skirmish'),
          U.el('button', {
            class: 'quest__action-walk',
            onclick: walkAway
          }, 'Walk Away')
        );
      } else if (ct === 'loot') {
        actionsRow.append(
          U.el('button', {
            class: 'quest__action-primary quest__action-primary--loot',
            onclick: handoffLoot
          }, 'Roll the Loot'),
          U.el('button', {
            class: 'quest__action-walk',
            onclick: walkAway
          }, 'Take What You Can')
        );
      } else if (ct === 'find') {
        actionsRow.append(
          U.el('button', {
            class: 'quest__action-primary quest__action-primary--find',
            onclick: handoffFind
          }, 'Add to the Cabinet'),
          U.el('button', {
            class: 'quest__action-walk',
            onclick: walkAway
          }, 'Leave It Where It Lies')
        );
      } else { // coda
        actionsRow.append(
          U.el('button', {
            class: 'quest__action-primary quest__action-primary--coda',
            onclick: endCoda
          }, 'End the Quest')
        );
      }
      climaxCard.append(actionsRow);
      wrap.append(climaxCard);
    }

    render();
  }
});

/* =========================================================================
   MODULE: THE SKIRMISH (Encounter Tracker)
   A combat dashboard, not a combat simulator. Pulls allies from the
   Fellowship and Hall of Faces, generates foes (quick anonymous mooks
   by archetype-and-tier, or named epic bosses with flavor text), tracks
   HP/initiative/conditions/round, auto-logs every action, and on
   encounter end writes a summary to the Almanac and updates Fellowship
   statuses for any allies who went down. Quick dice are available
   inline so the chronicler does not have to leave the room mid-fight.
   ========================================================================= */
Keep.register({
  id: 'skirmish',
  name: 'The Skirmish',
  category: 'table',
  glyph: 'g-skirmish',
  tagline: 'Initiative, wounds, and the noise of steel.',
  sub: 'Build the encounter, run the round, mark the dead.',

  async mount(body, actions) {
    // ===== Data =======================================================
    const ALLY_DEFAULTS = {
      scout:   { hp: 14, mod: 3 },
      healer:  { hp: 16, mod: 1 },
      warrior: { hp: 22, mod: 2 },
      mage:    { hp: 12, mod: 1 },
      rogue:   { hp: 14, mod: 4 },
      bard:    { hp: 14, mod: 2 },
      priest:  { hp: 16, mod: 1 },
      archer:  { hp: 14, mod: 3 },
      guard:   { hp: 20, mod: 1 }
    };
    function allyDefaultsFor(archetype) {
      return ALLY_DEFAULTS[(archetype || '').toLowerCase()] || { hp: 14, mod: 2 };
    }

    const FOE_TYPES = {
      bandit:  { label: 'Bandit',  names: ['Greylock', 'Two-Fingers', 'Ash', 'Cinder', 'Hark', 'Bloodwool', 'Crows', 'Mire', 'Wattle', 'Pin', 'Sten', 'Yarrow'] },
      thief:   { label: 'Thief',   names: ['Quill', 'Sparrow', 'Whisper', 'Soot', 'Patch', 'Vex', 'Nimble', 'Slip', 'Mote', 'Twine', 'Wisp'] },
      soldier: { label: 'Soldier', names: ['Vance', 'Mara', 'Bell', 'Roe', 'Thom', 'Ander', 'Caine', 'Pelt', 'Doryn', 'Hask', 'Eldon'] },
      cultist: { label: 'Cultist', names: ['the Veiled', 'Brother Crow', 'the Pale Witness', 'Sister Ash', 'the Hollow Mouth', 'Brother Salt', 'the Silent', 'Sister Wren'] },
      beast:   { label: 'Beast',   names: ['scarred wolf', 'old bear', 'marsh hound', 'lean wolf', 'broken hound', 'great cat', 'pack-leader', 'rabid stag'] },
      goblin:  { label: 'Goblin',  names: ['Snik', 'Grix', 'Bones', 'Glit', 'Vorek', 'Tikk', 'Skab', 'Pip', 'Drook', 'Rax', 'Nubb'] },
      undead:  { label: 'Undead',  names: ['hanged thief', 'wight in tattered mail', 'moaning revenant', 'pale wanderer', 'bound shade', 'silent walker', 'mournful one'] },
      knight:  { label: 'Knight',  names: ['Sir Bardas', 'Dame Iona', 'Sir Carlon', 'Dame Pelt', 'Sir Hold', 'Dame Verra', 'Sir Maund'] }
    };

    const TIERS = [
